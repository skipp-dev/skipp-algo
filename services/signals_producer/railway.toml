[build]
builder = "DOCKERFILE"
dockerfilePath = "services/signals_producer/Dockerfile"

[deploy]
# Long-running worker: the realtime signal engine polls FMP forever and serves
# the latest signals over /signals (consumed by sibling services on the
# private network).  The engine must bind its telemetry HTTP server to the
# Railway-provided port so /healthz is reachable by Railway's healthcheck.
startCommand = "python -m open_prep.realtime_signals --telemetry-port $PORT"
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "smc-signals-producer"
