# Grafana Cloud Alerting rules for SMC Live Overlay Daemon.
# Import via Grafana UI → Alerting → Alert rules → Import, or provision via API.
#
# Notification channel must be configured separately in Grafana Cloud
# (Slack webhook / Telegram bot / Email).

apiVersion: 1

groups:
  - orgId: 1
    name: live-overlay-critical
    folder: SMC Live Overlay
    interval: 1m
    rules:
      - uid: lo-scrape-missing
        title: "Metrics scrape missing"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: absent(live_overlay_uptime_seconds{job="live_overlay"})
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus is not scraping live-overlay metrics"
          runbook: "Check metrics-collector service and /metrics auth/path wiring."

      - uid: lo-core-signal-missing
        title: "Core readiness signal missing"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: absent(live_overlay_overlay_fresh{job="live_overlay"})
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Core readiness metric missing from scrape output"
          runbook: "Verify daemon /metrics output and exporter logic for overlay_fresh gauge."

      - uid: lo-feed-down-market-open
        title: "Feed unhealthy while market open"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_market_open{job="live_overlay"} * (1 - live_overlay_feed_healthy{job="live_overlay"})
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Live overlay feed is DOWN during market-open for > 5 min"
          runbook: "Check Railway logs for BentoError / circuit breaker. Verify DATABENTO_API_KEY validity."

      - uid: lo-workers-degraded
        title: "Workers unhealthy"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_workers_healthy
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: lt, params: [1]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "One or more worker threads are dead"
          runbook: "Check worker_liveness in /health. Railway may need restart (ON_FAILURE should auto-recover)."

      - uid: lo-overlay-stale
        title: "Overlay data stale"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_overlay_age_seconds
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [3600]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Overlay age > 1h — compute cycle likely hung or erroring"
          runbook: "Check full_compute_cycle_errors rate. Verify feed is pushing bars (last_bar_age_seconds)."

      - uid: lo-no-symbols
        title: "Zero overlay symbols after warmup"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_overlay_symbols
              instant: true
          - refId: B
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_uptime_seconds
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A == 0 && ($B > 600 || resets(live_overlay_uptime_seconds{job=\"live_overlay\"}[10m]) > 0)"
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No symbols computed after 10 min uptime"
          runbook: "Service started but compute cycle never succeeded. Check feed + compute logs."

  - orgId: 1
    name: live-overlay-warning
    folder: SMC Live Overlay
    interval: 5m
    rules:
      - uid: lo-last-bar-stale-open
        title: "Last bar stale while market open"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_market_open{job="live_overlay"} * (live_overlay_last_bar_age_seconds{job="live_overlay"} > bool 300)
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "No fresh bar for > 5 min while market is open"
          runbook: "Check feed thread liveness and Databento connectivity. Compare with feed_healthy/workers_healthy."

      - uid: lo-circuit-breaker-increase
        title: "Circuit breaker triggered (15m)"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: increase(live_overlay_feed_circuit_breakers{job="live_overlay"}[15m])
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 0s
        labels:
          severity: high
        annotations:
          summary: "Feed circuit breaker increased in last 15m"
          runbook: "Persistent Databento outage. Service may need restart if breaker keeps incrementing."

      - uid: lo-bento-errors-rate
        title: "Elevated Databento error rate"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: rate(live_overlay_feed_bento_errors[5m])
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0.1]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Sustained Databento error rate > 0.1/s for 10 min"
          runbook: "Check Databento status page. May indicate API key quota or network issues."

      - uid: lo-auth-denied-spike
        title: "Auth denied spike on smc_live"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: increase(live_overlay_smc_live_auth_denied{job="live_overlay"}[15m])
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [20]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Auth denied requests spiked in the last 15m"
          runbook: "Potential token drift or probing. Validate OVERLAY_SECRET_TOKEN rollout in Pine consumers."

      - uid: lo-request-rate-drop-open
        title: "Request rate near zero while market open"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_market_open{job="live_overlay"} * (rate(live_overlay_smc_live_requests_total{job="live_overlay"}[10m]) < bool 0.001) * (live_overlay_uptime_seconds{job="live_overlay"} > bool 600) * (increase(live_overlay_smc_live_requests_total{job="live_overlay"}[10m]) > bool 5)
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Incoming smc_live request rate dropped near zero during market-open"
          runbook: "Check TradingView consumer health, token rollout, and upstream network path."

      - uid: lo-compute-errors-rate
        title: "Compute cycle errors"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: increase(live_overlay_full_compute_cycle_errors{job="live_overlay"}[15m]) + increase(live_overlay_flow_patch_cycle_errors{job="live_overlay"}[15m])
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Compute cycles are erroring persistently"
          runbook: "Check Railway logs for stack traces in compute.py. Likely data quality issue in cached bars."

      - uid: lo-error-budget-burn-critical
        title: "Error budget burn critical"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: "(1 - (sum(rate(live_overlay_smc_live_success_total{job=\"live_overlay\"}[5m])) / clamp_min(sum(rate(live_overlay_smc_live_requests_total{job=\"live_overlay\"}[5m])), 1e-9))) / 0.01"
              instant: true
          - refId: B
            datasourceUid: grafanacloud-prom
            model:
              expr: "(1 - (sum(rate(live_overlay_smc_live_success_total{job=\"live_overlay\"}[1h])) / clamp_min(sum(rate(live_overlay_smc_live_requests_total{job=\"live_overlay\"}[1h])), 1e-9))) / 0.01"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: "($A > 14) && ($B > 7)"
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error budget burn is critically high"
          runbook: "Inspect error mix, latency p95/p99, and freshness timeline; mitigate request failures immediately."

      - uid: lo-error-budget-burn-warning
        title: "Error budget burn warning"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: "(1 - (sum(rate(live_overlay_smc_live_success_total{job=\"live_overlay\"}[5m])) / clamp_min(sum(rate(live_overlay_smc_live_requests_total{job=\"live_overlay\"}[5m])), 1e-9))) / 0.01"
              instant: true
          - refId: B
            datasourceUid: grafanacloud-prom
            model:
              expr: "(1 - (sum(rate(live_overlay_smc_live_success_total{job=\"live_overlay\"}[1h])) / clamp_min(sum(rate(live_overlay_smc_live_requests_total{job=\"live_overlay\"}[1h])), 1e-9))) / 0.01"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: "($A > 6) && ($B > 3)"
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Error budget burn elevated"
          runbook: "Check request success rate trend and investigate recent failure-type spikes before critical threshold is reached."

      - uid: lo-latency-p99-high
        title: "p99 latency elevated"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_smc_live_latency_p99_ms{job="live_overlay"}
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [500]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency above 500ms for 10m"
          runbook: "Check request volume hotspots and compute/feed health for saturation symptoms."

      - uid: lo-uptimerobot-snapshot-stale
        title: "UptimeRobot snapshot stale"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_uptimerobot_snapshot_age_seconds{job="live_overlay"}
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [180]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "UptimeRobot bridge data is stale"
          runbook: "Check UptimeRobot API key/quota and bridge scrape health state."

      - uid: lo-github-workflow-snapshot-stale
        title: "GitHub workflow snapshot stale"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_github_workflow_snapshot_age_seconds{job="live_overlay"}
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [180]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GitHub workflow bridge data is stale"
          runbook: "Check GitHub workflow token/repo config and bridge scrape status."

      - uid: lo-ingest-queue-depth-high
        title: "Ingest queue depth high"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_feed_ingest_queue_depth{job="live_overlay"}
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [1000]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Ingest queue depth is persistently high"
          runbook: "Backpressure detected: review feed throughput, compute cadence, and queue max setting."

      - uid: lo-ingest-drops-increasing
        title: "Ingest queue drops increasing"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: increase(live_overlay_feed_ingest_queue_dropped_total{job="live_overlay"}[10m])
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 0s
        labels:
          severity: high
        annotations:
          summary: "Bars are being dropped due to ingest queue saturation"
          runbook: "Increase LIVE_OVERLAY_INGEST_QUEUE_MAX and investigate sustained producer-consumer imbalance."

      - uid: lo-news-provider-health-degraded
        title: "News provider health degraded"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: (live_overlay_provider_news_snapshot_loaded{job="live_overlay"} == bool 1) * (live_overlay_provider_news_providers_degraded_total{job="live_overlay"} >= bool 2)
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Multiple news providers are degraded"
          runbook: "Inspect provider error fields in news snapshot and upstream provider quotas/auth."

      - uid: lo-news-snapshot-series-missing
        title: "News snapshot series missing"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: absent(live_overlay_provider_news_snapshot_loaded{job="live_overlay"}) or absent(live_overlay_provider_news_snapshot_age_seconds{job="live_overlay"})
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "News snapshot metrics are missing from scrape output"
          runbook: "Check /metrics exposure for news snapshot gauges and scrape target label wiring."

      - uid: lo-news-snapshot-unavailable
        title: "News snapshot unavailable"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_provider_news_snapshot_loaded{job="live_overlay"} == 0
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "News provider snapshot file is not loaded"
          runbook: "Verify NEWS_SNAPSHOT_PATH exists and is readable by the daemon; check seed/producer job."

      - uid: lo-news-snapshot-stale
        title: "News snapshot stale"
        condition: C
        data:
          - refId: A
            datasourceUid: grafanacloud-prom
            model:
              expr: live_overlay_provider_news_snapshot_loaded{job="live_overlay"} * (live_overlay_provider_news_snapshot_age_seconds{job="live_overlay"} > bool 3600)
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [A]}
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "News provider snapshot is older than 1 hour"
          runbook: "Check NEWS_SNAPSHOT_PATH producer job and file update cadence; inspect fetched_at_unix in snapshot."
