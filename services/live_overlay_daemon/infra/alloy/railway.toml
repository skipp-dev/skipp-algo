[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Grafana Alloy exposes Prometheus self-metrics on the HTTP server; Railway
# should probe that endpoint after the Dockerfile binds the server to $PORT.
healthcheckPath = "/metrics"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "metrics-collector"
