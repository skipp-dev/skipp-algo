# pin_registry.toml — single source of truth for ledger-style audit pins.
#
# Migrated from per-test _FROZEN_* constants per
# docs/adr/0009-pin-ledger-consolidation.md (Option B).
#
# Each top-level table corresponds to exactly one ledger test under
# tests/. The slice is loaded via tests/_pin_registry.py — do not parse
# this file from other locations to keep the schema enforceable.
#
# Editing rules:
#   * Bump counts / add entries only with a CHANGELOG / PR-description
#     note explaining why the new drift is acceptable.
#   * Removing an entry is fine if the underlying site disappeared;
#     the corresponding ledger test will flag stale entries.
#   * Duplicate keys in a single table will fail TOML parsing — drift
#     across two PRs that both add the same path will surface here
#     instead of silently overwriting.

