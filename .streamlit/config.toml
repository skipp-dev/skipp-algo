[server]
headless = true
address = "0.0.0.0"
port = 8501
# Use "auto" locally so file changes trigger hot-reload.
# Override to "none" on Streamlit Cloud via env var
# STREAMLIT_SERVER_FILE_WATCHER_TYPE=none if needed.
fileWatcherType = "auto"

[theme]
base = "dark"

[browser]
gatherUsageStats = false
