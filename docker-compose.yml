# ── SkippALGO Terminal — local / self-hosted deployment ────────
services:
  terminal:
    build: .
    container_name: skippalgo-terminal
    restart: unless-stopped
    ports:
      - "${TERMINAL_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_AUTH_TOKEN=${STREAMLIT_AUTH_TOKEN:-}
      - SMC_TERMINAL_TEST_MODE=0
    volumes:
      - ./artifacts:/app/artifacts
    mem_limit: 2g
    read_only: true
    tmpfs:
      - /tmp
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
