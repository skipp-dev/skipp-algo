# Pre-commit configuration for skipp-algo.
#
# Currently exposes a single local hook that refuses to commit/push
# manifest files leaking pytest provenance (`pytest-of-<user>`,
# `/var/folders/.../T/pytest`, `/tmp/pytest-of-`). The same scanner runs
# in CI via `.github/workflows/manifest-pytest-poison-scan.yml` against
# the entire tracked tree, so this hook is a fast pre-commit fail-fast.
#
# Setup (optional, recommended for committers):
#   pip install pre-commit
#   pre-commit install
repos:
  - repo: local
    hooks:
      - id: scan-manifests-for-pytest-provenance
        name: scan manifests for pytest provenance
        entry: python scripts/scan_manifests_for_pytest_provenance.py
        language: system
        files: 'manifest[^/]*\.json$'
        pass_filenames: true

      # ADR-0005 enforcement: the measurement runtime must remain
      # importable using only the Python 3.13 stdlib. Same AST scan as
      # tests/test_adr_0005_pure_stdlib_runtime.py, exposed as a
      # standalone CLI so contributors catch violations pre-push.
      - id: adr-0005-pure-stdlib-runtime
        name: ADR-0005 pure-stdlib measurement runtime
        entry: python scripts/check_adr_0005_pure_stdlib.py
        language: system
        files: '^scripts/(run_ab_comparison|smc_sprt_stop_rule)\.py$'
        pass_filenames: true

      # Frozen-line-ledger drift guard: local mirror of the authoritative
      # fast-gates "Run pin / ledger drift guard" step. Any added/removed
      # line in a covered source file shifts every line-pinned ledger in
      # that file; running the full set locally pre-push avoids the CI
      # whack-a-mole (2026-06-12: four ledger pins drifted in PR #2729
      # and were only caught in CI). The test list is extracted from
      # smc-fast-pr-gates.yml at runtime (single source of truth).
      # Install with: pre-commit install --hook-type pre-push
      - id: ledger-pin-drift-guard
        name: pin/ledger drift guard (fast-gates parity, ~60s)
        entry: bash scripts/run_ledger_drift_guard.sh
        language: system
        files: '\.(py|toml|ya?ml|sh|pine)$'
        pass_filenames: false
        stages: [pre-push]

      # Branch-safety guard: prints the current branch prominently and
      # blocks any direct commit to `main` or `master`.  Prevents the
      # shared-checkout branch-race failure mode where a commit intended
      # for a feature branch lands on main because another session switched
      # branches between the edit and the commit.
      # Runs on every `git commit` (stage: pre-commit, default).
      - id: branch-safety-guard
        name: branch safety guard (no direct commits to main/master)
        entry: bash scripts/check_branch_safety.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
