# live-window: any-trigger
# ADR-0013 enforcement: reject PRs whose title does not declare exactly one
# concern via the `concern(scope): subject` convention. See
# docs/adr/0013-atomic-vs-cross-cutting-workflow-prs.md and
# scripts/check_pr_title_concern.py.
name: pr-title-concern-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  lint-title:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python toolchain
        uses: ./.github/actions/setup-python-pinned

      - name: Validate PR title declares one concern (ADR-0013)
        # PR title is passed via env (never interpolated into the shell) to
        # avoid script injection through a malicious title.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python scripts/check_pr_title_concern.py
