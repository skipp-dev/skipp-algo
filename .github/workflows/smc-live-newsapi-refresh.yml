# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: smc-live-newsapi-refresh

on:
  schedule:
    - cron: "2 * * * 1-5"  # hourly Mo–Fr (was 2-57/5 / every-5-min; reduced 2026-06-16 — Pine-library bakes only 3×/day so sub-minute polling has no consumer)
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional comma-separated explicit symbol scope"
        required: false
        default: ""
      symbol_limit:
        description: "Base-manifest symbol limit when no explicit symbols are provided"
        required: false
        default: "100"
      reset_state:
        description: "Delete the persisted live-news state before this manual refresh"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: smc-live-newsapi-refresh
  # F-V5-C1 (2026-05-01): hourly cron — queue instead of kill mid-fetch.
  # Killing an in-flight NewsAPI page-iteration mid-call wastes the
  # spent quota and risks a half-written snapshot; serialising the
  # ticks costs at most one delayed run per overrun.
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_SELF_HOSTED_LABEL }}"

  refresh:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 10

    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          persist-credentials: false

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Install Python dependencies
        run: |
          "$SMC_PYTHON_BIN" -m pip install --upgrade pip
          "$SMC_PYTHON_BIN" -m pip install -r requirements.txt

      - name: Restore live-news state from bot/live-news-snapshot
        # WF-004 fix: the cron starts from a fresh checkout of main, which
        # does not carry smc_live_news_state.json. Without restoring the
        # state from the rolling bot branch (where the previous tick
        # force-pushed it), every hourly run starts cold and the dedup /
        # story-window state is effectively empty. Soft-fail: missing branch
        # or missing file is tolerated (first ever run, or branch reset).
        run: |
          set +e
          mkdir -p artifacts/smc_microstructure_exports
          git fetch origin "+refs/heads/bot/live-news-snapshot:refs/remotes/origin/bot/live-news-snapshot" 2>/dev/null
          if git cat-file -e "origin/bot/live-news-snapshot:artifacts/smc_microstructure_exports/smc_live_news_state.json" 2>/dev/null; then
            git show "origin/bot/live-news-snapshot:artifacts/smc_microstructure_exports/smc_live_news_state.json" \
              > artifacts/smc_microstructure_exports/smc_live_news_state.json
            echo "Restored live-news state from bot/live-news-snapshot."
          else
            echo "::notice::no prior state on bot/live-news-snapshot — starting cold (first run or branch reset)"
          fi
          exit 0

      - name: Refresh live news snapshot (NewsAPI.ai + FMP + TradingView)
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          # F (2026-06-22): FMP + TradingView re-enabled alongside NewsAPI.ai.
          # FMP_API_KEY drives the fmp_stock / fmp_press / fmp_articles lanes
          # (active subscription); TradingView is keyless. Benzinga stays off
          # via --skip-benzinga (no active subscription). The provider-health
          # dashboard previously flagged FMP/TV as degraded because the export
          # ran with --newsapi-only, which disabled those lanes despite the
          # live subscriptions being valid.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          INPUT_SYMBOLS: ${{ github.event.inputs.symbols }}
          INPUT_SYMBOL_LIMIT: ${{ github.event.inputs.symbol_limit }}
          INPUT_RESET_STATE: ${{ github.event.inputs.reset_state }}
          NEWSAPI_AI_SHARED_CACHE_TTL_SECONDS: "3900"  # 65 min — keeps cache warm across hourly cadence + light overrun jitter (was 25 s for 5-min cron)
        run: |
          test -n "${NEWSAPI_KEY}" || { echo "::error::NEWSAPI_KEY secret is required"; exit 1; }

          SYMBOLS="${INPUT_SYMBOLS:-}"
          # A2 (2026-06-10): INPUT_* already env-var-isolated;
          # adding format guards for defence-in-depth.
          SYMBOL_LIMIT="${INPUT_SYMBOL_LIMIT:-100}"
          [[ "${SYMBOL_LIMIT}" =~ ^[0-9]+$ ]] || {
            echo "::error::symbol_limit must be a non-negative integer, got: ${SYMBOL_LIMIT}"; exit 1
          }
          RESET_STATE="${INPUT_RESET_STATE:-false}"
          [[ "${RESET_STATE}" =~ ^(true|false)$ ]] || {
            echo "::error::reset_state must be 'true' or 'false', got: ${RESET_STATE}"; exit 1
          }

          if [ "${RESET_STATE}" = "true" ]; then
            rm -f artifacts/smc_microstructure_exports/smc_live_news_state.json
            echo "Reset persisted live-news state before export."
          fi

          "$SMC_PYTHON_BIN" scripts/export_smc_live_news_snapshot.py \
            --symbols "$SYMBOLS" \
            --export-dir artifacts/smc_microstructure_exports \
            --symbol-limit "$SYMBOL_LIMIT" \
            --skip-benzinga \
            --newsapi-lookback-days 2 \
            --newsapi-articles-per-request 100 \
            --story-window-hours 24 \
            --output artifacts/smc_microstructure_exports/smc_live_news_snapshot.json \
            --state artifacts/smc_microstructure_exports/smc_live_news_state.json

      - name: Upload live snapshot artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-live-newsapi-snapshot
          path: |
            artifacts/smc_microstructure_exports/smc_live_news_snapshot.json
            artifacts/smc_microstructure_exports/smc_live_news_state.json
          retention-days: 14

      # F-V5-F1 (2026-05-01): bare push to main is blocked by the
      # `main-governance` ruleset, and a PR per hourly cron tick would
      # spam ~24 PRs/day. The uploaded artifact above is the authoritative
      # live-snapshot delivery channel; consumers that need a git-tracked
      # staleness floor read from the rolling `bot/live-news-snapshot`
      # branch which we force-update here. No bare push, no fake-success
      # warning — every step honestly reports its own outcome.
      - name: Publish snapshot to rolling bot branch
        # Workflow-Audit MITTEL-11 (2026-06): `continue-on-error: true`
        # removed. The step body below is already deliberately fail-loud
        # (F-V5-F1: explicit `if git push … else … exit 1`), but the
        # step-level continue-on-error neutralised exactly that — a
        # permanently failing push (expired PAT, ruleset change) stayed
        # green forever and the bot/live-news-snapshot staleness floor
        # silently rotted. Transient failures self-heal on the next
        # hourly tick; persistent failures must show up red.
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          # F-V3 (audit 2026-05-02): strict mode so unexpected git failures
          # don't silently slip past and mis-report `outcome=pushed`. The
          # explicit `if/exit 0` paths below already match expected rcs.
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add --sparse -f artifacts/smc_microstructure_exports/smc_live_news_snapshot.json artifacts/smc_microstructure_exports/smc_live_news_state.json
          if git diff --cached --quiet; then
            echo "No live snapshot changes to commit."
            exit 0
          fi
          git commit -m "[skip ci] chore: refresh live news snapshot"
          # Force-update the dedicated snapshot branch (allowed by ruleset
          # since `bot/*` is excluded). --force-with-lease guards against
          # accidental overwrite of someone else's manual fix-up commit.
          # actions/checkout fetches a shallow ref by default, so the
          # remote-tracking branch for `bot/live-news-snapshot` does not
          # exist locally and `--force-with-lease` would fall back to its
          # "empty lease" semantics (i.e. unconditionally force-push).
          # Fetch the remote tip first so the lease has a real base to
          # compare against; tolerate the branch not yet existing.
          git fetch origin "+refs/heads/bot/live-news-snapshot:refs/remotes/origin/bot/live-news-snapshot" 2>/dev/null || true
          # F-V5-F1 (2026-05-03): replaced fake-success push pattern (`git`
          # push followed by `|| echo` warning swallow) with an explicit
          # `if git push; then ... else ... fi` block that surfaces real
          # push failures as job failures instead of silently downgrading
          # them to warnings. The cron tick still auto-recovers, but each
          # failed run now shows up red so operators get visibility. The
          # `if git push` form is what tests/test_workflow_auth_pattern.py
          # expects (it explicitly disallows the `if !` negation).
          if git push --force-with-lease=refs/heads/bot/live-news-snapshot origin "HEAD:refs/heads/bot/live-news-snapshot"; then
            echo "Pushed live-news snapshot to bot/live-news-snapshot."
          else
            echo "::warning::live-news snapshot push failed; artifact upload remains available, but bot/live-news-snapshot state may be stale and the next tick can replay stories."
            {
              echo "### ⚠ live-news state persistence warning"
              echo ""
              echo "The snapshot artifact uploaded, but the rolling bot/live-news-snapshot branch push failed. The next cron tick may restore stale story-window state and replay already-seen stories."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi