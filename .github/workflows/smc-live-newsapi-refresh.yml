name: smc-live-newsapi-refresh

on:
  schedule:
    - cron: "2-57/5 * * * 1-5"
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional comma-separated explicit symbol scope"
        required: false
        default: ""
      symbol_limit:
        description: "Base-manifest symbol limit when no explicit symbols are provided"
        required: false
        default: "100"
      reset_state:
        description: "Delete the persisted live-news state before this manual refresh"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: smc-live-newsapi-refresh
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh NewsAPI.ai live snapshot
        env:
          INPUT_SYMBOLS: ${{ github.event.inputs.symbols }}
          INPUT_SYMBOL_LIMIT: ${{ github.event.inputs.symbol_limit }}
          INPUT_RESET_STATE: ${{ github.event.inputs.reset_state }}
          NEWSAPI_AI_SHARED_CACHE_TTL_SECONDS: "25"
        run: |
          NEWSAPI_AI_KEY='${{ secrets.NEWSAPI_AI_KEY }}'
          export NEWSAPI_AI_KEY
          test -n "${NEWSAPI_AI_KEY}" || { echo "::error::NEWSAPI_AI_KEY secret is required"; exit 1; }

          SYMBOLS="${INPUT_SYMBOLS:-}"
          SYMBOL_LIMIT="${INPUT_SYMBOL_LIMIT:-100}"

          if [ "${INPUT_RESET_STATE:-false}" = "true" ]; then
            rm -f artifacts/smc_microstructure_exports/smc_live_news_state.json
            echo "Reset persisted live-news state before export."
          fi

          python scripts/export_smc_live_news_snapshot.py \
            --symbols "$SYMBOLS" \
            --export-dir artifacts/smc_microstructure_exports \
            --symbol-limit "$SYMBOL_LIMIT" \
            --newsapi-only \
            --newsapi-lookback-days 2 \
            --newsapi-articles-per-request 100 \
            --story-window-hours 24 \
            --output artifacts/smc_microstructure_exports/smc_live_news_snapshot.json \
            --state artifacts/smc_microstructure_exports/smc_live_news_state.json

      - name: Upload live snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smc-live-newsapi-snapshot
          path: |
            artifacts/smc_microstructure_exports/smc_live_news_snapshot.json
            artifacts/smc_microstructure_exports/smc_live_news_state.json
          retention-days: 14

      # Direct pushes to main may be blocked by branch protection requiring
      # pull requests and required checks (including fast-gates). The
      # artifact upload above is the authoritative live-snapshot delivery
      # channel; the optional commit below is a best-effort convenience for
      # git-tracked staleness floors and MUST NOT fail the workflow when the
      # protected-branch policy rejects it.
      #
      # If this push is consistently rejected, use the uploaded artifact as
      # the source of truth and either re-run the workflow or update the
      # branch-protection/ruleset configuration before expecting this step
      # to succeed.
      - name: Commit snapshot updates
        # CONTINUE-ON-ERROR-INTENTIONAL: snapshot commit is best-effort; ruleset
        # may transiently block bot push, run still succeeds (idempotent next tick).
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --sparse -f artifacts/smc_microstructure_exports/smc_live_news_snapshot.json artifacts/smc_microstructure_exports/smc_live_news_state.json
          if git diff --cached --quiet; then
            echo "No live snapshot changes to commit."
            exit 0
          fi
          git commit -m "[skip ci] chore: refresh live news snapshot"

          # Retry push with rebase to handle concurrent pushes to main.
          # Push/rebase failures are expected under branch protection and
          # are downgraded to ::warning:: so the run does not show error
          # annotations for an intended/acceptable outcome — the artifact
          # upload above is the authoritative delivery channel.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::warning::Push failed after ${attempt} attempts; relying on uploaded artifact."
              exit 0
            fi

            echo "::warning::Push rejected on attempt ${attempt}; rebasing onto origin/main and retrying."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::warning::Snapshot commit conflicts with newer origin/main; relying on uploaded artifact."
              exit 0
            fi
          done