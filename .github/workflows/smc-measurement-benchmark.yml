# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: smc-measurement-benchmark

on:
  schedule:
    - cron: "0 8 * * 6"    # Saturday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

# F-V5-C2 (2026-05-01): weekly cron benchmark — queue overlapping runs instead
# of killing them so a manual workflow_dispatch cannot truncate the rolling
# measurement series.
concurrency:
  group: smc-measurement-benchmark
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  measurement-benchmark:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run measurement benchmark harness
        run: |
          python scripts/run_smc_measurement_benchmark.py \
            --symbols AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,JPM,BAC,GS,MS,V,UNH,JNJ,HD,XOM,CVX,COP,OXY,CAT \
            --timeframes 5m,15m,1H,4H \
            --output-dir artifacts/ci/measurement_benchmark

      - name: Generate performance reports
        if: always()
        run: |
          for summary in artifacts/ci/measurement_benchmark/**/measurement_summary_*.json; do
            [ -f "$summary" ] && python scripts/smc_performance_report.py "$summary" || true
          done

      - name: Zone priority recalibration + drift check
        run: |
          python scripts/smc_zone_priority_calibration.py \
            --benchmark-dir artifacts/ci/measurement_benchmark \
            --output-path artifacts/ci/measurement_benchmark/zone_priority_calibration.json \
            --check-drift 0.15

      - name: FVG label audit
        if: always()
        run: |
          python scripts/fvg_label_audit.py \
            --benchmark-dir artifacts/ci/measurement_benchmark \
            --output-path artifacts/ci/measurement_benchmark/fvg_label_audit.json

      - name: Upload measurement benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smc-measurement-benchmark-${{ github.run_number }}
          path: artifacts/ci/measurement_benchmark/
          retention-days: 180