# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: smc-measurement-benchmark

on:
  schedule:
    - cron: "0 8 * * 6"    # Saturday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

# F-V5-C2 (2026-05-01): weekly cron benchmark — queue overlapping runs instead
# of killing them so a manual workflow_dispatch cannot truncate the rolling
# measurement series.
concurrency:
  group: smc-measurement-benchmark
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          SMC_FORCE_GH_HOSTED: ${{ vars.SMC_FORCE_GH_HOSTED }}
        run: |
          # Weekly measurement benchmarks are an off-hours batch workload, so
          # they should prefer the priority cron Windows runner when it is
          # online and idle.
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"

  measurement-benchmark:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 90

    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Install dependencies
        run: |
          "$SMC_PYTHON_BIN" -m pip install --upgrade pip
          "$SMC_PYTHON_BIN" -m pip install -r requirements.txt pytest

      - name: Run measurement benchmark harness
        run: |
          "$SMC_PYTHON_BIN" scripts/run_smc_measurement_benchmark.py \
            --symbols AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,JPM,BAC,GS,MS,V,UNH,JNJ,HD,XOM,CVX,COP,OXY,CAT \
            --timeframes 5m,10m,15m,30m,1H,4H,1D \
            --output-dir artifacts/ci/measurement_benchmark

      - name: Generate performance reports
        if: always()
        run: |
          for summary in artifacts/ci/measurement_benchmark/**/measurement_summary_*.json; do
            [ -f "$summary" ] && "$SMC_PYTHON_BIN" scripts/smc_performance_report.py "$summary" || true
          done

      - name: Zone priority recalibration + drift check
        run: |
          "$SMC_PYTHON_BIN" scripts/smc_zone_priority_calibration.py \
            --benchmark-dir artifacts/ci/measurement_benchmark \
            --output-path artifacts/ci/measurement_benchmark/zone_priority_calibration.json \
            --check-drift 0.15

      - name: FVG label audit
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/fvg_label_audit.py \
            --benchmark-dir artifacts/ci/measurement_benchmark \
            --output-path artifacts/ci/measurement_benchmark/fvg_label_audit.json

      - name: Upload measurement benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-measurement-benchmark-${{ github.run_number }}
          path: artifacts/ci/measurement_benchmark/
          retention-days: 180
