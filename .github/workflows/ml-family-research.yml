# live-window: off-hours-only  # ML-RESEARCH-GPU (2026-05-15)
name: ml-family-research

on:
  schedule:
    - cron: "30 10 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Research mode: train | explainability | tune"
        required: false
        default: "explainability"
        type: choice
        options:
          - train
          - explainability
          - tune
      backend:
        description: "Model backend: logistic | xgboost | lightgbm"
        required: false
        default: "xgboost"
        type: choice
        options:
          - logistic
          - xgboost
          - lightgbm
      families:
        description: "Comma-separated family list"
        required: false
        default: "BOS,OB,FVG,SWEEP"
        type: string
      prefer_gpu:
        description: "Prefer the GPU-labelled self-hosted runner when available"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      samples_per_family:
        description: "Synthetic samples per family"
        required: false
        default: "900"
        type: string
      feature_count:
        description: "Synthetic feature count"
        required: false
        default: "16"
        type: string
      trials:
        description: "Optuna trials when mode=tune"
        required: false
        default: "12"
        type: string

permissions:
  contents: read

concurrency:
  group: ml-family-research
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          PREFER_GPU="${{ inputs.prefer_gpu || 'true' }}"
          if [[ "$PREFER_GPU" == "true" ]]; then
            CUSTOM_LABEL="${{ vars.SMC_PRIORITY_CRON_GPU_SELF_HOSTED_LABEL || vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"
          else
            CUSTOM_LABEL="${{ vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"
          fi
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "$CUSTOM_LABEL"

  research:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 45
    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ml.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c \"import sys; print(sys.executable)\")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Install dependencies
        run: |
          "$SMC_PYTHON_BIN" -m pip install --upgrade pip
          "$SMC_PYTHON_BIN" -m pip install -r requirements.txt
          "$SMC_PYTHON_BIN" -m pip install -r requirements-ml.txt

      - name: Resolve research parameters
        id: params
        run: |
          MODE="${{ inputs.mode || 'explainability' }}"
          BACKEND="${{ inputs.backend || 'xgboost' }}"
          FAMILIES="${{ inputs.families || 'BOS,OB,FVG,SWEEP' }}"
          PREFER_GPU="${{ inputs.prefer_gpu || 'true' }}"
          SAMPLES="${{ inputs.samples_per_family || '900' }}"
          FEATURES="${{ inputs.feature_count || '16' }}"
          TRIALS="${{ inputs.trials || '12' }}"
          case "$MODE" in
            train) ARTIFACT_DIR="artifacts/ml/research/training" ;;
            explainability) ARTIFACT_DIR="artifacts/ml/research/explainability" ;;
            tune) ARTIFACT_DIR="artifacts/ml/research/optuna" ;;
            *)
              echo "::error::Unsupported mode $MODE"
              exit 1
              ;;
          esac
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "families=$FAMILIES" >> "$GITHUB_OUTPUT"
          echo "prefer_gpu=$PREFER_GPU" >> "$GITHUB_OUTPUT"
          echo "samples=$SAMPLES" >> "$GITHUB_OUTPUT"
          echo "features=$FEATURES" >> "$GITHUB_OUTPUT"
          echo "trials=$TRIALS" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"

      - name: Select ML device
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "self-hosted" && "${{ steps.params.outputs.prefer_gpu }}" == "true" ]]; then
            echo "SKIPP_ML_DEVICE=cuda" >> "$GITHUB_ENV"
            echo "::notice::ML research will request the GPU backend."
          else
            echo "SKIPP_ML_DEVICE=cpu" >> "$GITHUB_ENV"
            echo "::notice::ML research is running on the CPU path."
          fi

      - name: Run research mode
        run: |
          set -euo pipefail
          case "${{ steps.params.outputs.mode }}" in
            train)
              "$SMC_PYTHON_BIN" scripts/run_ml_family_training.py \
                --backend "${{ steps.params.outputs.backend }}" \
                --device "$SKIPP_ML_DEVICE" \
                --families "${{ steps.params.outputs.families }}" \
                --samples-per-family "${{ steps.params.outputs.samples }}" \
                --feature-count "${{ steps.params.outputs.features }}" \
                --output-path "${{ steps.params.outputs.artifact_dir }}/latest.json" \
                2>&1 | tee ml_family_research.log
              ;;
            explainability)
              "$SMC_PYTHON_BIN" scripts/run_ml_explainability_report.py \
                --backend "${{ steps.params.outputs.backend }}" \
                --device "$SKIPP_ML_DEVICE" \
                --families "${{ steps.params.outputs.families }}" \
                --samples-per-family "${{ steps.params.outputs.samples }}" \
                --feature-count "${{ steps.params.outputs.features }}" \
                --output-path "${{ steps.params.outputs.artifact_dir }}/latest.json" \
                --markdown-path "${{ steps.params.outputs.artifact_dir }}/latest.md" \
                2>&1 | tee ml_family_research.log
              ;;
            tune)
              "$SMC_PYTHON_BIN" scripts/run_ml_optuna_tuning.py \
                --backend "${{ steps.params.outputs.backend }}" \
                --device "$SKIPP_ML_DEVICE" \
                --families "${{ steps.params.outputs.families }}" \
                --samples-per-family "${{ steps.params.outputs.samples }}" \
                --feature-count "${{ steps.params.outputs.features }}" \
                --trials "${{ steps.params.outputs.trials }}" \
                --output-path "${{ steps.params.outputs.artifact_dir }}/latest.json" \
                2>&1 | tee ml_family_research.log
              ;;
          esac

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## ml-family-research"
            echo ""
            echo "- mode: \`${{ steps.params.outputs.mode }}\`"
            echo "- backend: \`${{ steps.params.outputs.backend }}\`"
            echo "- requested device: \`${SKIPP_ML_DEVICE:-cpu}\`"
            echo "- runner environment: \`${{ needs.select-runner.outputs.runner_environment }}\`"
            echo "- artifact dir: \`${{ steps.params.outputs.artifact_dir }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload research artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ml-family-research-${{ steps.params.outputs.mode }}-${{ github.run_id }}
          path: |
            ml_family_research.log
            ${{ steps.params.outputs.artifact_dir }}/
          if-no-files-found: ignore
          retention-days: 30