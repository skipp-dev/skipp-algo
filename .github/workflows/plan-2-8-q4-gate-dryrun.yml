# live-window: manual-only  # F-V6-F2.1 (2026-05-02)
name: plan-2.8 q4-gate dryrun

# Manual-only dry-run of the Plan 2.8 S3.2 Q4-gate evaluator.
# Operators fire this at W13 review with a prepared A/B bundle JSON
# (either pushed to a branch or uploaded as a workflow input path)
# to get a reproducible pass/fail verdict + markdown summary without
# running the full rolling benchmark.

on:
  workflow_dispatch:
    inputs:
      bundle_path:
        description: "Repo-relative path to the Q4-gate input bundle JSON."
        required: true
        default: "artifacts/plan_2_8_q4_gate_bundle.json"
      uplift_min_pp:
        description: "G1 uplift threshold (pp, default 0.03)."
        required: false
        default: "0.03"
      uplift_min_buckets:
        description: "G1 required bucket count (default 2)."
        required: false
        default: "2"
      brier_max_regression:
        description: "G2 max Brier regression (default 0.02)."
        required: false
        default: "0.02"
      min_events_per_bucket:
        description: "G3 min events per bucket (default 30)."
        required: false
        default: "30"

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

jobs:
  q4-gate-dryrun:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-m' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run Q4-gate evaluator
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/q4_gate
          python scripts/plan_2_8_q4_gate_evaluator.py \
            --bundle "${{ inputs.bundle_path }}" \
            --uplift-min-pp "${{ inputs.uplift_min_pp }}" \
            --uplift-min-buckets "${{ inputs.uplift_min_buckets }}" \
            --brier-max-regression "${{ inputs.brier_max_regression }}" \
            --min-events-per-bucket "${{ inputs.min_events_per_bucket }}" \
            --output artifacts/q4_gate/plan_2_8_q4_gate_verdict.json \
            --format md \
            | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-q4-gate-verdict
          path: artifacts/q4_gate/plan_2_8_q4_gate_verdict.json
          if-no-files-found: warn
          retention-days: 90
