name: run-open-prep-daily

# Daily pre-open scoring run. Generates a fresh `outcomes_<date>.json`
# that the existing `open-prep-outcome-backfill` workflow will label
# ~30 min after RTH open via Databento RTH bars. This is what grows
# the FI labeled-sample corpus toward the G1 acceptance gate (>= 30
# labeled samples). Without this scheduled producer, the backfill has
# nothing new to label and the FI report stays at `insufficient_labels`.

on:
  schedule:
    # 13:00 UTC weekdays — covers both DST regimes:
    #   * EDT (UTC-4): 09:00 ET — 30 min before RTH open at 09:30 ET.
    #   * EST (UTC-5): 08:00 ET — 90 min before RTH open at 09:30 ET.
    # Both windows are firmly inside the pre-open window the scorer
    # is designed for.
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      universe_source:
        description: "Universe source: fmp_us_mid_large (default) or static"
        required: false
        default: "fmp_us_mid_large"
      top:
        description: "How many ranked candidates to keep"
        required: false
        default: "10"
      trade_cards:
        description: "How many trade cards to generate"
        required: false
        default: "5"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: run-open-prep-daily
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"

jobs:
  run:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-m' }}
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # GH_PAT is required so the `bot/*` push + `gh pr create` below
          # trigger the `fast-gates` required check. Workflows opened with
          # the default GITHUB_TOKEN do NOT spawn child workflows, which
          # leaves the PR stuck in BLOCKED with `fast-gates` "expected"
          # forever (observed on PR #103, run 24894798260).
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run open-prep scoring
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          BENZINGA_API_KEY: ${{ secrets.BENZINGA_API_KEY }}
          NEWSAPI_AI_KEY: ${{ secrets.NEWSAPI_AI_KEY }}
          OPEN_PREP_LOG_LEVEL: INFO
          OPEN_PREP_CODE_VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/open_prep/runs
          UNIVERSE="${{ github.event.inputs.universe_source || 'fmp_us_mid_large' }}"
          TOP="${{ github.event.inputs.top || '10' }}"
          CARDS="${{ github.event.inputs.trade_cards || '5' }}"
          DATE_TAG="$(date -u +%Y%m%dT%H%M%SZ)"
          OUT="artifacts/open_prep/runs/run_${DATE_TAG}.json"
          # Stream stdout (the result payload) to a per-run artifact for
          # later inspection; the side-effect we actually care about is
          # `artifacts/open_prep/outcomes/outcomes_<today>.json` which
          # `store_daily_outcomes()` writes during the run and which the
          # outcome-backfill workflow later resolves into FI labels.
          python -m open_prep.run_open_prep \
            --universe-source "$UNIVERSE" \
            --top "$TOP" \
            --trade-cards "$CARDS" \
            --pre-open-only \
            > "$OUT"
          echo "Wrote run payload: $OUT ($(wc -c < "$OUT") bytes)"
          ls -la artifacts/open_prep/outcomes/ || true

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-open-prep-${{ github.run_id }}
          path: |
            artifacts/open_prep/runs/
            artifacts/open_prep/outcomes/
          if-no-files-found: warn

      - name: Commit fresh outcomes via auto-merge PR
        # The repo's `main-governance` ruleset targets only ~DEFAULT_BRANCH,
        # so we can push to fresh `bot/*` branches and open an auto-merge PR.
        # Final merge into `main` still goes through pull_request +
        # required_status_checks. We MUST authenticate with GH_PAT (not the
        # default GITHUB_TOKEN) for both the push and `gh pr create` — GitHub
        # suppresses workflow triggers for events generated by GITHUB_TOKEN,
        # which leaves the required `fast-gates` check "expected" forever and
        # the PR stuck in BLOCKED (observed on PR #103, run 24894798260).
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/open_prep/outcomes/ || true
          if git diff --staged --quiet; then
            echo "No new outcomes to commit."
            exit 0
          fi
          BRANCH="bot/run-open-prep-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "chore(open_prep): daily run outcomes ${GITHUB_RUN_ID}"
          git push -u origin "$BRANCH"
          # F-V6-I2.1 (2026-05-02): previously this `gh pr create` was suffixed
          # with `|| true`, which silently swallowed real PR-creation failures
          # (auth issues, branch-protection refusals, transient API errors) and
          # left the workflow green with no follow-up PR. Surface as ::error::
          # and fail the job so the daily outcomes cannot be lost.
          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --label automated \
            --title "chore(open_prep): daily run outcomes ${GITHUB_RUN_ID}" \
            --body "Automated pre-open scoring run from \`run-open-prep-daily\` (run ${GITHUB_RUN_ID}). Adds today's outcomes_*.json so the outcome-backfill workflow can label it later for the FI corpus."; then
            echo "::error file=.github/workflows/run-open-prep-daily.yml::gh pr create failed for ${BRANCH} — see step log for stderr"
            exit 1
          fi
          # CONTINUE-ON-ERROR-INTENTIONAL: enabling auto-merge can race with
          # branch-protection / required-status-check evaluation; the PR itself
          # is already open and reviewable, so we surface as warning rather
          # than failing the job.
          gh pr merge "$BRANCH" --auto --squash --delete-branch \
            || echo "::warning::auto-merge enable failed for ${BRANCH} (PR is open and reviewable)"
