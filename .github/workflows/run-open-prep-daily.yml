# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: run-open-prep-daily

# Schedule: 13:00 UTC weekdays — 30 min before trading window opens at 13:30 UTC (audit F-V3-14, 2026-05-01)
#
# Daily pre-open scoring run. Generates a fresh `outcomes_<date>.json`
# that the existing `open-prep-outcome-backfill` workflow will label
# ~30 min after RTH open via Databento RTH bars. This is what grows
# the FI labeled-sample corpus toward the G1 acceptance gate (>= 30
# labeled samples). Without this scheduled producer, the backfill has
# nothing new to label and the FI report stays at `insufficient_labels`.

on:
  schedule:
    # 13:00 UTC weekdays — covers both DST regimes:
    #   * EDT (UTC-4): 09:00 ET — 30 min before RTH open at 09:30 ET.
    #   * EST (UTC-5): 08:00 ET — 90 min before RTH open at 09:30 ET.
    # Both windows are firmly inside the pre-open window the scorer
    # is designed for.
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      universe_source:
        description: "Universe source: fmp_us_mid_large (default) or static"
        required: false
        default: "fmp_us_mid_large"
      top:
        description: "How many ranked candidates to keep"
        required: false
        default: "10"
      trade_cards:
        description: "How many trade cards to generate"
        required: false
        default: "5"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: run-open-prep-daily
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}

defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"

  run:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 35
    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # GH_PAT is required so the `bot/*` push + `gh pr create` below
          # trigger the `fast-gates` required check. Workflows opened with
          # the default GITHUB_TOKEN do NOT spawn child workflows, which
          # leaves the PR stuck in BLOCKED with `fast-gates` "expected"
          # forever (observed on PR #103, run 24894798260).
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          persist-credentials: false

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Install Python dependencies
        run: |
          "$SMC_PYTHON_BIN" -m pip install --upgrade pip
          "$SMC_PYTHON_BIN" -m pip install -r requirements.txt

      - name: Run open-prep scoring
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          BENZINGA_API_KEY: ${{ secrets.BENZINGA_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          OPEN_PREP_LOG_LEVEL: INFO
          OPEN_PREP_CODE_VERSION: ${{ github.sha }}
          # A2 (2026-06-10): env-var indirection for user-supplied inputs.
          INPUT_UNIVERSE: ${{ github.event.inputs.universe_source || 'fmp_us_mid_large' }}
          INPUT_TOP: ${{ github.event.inputs.top || '10' }}
          INPUT_CARDS: ${{ github.event.inputs.trade_cards || '5' }}
        run: |
          set -euo pipefail
          # A2: validate before use.
          [[ "${INPUT_UNIVERSE}" =~ ^[A-Za-z0-9_]+$ ]] || {
            echo "::error::universe_source must be alphanumeric/underscore, got: ${INPUT_UNIVERSE}"; exit 1
          }
          [[ "${INPUT_TOP}" =~ ^[0-9]+$ ]] || {
            echo "::error::top must be a non-negative integer, got: ${INPUT_TOP}"; exit 1
          }
          [[ "${INPUT_CARDS}" =~ ^[0-9]+$ ]] || {
            echo "::error::trade_cards must be a non-negative integer, got: ${INPUT_CARDS}"; exit 1
          }
          mkdir -p artifacts/open_prep/runs
          UNIVERSE="${INPUT_UNIVERSE}"
          TOP="${INPUT_TOP}"
          CARDS="${INPUT_CARDS}"
          DATE_TAG="$(date -u +%Y%m%dT%H%M%SZ)"
          OUT="artifacts/open_prep/runs/run_${DATE_TAG}.json"
          # Stream stdout (the result payload) to a per-run artifact for
          # later inspection; the side-effect we actually care about is
          # `artifacts/open_prep/outcomes/outcomes_<today>.json` which
          # `store_daily_outcomes()` writes during the run and which the
          # outcome-backfill workflow later resolves into FI labels.
          "$SMC_PYTHON_BIN" -m open_prep.run_open_prep \
            --universe-source "$UNIVERSE" \
            --top "$TOP" \
            --trade-cards "$CARDS" \
            --pre-open-only \
            > "$OUT"
          echo "Wrote run payload: $OUT ($(wc -c < "$OUT") bytes)"
          ls -la artifacts/open_prep/outcomes/ || true

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: run-open-prep-${{ github.run_id }}
          path: |
            artifacts/open_prep/runs/
            artifacts/open_prep/outcomes/
          if-no-files-found: warn

      - name: Publish open-prep snapshot to rolling bot branch
        # Task F-V8 (2026-06-23): the artifact upload above is the
        # authoritative per-run snapshot, but downstream consumers (the
        # realtime-signals producer) need a git-tracked, stable-path copy
        # of latest_open_prep_run.json. The `main-governance` ruleset blocks
        # bare pushes to main and a daily PR would add noise, so — exactly
        # like smc-live-newsapi-refresh — we force-update the dedicated
        # `bot/live-open-prep-snapshot` branch (allowed: `bot/*` is excluded
        # from the ruleset). No `continue-on-error`: the block is fail-loud so
        # a permanently broken push (expired PAT, ruleset change) shows red.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          SNAPSHOT="artifacts/open_prep/latest/latest_open_prep_run.json"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "::warning::run produced no $SNAPSHOT; skipping snapshot publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Isolate the snapshot commit on a detached HEAD so the workflow's
          # checkout is left untouched: the later "Commit fresh outcomes" step
          # branches from the original SHA and its PR diff must NOT carry this
          # gitignored snapshot file.
          START_SHA="$(git rev-parse HEAD)"
          # actions/checkout is shallow, so the remote-tracking ref does not
          # exist locally and --force-with-lease would degrade to an empty
          # lease (unconditional force). Fetch the tip first for a real base.
          git fetch origin "+refs/heads/bot/live-open-prep-snapshot:refs/remotes/origin/bot/live-open-prep-snapshot" 2>/dev/null || true
          git checkout --detach --quiet "$START_SHA"
          git add --sparse -f "$SNAPSHOT"
          if git diff --cached --quiet; then
            echo "No open-prep snapshot changes to publish."
            git checkout --quiet "$START_SHA"
            exit 0
          fi
          git commit -m "[skip ci] chore: refresh open-prep snapshot"
          # `if git push` positive form is what tests/test_workflow_auth_pattern.py
          # requires (it disallows the `if !` negation). Surface real push
          # failures as a red job, not a swallowed warning.
          if git push --force-with-lease=refs/heads/bot/live-open-prep-snapshot origin "HEAD:refs/heads/bot/live-open-prep-snapshot"; then
            echo "Pushed open-prep snapshot to bot/live-open-prep-snapshot."
            git checkout --quiet "$START_SHA"
          else
            echo "::warning::open-prep snapshot push failed; the per-run artifact remains available, but bot/live-open-prep-snapshot may be stale."
            {
              echo "### ⚠ open-prep snapshot persistence warning"
              echo ""
              echo "The per-run artifact uploaded, but the rolling bot/live-open-prep-snapshot branch push failed. Consumers reading the stable snapshot path may see stale data until the next daily run."
            } >> "$GITHUB_STEP_SUMMARY"
            git checkout --quiet "$START_SHA" || true
            exit 1
          fi

      - name: Commit fresh outcomes via auto-merge PR
        # The repo's `main-governance` ruleset targets only ~DEFAULT_BRANCH,
        # so we can push to fresh `bot/*` branches and open an auto-merge PR.
        # Final merge into `main` still goes through pull_request +
        # required_status_checks. We MUST authenticate with GH_PAT (not the
        # default GITHUB_TOKEN) for both the push and `gh pr create` — GitHub
        # suppresses workflow triggers for events generated by GITHUB_TOKEN,
        # which leaves the required `fast-gates` check "expected" forever and
        # the PR stuck in BLOCKED (observed on PR #103, run 24894798260).
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add artifacts/open_prep/outcomes/ || true
          if git diff --staged --quiet; then
            echo "No new outcomes to commit."
            exit 0
          fi
          BRANCH="bot/run-open-prep-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git commit -m "chore(open_prep): daily run outcomes ${GITHUB_RUN_ID}"
          git push -u origin "$BRANCH"
          # F-V6-I2.1 (2026-05-02): previously this `gh pr create` was suffixed
          # with `|| true`, which silently swallowed real PR-creation failures
          # (auth issues, branch-protection refusals, transient API errors) and
          # left the workflow green with no follow-up PR. Surface as ::error::
          # and fail the job so the daily outcomes cannot be lost.
          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --label automated \
            --title "chore(open_prep): daily run outcomes ${GITHUB_RUN_ID}" \
            --body "Automated pre-open scoring run from \`run-open-prep-daily\` (run ${GITHUB_RUN_ID}). Adds today's outcomes_*.json so the outcome-backfill workflow can label it later for the FI corpus."; then
            echo "::error file=.github/workflows/run-open-prep-daily.yml::gh pr create failed for ${BRANCH} — see step log for stderr"
            exit 1
          fi
          # CONTINUE-ON-ERROR-INTENTIONAL: enabling auto-merge can race with
          # branch-protection / required-status-check evaluation; the PR itself
          # is already open and reviewable, so we surface as warning rather
          # than failing the job.
          gh pr merge "$BRANCH" --auto --squash --delete-branch \
            || echo "::warning::auto-merge enable failed for ${BRANCH} (PR is open and reviewable)"
