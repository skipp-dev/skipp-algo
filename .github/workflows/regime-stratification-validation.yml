# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: regime-stratification-validation

# C5/T6 acceptance: weekly determinism + property test of the
# regime-stratification module so any silent regression surfaces
# inside one week instead of waiting for the public-report consumer.

on:
  schedule:
    # Mondays 09:00 UTC, after the weekend deploy window closed.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: regime-stratification-validation
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

jobs:
  validate:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-l' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regime-stratification test suite (xdist)
        run: |
          python -m pytest tests/test_regime_stratification.py \
            -q --no-cov -n auto --dist=loadfile
