# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: regime-stratification-validation

# C5/T6 acceptance: weekly determinism + property test of the
# regime-stratification module so any silent regression surfaces
# inside one week instead of waiting for the public-report consumer.

on:
  schedule:
    # Mondays 09:00 UTC, after the weekend deploy window closed.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: regime-stratification-validation
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  # Job-id intentionally distinct from CI's "validate" so the check-context
  # names emitted by GitHub Actions do not collide. Branch-protection
  # required-checks match by context name; a collision would let either
  # workflow's run satisfy the requirement (or, when only one runs,
  # leave the other "pending" forever). See audit 2026-05-29.
  regime-validate:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regime-stratification test suite (xdist)
        run: |
          python -m pytest tests/test_regime_stratification.py \
            -q --no-cov -n auto --dist=loadfile
