# live-window: deprecated-workflow_dispatch-only  # F-V8-cutover (2026-05-18)
# ---------------------------------------------------------------------------
# smc-databento-production-export  (DEPRECATED)
#
# F-V8-cutover (2026-05-18): the daily 2x cron has been moved to the
# sharded producer (smc-databento-production-export-sharded.yml). This
# monolithic workflow is kept on workflow_dispatch ONLY as a one-cycle
# emergency fallback. After 7 days of green sharded crons it can be
# deleted entirely.
# ---------------------------------------------------------------------------
#
# Daily-windowed Databento volatility production export. Materializes the
# canonical `databento_volatility_production_*_manifest.json` (plus its
# companion workbook + frame parquets) under
# `artifacts/smc_microstructure_exports/` and exposes them to downstream
# workflows via:
#
#   1) GitHub Actions cache (key `smc-prod-export-<os>-<YYYY-MM-DD>`) so
#      `smc-library-refresh.yml` can restore the bundle in its
#      "Refresh release reference artifacts" step without re-running the
#      Databento pull.
#   2) A retained workflow artifact (`smc-databento-production-export`)
#      for ad-hoc inspection / replay.
#
# Why this exists:
#   `scripts/run_smc_pre_release_artifact_refresh.py` (called by
#   smc-library-refresh.yml) loads its reference symbol/timeframe bundles
#   via `manifest_prefix=databento_volatility_production_`. Prior to this
#   workflow that manifest was only ever generated on a developer
#   workstation, so library-refresh had been red since 2026-04-24 with
#   `canonical export bundle unavailable for symbol=…`.
#
# Schedule:
#   F-V8-C4 (2026-05-06) restructured the cron from 4×/day to 2×/day in
#   lockstep with the consumer. This workflow now runs at 12:00 / 16:00
#   UTC on weekdays; the library-refresh consumer fires 240 min later
#   (16:00 / 20:00 UTC), so each producer tick gets a dedicated 4 h
#   handoff window — enough headroom for the worst observed runtime
#   (~2 h 0 min, n=1/n=2/n=3 cap-busts at 120 min). The handoff itself is
#   artifact-based: the producer publishes via `actions/upload-artifact`
#   and the consumer fetches via `dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21`
#   (regex match on the latest successful run for the same ref). The
#   `actions/cache/restore` step in the consumer is for an unrelated
#   `incremental_base_seed` cache, not the producer→consumer handoff.
#
# Required secrets:
#   DATABENTO_API_KEY   – mandatory (producer hard-fails without it)
#   GH_PAT              – optional, used by checkout to inherit higher
#                         scopes when present; falls back to GITHUB_TOKEN
#   FMP_API_KEY         – optional (FMP enrichment is skipped when unset)
#   BENZINGA_API_KEY    – optional (Benzinga news comparison is skipped)
# ---------------------------------------------------------------------------

name: smc-databento-production-export

on:
  # F-V8-cutover (2026-05-18): cron triggers removed; daily schedule is
  # now owned by smc-databento-production-export-sharded.yml. Keep
  # workflow_dispatch as a one-cycle emergency fallback only.
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Override --lookback-days (default 30)"
        required: false
        default: "30"
      force_refresh:
        description: "Pass --force-refresh to bypass the file cache"
        required: false
        default: "false"

# F-V8-C3.1-D (2026-05-02): serialize producer runs per ref so a slow
# export (now permitted up to 240 min via F-V8-C4, 2026-05-06) cannot be
# raced by the next 4-hour cron tick. cancel-in-progress=false because
# killing a half-finished export would leave the consumer (smc-library-
# refresh) reading a stale or partial artifact at its next handoff
# window. The follow-on tick queues instead and runs once the in-flight
# job exits.
concurrency:
  group: smc-databento-production-export-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# F-V5-C2 (2026-05-01) → superseded by F-V8-C3.1-D (2026-05-02) per-ref
# block above; the prior ref-less `concurrency:` declaration was removed
# 2026-05-03 because YAML last-wins silently overrode the per-ref intent.

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  EXPORT_DIR: artifacts/smc_microstructure_exports
  PRODUCER_RUNNER_LABEL: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          SMC_FORCE_GH_HOSTED: ${{ vars.SMC_FORCE_GH_HOSTED }}
        run: |
          # The producer has documented high-RSS/OOM history during canonical
          # export generation. This monolith is DEPRECATED and kept only as a
          # workflow_dispatch emergency fallback, so it no longer hard-routes to
          # the (inactive) self-hosted pool: fall back to github-hosted when the
          # runner inventory cannot be queried.
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}" \
            --inventory-unavailable-fallback hosted

  export:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    # F-V8-C3.1 (2026-05-02): bumped 60→120 after 12 consecutive runs were
    # killed by the 60-min cap with runtimes 62–75 min (no successful run for
    # days). The intent of the F-V6-C3 tight cap was protecting the consumer
    # from stale data, but a producer that *never* finishes provides no data
    # at all — a strictly worse failure mode. F-V8-C4 (2026-05-06) bumped
    # 120 → 240 in lockstep with the cron restructure (4×→2×): the new
    # 4 h cron interval is matched by this 240-min cap, so back-to-back
    # runs still cannot overlap. Three consecutive 120-min cap-busts
    # (n=1/n=2/n=3) confirmed the producer's worst-case runtime exceeds
    # 2 h. Once a follow-up PR resolves the Step 6/6b/8 backend bias, this
    # cap can be tightened again. Pin test enforces producer ≤ consumer.
    timeout-minutes: 240

    steps:
      - name: Set export date
        id: date
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "EXPORT_DATE=${DATE}" >> "$GITHUB_ENV"
          echo "export_date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Emit runner selection
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"
          echo "::notice::Producer job running on '${{ runner.name }}' (environment=${{ needs.select-runner.outputs.runner_environment }})."

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          persist-credentials: false

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      # F-V8-perf (2026-05-18): uv installer (mirrors ci.yml + #2285/#2286).
      # Cache enabled only on GitHub-hosted; self-hosted relies on the local
      # on-disk uv cache.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: ${{ needs.select-runner.outputs.runner_environment == 'github-hosted' && 'true' || 'false' }}
          cache-dependency-glob: requirements*.txt

      - name: Install Python dependencies
        run: |
          uv pip install --system -r requirements.txt

      # F-V5-D2 (2026-05-01): the previous handoff used actions/cache as a
      # cross-workflow conduit, which is unsupported on github.com (caches are
      # branch-scoped) and silently broken on enterprise runners. The bundle is
      # now published exclusively via actions/upload-artifact below; the
      # downstream library-refresh consumer pulls it via
      # dawidd6/action-download-artifact (F-V5-D3).

      # F-V8-perf (2026-05-18): warm the Databento on-disk file-cache between
      # github-hosted runs. The producer sets `use_file_cache=True` and uses
      # `REPO_ROOT/artifacts/databento_volatility_cache/` as cache_dir
      # (databento_production_export.py:4572; gitignored at line 54). On
      # self-hosted runners the cache survives between runs naturally on disk,
      # so this step is skipped there. The per-day key gives same-day re-runs
      # an exact hit; the `databento-cache-<os>-` restore-keys prefix gives
      # cross-day partial hits (most bar files are unchanged across consecutive
      # 30-day-rolling windows). `--force-refresh` on workflow_dispatch still
      # bypasses the cache content at runtime regardless of restore.
      - name: Restore Databento file cache (github-hosted only)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        id: databento_file_cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: artifacts/databento_volatility_cache
          key: databento-cache-${{ runner.os }}-${{ env.EXPORT_DATE }}-${{ github.run_id }}
          restore-keys: |
            databento-cache-${{ runner.os }}-${{ env.EXPORT_DATE }}-
            databento-cache-${{ runner.os }}-

      - name: Report Databento cache-restore telemetry
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        run: |
          set +e
          CACHE_DIR="artifacts/databento_volatility_cache"
          if [ -d "$CACHE_DIR" ]; then
            FILE_COUNT=$(find "$CACHE_DIR" -type f | wc -l)
            BYTES=$(du -sb "$CACHE_DIR" 2>/dev/null | awk '{print $1}')
            echo "::notice::databento file-cache restored: files=${FILE_COUNT} bytes=${BYTES:-0} matched-key='${{ steps.databento_file_cache.outputs.cache-matched-key }}' hit=${{ steps.databento_file_cache.outputs.cache-hit }}"
          else
            echo "::notice::databento file-cache: cold start (no prior cache restored)"
          fi

      - name: Run Databento production export
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          BENZINGA_API_KEY: ${{ secrets.BENZINGA_API_KEY }}
          DATABENTO_DATASET: ${{ vars.DATABENTO_DATASET }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '30' }}
          FORCE_REFRESH_FLAG: ${{ inputs.force_refresh == 'true' && '--force-refresh' || '' }}
          PYTHONUNBUFFERED: "1"
          # Q3a (post-Probe-v3, 2026-05-10): activate the parallel-fetch cure
          # landed in Q3 (#2098) for Step 5/10 (load_daily_bars). 4 workers
          # fan out the per-batch Databento daily-bars requests; thread-safety
          # is provided by load_daily_bars's threading.Lock around the
          # progress callback and by databento_client's per-call
          # requests.Session (connection-pooled, no shared mutable state).
          # Mirrors the sharded-probe env contract — without this the
          # legacy producer cron has been at the 240min cap since 2026-05-06.
          DATABENTO_DAILY_MAX_WORKERS: "4"
          # Bridge 1c (2026-05-13): restrict the canonical xlsx workbook to
          # the four sheets that are either consumed downstream
          # (`daily_bars` — read by smc_integration/structure_batch.py and
          # scripts/export_smc_structure_artifact.py) or required for
          # diagnostics (manifest, batl_debug, output_checks). All other 24
          # sheets remain available as parquet via Step 10/10b. This is the
          # direct fix for the 5 consecutive cron OOMs 2026-05-11 → 2026-05-13
          # (runs 25687318767, 25733577369, 25738826438, 25752310158,
          # 25785343691), all SIGTERM during openpyxl.__exit__ XML
          # serialization at lookback_days=30 (RSS 41–56 GB on 64 GB runner).
          # To restore the historic full-workbook behaviour for manual
          # workflow_dispatch debugging only, override this env to `all`
          # (case-insensitive). The slim default lives in
          # DEFAULT_SLIM_CANONICAL_WORKBOOK_SHEET_NAMES in
          # scripts/databento_production_export.py and is covered by
          # tests/test_databento_production_workbook_slim_whitelist.py.
          CANONICAL_WORKBOOK_SHEETS: "manifest,daily_bars,batl_debug,output_checks"
          # F-V8-C5 (2026-05-16): serialize Step 8 sub-steps on the legacy producer
          # path. Recent schedule failures (exit 143) were concentrated during the
          # parallel 10a-d layer while close-trade detail expanded toward ~78M rows,
          # so we trade throughput for lower peak RSS until sustained green history
          # is re-established.
          DATABENTO_STEP8_SUBSTEP_PARALLELISM: "1"
        run: |
          set -euo pipefail
          mkdir -p "${EXPORT_DIR}" artifacts/ci
          # Tee stdout+stderr so the partial log survives runner shutdown
          # signals (the smaller -m runner tier has been getting evicted ~63 min into
          # silent runs — we lost all observability before this fix).
          # Run Python in unbuffered mode (`-u` / `PYTHONUNBUFFERED=1`) so
          # log lines flush promptly while `tee` preserves the combined stream.
          "$SMC_PYTHON_BIN" -u scripts/databento_production_export.py \
            --lookback-days "${LOOKBACK_DAYS}" \
            --export-dir "${EXPORT_DIR}" \
            ${FORCE_REFRESH_FLAG} 2>&1 | tee artifacts/ci/databento_production_export_stdout.log

      - name: Upload export stdout log (always)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-databento-production-export-stdout-${{ env.EXPORT_DATE }}-${{ github.run_id }}
          path: artifacts/ci/databento_production_export_stdout.log
          retention-days: 14
          if-no-files-found: warn

      - name: Verify canonical manifest was produced
        run: |
          set -euo pipefail
          if ! ls "${EXPORT_DIR}"/databento_volatility_production_*_manifest.json >/dev/null 2>&1; then
            echo "::error::Producer completed but no databento_volatility_production_*_manifest.json was found in ${EXPORT_DIR}/"
            ls -la "${EXPORT_DIR}/" || true
            exit 1
          fi
          NEWEST=$(ls -1t "${EXPORT_DIR}"/databento_volatility_production_*_manifest.json | head -1)
          echo "::notice::Newest manifest: ${NEWEST}"
          "$SMC_PYTHON_BIN" -c "import json,sys; d=json.load(open('${NEWEST}')); print('symbols:', len(d.get('symbols', []) or d.get('manifest', {}).get('symbols', [])), 'frames:', list((d.get('frames') or d.get('manifest', {}).get('frames') or {}).keys())[:5])" || true

      # F-V5-D2 (2026-05-01): cross-workflow handoff to smc-library-refresh
      # is now via actions/upload-artifact (below) instead of actions/cache.
      # Caches are branch-scoped on github.com so the previous design
      # silently dropped restores for non-default-branch consumer runs.
      - name: Upload export bundle as workflow artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-databento-production-export-${{ env.EXPORT_DATE }}-${{ github.run_id }}
          path: ${{ env.EXPORT_DIR }}/
          retention-days: 7
          if-no-files-found: error
