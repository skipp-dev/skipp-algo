# live-window: manual-only  # workflow_dispatch-only governed bootstrap (#43)
# F2 frozen-artifact bootstrap (Option B follow-up to PR #43, closes #43).
#
# Manually-triggered re-generation of the frozen contextual calibration
# artifact at artifacts/reports/zone_priority_contextual_calibration.json.
# Pulls the Databento corpus via the same script the rolling benchmark
# uses, runs scripts/smc_zone_priority_calibration.py with the
# --frozen / --frozen-at / --corpus-manifest-hash CLI introduced in
# PR #43, validates the output (non-empty promoted_buckets), and opens
# an auto-PR labeled `f2-recalibration` against main with a diff
# summary in the body. The PR is intentionally NOT auto-merged — a
# re-calibration is a governed event that a human reviews.
#
# corpus_start_date / corpus_window_days are recorded in the PR title +
# body for operator traceability. They do NOT reach the benchmark CLI
# (which has no date-window flags today); extending the benchmark to
# historic windows is out of scope per the issue spec.

name: f2-frozen-artifact-bootstrap

on:
  workflow_dispatch:
    inputs:
      corpus_start_date:
        description: "Corpus window start date (YYYY-MM-DD, UTC). Documented in PR title; not passed to benchmark CLI."
        required: true
        type: string
      corpus_window_days:
        description: "Corpus window length in days. Documented in PR title."
        required: false
        type: string
        default: "90"
      status:
        description: "Promotion status the operator intends for the regenerated artifact."
        required: false
        type: choice
        default: "shadow"
        options:
          - shadow
          - live
      frozen_at:
        description: "ISO-8601 UTC timestamp to stamp the artifact with. Empty = now."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: f2-frozen-artifact-bootstrap
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  bootstrap:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Resolve corpus window + frozen_at
        id: window
        run: |
          set -euo pipefail
          START="${{ inputs.corpus_start_date }}"
          DAYS="${{ inputs.corpus_window_days }}"
          if ! [[ "$START" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::corpus_start_date must be YYYY-MM-DD; got '$START'"
            exit 1
          fi
          if ! [[ "$DAYS" =~ ^[0-9]+$ ]]; then
            echo "::error::corpus_window_days must be a positive integer; got '$DAYS'"
            exit 1
          fi
          END=$(START_ENV="$START" DAYS_ENV="$DAYS" python -c "import os; from datetime import date,timedelta; s=date.fromisoformat(os.environ['START_ENV']); print((s+timedelta(days=int(os.environ['DAYS_ENV']))).isoformat())")
          FROZEN_AT="${{ inputs.frozen_at }}"
          if [ -z "$FROZEN_AT" ]; then
            FROZEN_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          fi
          OUT_DIR="artifacts/ci/f2_bootstrap_${START}_${END}"
          mkdir -p "$OUT_DIR"
          {
            echo "corpus_end_date=$END"
            echo "frozen_at=$FROZEN_AT"
            echo "out_dir=$OUT_DIR"
          } >> "$GITHUB_OUTPUT"

      - name: Snapshot pre-state artifact
        id: snapshot
        run: |
          set -euo pipefail
          OLD="artifacts/reports/zone_priority_contextual_calibration.json"
          if [ -f "$OLD" ]; then
            cp "$OLD" /tmp/old_calibration.json
            echo "had_old=true" >> "$GITHUB_OUTPUT"
          else
            echo "had_old=false" >> "$GITHUB_OUTPUT"
          fi
          # Previous benchmark manifest selection: prefer the most recent
          # by ISO directory-name suffix rather than mtime, since checkout
          # mtimes are identical and `ls -1t` would be non-deterministic.
          OLD_MAN=$(find artifacts/ci -maxdepth 2 -type f -path 'artifacts/ci/measurement_benchmark_combined_*/benchmark_run_manifest.json' 2>/dev/null | sort -r | head -n1 || true)
          if [ -n "$OLD_MAN" ]; then
            cp "$OLD_MAN" /tmp/old_manifest.json
            echo "had_old_manifest=true" >> "$GITHUB_OUTPUT"
          else
            echo "had_old_manifest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Databento corpus + run measurement benchmark
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
        run: |
          set -euo pipefail
          SYMBOLS="AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,JPM,BAC,GS,MS,V,UNH,JNJ,HD,XOM,CVX,COP,OXY,CAT"
          TIMEFRAMES="5m,15m,1H,4H"
          python scripts/run_smc_measurement_benchmark.py \
            --symbols "$SYMBOLS" \
            --timeframes "$TIMEFRAMES" \
            --output-dir "${{ steps.window.outputs.out_dir }}" \
            --require-evidence

      - name: Compute corpus manifest hash
        id: manifest
        run: |
          set -euo pipefail
          MAN="${{ steps.window.outputs.out_dir }}/benchmark_run_manifest.json"
          if [ ! -f "$MAN" ]; then
            echo "::error file=$MAN::benchmark_run_manifest.json not produced; cannot proceed"
            exit 1
          fi
          HASH=$(sha256sum "$MAN" | awk '{print $1}')
          echo "manifest_path=$MAN" >> "$GITHUB_OUTPUT"
          echo "corpus_manifest_hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Run frozen contextual calibration
        run: |
          set -euo pipefail
          python scripts/smc_zone_priority_calibration.py \
            --benchmark-dir "${{ steps.window.outputs.out_dir }}" \
            --frozen \
            --frozen-at "${{ steps.window.outputs.frozen_at }}" \
            --corpus-manifest-hash "${{ steps.manifest.outputs.corpus_manifest_hash }}" \
            --contextual-output-path artifacts/reports/zone_priority_contextual_calibration.json

      - name: Validate regenerated artifact (non-empty promoted_buckets)
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, sys
          from pathlib import Path
          p = Path("artifacts/reports/zone_priority_contextual_calibration.json")
          if not p.exists():
              print("::error::frozen artifact was not produced")
              sys.exit(1)
          payload = json.loads(p.read_text(encoding="utf-8"))
          promoted = list(payload.get("promoted_buckets") or [])
          if not promoted:
              print("::error::promoted_buckets is empty — refusing to open recalibration PR")
              sys.exit(1)
          print(f"::notice::promoted_buckets count={len(promoted)}")
          PY

      - name: Build diff summary for PR body
        run: |
          set -euo pipefail
          OLD_FLAG=""
          OLD_MAN_FLAG=""
          if [ "${{ steps.snapshot.outputs.had_old }}" = "true" ]; then
            OLD_FLAG="--old /tmp/old_calibration.json"
          fi
          if [ "${{ steps.snapshot.outputs.had_old_manifest }}" = "true" ]; then
            OLD_MAN_FLAG="--old-manifest /tmp/old_manifest.json"
          fi
          # shellcheck disable=SC2086
          python -m scripts.f2_calibration_diff \
            $OLD_FLAG \
            --new artifacts/reports/zone_priority_contextual_calibration.json \
            $OLD_MAN_FLAG \
            --new-manifest "${{ steps.manifest.outputs.manifest_path }}" \
            --out /tmp/pr_body_diff.md
          {
            echo "_Workflow inputs_:"
            echo ""
            echo "- corpus_start_date: \`${{ inputs.corpus_start_date }}\`"
            echo "- corpus_window_days: \`${{ inputs.corpus_window_days }}\`"
            echo "- corpus_end_date: \`${{ steps.window.outputs.corpus_end_date }}\`"
            echo "- status (intended): \`${{ inputs.status }}\`"
            echo "- frozen_at: \`${{ steps.window.outputs.frozen_at }}\`"
            echo "- corpus_manifest_hash: \`${{ steps.manifest.outputs.corpus_manifest_hash }}\`"
            echo ""
            cat /tmp/pr_body_diff.md
            echo ""
            echo "---"
            echo "_Opened by \`f2-frozen-artifact-bootstrap\` workflow (run ${GITHUB_RUN_ID}). Closes #43._"
          } > /tmp/pr_body.md

      - name: Open recalibration PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          START="${{ inputs.corpus_start_date }}"
          END="${{ steps.window.outputs.corpus_end_date }}"
          BRANCH="data/f2-recalibration-${START}--${END}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -b "$BRANCH"
          git add artifacts/reports/zone_priority_contextual_calibration.json
          # Companion .md report is emitted next to the .json by the calibration CLI.
          if [ -f artifacts/reports/zone_priority_contextual_calibration.md ]; then
            git add artifacts/reports/zone_priority_contextual_calibration.md
          fi
          # The calibration CLI may also emit sibling artifacts (e.g. per-bucket
          # breakdown json, drift summaries) into artifacts/reports/ with the
          # `zone_priority_contextual_calibration` prefix; stage all of them.
          for f in artifacts/reports/zone_priority_contextual_calibration*; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "::notice::no artifact changes to commit; skipping PR"
            exit 0
          fi
          git commit -m "chore(f2): regenerate frozen contextual calibration artifact (corpus ${START}--${END})"
          git push -u origin "$BRANCH"
          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --label f2-recalibration \
            --title "chore(f2): regenerate frozen contextual calibration artifact (corpus ${START}--${END})" \
            --body-file /tmp/pr_body.md; then
            echo "::error file=.github/workflows/f2-frozen-artifact-bootstrap.yml::gh pr create failed for ${BRANCH}"
            exit 1
          fi
