# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: drift-watchdog

# live-window: off-hours-only  # 07:00 UTC Mondays — outside trading window 13:30–20:00 UTC (audit F-V3-14, 2026-05-01)
#
# Sprint C9 / T5 — weekly drift watchdog cron.
#
# Reads the last 30 days of live outcomes, compares them against the
# committed walk-forward baseline, and emits artifacts/drift/drift_report_*.json.
# On `aggregate_severity == "red"` the job exits non-zero; the
# follow-up step opens a GitHub issue (T4).

on:
  schedule:
    # Mondays 07:00 UTC, 1h after the C2 walk-forward cron so inputs are
    # deterministic.
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      live_window_days:
        description: "Live-window in days"
        default: "30"
        required: false

permissions:
  contents: read
  issues: write

env:
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

# F-V5-C2 (2026-05-01): cron-triggered job — queue overlapping runs instead of
# killing them. The drift report walks 30 days of live outcomes; cancelling a
# half-written run mid-flight risks an inconsistent artifact.
concurrency:
  group: drift-watchdog
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  drift-watchdog:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    env:
      LIVE_WINDOW_DAYS: ${{ github.event.inputs.live_window_days || '30' }}
      BASELINE_JSON: artifacts/wfo/walk_forward_latest.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          # The watchdog module is pure stdlib + numpy. Install only
          # numpy (not the full requirements.txt) so the cron stays
          # fast and free of databento/httpx/streamlit transitive deps.
          pip install numpy

      - name: Run drift watchdog (advisory)
        id: watchdog
        # CONTINUE-ON-ERROR-INTENTIONAL: allow the script to exit 2 (red)
        # without failing the job — the follow-up step turns it into a
        # GitHub issue.
        continue-on-error: true
        run: |
          set +e
          python -m scripts.run_drift_watchdog \
            --baseline-json "$BASELINE_JSON" \
            --live-window-days "$LIVE_WINDOW_DAYS" \
            --output-dir artifacts/drift \
            --exit-nonzero-on-red
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: drift-report
          path: artifacts/drift/drift_report_*.json
          if-no-files-found: warn

      - name: Open GitHub issue on red
        if: steps.watchdog.outputs.rc == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(ls -t artifacts/drift/drift_report_*.json | head -n1)
          DATE=$(basename "$REPORT" | sed -E 's/drift_report_(.+)\.json/\1/')
          TITLE="Drift Alert ${DATE}: aggregate_severity=red"
          # Idempotency: title carries the date so re-runs the same day
          # do not spam.
          if gh issue list --label cron-failure --search "in:title \"${TITLE}\"" --state open | grep -q "${TITLE}"; then
            echo "Issue already open for ${DATE} — skipping."
            exit 0
          fi
          gh issue create \
            --label cron-failure \
            --title "${TITLE}" \
            --body-file "${REPORT}"

      - name: Fail job if watchdog crashed unexpectedly
        if: steps.watchdog.outputs.rc != '0' && steps.watchdog.outputs.rc != '2'
        run: |
          # F-V4-A4 (2026-05-01): emit ::error:: annotation so the failure surfaces
          # in the PR/run summary instead of only stderr.
          echo "::error::Watchdog exited with unexpected code ${{ steps.watchdog.outputs.rc }} (expected 0=ok or 2=drift)"
          exit 1
