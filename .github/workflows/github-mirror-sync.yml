# live-window: any-trigger  # github-mirror-sync (2026-07-01)
name: "github-mirror-sync"

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  delete:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  mirror:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - name: Checkout full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate mirror secret presence
        run: |
          if [[ -z "${{ secrets.SPREUSS_CISCO_MIRROR_PAT }}" ]]; then
            echo "::error::Missing secret SPREUSS_CISCO_MIRROR_PAT"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push branch and tag mirror
        run: |
          set -euo pipefail
          mirror_url="https://x-access-token:${{ secrets.SPREUSS_CISCO_MIRROR_PAT }}@github.com/spreuss_cisco/spreuss_cisco-skipp-algo.git"
          git remote remove github-mirror >/dev/null 2>&1 || true
          git remote add github-mirror "$mirror_url"

          # Mirror branch/tag namespace and prune removed refs on destination.
          git push --prune github-mirror \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'
