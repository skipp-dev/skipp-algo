# live-window: mutating-on-cron
name: adr0023-magnitude-shadow-daily

# ADR-0023 §4.1 — daily *shadow* magnitude-resolution ledger append.
#
# Runs scripts/run_magnitude_shadow_ledger.py against a supplied events
# JSON and appends one row per family to the shadow JSONL ledger
#   artifacts/governance/magnitude_resolution_shadow.jsonl
# that is uploaded as a workflow artifact only.
#
# This workflow is fail-soft and measure-only by design — the magnitude-
# resolution verdict stays in shadow until the Stage-1 weekly k-of-n
# evaluator (scripts/eval_magnitude_shadow_weekly.py) and the promotion
# gate sign off.  The appended ledger rows are committed back to the
# repo so that the shadow ledger accumulates across daily runs. The
# candidate families are BOS and SWEEP; FVG and OB are controls.
#
# Events source: the rolling production events export is NOT checked into
# the repo, so a scheduled run with no events resolves to status=no_data
# and still completes green — the Stage-1 wall-clock keeps ticking. To
# append a real row, dispatch this workflow manually with the events-path
# input pointing at an events JSON present in the checkout.
#
# Schedule: 13:30 UTC Mon-Fri, mirroring the other off-hours shadow jobs.

on:
  schedule:
    # 13:30 UTC Mon-Fri — off-hours weekday cadence, consistent with the
    # other shadow/measure-only daily jobs. Fail-soft on missing events.
    - cron: "30 13 * * 1-5"
  workflow_dispatch:
    inputs:
      events-path:
        description: "Path under the checkout to an events JSON list. Empty -> status=no_data (fail-soft)."
        required: false
        default: ""
      seed:
        description: "Deterministic bootstrap/permutation seed."
        required: false
        default: "230022"

permissions:
  contents: write
  actions: read

concurrency:
  group: adr0023-magnitude-shadow-daily
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
defaults:
  run:
    shell: bash

jobs:
  magnitude-shadow:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        # Mirror the validate job in ci.yml, which is the contract that
        # proves this dependency set is sufficient.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pyyaml

      # ADR-0023 §4.1: download the scored FamilyEvent records of the
      # CURRENT UTC day from the rolling benchmark workflow.  The
      # benchmark (cron 13:00 UTC) uploads scored_family_events.json as
      # scored-family-events-<YYYY-MM-DD>; this workflow (cron 13:30
      # UTC) pins the artifact name to today's date so a delayed or
      # failed benchmark can never smuggle stale events from an older
      # run into today's ledger row.  A miss falls through to the
      # existing no_data path (fail-soft contract).
      - name: Resolve benchmark artifact date
        id: bench_date
        run: |
          set -euo pipefail
          echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Download scored family events from benchmark
        id: download_events
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: smc-measurement-benchmark-rolling.yml
          name: scored-family-events-${{ steps.bench_date.outputs.date }}
          path: artifacts/ci/scored_family_events_download
          workflow_conclusion: success
          if_no_artifact_found: warn

      # ADR-0023 Option B (Issue #2706): download the 30-day accumulated
      # pool of FamilyEvent records produced by accumulate_family_events.py
      # in the rolling benchmark workflow.  This artifact grows across daily
      # runs until MIN_OOS_SAMPLES=40 is satisfied across walk-forward folds.
      # Fail-soft: a miss here leaves the per-day artifact as the fallback.
      - name: Download accumulated family events (ADR-0023 Option B)
        id: download_accumulated
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: smc-measurement-benchmark-rolling.yml
          name: scored-family-events-accumulated
          path: artifacts/ci/scored_family_events_accumulated
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Resolve events file
        id: events
        env:
          INPUT_EVENTS: ${{ inputs.events-path }}
        run: |
          set -euo pipefail
          # Priority 1: explicit dispatch input that exists in the checkout.
          if [ -n "${INPUT_EVENTS}" ] && [ -f "${INPUT_EVENTS}" ]; then
            echo "events_path=${INPUT_EVENTS}" >> "$GITHUB_OUTPUT"
            echo "source=input" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Priority 2 (ADR-0023 Option B): 30-day accumulated pool of events.
          # Preferred over the daily single-run artifact because it contains
          # events from up to 30 rolling days, giving the walk-forward enough
          # MIN_OOS=40 samples across temporal folds without manual feeding.
          ACCUMULATED_DIR="artifacts/ci/scored_family_events_accumulated"
          FOUND_ACCUMULATED=""
          if [ -d "${ACCUMULATED_DIR}" ]; then
            FOUND_ACCUMULATED="$(find "${ACCUMULATED_DIR}" -name 'accumulated_family_events.json' -type f 2>/dev/null | head -1)"
          fi
          if [ -n "${FOUND_ACCUMULATED}" ] && [ -s "${FOUND_ACCUMULATED}" ]; then
            echo "events_path=${FOUND_ACCUMULATED}" >> "$GITHUB_OUTPUT"
            echo "source=accumulated" >> "$GITHUB_OUTPUT"
            echo "::notice title=adr0023-magnitude-shadow::using 30-day accumulated events: ${FOUND_ACCUMULATED}"
            exit 0
          fi
          # Priority 3: today's single-run artifact (ADR-0023 §4.1 original path).
          # Falls through when the accumulated pool is not yet available (first
          # days after the Option B rollout) or the rolling-bench failed today.
          DOWNLOAD_DIR="artifacts/ci/scored_family_events_download"
          FOUND_EVENTS=""
          if [ -d "${DOWNLOAD_DIR}" ]; then
            FOUND_EVENTS="$(find "${DOWNLOAD_DIR}" -name 'scored_family_events.json' -type f 2>/dev/null | head -1)"
          fi
          if [ -n "${FOUND_EVENTS}" ] && [ -s "${FOUND_EVENTS}" ]; then
            echo "events_path=${FOUND_EVENTS}" >> "$GITHUB_OUTPUT"
            echo "source=benchmark" >> "$GITHUB_OUTPUT"
            echo "::notice title=adr0023-magnitude-shadow::using scored events from benchmark artifact: ${FOUND_EVENTS}"
            exit 0
          fi
          # Priority 4: fail-soft no_data. The production events export is
          # not part of the repo, so scheduled runs have no events to score.
          echo "events_path=" >> "$GITHUB_OUTPUT"
          echo "source=no_data" >> "$GITHUB_OUTPUT"

      # Workflow-Audit MITTEL-5 (B5, 2026-06): commit-back gap check.
      # The commit-back step at the end of this job is deliberately
      # triple fail-soft (exit 0 on rebase conflict, push reject and
      # retry exhaustion) — correct for a single run, but REPEATED
      # silent failures open an unnoticed gap in the committed ledger.
      # This guard reads the newest `date` in the committed ledger at
      # checkout (i.e. BEFORE today's append) and fails loud when the
      # gap exceeds budget. A red run here surfaces through the
      # freshness monitor (this workflow is on its watchlist), so the
      # alert chain closes. Budget 7 calendar days: weekday cron means
      # a normal weekend gap is 3 days; 7 absorbs holidays plus a
      # couple of legitimate fail-soft skips before alarming.
      - name: Guard against silent commit-back gap in shadow ledger
        env:
          LEDGER_PATH: artifacts/governance/magnitude_resolution_shadow.jsonl
          GAP_BUDGET_DAYS: "7"
        run: |
          set -euo pipefail
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import sys

          path = os.environ["LEDGER_PATH"]
          budget = int(os.environ["GAP_BUDGET_DAYS"])
          if not os.path.exists(path):
              print("::notice title=adr0023-gap-check::ledger not present yet — nothing to check")
              sys.exit(0)
          newest = None
          with open(path, encoding="utf-8") as fh:
              for ln in fh:
                  ln = ln.strip()
                  if not ln:
                      continue
                  try:
                      d = json.loads(ln).get("date")
                  except Exception:
                      continue
                  if d and (newest is None or d > newest):
                      newest = d
          if newest is None:
              print("::notice title=adr0023-gap-check::ledger empty — nothing to check")
              sys.exit(0)
          try:
              newest_day = dt.date.fromisoformat(newest)
          except ValueError:
              print(f"::error title=adr0023-gap-check::unparseable newest ledger date {newest!r}")
              sys.exit(1)
          gap = (dt.datetime.now(dt.timezone.utc).date() - newest_day).days
          if gap > budget:
              print(
                  f"::error title=adr0023-gap-check::committed shadow ledger is {gap} days old "
                  f"(newest row {newest}, budget {budget}d). The fail-soft commit-back has "
                  f"likely been failing silently for multiple runs — check recent run logs "
                  f"for 'commit-back exhausted retries' / rebase warnings."
              )
              sys.exit(1)
          print(f"::notice title=adr0023-gap-check::newest committed ledger row {newest} ({gap}d old, budget {budget}d) — OK")
          PY

      - name: Append magnitude-shadow ledger row
        id: ledger
        env:
          EVENTS_PATH: ${{ steps.events.outputs.events_path }}
          SEED: ${{ inputs.seed || '230022' }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/governance
          if [ -z "${EVENTS_PATH}" ]; then
            echo "status=no_data" >> "$GITHUB_OUTPUT"
            echo "::notice title=adr0023-magnitude-shadow::no events resolved; skipping ledger append (fail-soft)"
            exit 0
          fi
          # Capture the script rc explicitly without disabling errexit:
          # `|| rc=$?` absorbs the non-zero pipeline exit, and pipefail
          # makes the pipeline surface the python rc (tee never fails here).
          rc=0
          python scripts/run_magnitude_shadow_ledger.py "${EVENTS_PATH}" \
            --ledger artifacts/governance/magnitude_resolution_shadow.jsonl \
            --seed "${SEED}" \
            2>&1 | tee ledger.log || rc=$?
          # Exit codes 0 (>=1 family resolves), 2 (none resolve), 3
          # (all thin) and 5 (stale feed: same events_hash already graded
          # under an earlier date — nothing appended, W7-2) are all VALID
          # shadow outcomes, not job failures. A persistently frozen feed
          # stops the ledger growing, so the fail-loud gap guard above
          # escalates after its budget. Only rc 1 (usage / empty events /
          # corrupt ledger) is a real error.
          case "$rc" in
            0) echo "status=resolved" >> "$GITHUB_OUTPUT" ;;
            2) echo "status=none_resolve" >> "$GITHUB_OUTPUT" ;;
            3) echo "status=all_thin" >> "$GITHUB_OUTPUT" ;;
            5)
              echo "status=stale_feed" >> "$GITHUB_OUTPUT"
              echo "::warning title=adr0023-magnitude-shadow::stale events feed — benchmark artifact unchanged since the last graded date; no row appended (W7-2)"
              ;;
            *)
              echo "status=error" >> "$GITHUB_OUTPUT"
              echo "::error title=adr0023-magnitude-shadow::ledger run failed (rc=$rc)"
              exit "$rc"
              ;;
          esac
          exit 0

      - name: Annotate shadow result
        if: always()
        run: |
          {
            echo "## adr0023-magnitude-shadow-daily"
            echo ""
            echo "- events source: \`${{ steps.events.outputs.source }}\`"
            echo "- events path: \`${{ steps.events.outputs.events_path }}\`"
            echo "- ledger status: \`${{ steps.ledger.outputs.status || 'unknown' }}\`"
            echo "- seed: \`${{ inputs.seed || '230022' }}\`"
            echo ""
            echo "Measure-only shadow ledger (ADR-0023 §4.1). Ledger committed back to accumulate."
          } >> "$GITHUB_STEP_SUMMARY"
          # Sparkline + Stage-2 progress table (fail-soft: script errors
          # must not fail the step — the basic summary above is already
          # written and the workflow is measure-only).
          python scripts/render_shadow_step_summary.py \
            --ledger artifacts/governance/magnitude_resolution_shadow.jsonl \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo "::notice title=adr0023-magnitude-shadow::status=${{ steps.ledger.outputs.status || 'unknown' }} source=${{ steps.events.outputs.source }}"

      - name: Upload shadow ledger + log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: adr0023-magnitude-shadow-${{ github.run_id }}
          path: |
            artifacts/governance/magnitude_resolution_shadow.jsonl
            ledger.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Ledger metrics summary (families measured + row delta)
        if: always()
        # CONTINUE-ON-ERROR-INTENTIONAL: summary-only metrics must never fail this measure-only shadow workflow.
        continue-on-error: true
        run: |
          python - <<'PY'
          import json, os, subprocess

          LEDGER = "artifacts/governance/magnitude_resolution_shadow.jsonl"

          def _rows(text):
              out = []
              for ln in text.splitlines():
                  ln = ln.strip()
                  if not ln:
                      continue
                  try:
                      out.append(json.loads(ln))
                  except Exception:
                      pass
              return out

          cur_txt = ""
          if os.path.exists(LEDGER):
              with open(LEDGER, encoding="utf-8") as fh:
                  cur_txt = fh.read()
          try:
              base_txt = subprocess.run(
                  ["git", "show", f"HEAD:{LEDGER}"],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout
          except Exception:
              base_txt = ""

          cur, base = _rows(cur_txt), _rows(base_txt)
          new_rows = cur[len(base):] if len(cur) >= len(base) else cur
          fams = sorted({r.get("family", "") for r in new_rows if r.get("family")})
          delta = len(cur) - len(base)

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(f"- ledger rows: {len(cur)} (delta {delta:+d} this run)\n")
                  fh.write(
                      f"- families measured this run: {len(fams)}"
                      + (f" ({', '.join(fams)})" if fams else "")
                      + "\n"
                  )
          print(
              "::notice title=adr0023-magnitude-shadow::"
              f"ledger_rows={len(cur)} delta={delta} families_measured={len(fams)}"
          )
          PY

      # Commit-back: persist the appended ledger so that rows accumulate
      # across daily runs instead of resetting to the committed baseline.
      # Guarded: only when the ledger step succeeded with status=resolved,
      # none_resolve, all_thin, or stale_feed (i.e. NOT error / no_data) and
      # the file actually changed vs HEAD (stale_feed appends nothing, so it
      # falls through to the unchanged-skip below).
      - name: Commit shadow ledger back to repo
        if: >
          steps.ledger.outputs.status != 'error'
          && steps.ledger.outputs.status != 'no_data'
          && steps.ledger.outputs.status != ''
        run: |
          git diff --quiet artifacts/governance/magnitude_resolution_shadow.jsonl && {
            echo "::notice title=adr0023-magnitude-shadow::ledger unchanged — skipping commit-back"
            exit 0
          }
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/governance/magnitude_resolution_shadow.jsonl
          git commit -m "chore(adr0023): accumulate shadow ledger $(date -u +%Y-%m-%d)"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          # Race-safe push: main can move between checkout and push (other
          # scheduled jobs also commit back). Rebase our single ledger commit
          # onto the latest origin/main and retry on non-fast-forward reject.
          for attempt in 1 2 3; do
            git fetch origin main --quiet || true
            if ! git rebase origin/main; then
              git rebase --abort 2>/dev/null || true
              echo "::warning title=adr0023-magnitude-shadow::rebase onto origin/main failed (ledger conflict?); skipping commit-back this run"
              exit 0
            fi
            if git push origin HEAD:main; then
              echo "::notice title=adr0023-magnitude-shadow::ledger committed back (attempt ${attempt})"
              exit 0
            fi
            echo "::warning title=adr0023-magnitude-shadow::push attempt ${attempt} rejected (non-fast-forward); retrying"
          done
          echo "::warning title=adr0023-magnitude-shadow::commit-back exhausted retries; will accumulate next run"
          exit 0
