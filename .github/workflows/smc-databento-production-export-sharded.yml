# live-window: live-cron  # F-V8-cutover (2026-05-18)
# ---------------------------------------------------------------------------
# smc-databento-production-export-sharded  (A9b.2a + A9b.2b)
#
# Matrix-sharded producer workflow that will eventually replace
# `smc-databento-production-export.yml` once the cron cutover (A9b.5)
# lands. Current stage:
#
#   plan      (A9b.2a)    — compute shard plan via
#                           scripts/databento_plan_shards.py and emit
#                           matrix JSON as job-output + artifact.
#   producer  (A9b.2b)    — matrix-fan-out of N shards. Each shard runs
#                           scripts/databento_production_export.py with
#                           --start-date/--end-date/--shard-id/--shard-of
#                           and uploads stdout + per-shard export-dir as
#                           a single artifact `a9b-2b-shard-<i>-of-<N>`.
#   reduce    (A9b.2b-v2) — downloads every producer-shard artifact, runs
#                           scripts/databento_production_merge_shards.py
#                           with --expected-shard-count + --allow-partial,
#                           uploads the merged manifest as a single
#                           artifact `a9b-2b-merged-manifest`. Runs even
#                           if some shards failed (partial-report
#                           principle); the merged manifest then carries
#                           partial_run=true + failed_shard_ids=[...].
#
# Trigger: cron (2x/day, 12:00 + 16:00 UTC weekdays — see F-V8-cutover
# 2026-05-18) + workflow_dispatch. Pre-cutover this was workflow_dispatch-
# only (probe workflow); the cron block was added when the monolithic
# producer was deprecated and this sharded workflow became canonical. The
# 240-min handoff window to library-refresh (16:00/20:00 UTC) is preserved.
#
# Probe flow:
#   gh workflow run smc-databento-production-export-sharded.yml \
#     -f lookback_days=10 -f num_shards=2
#   # → 1 plan job + 2 producer shards × ~120min cap. Shard artifacts
#   #   feed the A9b.3 reduce-step fixture work (real shard-manifests).
#
# A9b spec lives in session memory `f2-rolling-bench-rootcause.md`.
# ---------------------------------------------------------------------------

name: smc-databento-production-export-sharded

on:
  # F-V8-cutover (2026-05-18): promoted from off-hours probe (02:00 UTC)
  # to the canonical 2x/day cron — same schedule the monolithic producer
  # used before deprecation. 240-min handoff window to the library-refresh
  # consumer (16:00/20:00 UTC) is preserved.
  schedule:
    - cron: "0 12 * * 1-5"   # 12:00 UTC – 240 min ahead of library-refresh 16:00 tick
    - cron: "0 16 * * 1-5"   # 16:00 UTC – 240 min ahead of library-refresh 20:00 tick
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Total trailing calendar window to split across shards (default 30)"
        required: false
        default: "30"
      num_shards:
        description: "Number of producer shards in the matrix (default 6)"
        required: false
        default: "6"
      enable_cache_probe:
        description: "Opt-in: write per-shard cache-probe JSONL (baseline / validation runs)."
        required: false
        type: boolean
        default: false

# Per-ref serialization mirrors the live producer cron's discipline so a
# slow plan-job (it shouldn't be slow, but cheap insurance) cannot be
# raced by a manual re-dispatch on the same ref. cancel-in-progress is
# false by symmetry; the plan job is sub-minute, queueing is fine.
concurrency:
  group: smc-databento-production-export-sharded-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}

defaults:
  run:
    shell: bash

jobs:
  plan:
    name: plan shards
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      shard_count: ${{ steps.compute.outputs.shard_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      - name: Compute shard plan
        id: compute
        run: |
          set -euo pipefail
          # `inputs.*` are empty on schedule triggers; fall back to the same
          # defaults documented in workflow_dispatch.inputs so probe-cron runs
          # exercise the cutover-target config (lookback_days=30, num_shards=6).
          LOOKBACK="${{ inputs.lookback_days || '30' }}"
          NUM="${{ inputs.num_shards || '6' }}"
          echo "::notice::Planning shards: lookback_days=${LOOKBACK} num_shards=${NUM}"
          python scripts/databento_plan_shards.py \
            --lookback-days "${LOOKBACK}" \
            --num-shards "${NUM}" \
            > shards.json
          echo "----- shards.json -----"
          cat shards.json
          echo "-----------------------"
          # Wrap into the matrix-include form GHA expects so A9b.2b can
          # consume it directly via strategy.matrix.fromJson(needs.plan.outputs.matrix).
          # IMPORTANT: do not document GHA expressions using their literal brace
          # syntax inside this run: block — the template engine evaluates such
          # expressions before the shell sees the script (even in shell
          # comments) and crashes if the reference resolves to empty. Use
          # prose only inside run: blocks.
          MATRIX=$(jq -c '{include: .}' shards.json)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "shard_count=$(jq 'length' shards.json)" >> "$GITHUB_OUTPUT"

      - name: Upload shard plan
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: a9b-2a-shard-plan
          path: shards.json
          retention-days: 7
          if-no-files-found: error

  producer:
    name: producer (shard ${{ matrix.shard_id }}/${{ matrix.shard_of }})
    needs: plan
    if: needs.plan.outputs.shard_count != '0'
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    # Per-shard cap. The original 1-job producer hit a ~120min platform
    # wall (A9-grep / A9e probe falsified internal-timeout hypothesis).
    # Q4 (post-Probe-v3): bumped 90→120 to absorb the v3 cap-hit margin
    # observed at lookback_days=10 num_shards=2; the platform wall lives
    # ~at 120min so this is at-the-wall, not above it. Step-progress
    # markers from Q1 (xlsx writer) and Q3 (Step 5 batches) plus
    # P5.3-A6 (Step 6 per-day) provide the observability needed to
    # attribute any future cap-hit before another bump is even considered.
    timeout-minutes: 120
    strategy:
      # We MUST collect every shard's manifest even if shard-1 OOMs:
      # those shard-manifest specimens drive the A9b.3 reduce-step
      # fixture design.
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    env:
      EXPORT_DIR: artifacts/smc_microstructure_exports
    steps:
      - name: Emit shard context
        run: |
          echo "::notice::Shard ${{ matrix.shard_id }}/${{ matrix.shard_of }} window=${{ matrix.start_date }}..${{ matrix.end_date }} runner='${{ runner.name }}'"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      # F-V8-perf (2026-05-18): uv installer (mirrors ci.yml + #2285/#2286).
      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: requirements*.txt

      - name: Install Python dependencies
        run: |
          uv pip install --system -r requirements.txt

      - name: Run Databento production export (sharded)
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          BENZINGA_API_KEY: ${{ secrets.BENZINGA_API_KEY }}
          DATABENTO_DATASET: ${{ vars.DATABENTO_DATASET }}
          PYTHONUNBUFFERED: "1"
          # Q3a (post-Probe-v3): activate the parallel-fetch cure landed in
          # Q3 (#2098) for Step 5/10 (load_daily_bars). 4 workers fan out
          # the per-batch Databento daily-bars requests; thread-safety is
          # provided by load_daily_bars's threading.Lock around the
          # progress callback and by databento_client's per-call
          # requests.Session (connection-pooled, no shared mutable state).
          # Producer pipeline is then expected to land well under the
          # 120min cap (Q4 #2097) on lookback_days=10 num_shards=2.
          DATABENTO_DAILY_MAX_WORKERS: "4"
          # F-V8-cutover (2026-05-18): per-shard windows are ~5 trading days
          # (30-day rolling / 6 shards), well below the 30-day window that
          # historically triggered the OOMs which forced the monolith to
          # DATABENTO_STEP8_SUBSTEP_PARALLELISM=1. Each shard's peak RSS is
          # naturally bounded by its smaller window, so we re-enable Step-8
          # parallelism here (=2, conservative). If shard runs show RSS
          # headroom in the first week of post-cutover telemetry this can
          # be bumped to 4.
          DATABENTO_STEP8_SUBSTEP_PARALLELISM: "2"
          # F-V8-perf-3.5 PR-A (2026-05-19): cache-probe is opt-in via the
          # `enable_cache_probe` workflow_dispatch input. On schedule triggers
          # (and dispatches without the toggle) the env stays empty, so the
          # producer skips the probe entirely — no probe-shaped IO on the hot
          # path. Flip the toggle for the Phase-B baseline run and the Phase-D
          # post-cache validation runs.
          #
          # GHA-quirk pin (2026-05-20, Phase-B Run 1 post-mortem): for
          # ``type: boolean`` workflow_dispatch inputs GHA exposes the value
          # as a real boolean in the ``${{ inputs.* }}`` context, NOT the
          # string form. The original PR-A form compared the input with a
          # quoted string literal and therefore always evaluated false
          # (string-vs-boolean compare) — the env stayed empty even on
          # dispatches with ``-f enable_cache_probe=true``, silently dropping
          # every probe artifact. Use the bare truthy form below;
          # null/false/missing all collapse to '' through the ternary,
          # which is exactly what the producer treats as "probe disabled".
          DATABENTO_CACHE_PROBE_LOG: ${{ inputs.enable_cache_probe && format('artifacts/ci/cache_probe_shard_{0}.jsonl', matrix.shard_id) || '' }}
        run: |
          set -euo pipefail
          mkdir -p "${EXPORT_DIR}" artifacts/ci
          # Mirror live-cron stdout-tee discipline so a runner-process
          # eviction at the platform-wall preserves partial logs.
          python -u scripts/databento_production_export.py \
            --start-date "${{ matrix.start_date }}" \
            --end-date "${{ matrix.end_date }}" \
            --shard-id "${{ matrix.shard_id }}" \
            --shard-of "${{ matrix.shard_of }}" \
            --export-dir "${EXPORT_DIR}" \
            2>&1 | tee artifacts/ci/databento_production_export_stdout.log

      - name: Upload shard artifact (always)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: a9b-2b-shard-${{ matrix.shard_id }}-of-${{ matrix.shard_of }}
          path: |
            artifacts/ci/databento_production_export_stdout.log
            ${{ env.EXPORT_DIR }}/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload cache-probe log
        # Stay unconditional (`always()`) so the step survives shard OOM /
        # timeout, but downgrade to `ignore` so schedule runs (which set the
        # probe env to '' above and therefore produce no JSONL) don't fail
        # the shard. The dedicated test pin lives in
        # tests/test_smc_databento_production_export_sharded_workflow.py.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cache-probe-shard-${{ matrix.shard_id }}-of-${{ matrix.shard_of }}
          path: artifacts/ci/cache_probe_shard_${{ matrix.shard_id }}.jsonl
          retention-days: 14
          if-no-files-found: ignore

  reduce:
    name: reduce shard manifests
    needs: [plan, producer]
    # Run reduce as long as the plan succeeded AND there is at least one
    # shard to merge, regardless of individual producer outcomes. Without
    # `always()` a single shard fail would skip reduce and we'd lose the
    # partial-report. The plan-success guard keeps us from running reduce
    # when planning itself failed; the shard_count != '0' guard avoids
    # an empty reduce when the plan produced an empty matrix (zero shards
    # also skip the producer job per its own condition).
    if: always() && needs.plan.result == 'success' && needs.plan.outputs.shard_count != '0'
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      # WF-012 (2026-05-20): the reducer imports pandas/pyarrow while
      # concatenating shard parquet payloads. Producer shards installed
      # requirements.txt, but reduce only set up bare Python and failed with
      # ``No module named 'pandas'`` after downloading every shard artifact.
      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: requirements*.txt

      - name: Install Python dependencies
        run: |
          uv pip install --system -r requirements.txt

      - name: Download all producer shard artifacts
        # `merge-multiple: false` keeps each shard's manifest in its own
        # subdirectory; otherwise basenames collide and shard-K silently
        # overwrites shard-K-1 in the workspace. Pattern matches every
        # producer-emitted artifact regardless of how many shards the
        # plan dispatched.
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: a9b-2b-shard-*-of-*
          path: shard-artifacts/
          merge-multiple: false

      - name: List downloaded shard artifacts
        # Diagnostic — surfaces which shards actually completed before
        # we hand the directory list to the reducer. Cheap, always-on.
        run: |
          set -euo pipefail
          echo '----- shard-artifacts/ tree -----'
          ls -la shard-artifacts/ || true
          for d in shard-artifacts/a9b-2b-shard-*; do
            echo "-- $d --"
            find "$d" -maxdepth 3 -name '*_manifest.json' -print || true
          done
          echo '---------------------------------'

      - name: Reduce per-shard manifests into one canonical manifest
        env:
          EXPECTED: ${{ needs.plan.outputs.shard_count }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/merged
          # Robustly discover the export root for each downloaded shard
          # artifact. actions/upload-artifact@v4+ strips the least-common
          # path prefix (here `artifacts/`), so a shard artifact contains
          # `smc_microstructure_exports/` at the top level under the
          # `shard-artifacts/<artifact-name>/` mount. We `find` it instead
          # of hard-globbing one assumed depth so a future restructuring
          # of the producer artifact upload paths can't silently turn the
          # reducer into a no-op. Pass the OUTER shard-artifact dir to the
          # reducer (basename `a9b-2b-shard-N-of-M`) so
          # _parse_shard_id_from_dir() can recover the real shard id; the
          # reducer uses rglob('*_manifest.json') to descend.
          mapfile -t SHARD_DIRS < <(
            find shard-artifacts -mindepth 1 -maxdepth 1 -type d -name 'a9b-2b-shard-*' | sort
          )
          ARGS=()
          for d in "${SHARD_DIRS[@]}"; do
            if find "$d" -name '*_manifest.json' -print -quit | grep -q .; then
              ARGS+=(--shard-dir "$d")
            else
              echo "::warning::No manifest under $d; skipping"
            fi
          done
          if [ "${#ARGS[@]}" -eq 0 ]; then
            echo "::error::No shard manifests found under shard-artifacts/; cannot run reduce."
            exit 1
          fi
          # F-V8-cutover (2026-05-18): produce a real canonical merged
          # bundle. The reducer concatenates per-frame parquets across all
          # shards and writes `databento_volatility_production_merged__<frame>.parquet`
          # next to the merged manifest, so downstream consumers loading
          # via load_export_bundle(manifest_prefix='databento_volatility_production_')
          # resolve a complete bundle and not a single shard's date slice.
          python scripts/databento_production_merge_shards.py \
            "${ARGS[@]}" \
            --expected-shard-count "${EXPECTED}" \
            --allow-partial \
            --output artifacts/merged/databento_volatility_production_merged_manifest.json \
            --payload-output-dir artifacts/merged/
          echo '----- merged manifest head -----'
          python - <<'PY'
          import json
          m = json.load(open('artifacts/merged/databento_volatility_production_merged_manifest.json'))
          for k in ('shard_count', 'shard_ids', 'expected_shard_count', 'partial_run', 'failed_shard_ids', 'merge_script_version', 'merged_at', 'trade_dates_covered'):
              if k in m:
                  print(f'{k}: {m[k]!r}')
          PY
          echo '----- merged payload tree -----'
          ls -la artifacts/merged/ | head -40
          echo '--------------------------------'

      - name: Upload merged manifest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: a9b-2b-merged-manifest
          path: artifacts/merged/
          retention-days: 30
          if-no-files-found: error

      # F-V8-cutover (2026-05-18): a scheduled live producer tick must
      # never succeed silently with a degraded (partial) merged bundle.
      # The reducer is permitted to emit `partial_run=true` so diagnostics
      # still upload via `Upload merged manifest` (above, `if: always()`),
      # but on `schedule` events we hard-fail the workflow afterwards so
      # no green run can exist without a complete canonical artifact and
      # downstream consumers never read a half-day bundle.
      - name: Fail scheduled run on partial merged manifest
        if: github.event_name == 'schedule' && success()
        run: |
          set -euo pipefail
          MERGED_MANIFEST="artifacts/merged/databento_volatility_production_merged_manifest.json"
          if [ ! -f "${MERGED_MANIFEST}" ]; then
            echo "::error::scheduled run: merged manifest missing at ${MERGED_MANIFEST}"
            exit 1
          fi
          PARTIAL=$(python -c "import json,sys; d=json.load(open(sys.argv[1])); print(bool(d.get('partial_run') or d.get('manifest', {}).get('partial_run')))" "${MERGED_MANIFEST}")
          if [ "${PARTIAL}" = "True" ]; then
            FAILED=$(python -c "import json,sys; d=json.load(open(sys.argv[1])); print(','.join(str(x) for x in (d.get('failed_shard_ids') or (d.get('manifest') or {}).get('failed_shard_ids') or [])))" "${MERGED_MANIFEST}")
            echo "::error file=.github/workflows/smc-databento-production-export-sharded.yml::scheduled run produced partial_run=true (failed_shard_ids=${FAILED:-unknown}); refusing to publish a degraded canonical artifact. Re-run the failed shards or dispatch manually."
            exit 1
          fi
          echo "::notice::scheduled run: merged manifest is complete (partial_run=false)"

      # F-V8-D5 (2026-05-16): A9b.5 cutover compat-layer.
      # Re-publishes the merged export bundle under the legacy artifact
      # name `smc-databento-production-export-<DATE>-<RUN_ID>` so that
      # existing downstream consumers (notably
      # smc-measurement-benchmark-rolling.yml's
      # `Restore Databento production export bundle` step, which globs on
      # the `smc-databento-production-export-` prefix) keep working when
      # the production cron is moved from the monolithic workflow to this
      # sharded one. F-V8-cutover (2026-05-18) restricted the compat
      # payload to the merged bundle (manifest + merged parquets) emitted
      # by the reducer; per-shard payload files are intentionally NOT
      # copied because the consumer's manifest globber would otherwise
      # resolve a per-shard manifest (covering one date-shard) instead of
      # the union-merged manifest, silently halving the downstream
      # universe. Shards are date-disjoint, not symbol-disjoint, so the
      # reducer's date-union parquet merge is the canonical bundle.
      - name: Stage compat export bundle (legacy artifact name)
        id: compat_stage
        # F-V8-cutover (2026-05-18): probe gate removed — this workflow is
        # now the canonical producer, so EVERY successful run must republish
        # under the legacy artifact name the consumer globs on. The earlier
        # "Fail scheduled run on partial merged manifest" gate guarantees
        # we never get here on a scheduled tick with partial_run=true, so
        # the manual-dispatch lane is the only path where partial_run can
        # still skip the compat upload.
        if: success()
        run: |
          set -euo pipefail
          COMPAT_DIR="artifacts/export-compat"
          mkdir -p "${COMPAT_DIR}"

          # Detect partial_run from the merged manifest; skip compat upload
          # when partial so legacy consumers don't see a silently-incomplete
          # day. (Scheduled runs are already hard-failed above; this guard
          # covers manual workflow_dispatch lanes only.)
          MERGED_MANIFEST="artifacts/merged/databento_volatility_production_merged_manifest.json"
          if [ ! -f "${MERGED_MANIFEST}" ]; then
            echo "::warning::merged manifest not found at ${MERGED_MANIFEST}; skipping compat upload"
            echo "skip_compat=true" >>"${GITHUB_OUTPUT}"
            echo "export_date=" >>"${GITHUB_OUTPUT}"
            exit 0
          fi
          PARTIAL=$(python -c "import json,sys; d=json.load(open(sys.argv[1])); print(bool(d.get('partial_run') or d.get('manifest', {}).get('partial_run')))" "${MERGED_MANIFEST}")
          if [ "${PARTIAL}" = "True" ]; then
            echo "::notice::merged manifest has partial_run=true; skipping legacy compat upload (consumers have no partial-run handling yet)"
            echo "skip_compat=true" >>"${GITHUB_OUTPUT}"
            echo "export_date=" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          # F-V8-cutover (2026-05-18): copy ONLY the reducer output. The
          # merged manifest plus its sibling `..._merged__<frame>.parquet`
          # files form a self-contained canonical bundle. Copying per-shard
          # payloads in addition would leak shard-scoped manifests whose
          # sibling parquets the loader would prefer over the merged ones,
          # silently regressing the consumer to a single shard's coverage.
          cp -R artifacts/merged/. "${COMPAT_DIR}/"

          # Hard-fail when no parquet payload made it into the compat dir.
          # The reducer's payload concat is best-effort per-frame and could
          # produce only a manifest if a regression silently disables it.
          PARQUET_COUNT=$(find "${COMPAT_DIR}" -maxdepth 1 -name '*.parquet' -type f | wc -l | tr -d ' ')
          if [ "${PARQUET_COUNT}" -lt 1 ]; then
            echo "::error file=.github/workflows/smc-databento-production-export-sharded.yml::compat bundle has zero parquet payloads at ${COMPAT_DIR}; reducer payload merge regressed"
            exit 1
          fi

          # F-V8-cutover (2026-05-18): EXPORT_DATE uses ISO `YYYY-MM-DD`
          # to match the consumer's `REFRESH_DATE` format in
          # `smc-library-refresh.yml`. A compact `YYYYMMDD` form here would
          # break the consumer's prefix match on `smc-databento-production-
          # export-<date>-*` and silently fall back to the previous day's
          # artifact.
          EXPORT_DATE=$(date -u +%Y-%m-%d)
          echo "export_date=${EXPORT_DATE}" >>"${GITHUB_OUTPUT}"
          echo "skip_compat=false" >>"${GITHUB_OUTPUT}"
          echo "::notice::Compat bundle staged at ${COMPAT_DIR} for date ${EXPORT_DATE} (${PARQUET_COUNT} parquet payload(s))"
          ls -la "${COMPAT_DIR}/" | head -40

      - name: Upload compat export bundle (legacy artifact name)
        if: success() && steps.compat_stage.outputs.skip_compat == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-databento-production-export-${{ steps.compat_stage.outputs.export_date }}-${{ github.run_id }}
          path: artifacts/export-compat/
          retention-days: 7
          if-no-files-found: error
