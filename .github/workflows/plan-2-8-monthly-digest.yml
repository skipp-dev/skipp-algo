# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: Plan 2.8 Monthly Digest

on:
  schedule:
    - cron: '0 13 1 * *'  # 1st of month, 13:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days between comparison endpoints'
        required: false
        default: '30'
      alert_threshold_pp:
        description: 'Absolute HR drift (0..1) to flag a slice'
        required: false
        default: '0.05'
      min_events:
        description: 'Per-slice events floor for a comparable verdict'
        required: false
        default: '30'

permissions:
  contents: read
  actions: read

# F-V5-C2 (2026-05-01): cron-triggered digest — queue overlapping runs instead
# of killing them so the monthly snapshot cannot be truncated by a manual
# workflow_dispatch overlap.
concurrency:
  group: plan-2-8-monthly-digest
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
defaults:
  run:
    shell: bash

jobs:
  monthly-digest:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10  # F-V10 cron runaway guard; matches plan-2-8-weekly-digest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Download latest rolling bench artifact
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          workflow: smc-measurement-benchmark-rolling.yml
          name: '^smc-measurement-benchmark-rolling-.*$'
          name_is_regexp: true
          # Consume only successful producer runs — a failed run
          # may have uploaded incomplete artifacts.
          workflow_conclusion: success
          if_no_artifact_found: warn
          path: artifacts/latest_bench

      - name: Render monthly trend digest
        id: digest
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_monthly
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No plan_2_8_history.jsonl found in latest bench artifact." \
              | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '30' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --output             artifacts/plan_2_8_monthly/monthly_digest.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_monthly/monthly_digest.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_monthly/monthly_digest.md \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          true

      - name: Plan 2.8 top movers (monthly)
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history; skipping top-movers."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_monthly
          python scripts/plan_2_8_top_movers.py \
            --history       "${history}" \
            --lookback-days "${{ inputs.lookback_days || '30' }}" \
            --min-events    "${{ inputs.min_events || '30' }}" \
            --top-n         10 \
            --output        artifacts/plan_2_8_monthly/top_movers.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_monthly/top_movers.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_monthly/top_movers.md \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          true

      - name: Plan 2.8 rolling HR trend (8 weeks)
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history; skipping rollup."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_monthly
          python scripts/plan_2_8_digest_rollup.py \
            --history    "${history}" \
            --weeks      8 \
            --min-events "${{ inputs.min_events || '30' }}" \
            --output     artifacts/plan_2_8_monthly/rollup.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_monthly/rollup.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_monthly/rollup.md \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          true

      - name: Plan 2.8 deferred ADR queue
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_monthly
          if [ ! -s docs/DECISIONS.md ]; then
            echo "No DECISIONS.md; skipping ADR queue."
            exit 0
          fi
          python scripts/plan_2_8_adr_queue.py \
            --decisions docs/DECISIONS.md \
            --status    deferred \
            --output    artifacts/plan_2_8_monthly/adr_queue.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_monthly/adr_queue.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_monthly/adr_queue.md \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          true

      - name: Upload monthly digest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plan-2-8-monthly-digest
          path: artifacts/plan_2_8_monthly
          if-no-files-found: warn
          retention-days: 365
