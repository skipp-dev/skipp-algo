# live-window: any-trigger  # F-V6-F2.1 (2026-05-02)
name: smc-deeper-integration-gates

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

  PYTHONUNBUFFERED: "1"  # F-V4-A2: surface partial logs on runner eviction
jobs:
  deeper-gates:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-l' }}
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Refresh reference artifacts for deeper evidence run
        # Bug-Hunt 2026-05-01 F-03: pass --soft-skip-on-missing-inputs so
        # the step exits cleanly with rc=0 (and a GitHub annotation) when
        # the runner does not carry the canonical Databento export bundle
        # (manifest_prefix=databento_volatility_production_), instead of
        # turning every deeper-gates run red. Any other failure class
        # still propagates as rc!=0.
        run: |
          set +e
          python scripts/run_smc_pre_release_artifact_refresh.py \
            --soft-skip-on-missing-inputs \
            --output artifacts/ci/smc_deeper_refresh_report.json
          rc=$?
          if [ "$rc" -eq 78 ]; then
            echo "::warning title=pre-release-refresh::skipped (no canonical export bundle on runner; rc=78)"
            exit 0
          fi
          exit "$rc"

      - name: Run deeper provider and smoke health checks
        run: |
          python scripts/run_smc_ci_health_checks.py \
            --output artifacts/ci/smc_deeper_health_report.json

      - name: Run deeper measurement lane export
        # CONTINUE-ON-ERROR-INTENTIONAL: measurement-lane export is advisory
        # (writes report artifact); a failure here must not abort the
        # subsequent gates job.
        continue-on-error: true
        run: |
          python scripts/run_smc_release_gates.py \
            --ci-mode \
            --skip-publish-contract \
            --output artifacts/ci/smc_deeper_measurement_report.json

      - name: Run deeper SMC test matrix
        run: |
          shopt -s nullglob
          tests=(
            tests/test_smc_integration_*.py
            tests/test_explicit_structure_*.py
            tests/test_smc_core_*.py
            tests/test_smc_adapters_*.py
            tests/test_measurement_*.py
            tests/test_smc_vol_regime.py
            tests/test_smc_bias_merge.py
          )
          if [ ${#tests[@]} -eq 0 ]; then
            # F-V4-A4 (2026-05-01): emit ::error:: annotation so the empty-glob
            # config error is visible in the run summary.
            echo "::error::No deeper-gate tests matched the configured patterns."
            exit 1
          fi
          python -m pytest -q --maxfail=1 "${tests[@]}"

      - name: Build deeper gate evidence summary
        if: always()
        run: |
          python scripts/collect_smc_gate_evidence.py \
            --input-glob "artifacts/ci/smc_deeper*_report.json" \
            --output artifacts/ci/smc_deeper_evidence_summary.json

      - name: Render deeper gate summary
        if: always()
        run: |
          python scripts/render_ci_gate_summary.py \
            --report artifacts/ci/smc_deeper_evidence_summary.json \
            --enforcement advisory

      - name: Run E2E structural smoke test (advisory)
        id: e2e_smoke
        # CONTINUE-ON-ERROR-INTENTIONAL: smoke test is explicitly advisory
        # (name suffix says so); outcome is captured via $smoke_exit env for
        # downstream reporting rather than failing the job.
        continue-on-error: true
        run: |
          python scripts/e2e_smoke_ci.py \
            --reference tests/fixtures/e2e_smoke_reference.json \
            2>&1 | tee artifacts/ci/smc_e2e_smoke_output.txt
          echo "smoke_exit=$?" >> "$GITHUB_ENV"

      - name: Write E2E smoke summary
        if: always() && steps.e2e_smoke.outcome != 'skipped'
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          outcome = "${{ steps.e2e_smoke.outcome }}"
          output_path = Path("artifacts/ci/smc_e2e_smoke_output.txt")
          output_text = output_path.read_text().strip() if output_path.exists() else "(no output captured)"

          icon = "✅" if outcome == "success" else "⚠️"
          status = "PASSED" if outcome == "success" else "ADVISORY FAILURE"

          summary = f"""
          ### {icon} E2E Structural Smoke Test — {status}

          | Field | Value |
          |-------|-------|
          | **Outcome** | `{outcome}` |
          | **Mode** | Advisory (non-blocking) |
          | **Script** | `scripts/e2e_smoke_ci.py` |

          <details>
          <summary>Output</summary>

          ```
          {output_text}
          ```

          </details>
          """

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write(summary)
          else:
              print(summary)
          PY

      - name: Upload deeper gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smc-deeper-gate-evidence
          path: |
            artifacts/ci/measurement/
            artifacts/ci/smc_deeper_refresh_report.json
            artifacts/ci/smc_deeper_health_report.json
            artifacts/ci/smc_deeper_measurement_report.json
            artifacts/ci/smc_deeper_evidence_summary.json
            artifacts/ci/smc_e2e_smoke_output.txt
