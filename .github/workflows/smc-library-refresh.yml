# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
# SMC Library Intraday Refresh (v5)
#
# Runs 3x per trading day at 16:00 / 20:00 / 22:00 UTC on weekdays — the
# 22:00 tick (A2-F2, PR #2787) was added as a 60-min consumer followup for
# the producer safety-net tick at 21:00 UTC. Prior history: 2x/day 16:00/20:00
# (F-V8-C4 2026-05-06, 4×→2×); 4x 13/15/17/19 (F-V6-C3); 4x 12:30/14:30/16:30/18:30.
# F-V8-cutover (2026-05-18) then moved the canonical producer cron to
# smc-databento-production-export-sharded.yml while keeping the legacy
# artifact name for downstream compatibility. See cron block below for
# rationale and CHANGELOG.md F-V8-C4 entry for the lockstep producer
# restructure. Within the handoff window the consumer expects a
# freshly-completed producer artifact (see
# test_workflow_databento_handoff_timeouts for the pin enforcing this).
# Each run: generate → event-risk → gate → detect changes → diff report →
#           governance → publish → commit → alerts.
# Skips publish/version-bump/commit when the library content is unchanged.
# v5 stages:
#   1. Restore Databento base-data bundle (produced by
#      smc-databento-production-export-sharded.yml and consumed here via
#      --bundle; this workflow runs no Databento scan of its own)
#   2. Enrichment (regime, news, calendar, layering, event-risk)
#   3. Evidence gates (integration / structure / core tests)
#   4. Change detection (diff against previous library)
#   5. Version governance (breaking-change detection)
#   6. Publish to TradingView
#   7. Commit artifacts
#   8. Signal + event-risk alerts (Telegram / email)
#
# Required secrets:
#   FMP_API_KEY        – Financial Modeling Prep API key (enrichment data)
#   BENZINGA_API_KEY   – Benzinga API key (news/calendar fallback)
#   TV_STORAGE_STATE   – TradingView Playwright storage-state as raw JSON or gzip+base64 (publish)
#   DATABENTO_API_KEY  – Consumed by the provider-credential preflight step
#                        (--databento-key-env DATABENTO_API_KEY); base data is
#                        produced by smc-databento-production-export-sharded.yml
#                        and consumed via --bundle but the key is still required
#                        here so the preflight can validate it is present/valid.
#
# Optional secrets:
#   GH_PAT             – Optional GitHub PAT override for checkout;
#                        the final repository push is forced through the
#                        built-in github.token with contents:write permission.
#
# Optional secrets (alerting):
#   TELEGRAM_BOT_TOKEN – Telegram bot token for alert delivery
#   TELEGRAM_CHAT_ID   – Telegram chat/channel ID for alerts
#   SMTP_HOST          – SMTP server hostname for email alerts
#   SMTP_USER          – SMTP login username
#   SMTP_PASS          – SMTP login password
#   ALERT_EMAIL_FROM   – Sender address for email alerts
#   ALERT_EMAIL_TO     – Recipient address for email alerts
#   NEWSAPI_KEY     – NewsAPI.ai key for optional news fallback enrichment
#
# Secret compatibility note (v4 → v5):
#   Secret names are unchanged from v4 — no reconfiguration needed.
#   The v5 architecture adds the event-risk enrichment stage which
#   derives from existing calendar + news data; no new secrets required.

name: smc-library-refresh

on:
  schedule:
    # F-V8-C4 (2026-05-06): cron restructure 4×→2× to match producer's
    # new 240-min budget (see smc-databento-production-export-sharded.yml).
    # Each
    # producer tick gets a consumer follow-up exactly 240 min later, so
    # within the handoff window the consumer expects a freshly-completed
    # export even if the producer uses its full new cap. Workflow_run
    # trigger below remains the primary fast path; cron is the safety net.
    # Option-D (2026-06-16): 9 safety-net ticks, each exactly 60 min after the
    # corresponding producer tick. Count must equal producer count (enforced by
    # tests/test_workflow_databento_cron_respacing.py).
    - cron: "0 9 * * 1-5"    # 09:00 UTC – 60 min after producer 08:00 tick
    - cron: "0 11 * * 1-5"   # 11:00 UTC – 60 min after producer 10:00 tick
    - cron: "0 13 * * 1-5"   # 13:00 UTC – 60 min after producer 12:00 tick
    - cron: "0 15 * * 1-5"   # 15:00 UTC – 60 min after producer 14:00 tick
    - cron: "0 17 * * 1-5"   # 17:00 UTC – 60 min after producer 16:00 tick
    - cron: "0 19 * * 1-5"   # 19:00 UTC – 60 min after producer 18:00 tick
    - cron: "0 21 * * 1-5"   # 21:00 UTC – 60 min after producer 20:00 tick
    - cron: "0 22 * * 1-5"   # 22:00 UTC – 60 min after producer 21:00 tick
    - cron: "0 23 * * 1-5"   # 23:00 UTC – 60 min after producer 22:00 tick
  # F-V4-J3 (2026-05-01) blast-radius reduction (kept alongside the
  # F-V6-C3 cron schedule above as belt-and-suspenders): consumer also
  # fires immediately when the canonical sharded producer
  # (smc-databento-production-export-sharded) completes successfully,
  # gated by the job-level `if:` below. Refresh is idempotent so
  # back-to-back fires (workflow_run + nearby cron) are safe;
  # concurrency guard above prevents overlap.
  workflow_run:
    workflows: ["smc-databento-production-export-sharded"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      hosted_runner_override:
        description: >-
          Optional one-off override for the github-hosted fallback runner
          label (e.g. 'ubuntu-24.04-4core'). Empty value falls back to
          vars.SMC_GH_HOSTED_RUNNER or 'ubuntu-latest'. Only takes effect
          when no idle self-hosted runner is available. Used to pilot
          larger hosted runners without changing the repo variable.
        required: false
        type: string
        default: ''
      allow_breaking_publish:
        description: >-
          Operator override: when 'true', the version-governance breaking-
          change gate is bypassed and the library publishes despite
          field-version / schema-version / field-count escalations.
          Only honored on workflow_dispatch against refs/heads/main.
          Use after merging a release-pending PR that documents the
          breaking bump (see auto-opened bot/library-release-pending-*
          PR). NEVER set true on scheduled or workflow_run triggers.
        required: false
        type: boolean
        default: false

# F-V8-C3.1-D (2026-05-02): serialize consumer runs per ref. Mirrors the
# producer guard (smc-databento-production-export-sharded) so a slow handoff
# cannot be raced by the next 2-hour cron tick. cancel-in-progress=false
# because the consumer commits artifacts and opens PRs — killing it
# mid-run would leave a half-written artifact tree on the runner and a
# zombie PR branch on origin. The follow-on tick queues instead.
concurrency:
  group: smc-library-refresh-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Required by dawidd6/action-download-artifact below: it calls the
  # GitHub Actions REST API to enumerate the producer workflow's runs
  # and download the resolved artifact. Without this, the cross-workflow
  # pull silently fails with 403 and verify_export_bundle then blocks.
  actions: read

# F-V5-C2 (2026-05-01) → superseded by F-V8-C3.1-D (2026-05-02) per-ref
# block above; the prior ref-less `concurrency:` declaration was removed
# 2026-05-03 because YAML last-wins silently overrode the per-ref intent.

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REFRESH_DATE: ""   # set dynamically in the date step
defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          SMC_FORCE_GH_HOSTED: ${{ vars.SMC_FORCE_GH_HOSTED }}
        run: |
          # Library refresh is a long-running cron/workflow_run batch job, so
          # prefer the priority cron Windows runner when one is online and idle.
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ inputs.hosted_runner_override != '' && inputs.hosted_runner_override || (vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest') }}" \
            --custom-label "${{ vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"

  record-runner-selection:
    # Durable aggregate counter of runner-selection outcomes. Runs whenever
    # select-runner produced a decision, independent of whether the refresh
    # job later runs/skips/fails. This is best-effort telemetry, so the job
    # is continue-on-error and never fails the workflow. See
    # scripts/runner_selection_metrics.py and
    # automation/metrics/push_runner_selection_metric.sh.
    needs: select-runner
    if: ${{ always() && needs.select-runner.result == 'success' }}
    # CONTINUE-ON-ERROR-INTENTIONAL: best-effort telemetry only. A failure to
    # record/push the runner-selection metric must never fail the surrounding
    # library-refresh workflow (audit finding M-1, Klasse #24).
    continue-on-error: true
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Configure git credentials for metrics push
        # push_runner_selection_metric.sh uses the ambient origin credential.
        # With persist-credentials: false on the checkout, we must explicitly
        # set the remote URL with the token before the push script runs.
        # This is more explicit and auditable than relying on the injected
        # credential-helper from the checkout action.
        # Use GITHUB_TOKEN + ${GITHUB_REPOSITORY} (built-in env var) to match
        # the convention used by the refresh and publish jobs in this workflow.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Record runner-selection metric
        env:
          REASON: ${{ needs.select-runner.outputs.resolution_reason }}
          RUNNER_ENVIRONMENT: ${{ needs.select-runner.outputs.runner_environment }}
          MATCHED_RUNNER_NAME: ${{ needs.select-runner.outputs.matched_runner_name }}
          WORKFLOW: ${{ github.workflow }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          PYTHON_BIN: python
        run: |
          bash automation/metrics/push_runner_selection_metric.sh

      - name: Publish summary to job log
        if: ${{ always() }}
        run: |
          # Pull the latest aggregate ledger from the metrics branch (if any)
          # and render the rollup into this run's job summary.
          branch="metrics/runner-selection"
          max_lines="${RUNNER_SELECTION_SUMMARY_MAX_LINES:-50000}"
          if git fetch --quiet origin "${branch}" 2>/dev/null; then
            git show "FETCH_HEAD:metrics/runner_selection.jsonl" 2>/dev/null > /tmp/runner_metrics_full.jsonl || : > /tmp/runner_metrics_full.jsonl
            tail -n "${max_lines}" /tmp/runner_metrics_full.jsonl > /tmp/runner_metrics_tail.jsonl || : > /tmp/runner_metrics_tail.jsonl
            python scripts/runner_selection_metrics.py summary \
              --metrics-file /tmp/runner_metrics_full.jsonl --format md >> "${GITHUB_STEP_SUMMARY}" || true
            {
              echo ""
              echo "_Rendered from full metrics ledger; tail preview cap currently ${max_lines} lines._"
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No runner-selection metrics recorded yet." >> "${GITHUB_STEP_SUMMARY}"
          fi

  refresh:
    # F-V4-J3: when triggered by workflow_run, only proceed if producer
    # succeeded. Manual workflow_dispatch and scheduled cron bypass this
    # guard (cron already implies "no upstream signal to gate on").
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    # F-V8-C4 (2026-05-06): bumped 120→240 in lockstep with the producer.
    # Pin test enforces producer ≤ consumer, so the two move together.
    # 240 = exactly the new 4 h cron interval — back-to-back runs touch
    # but cannot overlap (anything >240 would let a zombie run collide
    # with the next tick).
    timeout-minutes: 240

    steps:
      # ── Metadata ────────────────────────────────────────────────
      - name: Set refresh date
        run: |
          echo "REFRESH_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
          echo "REFRESH_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Emit runner selection
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"
          echo "::notice::SMC refresh job running on '${{ needs.select-runner.outputs.runner_environment }}' (matched='${{ needs.select-runner.outputs.matched_runner_name || runner.name }}', reason='${{ needs.select-runner.outputs.resolution_reason }}')."

      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          persist-credentials: false

      # ── Python + Node setup ─────────────────────────────────────
      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          # Additional fallback candidates for self-hosted Linux/macOS runners
          # that expose the interpreter under a versioned name.
          for candidate in python3.12 python3; do
            if command -v "$candidate" >/dev/null 2>&1; then
              if "$candidate" -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)" 2>/dev/null; then
                echo "SMC_PYTHON_BIN=$candidate" >> "$GITHUB_ENV"
                exit 0
              fi
            fi
          done

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\`, \`py -3.12\`, \`python3.12\`, \`python3\`)."
          exit 1

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Mirrors ci.yml: GHA cache backend returns HTTP 400 on the
          # Windows self-hosted runner. Disable the GHA cache layer there;
          # uv keeps its on-disk cache regardless.
          enable-cache: ${{ needs.select-runner.outputs.runner_environment == 'github-hosted' && 'true' || 'false' }}
          cache-dependency-glob: |
            requirements*.txt

      - name: Install Python dependencies
        run: |
          # F-V8-perf (2026-05-18): pip -> uv. uv installs into the same
          # interpreter site-packages (no venv needed here), preserving the
          # downstream "$SMC_PYTHON_BIN script.py" contract.
          # WF-012 (2026-05-20): on the GitHub-hosted fallback the resolved
          # interpreter has no venv; --system is required so uv installs into
          # the system site-packages instead of erroring out. Mirrors the
          # rolling-benchmark and producer workflows.
          uv pip install --python "$SMC_PYTHON_BIN" --system -r requirements.txt pytest

      - name: Install Node dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw_version
        run: |
          version="$(npx --no-install playwright --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
          if [ -z "$version" ]; then
            # Fall back to package.json so the cache key stays stable even
            # if the npx probe ever changes its output format.
            version="$(node -p "require('./node_modules/playwright/package.json').version")"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browsers cache
        id: pw_cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-${{ steps.pw_version.outputs.version }}

      - name: Install Playwright browsers (cache miss)
        if: steps.pw_cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system deps
        # apt install of Chromium system libs is fast on github-hosted but
        # cannot be cached across runs (apt state lives outside _work).
        # On self-hosted Windows there are no deps to install; the command
        # is a no-op so it's safe to run unconditionally.
        run: npx playwright install-deps chromium

      # ── Snapshot pre-generation state ───────────────────────────
      - name: Snapshot library + manifest before generation
        run: |
          if [ -f pine/generated/smc_micro_profiles_generated.pine ]; then
            cp pine/generated/smc_micro_profiles_generated.pine /tmp/library_before.pine
          else
            touch /tmp/library_before.pine
          fi
          if [ -f pine/generated/smc_micro_profiles_generated.json ]; then
            cp pine/generated/smc_micro_profiles_generated.json /tmp/manifest_before.json
          else
            echo '{}' > /tmp/manifest_before.json
          fi

      # ── Restore canonical Databento production export bundle ────
      # F-V5-D3 (2026-05-01): switched from actions/cache/restore to
      # dawidd6/action-download-artifact. The canonical sharded producer
      # workflow (smc-databento-production-export-sharded.yml) publishes
      # its compat-layer bundle under the legacy workflow-artifact name
      # `smc-databento-production-export-<DATE>-<RUN_ID>` (F-V5-D2). We
      # search the producer workflow's recent runs for the newest
      # successful artifact whose name matches today's date; if none is
      # available we fall back to the most recent same-prefix artifact.
      # `if_no_artifact_found: warn` keeps the existing soft-fail
      # contract — verify_export_bundle below decides whether to block.
      #
      # F-V8-C4.2 (2026-06-14): restore/verify happens BEFORE library
      # generation. The refresh consumer must build from the producer
      # bundle via `--bundle`, not rerun the producer's full Databento
      # scan via `--run-scan` on a cold hosted fallback runner.
      - name: Restore Databento production export bundle (today)
        id: restore_export_bundle_today
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: smc-databento-production-export-sharded.yml
          name: smc-databento-production-export-${{ env.REFRESH_DATE }}-
          name_is_regexp: true
          path: artifacts/smc_microstructure_exports
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Restore Databento production export bundle (latest fallback)
        id: restore_export_bundle_fallback
        if: steps.restore_export_bundle_today.outputs.found_artifact != 'true'
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: smc-databento-production-export-sharded.yml
          name: ^smc-databento-production-export-
          name_is_regexp: true
          path: artifacts/smc_microstructure_exports
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Reject stale Databento fallback on automated refresh
        id: reject_stale_export_fallback
        if: |
          github.event_name != 'workflow_dispatch'
          && steps.restore_export_bundle_today.outputs.found_artifact != 'true'
          && steps.restore_export_bundle_fallback.outputs.found_artifact == 'true'
        run: |
          set -euo pipefail
          echo "::error file=.github/workflows/smc-library-refresh.yml::Automated library refresh resolved only a fallback Databento export for REFRESH_DATE=${REFRESH_DATE}. Refusing to generate from a stale producer bundle; wait for smc-databento-production-export-sharded to publish today's compat artifact, or rerun manually if an older bundle is intentional."
          exit 1

      # F-V8-D1 (2026-05-14): dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21 with
      # name_is_regexp: true unconditionally nests each downloaded artifact
      # under `<path>/<artifact-name>/...` (see main.js:269). Consumer
      # scripts (smc_integration.{structure_batch,measurement_evidence,
      # service}, scripts/run_smc_pre_release_artifact_refresh.py and
      # scripts/load_databento_export_bundle.py:_manifest_candidates)
      # all use a non-recursive `directory.glob(manifest_prefix*_manifest.json)`,
      # so the nested layout is invisible to them. Flatten the bundle into
      # the export-dir root before the verify-step and bundle-based
      # generation run.
      #
      # F-V8-C4.2 (2026-06-14): the producer bundle is now the source of
      # truth for generation itself. If a self-hosted workspace contains
      # leftover working-set files, the freshly downloaded producer bundle
      # still wins and every overwrite is surfaced as a notice.
      #
      # Skip when neither download step found an artifact: flatten is then
      # a no-op and `verify_export_bundle` produces the canonical
      # missing-bundle error annotation pointing at the producer workflow.
      - name: Flatten downloaded Databento export bundle
        id: flatten_export_bundle
        if: |
          steps.restore_export_bundle_today.outputs.found_artifact == 'true'
          || steps.restore_export_bundle_fallback.outputs.found_artifact == 'true'
        run: |
          set -euo pipefail
          ROOT=artifacts/smc_microstructure_exports
          shopt -s nullglob
          # Only flatten subdirs whose name matches the producer artifact-name
          # convention (smc-databento-production-export-YYYY-MM-DD-<runid>).
          # This keeps unrelated co-located subdirs (none today, but defensive)
          # untouched.
          moved=0
          overwritten=0
          for sub in "$ROOT"/smc-databento-production-export-*; do
            [ -d "$sub" ] || continue
            echo "==> Flattening $sub"
            for entry in "$sub"/* "$sub"/.[!.]*; do
              [ -e "$entry" ] || continue
              base=$(basename "$entry")
              if [ -e "$ROOT/$base" ]; then
                echo "::notice::Producer bundle overrides local working-set copy: $ROOT/$base"
                overwritten=$((overwritten + 1))
              fi
              mv -f "$entry" "$ROOT/$base"
              moved=$((moved + 1))
            done
            rmdir "$sub"
          done
          echo "==> Flattened $moved entries ($overwritten overwrote a local working-set copy)"
          echo "moved_entries=$moved" >> "$GITHUB_OUTPUT"
          echo "overwritten_entries=$overwritten" >> "$GITHUB_OUTPUT"

      - name: Verify Databento production export bundle is present
        id: verify_export_bundle
        run: |
          set -euo pipefail
          if ls artifacts/smc_microstructure_exports/databento_volatility_production_*_manifest.json >/dev/null 2>&1; then
            echo "bundle_present=true" >> "$GITHUB_OUTPUT"
            NEWEST=$(ls -1t artifacts/smc_microstructure_exports/databento_volatility_production_*_manifest.json | head -1)
            echo "::notice::Restored Databento production manifest: ${NEWEST}"
            exit 0
          fi
          # F-V5-D1 (2026-05-01): automated consumers MUST not generate or
          # publish against a stale / missing producer bundle. Hard-fail
          # with a clickable annotation that points at the upstream workflow
          # so triage starts in the right place.
          echo "bundle_present=false" >> "$GITHUB_OUTPUT"
          echo "::error file=.github/workflows/smc-databento-production-export-sharded.yml::Producer artifact missing for ${REFRESH_DATE}; refresh aborted. Re-run smc-databento-production-export-sharded and then re-trigger smc-library-refresh."
          exit 1

      # ── Provider credential preflight ───────────────────────────
      # Gate generation on provider credential health so a delinquent
      # Databento invoice (HTTP 402) or a missing/expired key fails fast
      # here instead of burning ~2.5h of generation before the runner is
      # shut down (see run #412). Shares scripts/credential_health_check.py
      # with credential-health-check.yml and PR #2743's delivery probe.
      - name: Provider credential preflight
        id: provider_preflight
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          mkdir -p artifacts/ci
          newsapi_arg=()
          if [ -z "${NEWSAPI_KEY:-}" ]; then
            echo "::warning::NEWSAPI_KEY not set — skipping optional NewsAPI preflight probe."
            newsapi_arg+=(--skip-newsapi)
          fi
          set +e
          "$SMC_PYTHON_BIN" scripts/credential_health_check.py \
            --skip-tv \
            --skip-gh-pat \
            "${newsapi_arg[@]}" \
            --databento-key-env DATABENTO_API_KEY \
            --fmp-key-env FMP_API_KEY \
            --output artifacts/ci/provider_preflight.json
          rc=$?
          set -e
          # credential_health_check.py exit codes: 0=ok, 2=warn-or-error,
          # 1=all-probes-skipped (no JSON written). It does NOT distinguish
          # error from warn via the exit code, so gate on overall_severity
          # in the JSON report instead.
          if [ "$rc" -eq 1 ]; then
            echo "::error::Provider credential preflight produced no signal (all probes skipped) — aborting before generation."
            exit 1
          fi
          if [ ! -f artifacts/ci/provider_preflight.json ]; then
            echo "::error::Provider credential preflight JSON missing after rc=$rc — aborting."
            exit 1
          fi
          severity=$("$SMC_PYTHON_BIN" -c "import json,sys; print(json.load(open('artifacts/ci/provider_preflight.json')).get('overall_severity','error'))")
          echo "provider_preflight_severity=$severity"
          echo "provider_preflight_severity=$severity" >> "$GITHUB_OUTPUT"
          if [ "$severity" = "error" ]; then
            echo "::error::Provider credential preflight failed (severity=error) — aborting before generation to avoid a wasted long run."
            exit 1
          fi
          if [ "$severity" = "warn" ]; then
            echo "::warning::Provider credential preflight reported warnings (severity=warn) — proceeding with generation."
          fi

      # ── Library generation with enrichment (v5) ─────────────────
      - name: Generate SMC library with v5 enrichment
        # Option-D (2026-06-16): 45-min hard limit guards against FMP/Benzinga
        # retry storms that caused 90–155 min hangs (root cause: ~100 per-ticker
        # API calls × 84s worst-case retry budget = ~8400s). A timed-out run
        # fails the job, releases the concurrency slot, and lets the next tick
        # pick up the delta. The job-level cap stays at 240 min.
        timeout-minutes: 45
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          BENZINGA_API_KEY: ${{ secrets.BENZINGA_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          "$SMC_PYTHON_BIN" scripts/generate_smc_micro_base_from_databento.py \
            --bundle artifacts/smc_microstructure_exports \
            --enrich-all \
            --export-dir artifacts/smc_microstructure_exports \
            --output-root .

      - name: Verify generated base manifest exists
        run: |
          if ! find artifacts/smc_microstructure_exports -name '*__smc_microstructure_base_manifest.json' -print -quit | grep -q .; then
            echo "::error::Missing generated base manifest in artifacts/smc_microstructure_exports"
            exit 1
          fi

      # ── Evidence gates ──────────────────────────────────────────
      - name: Run evidence gate tests
        id: gates
        # CONTINUE-ON-ERROR-INTENTIONAL: gates outcome is consumed downstream
        # via steps.gates.outcome / outputs (see breaking-change + alerts steps);
        # advisory failures must not abort the refresh pipeline.
        continue-on-error: true
        run: |
          shopt -s nullglob
          mkdir -p artifacts/ci
          tests=(
            tests/test_smc_integration_*.py
            tests/test_explicit_structure_*.py
            tests/test_smc_core_*.py
          )
          if [ ${#tests[@]} -eq 0 ]; then
            # F-V4-A4 (2026-05-01): empty-glob config error must surface as a
            # ::error:: annotation, not stderr-only.
            echo "::error::No gate tests matched the configured patterns."
            exit 1
          fi
          set +e
          # F-V8-perf (2026-05-18): xdist parallelism on the gate tests. The
          # integration/structure/core suites are already parallel-safe (same
          # pattern as ci.yml's validate job). worksteal keeps long tests from
          # bottlenecking a single worker.
          "$SMC_PYTHON_BIN" -m pytest -q --maxfail=1 -n auto --dist=worksteal "${tests[@]}" 2>&1 | tee artifacts/ci/smc_refresh_gate_pytest.log
          GATE_RC=${PIPESTATUS[0]}
          set -e

          FIRST_FAILED_TEST_LINE=$(grep -m1 '^FAILED ' artifacts/ci/smc_refresh_gate_pytest.log || true)
          FIRST_FAILED_TEST=$(printf '%s\n' "$FIRST_FAILED_TEST_LINE" | sed -E 's/^FAILED ([^ ]+).*/\1/')
          if [ -n "$FIRST_FAILED_TEST" ]; then
            {
              echo "first_failed_test<<EOF"
              echo "$FIRST_FAILED_TEST"
              echo "EOF"
              echo "first_failed_test_line<<EOF"
              echo "$FIRST_FAILED_TEST_LINE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          exit "$GATE_RC"

      - name: "⚠️ Warn: Run evidence gate tests"
        if: always() && steps.gates.outcome == 'failure'
        run: |
          echo "::warning::Step 'Run evidence gate tests' failed silently (soft-fail step)"

      - name: Collect gate evidence
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/collect_smc_gate_evidence.py \
            --input-glob "artifacts/ci/smc_*_report.json" \
            --output artifacts/ci/smc_refresh_evidence_summary.json

      - name: Abort on gate failure
        if: steps.gates.outcome == 'failure'
        run: |
          if [ -n "${{ steps.gates.outputs.first_failed_test }}" ]; then
            echo "::error::Evidence gates failed on ${{ steps.gates.outputs.first_failed_test }} — library will NOT be published."
          else
            echo "::error::Evidence gates failed — library will NOT be published."
          fi
          echo "GATE_STATUS=failed" >> "$GITHUB_ENV"
          exit 1

      # ── Change detection ────────────────────────────────────────
      - name: Detect library changes
        id: diff
        run: |
          LIBRARY="pine/generated/smc_micro_profiles_generated.pine"
          MANIFEST="pine/generated/smc_micro_profiles_generated.json"
          mkdir -p artifacts/ci

          if diff -q /tmp/library_before.pine "$LIBRARY" > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Library content unchanged — skipping publish/commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            diff -u /tmp/library_before.pine "$LIBRARY" \
              > artifacts/ci/library_diff_${REFRESH_DATE}.patch || true
            echo "::notice::Library content changed — proceeding to publish."
          fi

      # ── Schema / version governance ─────────────────────────────
      - name: Evaluate version governance
        id: breaking
        if: steps.diff.outputs.changed == 'true'
        run: |
          set +e
          DECISION=$("$SMC_PYTHON_BIN" scripts/smc_version_governance.py \
            --old-manifest /tmp/manifest_before.json \
            --new-manifest pine/generated/smc_micro_profiles_generated.json \
            --old-library /tmp/library_before.pine \
            --library pine/generated/smc_micro_profiles_generated.pine)
          RC=$?
          set -e

          mkdir -p artifacts/ci
          echo "$DECISION" | tee artifacts/ci/version_governance_${REFRESH_DATE}.json

          if [ "$RC" -ne 0 ]; then
            BREAKING="true"
            REASON=$(echo "$DECISION" | jq -r '.reasons | join("; ")')
            SCHEMA_OLD=$(echo "$DECISION" | jq -r '.schema_version_old')
            SCHEMA_NEW=$(echo "$DECISION" | jq -r '.schema_version_new')
            FIELD_OLD=$(echo "$DECISION" | jq -r '.field_version_old')
            FIELD_NEW=$(echo "$DECISION" | jq -r '.field_version_new')
            # F-V8-N1 (2026-05-28): elevate visibility from ::warning to
            # ::error file-annotation so blocked publishes show as a red
            # marker on the run UI and not just a silently-skipped step
            # chain. Pair with the GITHUB_STEP_SUMMARY block + the
            # release_pending.flag artifact + the auto-opened
            # bot/library-release-pending-* PR below.
            echo "::error file=.github/workflows/smc-library-refresh.yml,title=Breaking change blocks publish::Breaking change detected — auto-publish blocked. ${REASON}"
            {
              echo "## :no_entry: Library publish blocked — breaking change"
              echo ""
              echo "| Field | Before | After |"
              echo "|---|---|---|"
              echo "| schema_version | \`${SCHEMA_OLD}\` | \`${SCHEMA_NEW}\` |"
              echo "| library_field_version | \`${FIELD_OLD}\` | \`${FIELD_NEW}\` |"
              echo ""
              echo "**Reasons:** ${REASON}"
              echo ""
              echo "A release-pending PR will be opened automatically (label \`release-pending\`)."
              echo "Review, merge it, then re-run this workflow via \`workflow_dispatch\` with"
              echo "\`allow_breaking_publish=true\` to release the bump to TradingView."
            } >> "$GITHUB_STEP_SUMMARY"
            # Sticky artifact channel so operators see the pending-publish state
            # even when scrolling Actions list (the run still shows green).
            printf '%s\n' "$DECISION" > artifacts/ci/release_pending.flag
          else
            BREAKING="false"
            REASON=""
          fi

          echo "breaking=${BREAKING}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"

      # F-V8-N1 (2026-05-28): single source of truth for the publish gate.
      # Combines the breaking-change classification with the operator
      # override input so every downstream `if:` condition can reference
      # one boolean instead of repeating the same conjunction 9 times.
      # Override is only honored on workflow_dispatch against
      # refs/heads/main (defence-in-depth: schedule + workflow_run can
      # never publish a breaking change silently, regardless of inputs).
      - name: Compute publish gate
        id: publish_gate
        if: steps.diff.outputs.changed == 'true'
        env:
          BREAKING: ${{ steps.breaking.outputs.breaking }}
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
          ALLOW_BREAKING: ${{ inputs.allow_breaking_publish }}
        run: |
          set -euo pipefail
          OVERRIDE="false"
          if [ "$IS_DISPATCH" = "true" ] && [ "$IS_MAIN" = "true" ] && [ "$ALLOW_BREAKING" = "true" ]; then
            OVERRIDE="true"
          fi

          if [ "$BREAKING" != "true" ]; then
            PUBLISH_ALLOWED="true"
          elif [ "$OVERRIDE" = "true" ]; then
            PUBLISH_ALLOWED="true"
            echo "::warning title=Operator override active::allow_breaking_publish=true bypasses the breaking-change gate on this dispatch. Ensure a release-pending PR has been reviewed + merged."
          else
            PUBLISH_ALLOWED="false"
          fi

          echo "publish_allowed=${PUBLISH_ALLOWED}" >> "$GITHUB_OUTPUT"
          echo "override_active=${OVERRIDE}" >> "$GITHUB_OUTPUT"

      # F-V8-N1 (2026-05-28): when the breaking-change gate blocks publish,
      # open a `bot/library-release-pending-*` PR carrying the regenerated
      # library + manifest. This was the missing link that caused 5+ weeks
      # of silent skipped publishes (HR_SENTINEL_DEGRADED #51, WS3 #55,
      # WS3 #58 all stacked up because no human got a PR to merge after
      # the gate fired). The PR uses the existing GH_PAT pattern so
      # downstream checks fire correctly.
      - name: Open release-pending PR (on breaking change)
        id: release_pending_pr
        if: |
          steps.diff.outputs.changed == 'true'
          && steps.breaking.outputs.breaking == 'true'
          && steps.publish_gate.outputs.publish_allowed != 'true'
          && github.event_name != 'pull_request'
          && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          REASON: ${{ steps.breaking.outputs.reason }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          BRANCH="bot/library-release-pending-${GITHUB_RUN_ID}"
          # Idempotency: a duplicate run on the same SHA reuses the branch.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::notice::Release-pending branch ${BRANCH} already exists — skipping re-open."
            exit 0
          fi

          GIT_LFS_SKIP_SMUDGE=1 git -c filter.lfs.smudge= -c filter.lfs.process= -c filter.lfs.required=false restore --source=HEAD --worktree --staged -- \
            artifacts/databento_volatility_cache/ \
            artifacts/smc_microstructure_exports/smc_live_news_snapshot.json \
            artifacts/smc_microstructure_exports/smc_live_news_state.json || true

          git add pine/generated/ \
            artifacts/ci/version_governance_${REFRESH_DATE}.json \
            artifacts/ci/release_pending.flag
          if git diff --cached --quiet; then
            echo "::notice::No release-pending changes to commit (already on main)."
            exit 0
          fi

          git checkout -b "$BRANCH"
          COMMIT_MSG="chore(library): release-pending ${REFRESH_DATE} (breaking) (run ${{ github.run_number }})

          Auto-opened by smc-library-refresh after the version-governance gate
          classified this refresh as a breaking change. Reasons:

            ${REASON}

          Merging this PR documents the bump for downstream reviewers. After
          merge, re-run smc-library-refresh via workflow_dispatch with
          allow_breaking_publish=true to release the new library version to
          TradingView. The follow-up consumer-import bump (smc_micro_profiles_
          generated/N -> /N+1) lands as a separate sed-style PR per issue #59."
          git commit -m "$COMMIT_MSG"
          git push -u origin "$BRANCH"

          PR_BODY="Automated release-pending PR opened by \`smc-library-refresh\` (run ${GITHUB_RUN_ID}).

          The version-governance gate (\`scripts/smc_version_governance.py\`) classified
          this refresh as a **breaking change** and blocked the TradingView publish.

          **Reasons:** ${REASON}

          ### Operator workflow
          1. Review the regenerated \`pine/generated/\` artifacts in this PR.
          2. Verify the bump is intentional (see \`artifacts/ci/version_governance_${REFRESH_DATE}.json\`).
          3. Merge this PR.
          4. Re-run [smc-library-refresh.yml](.github/workflows/smc-library-refresh.yml) via \`workflow_dispatch\` with **\`allow_breaking_publish=true\`** to publish to TradingView.
          5. After publish succeeds, follow up with the consumer-import bump per issue #59.

          CI is skipped for \`bot/*\` PRs (validation already happened inside the refresh workflow)."

          # Idempotently ensure required labels exist; first run after this
          # workflow was introduced failed because the repo had none of them.
          gh label create release-pending --color B60205 \
            --description "Library publish gated by breaking-change governance; awaiting human ack before /N -> /N+1" 2>/dev/null || true
          gh label create breaking-change --color B60205 \
            --description "Pine library MAJOR schema/field bump; requires consumer-import refresh" 2>/dev/null || true
          gh label create automated --color FBCA04 \
            --description "Bot-generated PR (auto-merge, skip heavy CI)" 2>/dev/null || true

          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --label release-pending \
            --label breaking-change \
            --label automated \
            --title "chore(library): release-pending ${REFRESH_DATE} (breaking) (run ${{ github.run_number }})" \
            --body "$PR_BODY"; then
            echo "::error file=.github/workflows/smc-library-refresh.yml::gh pr create failed for release-pending branch ${BRANCH} — see step log for stderr"
            exit 1
          fi
      # ── Release-reference artifact refresh + strict gates ───────
      # Marked advisory until the producer cache is warm so that a missing
      # bundle does not block the entire library refresh / TradingView
      # publish flow. The strict gates step below still runs unconditionally.
      # CONTINUE-ON-ERROR-INTENTIONAL: best-effort hop — strict gates step below
      # is the real fail signal; M-1 / Klasse #24.
      - name: Refresh release reference artifacts (best-effort)
        id: pre_release_refresh
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        run: |
          if [ "${{ steps.verify_export_bundle.outputs.bundle_present }}" != "true" ]; then
            echo "::warning::Skipping release reference artifact refresh: export bundle missing."
            exit 0
          fi
          "$SMC_PYTHON_BIN" scripts/run_smc_pre_release_artifact_refresh.py \
            --export-bundle-root artifacts/smc_microstructure_exports \
            --warn-on-empty-artifacts \
            --output artifacts/ci/smc_pre_release_artifact_refresh_report.json

      - name: "⚠️ Warn: Refresh release reference artifacts (best-effort)"
        if: always() && steps.pre_release_refresh.outcome == 'failure'
        run: |
          echo "::warning::Step 'Refresh release reference artifacts (best-effort)' failed silently (soft-fail step)"

      - name: Run pre-publish strict release gates
        id: pre_release_gates
        if: steps.diff.outputs.changed == 'true'
        run: |
          "$SMC_PYTHON_BIN" scripts/run_smc_release_gates.py \
            --output artifacts/ci/smc_pre_release_gates_report.json

      # ── Dated snapshot archival ─────────────────────────────────
      - name: Archive dated library snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          SNAP_DIR="artifacts/snapshots/${REFRESH_DATE}"
          mkdir -p "$SNAP_DIR"
          cp pine/generated/smc_micro_profiles_generated.pine \
             "${SNAP_DIR}/smc_micro_profiles_generated_run${{ github.run_number }}.pine"
          cp pine/generated/smc_micro_profiles_generated.json \
             "${SNAP_DIR}/smc_micro_profiles_generated_run${{ github.run_number }}.json"
          if [ -f pine/generated/smc_micro_profiles_core_import.pine ]; then
            cp pine/generated/smc_micro_profiles_core_import.pine \
               "${SNAP_DIR}/smc_micro_profiles_core_import_run${{ github.run_number }}.pine"
          fi

      # ── Publish to TradingView (skip when unchanged or breaking) ─
      - name: Write TradingView storage state
        if: steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        env:
          TV_STORAGE_STATE_SECRET: ${{ secrets.TV_STORAGE_STATE }}
        run: |
          mkdir -p automation/tradingview/auth
          "$SMC_PYTHON_BIN" - <<'PY'
          import base64
          import gzip
          import json
          import os
          from pathlib import Path

          raw = os.environ['TV_STORAGE_STATE_SECRET']
          trimmed = raw.strip()
          if not trimmed:
            raise SystemExit('TV_STORAGE_STATE secret is empty')

          if trimmed.startswith('{'):
            payload = trimmed
          else:
            try:
              payload = gzip.decompress(base64.b64decode(trimmed)).decode('utf-8')
            except Exception as exc:
              raise SystemExit(f'TV_STORAGE_STATE is neither raw JSON nor gzip+base64: {exc}')

          try:
            json.loads(payload)
          except json.JSONDecodeError as exc:
            raise SystemExit(f'Invalid TV_STORAGE_STATE JSON payload: {exc}')

          output_path = Path('automation/tradingview/auth/storage-state.json')
          output_path.write_text(payload if payload.endswith('\n') else payload + '\n', encoding='utf-8')
          PY

      - name: Validate TradingView storage state JSON
        if: steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        run: |
          "$SMC_PYTHON_BIN" - <<'PY'
          import json
          from pathlib import Path

          path = Path("automation/tradingview/auth/storage-state.json")
          try:
              json.loads(path.read_text(encoding="utf-8"))
          except json.JSONDecodeError as exc:
              raise SystemExit(f"Invalid TV_STORAGE_STATE JSON in {path}: {exc}")
          PY

      - name: Run TradingView readonly preflight
        id: tv_preflight
        if: steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        env:
          TV_HEADLESS: "1"
          TV_STORAGE_STATE: automation/tradingview/auth/storage-state.json
          TV_STORAGE_STATE_MAX_AGE_HOURS: "72"
          TV_STEP_TIMEOUT_MS: "90000"
          TV_PREFLIGHT_MAX_ATTEMPTS: "3"
        run: |
          # Retry wrapper: TV/Playwright steps occasionally flake (e.g. addCurrentScriptToChart
          # timing out while the chart iframe is still hydrating). Retry the whole preflight
          # process up to TV_PREFLIGHT_MAX_ATTEMPTS with exponential backoff before failing
          # the job, so a single transient browser hiccup does not silently re-stall the
          # publish pipeline (see PR #2415 for the surfacing fix that exposed this flake).
          #
          # Bundle B telemetry: emit one JSONL line per attempt to
          # artifacts/tradingview/preflight_retry_log.jsonl and preserve each
          # attempt's preflight JSON as tv_preflight_ci.attempt_${n}.json so a
          # post-mortem can distinguish "1x flake then green" from "3x identical
          # deterministic failure = real DOM drift" without parsing log strings.
          set +e
          mkdir -p artifacts/tradingview
          retry_log="artifacts/tradingview/preflight_retry_log.jsonl"
          : > "$retry_log"
          max_attempts="${TV_PREFLIGHT_MAX_ATTEMPTS:-3}"
          attempt=1
          backoff=10
          status=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::TradingView readonly preflight (attempt ${attempt}/${max_attempts})"
            started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            start_ns=$(date +%s)
            npx tsx scripts/tv_preflight.ts \
              --config automation/tradingview/preflight-smc-mainline-open-only.json \
              --execution-mode readonly \
              --out artifacts/tradingview/tv_preflight_ci.json
            status=$?
            end_ns=$(date +%s)
            ended_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            duration=$(( end_ns - start_ns ))
            preserved="artifacts/tradingview/tv_preflight_ci.attempt_${attempt}.json"
            if [ -f artifacts/tradingview/tv_preflight_ci.json ]; then
              cp artifacts/tradingview/tv_preflight_ci.json "$preserved"
            else
              preserved=""
            fi
            echo "::endgroup::"
            will_retry="false"
            if [ "$status" -ne 0 ] && [ "$attempt" -lt "$max_attempts" ]; then
              will_retry="true"
            fi
            env A="$attempt" M="$max_attempts" S="$status" SA="$started_at" EA="$ended_at" D="$duration" P="$preserved" WR="$will_retry" \
              python -c "import json,os,sys; json.dump({'attempt':int(os.environ['A']),'max_attempts':int(os.environ['M']),'exit_code':int(os.environ['S']),'started_at':os.environ['SA'],'ended_at':os.environ['EA'],'duration_seconds':int(os.environ['D']),'output_preserved_as':os.environ['P'] or None,'will_retry':os.environ['WR']=='true'}, sys.stdout); sys.stdout.write('\n')" \
              >> "$retry_log"
            if [ "$status" -eq 0 ]; then
              echo "preflight succeeded on attempt ${attempt}"
              break
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "::warning title=TradingView preflight flake::attempt ${attempt} failed (exit ${status}); retrying in ${backoff}s"
              sleep "$backoff"
              backoff=$(( backoff * 3 ))
            fi
            attempt=$(( attempt + 1 ))
          done
          if [ "$status" -ne 0 ]; then
            echo "::error title=TradingView preflight failed::All ${max_attempts} attempts failed (last exit ${status})"
            # Emit a compact summary so a reader can immediately tell flake vs
            # deterministic-failure without downloading the artifact bundle.
            if [ -f "$retry_log" ]; then
              {
                echo ""
                echo "### TradingView preflight retry log"
                echo ""
                echo '```jsonl'
                cat "$retry_log"
                echo ''
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          exit "$status"

      - name: Publish library to TradingView
        id: publish
        if: steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        env:
          TV_HEADLESS: "1"
          TV_STORAGE_STATE: automation/tradingview/auth/storage-state.json
          TV_STORAGE_STATE_MAX_AGE_HOURS: "72"
          TV_STEP_TIMEOUT_MS: "90000"
        run: |
          npx tsx scripts/tv_publish_micro_library.ts \
            --manifest pine/generated/smc_micro_profiles_generated.json \
            --core SMC_Core_Engine.pine \
            --release-manifest artifacts/tradingview/library_release_manifest.json

      - name: Run TradingView post-release validation
        id: tv_post_release_raw
        if: steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        # CONTINUE-ON-ERROR-INTENTIONAL: TV automation is flaky external integration;
        # outcome is consumed by downstream alert step (steps.tv_post_release_raw.outcome)
        # rather than treated as hard fail.
        continue-on-error: true
        env:
          TV_HEADLESS: "1"
          TV_STORAGE_STATE: automation/tradingview/auth/storage-state.json
          TV_STORAGE_STATE_MAX_AGE_HOURS: "72"
        run: |
          npx tsx scripts/tv_preflight.ts \
            --config automation/tradingview/preflight-smc-mainline.json \
            --execution-mode readonly \
            --out artifacts/tradingview/tv_post_release_validation.json

      - name: "⚠️ Warn: Run TradingView post-release validation"
        if: always() && steps.tv_post_release_raw.outcome == 'failure'
        run: |
          echo "::warning::Step 'Run TradingView post-release validation' failed silently (soft-fail step)"

      - name: Normalize TradingView post-release validation
        id: tv_post_release
        if: always() && steps.publish.outcome == 'success' && steps.tv_post_release_raw.outcome == 'success' && steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        run: |
          "$SMC_PYTHON_BIN" scripts/run_smc_post_release_validation.py \
            --release-manifest artifacts/tradingview/library_release_manifest.json \
            --validation-report artifacts/tradingview/tv_post_release_validation.json \
            --ci-mode \
            --output artifacts/ci/smc_post_release_validation_report.json

      - name: Run strict release gates
        id: release_gates
        if: always() && steps.publish.outcome == 'success' && steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        run: |
          "$SMC_PYTHON_BIN" scripts/run_smc_release_gates.py \
            --post-release-validation-report artifacts/ci/smc_post_release_validation_report.json \
            --output artifacts/ci/smc_post_release_gates_report.json

      - name: Refresh gate evidence summary after post-release validation
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/collect_smc_gate_evidence.py \
            --input-glob "artifacts/ci/smc_*_report.json" \
            --output artifacts/ci/smc_refresh_evidence_summary.json

      - name: Extract provider health signals
        if: always()
        run: |
          "$SMC_PYTHON_BIN" - <<'PY'
          import json
          import os
          from pathlib import Path

          alerts: list[dict] = []
          warnings: list[dict] = []
          report = {}
          for report_path in (
            Path("artifacts/ci/smc_post_release_gates_report.json"),
            Path("artifacts/ci/smc_pre_release_gates_report.json"),
            Path("artifacts/ci/smc_release_gates_report.json"),
          ):
            if not report_path.exists():
              continue
            try:
              loaded = json.loads(report_path.read_text(encoding="utf-8"))
            except Exception:
              continue
            if isinstance(loaded, dict):
              report = loaded
              break

          if report:
            for gate in report.get("gates", []):
              if isinstance(gate, dict) and gate.get("name") == "provider_health":
                details = gate.get("details", {})
                if isinstance(details, dict):
                  raw_alerts = details.get("domain_alerts", [])
                  if isinstance(raw_alerts, list):
                    alerts = [item for item in raw_alerts if isinstance(item, dict)]
                  raw_warnings = details.get("warnings", [])
                  if isinstance(raw_warnings, list):
                    warnings = [item for item in raw_warnings if isinstance(item, dict)]
                break

          def summarize(alert: dict) -> str:
            code = str(alert.get("code") or "")
            domain = str(alert.get("domain") or "unknown")
            symbol = str(alert.get("symbol") or "?")
            timeframe = str(alert.get("timeframe") or "?")
            planned = str(alert.get("planned_source") or "")
            actual = str(alert.get("actual_source") or "")
            status = str(alert.get("status") or "")
            if code.startswith("FALLBACK_"):
              detail = f"{actual or 'unknown'} <- {planned or 'unknown'}"
            else:
              detail = status or "unknown"
            return f"- {code}: {domain} {symbol}/{timeframe} ({detail})"

          def summarize_warning(row: dict) -> str:
            code = str(row.get("code") or "UNKNOWN")
            symbol = str(row.get("symbol") or "").strip()
            timeframe = str(row.get("timeframe") or "").strip()
            suffix = f" {symbol}/{timeframe}" if symbol and timeframe else ""
            return f"- {code}:{suffix}" if suffix else f"- {code}"

          info_count = sum(1 for item in alerts if str(item.get("severity") or "") == "info")
          warn_count = sum(1 for item in alerts if str(item.get("severity") or "") == "warn")
          rendered_lines = "\n".join(summarize(item) for item in alerts[:5])
          rendered_warning_lines = "\n".join(summarize_warning(item) for item in warnings[:5])

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
            handle.write(f"PROVIDER_DOMAIN_ALERT_COUNT={len(alerts)}\n")
            handle.write(f"PROVIDER_DOMAIN_INFO_COUNT={info_count}\n")
            handle.write(f"PROVIDER_DOMAIN_WARN_COUNT={warn_count}\n")
            handle.write(f"PROVIDER_HEALTH_WARNING_COUNT={len(warnings)}\n")
            handle.write("PROVIDER_DOMAIN_ALERT_LINES<<EOF\n")
            if rendered_lines:
              handle.write(rendered_lines + "\n")
            handle.write("EOF\n")
            handle.write("PROVIDER_HEALTH_WARNING_LINES<<EOF\n")
            if rendered_warning_lines:
              handle.write(rendered_warning_lines + "\n")
            handle.write("EOF\n")
          PY

      # ── Version bump + commit (skip when unchanged or breaking) ─
      - name: Bump library version in all pine consumers
        if: steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        run: |
          NEW_VERSION=$(jq -r '.library_version' pine/generated/smc_micro_profiles_generated.json)
          # Workflow-Audit NIEDRIG (2026-06): jq -r emits the literal
          # string "null" for a missing key OR a JSON null; an empty
          # string only occurs when the JSON value is itself "". Either
          # would previously flow straight into the consumer repin and
          # rewrite every import to ".../null" (or ".../"). Fail loud instead.
          if [ -z "${NEW_VERSION}" ] || [ "${NEW_VERSION}" = "null" ]; then
            echo "::error::library_version missing or null in pine/generated/smc_micro_profiles_generated.json — refusing to repin consumers."
            exit 1
          fi
          PIN_PATTERN='import preuss_steffen/smc_micro_profiles_generated/[0-9]*'
          REPLACEMENT="import preuss_steffen/smc_micro_profiles_generated/${NEW_VERSION}"
          # Enumerate every top-level .pine that pins the library. Fixture
          # and generated paths are excluded — they have their own
          # snapshot flow. Closes the 2026-04-22 gap where only
          # SMC_Core_Engine.pine was repinned, leaving 13 other
          # consumers stranded on the previous library version.
          mapfile -t PINE_CONSUMERS < <(grep -lrE "${PIN_PATTERN}" . \
            --include='*.pine' \
            --exclude-dir=tests \
            --exclude-dir=pine \
            --exclude-dir=node_modules \
            --exclude-dir=.git | sort -u)
          if [ ${#PINE_CONSUMERS[@]} -eq 0 ]; then
            echo "::error::No pine consumers found for library pin. Refusing to proceed."
            exit 1
          fi
          echo "Pinning ${#PINE_CONSUMERS[@]} pine consumers to library ${NEW_VERSION}:"
          printf '  %s\n' "${PINE_CONSUMERS[@]}"
          for f in "${PINE_CONSUMERS[@]}"; do
            sed -i "s|${PIN_PATTERN}|${REPLACEMENT}|g" "$f"
            if ! grep -qF "${REPLACEMENT}" "$f"; then
              echo "::error::Failed to pin ${f} to library version ${NEW_VERSION}."
              exit 1
            fi
          done

      - name: Commit and push changes
        id: commit_push
        if: steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && steps.tv_post_release_raw.outcome == 'success' && steps.tv_post_release.outcome == 'success' && steps.release_gates.outcome == 'success' && github.ref == 'refs/heads/main'
        env:
          # GH_PAT is required so the bot/* push + `gh pr create` below
          # actually trigger downstream workflows (notably fast-gates).
          # PRs/pushes created with the default GITHUB_TOKEN do NOT spawn
          # child workflows (GitHub suppresses webhook events for token-
          # generated actions), which would leave `gh pr merge --auto`
          # waiting forever on a check that never runs. Falls back to
          # github.token only on forks where the secret is unavailable.
          # See `/memories/repo/bot-pr-needs-pat-not-github-token.md`
          # and tests/test_workflow_gh_pat_discipline.py.
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          # The repo's `main-governance` ruleset only targets ~DEFAULT_BRANCH,
          # so direct `git push origin HEAD:main` is rejected with GH013
          # ("Required status check 'fast-gates' is expected"). Use the same
          # bot/* PR + auto-merge pattern as run-open-prep-daily.yml and
          # open-prep-outcome-backfill.yml. The CI skip-pattern in
          # smc-fast-pr-gates.yml + ci.yml short-circuits heavy steps for
          # bot/* heads, so the PR merges in seconds without burning CI.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          GIT_LFS_SKIP_SMUDGE=1 git -c filter.lfs.smudge= -c filter.lfs.process= -c filter.lfs.required=false restore --source=HEAD --worktree --staged -- \
            artifacts/databento_volatility_cache/ \
            artifacts/smc_microstructure_exports/smc_live_news_snapshot.json \
            artifacts/smc_microstructure_exports/smc_live_news_state.json || true
          git add pine/generated/ \
            SMC_Core_Engine.pine \
            SMC_Dashboard.pine \
            SMC_Mobile_Dashboard.pine \
            SMC_Long_Strategy.pine \
            SkippALGO_Confluence.pine \
            SMC_Structure_Context.pine \
            SMC_Session_Context.pine \
            SMC_Profile_Context.pine \
            SMC_Orderflow_Overlay.pine \
            SMC_Liquidity_Structure.pine \
            SMC_Liquidity_Context.pine \
            SMC_Imbalance_Context.pine \
            SMC_HTF_Confluence.pine \
            SMC_Event_Overlay.pine \
            SMC_Breakout_Overlay.pine \
            artifacts/tradingview/library_release_manifest.json
          if ! git diff --quiet; then
            echo "::error::Unexpected tracked changes remain unstaged before refresh commit."
            git status --short
            git diff --name-only
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "::notice::No post-publish changes to commit."
            exit 0
          fi

          BRANCH="bot/library-refresh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git commit -m "chore: library refresh ${REFRESH_DATE} (run ${{ github.run_number }})"
          git push -u origin "$BRANCH"
          # F-V6-I2.1 (2026-05-02): previously this `gh pr create` was suffixed
          # with `|| true`, which silently swallowed real PR-creation failures
          # (auth issues, branch-protection refusals, transient API errors) and
          # left the workflow green with no follow-up PR. Surface as ::error::
          # and fail the job so the library refresh cannot be lost.
          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --label automated \
            --title "chore: library refresh ${REFRESH_DATE} (run ${{ github.run_number }})" \
            --body "Automated SMC library refresh from \`smc-library-refresh\` (run ${GITHUB_RUN_ID}). Pine library content + manifest. Heavy CI is skipped for bot/* PRs (validation already happened in the refresh workflow itself: TV preflight + post-release validation + release gates)."; then
            echo "::error file=.github/workflows/smc-library-refresh.yml::gh pr create failed for ${BRANCH} — see step log for stderr"
            exit 1
          fi
          # CONTINUE-ON-ERROR-INTENTIONAL: enabling auto-merge can race with
          # branch-protection / required-status-check evaluation; the PR itself
          # is already open and reviewable, so we surface as warning rather
          # than failing the job.
          gh pr merge "$BRANCH" --auto --squash --delete-branch \
            || echo "::warning::auto-merge enable failed for ${BRANCH} (PR is open and reviewable)"

      # ── Signal alerts (non-blocking) ────────────────────────────
      - name: Evaluate and send alerts
        id: alerts
        if: always() && steps.diff.outputs.changed == 'true' && steps.publish_gate.outputs.publish_allowed == 'true' && github.ref == 'refs/heads/main'
        # CONTINUE-ON-ERROR-INTENTIONAL: alert dispatch is best-effort notification;
        # missing TELEGRAM/SMTP secrets or transient delivery errors must not fail
        # the refresh job (artifacts already produced).
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          "$SMC_PYTHON_BIN" scripts/smc_alert_notifier.py \
            --library pine/generated/smc_micro_profiles_generated.pine \
            --state-file artifacts/ci/alert_last_state.json \
            --post-release-report artifacts/ci/smc_post_release_validation_report.json \
            --provider-alerts \
            ${TELEGRAM_BOT_TOKEN:+--telegram-bot-token "$TELEGRAM_BOT_TOKEN"} \
            ${TELEGRAM_CHAT_ID:+--telegram-chat-id "$TELEGRAM_CHAT_ID"} \
            ${SMTP_HOST:+--smtp-host "$SMTP_HOST"} \
            ${SMTP_USER:+--smtp-user "$SMTP_USER"} \
            ${SMTP_PASS:+--smtp-pass "$SMTP_PASS"} \
            ${ALERT_EMAIL_FROM:+--email-from "$ALERT_EMAIL_FROM"} \
            ${ALERT_EMAIL_TO:+--email-to "$ALERT_EMAIL_TO"}

      # ── Upload CI artifacts ─────────────────────────────────────
      - name: Upload gate evidence + library artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-refresh-${{ env.REFRESH_DATE }}-${{ github.run_number }}
          path: |
            artifacts/ci/
            artifacts/snapshots/
            pine/generated/
          retention-days: 90

      - name: Upload TradingView validation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-tradingview-${{ env.REFRESH_DATE }}-${{ github.run_number }}
          path: |
            artifacts/tradingview/
          if-no-files-found: ignore
          retention-days: 30

      # ── Status summary ─────────────────────────────────────────
      - name: Emit workflow summary
        if: always()
        env:
          FIRST_FAILED_GATE_TEST: ${{ steps.gates.outputs.first_failed_test }}
          FIRST_FAILED_GATE_TEST_LINE: ${{ steps.gates.outputs.first_failed_test_line }}
          # A2-F1 (audit 2026-06-15): route git-ref context through env-indirection
          # so a branch name with shell metacharacters cannot escape the markdown
          # summary echo (CWE-94). Consistent with IS_MAIN env-indirection above.
          REF_NAME: ${{ github.ref_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          {
            echo "## SMC Library Refresh (v5) — ${REFRESH_TS}"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Runner environment | ${{ needs.select-runner.outputs.runner_environment }} |"
            echo "| Runner resolution | ${{ needs.select-runner.outputs.resolution_reason }} |"
            echo "| Runner name | ${{ needs.select-runner.outputs.matched_runner_name || runner.name }} |"
            echo "| Ref | ${REF_NAME} |"
            echo "| Generation (base + enrichment + event-risk) | ${{ steps.gates.outcome == 'success' && '✅' || steps.gates.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
            echo "| Evidence gates | ${{ steps.gates.outcome == 'success' && '✅ passed' || '❌ failed' }} |"
            if [ "${{ steps.gates.outcome }}" = "failure" ] && [ -n "$FIRST_FAILED_GATE_TEST" ]; then
              echo "| First failing gate test | $FIRST_FAILED_GATE_TEST |"
            fi
            echo "| Library changed | ${{ steps.diff.outputs.changed == 'true' && '✅ yes' || '⏭️ no' }} |"
            echo "| Pre-release artifact refresh | ${{ steps.pre_release_refresh.outcome == 'success' && '✅ passed' || steps.pre_release_refresh.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
            echo "| Pre-publish strict release gates | ${{ steps.pre_release_gates.outcome == 'success' && '✅ passed' || steps.pre_release_gates.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
            if [ "${{ steps.breaking.outputs.breaking }}" = "true" ]; then
              echo "| ⚠️ Breaking-change governance | 🛑 ${{ steps.breaking.outputs.reason }} |"
              echo "| Publish | 🛑 blocked (breaking change) |"
              echo "| Commit | 🛑 blocked (breaking change) |"
              echo "| Signal + event-risk alerts | 🛑 blocked (breaking change) |"
            elif [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
              echo "| Breaking-change governance | ✅ compatible |"
              if [ "${GIT_REF}" = "refs/heads/main" ]; then
                echo "| TradingView preflight | ${{ steps.tv_preflight.outcome == 'success' && '✅ passed' || steps.tv_preflight.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| Publish | ${{ steps.publish.outcome == 'success' && '✅' || steps.publish.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| TradingView post-release validation | ${{ steps.tv_post_release.outcome == 'success' && '✅ passed' || steps.tv_post_release.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| Post-release strict release gates | ${{ steps.release_gates.outcome == 'success' && '✅ passed' || steps.release_gates.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| Commit | ${{ steps.commit_push.outcome == 'success' && '✅' || steps.commit_push.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| Signal + event-risk alerts | ${{ steps.alerts.outcome == 'success' && '✅ evaluated' || steps.alerts.outcome == 'skipped' && '⏭️ skipped' || '⚠️ error (non-blocking)' }} |"
              else
                echo "| TradingView preflight | ⏭️ skipped (non-main ref) |"
                echo "| Publish | ⏭️ skipped (non-main ref) |"
                echo "| TradingView post-release validation | ⏭️ skipped (non-main ref) |"
                echo "| Post-release strict release gates | ⏭️ skipped (non-main ref) |"
                echo "| Commit | ⏭️ skipped (non-main ref) |"
                echo "| Signal + event-risk alerts | ⏭️ skipped (non-main ref) |"
              fi
            else
              echo "| TradingView preflight | ⏭️ skipped (no changes) |"
              echo "| Publish | ⏭️ skipped (no changes) |"
              echo "| TradingView post-release validation | ⏭️ skipped (no changes) |"
              echo "| Post-release strict release gates | ⏭️ skipped (no changes) |"
              echo "| Commit | ⏭️ skipped (no changes) |"
              echo "| Signal + event-risk alerts | ⏭️ skipped (no changes) |"
            fi
            if [ "${{ steps.gates.outcome }}" = "failure" ] && [ -n "$FIRST_FAILED_GATE_TEST_LINE" ]; then
              echo ""
              echo "### First Failing Gate Test"
              echo ""
              echo "$FIRST_FAILED_GATE_TEST_LINE"
            fi
            if [ "${PROVIDER_DOMAIN_ALERT_COUNT:-0}" -gt 0 ]; then
              echo ""
              echo "### Provider Domain Alerts"
              echo ""
              echo "| Severity | Count |"
              echo "|---|---:|"
              echo "| warn | ${PROVIDER_DOMAIN_WARN_COUNT:-0} |"
              echo "| info | ${PROVIDER_DOMAIN_INFO_COUNT:-0} |"
              if [ -n "${PROVIDER_DOMAIN_ALERT_LINES}" ]; then
                echo ""
                printf '%s\n' "${PROVIDER_DOMAIN_ALERT_LINES}"
              fi
            fi
            if [ "${PROVIDER_HEALTH_WARNING_COUNT:-0}" -gt 0 ]; then
              echo ""
              echo "### Provider Health Warnings"
              echo ""
              echo "Count: ${PROVIDER_HEALTH_WARNING_COUNT:-0}"
              if [ -n "${PROVIDER_HEALTH_WARNING_LINES}" ]; then
                echo ""
                printf '%s\n' "${PROVIDER_HEALTH_WARNING_LINES}"
              fi
            fi
            echo ""
            if [ -f artifacts/ci/library_diff_${REFRESH_DATE}.patch ]; then
              echo "<details><summary>Library diff</summary>"
              echo ""
              echo '```diff'
              head -200 "artifacts/ci/library_diff_${REFRESH_DATE}.patch"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Breaking-change notification ────────────────────────────
      - name: Notify on breaking change
        id: notify_breaking
        if: steps.breaking.outputs.breaking == 'true'
        # CONTINUE-ON-ERROR-INTENTIONAL: breaking-change Telegram notify is
        # best-effort; the breaking-change gate itself already blocked auto-commit
        # (visible via job conclusion), so notify failure must not mask that signal.
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🛑 SMC Library breaking change detected (${REFRESH_TS})%0A${{ steps.breaking.outputs.reason }}%0AArtifacts archived but auto-commit blocked."
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sf -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode=HTML || true
          fi

      - name: "⚠️ Warn: Notify on breaking change"
        if: always() && steps.notify_breaking.outcome == 'failure'
        run: |
          echo "::warning::Step 'Notify on breaking change' failed silently (soft-fail step)"

      # ── End-of-run status notification ──────────────────────────
      - name: Send end-of-run status notification
        id: notify_end
        if: always()
        # CONTINUE-ON-ERROR-INTENTIONAL: end-of-run Telegram heartbeat is
        # best-effort observability; failure must not flip job conclusion since
        # the actual work (refresh + commit) is upstream.
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::notice::Telegram secrets not configured — skipping status notification."
            exit 0
          fi

          GATE="${{ steps.gates.outcome }}"
          CHANGED="${{ steps.diff.outputs.changed }}"
          BREAKING="${{ steps.breaking.outputs.breaking }}"
          PREFLIGHT="${{ steps.tv_preflight.outcome }}"
          PUBLISH="${{ steps.publish.outcome }}"
          POST_RELEASE="${{ steps.tv_post_release.outcome }}"
          COMMIT_PUSH="${{ steps.commit_push.outcome }}"
          ALERTS="${{ steps.alerts.outcome }}"
          ALERT_COUNT="${PROVIDER_DOMAIN_ALERT_COUNT:-0}"
          ALERT_INFO="${PROVIDER_DOMAIN_INFO_COUNT:-0}"
          ALERT_WARN="${PROVIDER_DOMAIN_WARN_COUNT:-0}"
          PROVIDER_WARNING_COUNT="${PROVIDER_HEALTH_WARNING_COUNT:-0}"

          if [ "$GATE" = "failure" ]; then
            ICON="❌"
            HEADLINE="Evidence gates failed"
          elif [ "$CHANGED" != "true" ]; then
            ICON="⏭️"
            HEADLINE="No library changes"
          elif [ "$BREAKING" = "true" ]; then
            ICON="🛑"
            HEADLINE="Breaking change — publish blocked"
          elif [ "$PREFLIGHT" = "failure" ]; then
            ICON="❌"
            HEADLINE="TradingView preflight failed"
          elif [ "$PUBLISH" = "failure" ]; then
            ICON="❌"
            HEADLINE="TradingView publish failed"
          elif [ "$POST_RELEASE" = "failure" ]; then
            ICON="❌"
            HEADLINE="TradingView post-release validation failed"
          elif [ "$COMMIT_PUSH" = "failure" ]; then
            ICON="❌"
            HEADLINE="Commit/push failed"
          elif [ "$ALERT_WARN" != "0" ] || [ "$PROVIDER_WARNING_COUNT" != "0" ]; then
            ICON="⚠️"
            HEADLINE="Library published with provider warnings"
          elif [ "$ALERT_INFO" != "0" ]; then
            ICON="ℹ️"
            HEADLINE="Library published with fallback alerts"
          else
            ICON="✅"
            HEADLINE="Library published"
          fi

          MSG="${ICON} <b>SMC Refresh</b> — ${HEADLINE}%0A🕐 ${REFRESH_TS}  •  Run #${{ github.run_number }}"
          if [ "$ALERT_COUNT" != "0" ]; then
            MSG="${MSG}%0Aℹ️ Provider domain alerts: ${ALERT_COUNT} (${ALERT_WARN} warn / ${ALERT_INFO} info)"
          fi
          if [ "$PROVIDER_WARNING_COUNT" != "0" ]; then
            MSG="${MSG}%0A⚠️ Provider health warnings: ${PROVIDER_WARNING_COUNT}"
          fi
          if [ "$ALERTS" = "success" ]; then
            MSG="${MSG}%0A📡 Signal alerts evaluated"
          fi

          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode=HTML || true

      - name: "⚠️ Warn: Send end-of-run status notification"
        if: always() && steps.notify_end.outcome == 'failure'
        run: |
          echo "::warning::Step 'Send end-of-run status notification' failed silently (soft-fail step)"

      # ── W3 (R4b audit): cumulative best-effort failure summary + trend ──────
      # The six continue-on-error steps above (gates, pre_release_refresh,
      # tv_post_release_raw, alerts, notify_breaking, notify_end) each only emit
      # a per-step ::warning:: on failure, so a degradation is only visible by
      # reading the raw logs of every run. These three steps aggregate those
      # outcomes into one GITHUB_STEP_SUMMARY table plus a rolling cross-run
      # trend persisted as a workflow artifact (no commits to main).
      - name: Restore best-effort failure history
        id: dl_best_effort_history
        if: always()
        # CONTINUE-ON-ERROR-INTENTIONAL: cold start (no prior artifact on the
        # first run) and transient download failures are observability-only and
        # must not fail the refresh job.
        continue-on-error: true
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          name: best-effort-failure-history
          path: artifacts/ci
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Best-effort failure summary
        id: best_effort_summary
        if: always()
        # CONTINUE-ON-ERROR-INTENTIONAL: an observability-only summary must
        # never flip the conclusion of an otherwise-green best-effort pipeline.
        continue-on-error: true
        env:
          OUT_GATES: ${{ steps.gates.outcome }}
          OUT_PRE_RELEASE_REFRESH: ${{ steps.pre_release_refresh.outcome }}
          OUT_TV_POST_RELEASE_RAW: ${{ steps.tv_post_release_raw.outcome }}
          OUT_ALERTS: ${{ steps.alerts.outcome }}
          OUT_NOTIFY_BREAKING: ${{ steps.notify_breaking.outcome }}
          OUT_NOTIFY_END: ${{ steps.notify_end.outcome }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          PYBIN="${SMC_PYTHON_BIN:-python3}"
          HIST="artifacts/ci/best_effort_failure_history.jsonl"
          SNAP="artifacts/ci/best_effort_failures.json"
          "$PYBIN" scripts/best_effort_failure_trend.py record \
            --history "$HIST" \
            --snapshot "$SNAP" \
            --run-id "$RUN_ID" \
            --run-url "$RUN_URL" \
            --ref "$REF" \
            --outcome "gates=$OUT_GATES" \
            --outcome "pre_release_refresh=$OUT_PRE_RELEASE_REFRESH" \
            --outcome "tv_post_release_raw=$OUT_TV_POST_RELEASE_RAW" \
            --outcome "alerts=$OUT_ALERTS" \
            --outcome "notify_breaking=$OUT_NOTIFY_BREAKING" \
            --outcome "notify_end=$OUT_NOTIFY_END"
          "$PYBIN" scripts/best_effort_failure_trend.py digest \
            --history "$HIST" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload best-effort failure history
        id: ul_best_effort_history
        if: always()
        # CONTINUE-ON-ERROR-INTENTIONAL: persisting the trend artifact is
        # observability-only; a transient upload failure must not fail the job.
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: best-effort-failure-history
          path: |
            artifacts/ci/best_effort_failure_history.jsonl
            artifacts/ci/best_effort_failures.json
          retention-days: 90
          if-no-files-found: warn
          overwrite: true
