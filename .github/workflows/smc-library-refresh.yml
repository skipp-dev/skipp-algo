# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
# SMC Library Intraday Refresh (v5)
#
# Runs 4x per trading day at 13:00 / 15:00 / 17:00 / 19:00 UTC on weekdays
# (respaced from 12:30/14:30/16:30/18:30 — see F-V6-C3, 2026-05-02).
# Each run: generate → event-risk → gate → detect changes → diff report →
#           governance → publish → commit → alerts.
# Skips publish/version-bump/commit when the library content is unchanged.
# v5 stages:
#   1. Base data scan (Databento)
#   2. Enrichment (regime, news, calendar, layering, event-risk)
#   3. Evidence gates (integration / structure / core tests)
#   4. Change detection (diff against previous library)
#   5. Version governance (breaking-change detection)
#   6. Publish to TradingView
#   7. Commit artifacts
#   8. Signal + event-risk alerts (Telegram / email)
#
# Required secrets:
#   FMP_API_KEY        – Financial Modeling Prep API key (enrichment data)
#   BENZINGA_API_KEY   – Benzinga API key (news/calendar fallback)
#   DATABENTO_API_KEY  – Databento API key (base data generation)
#   TV_STORAGE_STATE   – TradingView Playwright storage-state as raw JSON or gzip+base64 (publish)
#
# Optional secrets:
#   GH_PAT             – Optional GitHub PAT override for checkout;
#                        the final repository push is forced through the
#                        built-in github.token with contents:write permission.
#
# Optional secrets (alerting):
#   TELEGRAM_BOT_TOKEN – Telegram bot token for alert delivery
#   TELEGRAM_CHAT_ID   – Telegram chat/channel ID for alerts
#   SMTP_HOST          – SMTP server hostname for email alerts
#   SMTP_USER          – SMTP login username
#   SMTP_PASS          – SMTP login password
#   ALERT_EMAIL_FROM   – Sender address for email alerts
#   ALERT_EMAIL_TO     – Recipient address for email alerts
#   NEWSAPI_AI_KEY     – NewsAPI.ai key for optional news fallback enrichment
#
# Secret compatibility note (v4 → v5):
#   Secret names are unchanged from v4 — no reconfiguration needed.
#   The v5 architecture adds the event-risk enrichment stage which
#   derives from existing calendar + news data; no new secrets required.

name: smc-library-refresh

on:
  schedule:
    # F-V6-C3 (2026-05-02): respaced from HH:30 → HH+1:00. The 30-min
    # handoff window was too tight for the producer
    # (smc-databento-production-export) which can legitimately run up to
    # 60 min (timeout cap, PR #2018). New 60-min headroom guarantees the
    # consumer always reads the freshest export.
    - cron: "0 13 * * 1-5"   # 13:00 UTC – pre-market   (was 12:30)
    - cron: "0 15 * * 1-5"   # 15:00 UTC – market open  (was 14:30)
    - cron: "0 17 * * 1-5"   # 17:00 UTC – midday       (was 16:30)
    - cron: "0 19 * * 1-5"   # 19:00 UTC – late session (was 18:30)
  workflow_dispatch:

# F-V8-C3.1-D (2026-05-02): serialize consumer runs per ref. Mirrors the
# producer guard (smc-databento-production-export) so a slow handoff
# cannot be raced by the next 2-hour cron tick. cancel-in-progress=false
# because the consumer commits artifacts and opens PRs — killing it
# mid-run would leave a half-written artifact tree on the runner and a
# zombie PR branch on origin. The follow-on tick queues instead.
concurrency:
  group: smc-library-refresh-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REFRESH_DATE: ""   # set dynamically in the date step
  SMC_REFRESH_RUNNER_LABEL: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-l' }}
  SMC_INCREMENTAL_BASE_SEED_CACHE_VERSION: v1
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

jobs:
  refresh:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-l' }}
    # F-V8-C3.1 (2026-05-02): bumped 90→120 in lockstep with the producer
    # (smc-databento-production-export). Pin test enforces producer ≤
    # consumer, so the two move together. 120 = exactly the 2h cron
    # interval — back-to-back runs touch but cannot overlap (anything >120
    # would let a zombie run collide with the next tick).
    timeout-minutes: 120

    steps:
      # ── Metadata ────────────────────────────────────────────────
      - name: Set refresh date
        run: |
          echo "REFRESH_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
          echo "REFRESH_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Emit runner selection
        run: |
          echo "::notice::SMC refresh job running on label '${{ env.SMC_REFRESH_RUNNER_LABEL }}' (runner='${{ runner.name }}')."

      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          persist-credentials: false

      # ── Python + Node setup ─────────────────────────────────────
      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Snapshot pre-generation state ───────────────────────────
      - name: Snapshot library + manifest before generation
        run: |
          if [ -f pine/generated/smc_micro_profiles_generated.pine ]; then
            cp pine/generated/smc_micro_profiles_generated.pine /tmp/library_before.pine
          else
            touch /tmp/library_before.pine
          fi
          if [ -f pine/generated/smc_micro_profiles_generated.json ]; then
            cp pine/generated/smc_micro_profiles_generated.json /tmp/manifest_before.json
          else
            echo '{}' > /tmp/manifest_before.json
          fi

      - name: Restore incremental base seed
        uses: actions/cache/restore@v5
        with:
          path: artifacts/smc_microstructure_exports/incremental_base_seed
          key: ${{ runner.os }}-smc-incremental-base-seed-${{ env.SMC_INCREMENTAL_BASE_SEED_CACHE_VERSION }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-smc-incremental-base-seed-${{ env.SMC_INCREMENTAL_BASE_SEED_CACHE_VERSION }}-${{ github.ref_name }}-

      # ── Library generation with enrichment (v5) ─────────────────
      - name: Generate SMC library with v5 enrichment
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          BENZINGA_API_KEY: ${{ secrets.BENZINGA_API_KEY }}
          NEWSAPI_AI_KEY: ${{ secrets.NEWSAPI_AI_KEY }}
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
        run: |
          python scripts/generate_smc_micro_base_from_databento.py \
            --run-scan \
            --incremental-base-only \
            --enrich-all \
            --export-dir artifacts/smc_microstructure_exports \
            --output-root .

      - name: Verify generated base manifest exists
        run: |
          if ! find artifacts/smc_microstructure_exports -name '*__smc_microstructure_base_manifest.json' -print -quit | grep -q .; then
            echo "::error::Missing generated base manifest in artifacts/smc_microstructure_exports"
            exit 1
          fi

      - name: Save incremental base seed
        if: success()
        uses: actions/cache/save@v5
        with:
          path: artifacts/smc_microstructure_exports/incremental_base_seed
          key: ${{ runner.os }}-smc-incremental-base-seed-${{ env.SMC_INCREMENTAL_BASE_SEED_CACHE_VERSION }}-${{ github.ref_name }}-${{ github.run_id }}

      # ── Evidence gates ──────────────────────────────────────────
      - name: Run evidence gate tests
        id: gates
        # CONTINUE-ON-ERROR-INTENTIONAL: gates outcome is consumed downstream
        # via steps.gates.outcome / outputs (see breaking-change + alerts steps);
        # advisory failures must not abort the refresh pipeline.
        continue-on-error: true
        run: |
          shopt -s nullglob
          mkdir -p artifacts/ci
          tests=(
            tests/test_smc_integration_*.py
            tests/test_explicit_structure_*.py
            tests/test_smc_core_*.py
          )
          if [ ${#tests[@]} -eq 0 ]; then
            echo "No gate tests matched." >&2
            exit 1
          fi
          set +e
          python -m pytest -q --maxfail=1 "${tests[@]}" 2>&1 | tee artifacts/ci/smc_refresh_gate_pytest.log
          GATE_RC=${PIPESTATUS[0]}
          set -e

          FIRST_FAILED_TEST_LINE=$(grep -m1 '^FAILED ' artifacts/ci/smc_refresh_gate_pytest.log || true)
          FIRST_FAILED_TEST=$(printf '%s\n' "$FIRST_FAILED_TEST_LINE" | sed -E 's/^FAILED ([^ ]+).*/\1/')
          if [ -n "$FIRST_FAILED_TEST" ]; then
            {
              echo "first_failed_test<<EOF"
              echo "$FIRST_FAILED_TEST"
              echo "EOF"
              echo "first_failed_test_line<<EOF"
              echo "$FIRST_FAILED_TEST_LINE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          exit "$GATE_RC"

      - name: Collect gate evidence
        if: always()
        run: |
          python scripts/collect_smc_gate_evidence.py \
            --input-glob "artifacts/ci/smc_*_report.json" \
            --output artifacts/ci/smc_refresh_evidence_summary.json

      - name: Abort on gate failure
        if: steps.gates.outcome == 'failure'
        run: |
          if [ -n "${{ steps.gates.outputs.first_failed_test }}" ]; then
            echo "::error::Evidence gates failed on ${{ steps.gates.outputs.first_failed_test }} — library will NOT be published."
          else
            echo "::error::Evidence gates failed — library will NOT be published."
          fi
          echo "GATE_STATUS=failed" >> "$GITHUB_ENV"
          exit 1

      # ── Change detection ────────────────────────────────────────
      - name: Detect library changes
        id: diff
        run: |
          LIBRARY="pine/generated/smc_micro_profiles_generated.pine"
          MANIFEST="pine/generated/smc_micro_profiles_generated.json"
          mkdir -p artifacts/ci

          if diff -q /tmp/library_before.pine "$LIBRARY" > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Library content unchanged — skipping publish/commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            diff -u /tmp/library_before.pine "$LIBRARY" \
              > artifacts/ci/library_diff_${REFRESH_DATE}.patch || true
            echo "::notice::Library content changed — proceeding to publish."
          fi

      # ── Schema / version governance ─────────────────────────────
      - name: Evaluate version governance
        id: breaking
        if: steps.diff.outputs.changed == 'true'
        run: |
          set +e
          DECISION=$(python scripts/smc_version_governance.py \
            --old-manifest /tmp/manifest_before.json \
            --new-manifest pine/generated/smc_micro_profiles_generated.json \
            --old-library /tmp/library_before.pine \
            --library pine/generated/smc_micro_profiles_generated.pine)
          RC=$?
          set -e

          echo "$DECISION" | tee artifacts/ci/version_governance_${REFRESH_DATE}.json

          if [ "$RC" -ne 0 ]; then
            BREAKING="true"
            REASON=$(echo "$DECISION" | jq -r '.reasons | join("; ")')
            echo "::warning::Breaking change detected — auto-commit blocked. ${REASON}"
          else
            BREAKING="false"
            REASON=""
          fi

          echo "breaking=${BREAKING}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"

      # ── Restore canonical Databento production export bundle ────
      # Produced by `.github/workflows/smc-databento-production-export.yml`.
      # The producer runs ~30 min before each library-refresh tick and
      # writes `artifacts/smc_microstructure_exports/databento_volatility_production_*`.
      # We restore by today's date key, falling back to the most recent
      # same-OS bundle if the producer was skipped or hasn't run yet.
      - name: Restore Databento production export bundle
        id: restore_export_bundle
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: artifacts/smc_microstructure_exports
          key: smc-prod-export-${{ runner.os }}-${{ env.REFRESH_DATE }}
          restore-keys: |
            smc-prod-export-${{ runner.os }}-

      - name: Verify Databento production export bundle is present
        id: verify_export_bundle
        if: steps.diff.outputs.changed == 'true'
        run: |
          set +e
          if ls artifacts/smc_microstructure_exports/databento_volatility_production_*_manifest.json >/dev/null 2>&1; then
            echo "bundle_present=true" >> "$GITHUB_OUTPUT"
            NEWEST=$(ls -1t artifacts/smc_microstructure_exports/databento_volatility_production_*_manifest.json | head -1)
            echo "::notice::Restored Databento production manifest: ${NEWEST}"
          else
            echo "bundle_present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No Databento production export bundle restored from cache. The release-reference refresh step will be advisory-only this run. Trigger smc-databento-production-export workflow to populate."
          fi
          exit 0

      # ── Release-reference artifact refresh + strict gates ───────
      # Marked advisory until the producer cache is warm so that a missing
      # bundle does not block the entire library refresh / TradingView
      # publish flow. The strict gates step below still runs unconditionally.
      # CONTINUE-ON-ERROR-INTENTIONAL: best-effort hop — strict gates step below
      # is the real fail signal; M-1 / Klasse #24.
      - name: Refresh release reference artifacts (best-effort)
        id: pre_release_refresh
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        run: |
          if [ "${{ steps.verify_export_bundle.outputs.bundle_present }}" != "true" ]; then
            echo "::warning::Skipping release reference artifact refresh: export bundle missing."
            exit 0
          fi
          python scripts/run_smc_pre_release_artifact_refresh.py \
            --export-bundle-root artifacts/smc_microstructure_exports \
            --warn-on-empty-artifacts \
            --output artifacts/ci/smc_pre_release_artifact_refresh_report.json

      - name: Run pre-publish strict release gates
        id: pre_release_gates
        if: steps.diff.outputs.changed == 'true'
        run: |
          python scripts/run_smc_release_gates.py \
            --output artifacts/ci/smc_pre_release_gates_report.json

      # ── Dated snapshot archival ─────────────────────────────────
      - name: Archive dated library snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          SNAP_DIR="artifacts/snapshots/${REFRESH_DATE}"
          mkdir -p "$SNAP_DIR"
          cp pine/generated/smc_micro_profiles_generated.pine \
             "${SNAP_DIR}/smc_micro_profiles_generated_run${{ github.run_number }}.pine"
          cp pine/generated/smc_micro_profiles_generated.json \
             "${SNAP_DIR}/smc_micro_profiles_generated_run${{ github.run_number }}.json"
          if [ -f pine/generated/smc_micro_profiles_core_import.pine ]; then
            cp pine/generated/smc_micro_profiles_core_import.pine \
               "${SNAP_DIR}/smc_micro_profiles_core_import_run${{ github.run_number }}.pine"
          fi

      # ── Publish to TradingView (skip when unchanged or breaking) ─
      - name: Write TradingView storage state
        if: steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        env:
          TV_STORAGE_STATE_SECRET: ${{ secrets.TV_STORAGE_STATE }}
        run: |
          mkdir -p automation/tradingview/auth
          python - <<'PY'
          import base64
          import gzip
          import json
          import os
          from pathlib import Path

          raw = os.environ['TV_STORAGE_STATE_SECRET']
          trimmed = raw.strip()
          if not trimmed:
            raise SystemExit('TV_STORAGE_STATE secret is empty')

          if trimmed.startswith('{'):
            payload = trimmed
          else:
            try:
              payload = gzip.decompress(base64.b64decode(trimmed)).decode('utf-8')
            except Exception as exc:
              raise SystemExit(f'TV_STORAGE_STATE is neither raw JSON nor gzip+base64: {exc}')

          try:
            json.loads(payload)
          except json.JSONDecodeError as exc:
            raise SystemExit(f'Invalid TV_STORAGE_STATE JSON payload: {exc}')

          output_path = Path('automation/tradingview/auth/storage-state.json')
          output_path.write_text(payload if payload.endswith('\n') else payload + '\n', encoding='utf-8')
          PY

      - name: Validate TradingView storage state JSON
        if: steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("automation/tradingview/auth/storage-state.json")
          try:
              json.loads(path.read_text(encoding="utf-8"))
          except json.JSONDecodeError as exc:
              raise SystemExit(f"Invalid TV_STORAGE_STATE JSON in {path}: {exc}")
          PY

      - name: Run TradingView readonly preflight
        id: tv_preflight
        if: steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        env:
          TV_HEADLESS: "1"
          TV_STORAGE_STATE: automation/tradingview/auth/storage-state.json
          TV_STORAGE_STATE_MAX_AGE_HOURS: "72"
        run: |
          npx tsx scripts/tv_preflight.ts \
            --config automation/tradingview/preflight-smc-mainline.json \
            --execution-mode readonly \
            --out artifacts/tradingview/tv_preflight_ci.json

      - name: Publish library to TradingView
        id: publish
        if: steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        env:
          TV_HEADLESS: "1"
          TV_STORAGE_STATE: automation/tradingview/auth/storage-state.json
          TV_STORAGE_STATE_MAX_AGE_HOURS: "72"
        run: |
          npx tsx scripts/tv_publish_micro_library.ts \
            --manifest pine/generated/smc_micro_profiles_generated.json \
            --core SMC_Core_Engine.pine \
            --release-manifest artifacts/tradingview/library_release_manifest.json

      - name: Run TradingView post-release validation
        id: tv_post_release_raw
        if: steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        # CONTINUE-ON-ERROR-INTENTIONAL: TV automation is flaky external integration;
        # outcome is consumed by downstream alert step (steps.tv_post_release_raw.outcome)
        # rather than treated as hard fail.
        continue-on-error: true
        env:
          TV_HEADLESS: "1"
          TV_STORAGE_STATE: automation/tradingview/auth/storage-state.json
          TV_STORAGE_STATE_MAX_AGE_HOURS: "72"
        run: |
          npx tsx scripts/tv_preflight.ts \
            --config automation/tradingview/preflight-smc-mainline.json \
            --execution-mode readonly \
            --out artifacts/tradingview/tv_post_release_validation.json

      - name: Normalize TradingView post-release validation
        id: tv_post_release
        if: always() && steps.publish.outcome == 'success' && steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        run: |
          python scripts/run_smc_post_release_validation.py \
            --release-manifest artifacts/tradingview/library_release_manifest.json \
            --validation-report artifacts/tradingview/tv_post_release_validation.json \
            --ci-mode \
            --output artifacts/ci/smc_post_release_validation_report.json

      - name: Run strict release gates
        id: release_gates
        if: always() && steps.publish.outcome == 'success' && steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        run: |
          python scripts/run_smc_release_gates.py \
            --post-release-validation-report artifacts/ci/smc_post_release_validation_report.json \
            --output artifacts/ci/smc_post_release_gates_report.json

      - name: Refresh gate evidence summary after post-release validation
        if: always()
        run: |
          python scripts/collect_smc_gate_evidence.py \
            --input-glob "artifacts/ci/smc_*_report.json" \
            --output artifacts/ci/smc_refresh_evidence_summary.json

      - name: Extract provider health signals
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          alerts: list[dict] = []
          warnings: list[dict] = []
          report = {}
          for report_path in (
            Path("artifacts/ci/smc_post_release_gates_report.json"),
            Path("artifacts/ci/smc_pre_release_gates_report.json"),
            Path("artifacts/ci/smc_release_gates_report.json"),
          ):
            if not report_path.exists():
              continue
            try:
              loaded = json.loads(report_path.read_text(encoding="utf-8"))
            except Exception:
              continue
            if isinstance(loaded, dict):
              report = loaded
              break

          if report:
            for gate in report.get("gates", []):
              if isinstance(gate, dict) and gate.get("name") == "provider_health":
                details = gate.get("details", {})
                if isinstance(details, dict):
                  raw_alerts = details.get("domain_alerts", [])
                  if isinstance(raw_alerts, list):
                    alerts = [item for item in raw_alerts if isinstance(item, dict)]
                  raw_warnings = details.get("warnings", [])
                  if isinstance(raw_warnings, list):
                    warnings = [item for item in raw_warnings if isinstance(item, dict)]
                break

          def summarize(alert: dict) -> str:
            code = str(alert.get("code") or "")
            domain = str(alert.get("domain") or "unknown")
            symbol = str(alert.get("symbol") or "?")
            timeframe = str(alert.get("timeframe") or "?")
            planned = str(alert.get("planned_source") or "")
            actual = str(alert.get("actual_source") or "")
            status = str(alert.get("status") or "")
            if code.startswith("FALLBACK_"):
              detail = f"{actual or 'unknown'} <- {planned or 'unknown'}"
            else:
              detail = status or "unknown"
            return f"- {code}: {domain} {symbol}/{timeframe} ({detail})"

          def summarize_warning(row: dict) -> str:
            code = str(row.get("code") or "UNKNOWN")
            symbol = str(row.get("symbol") or "").strip()
            timeframe = str(row.get("timeframe") or "").strip()
            suffix = f" {symbol}/{timeframe}" if symbol and timeframe else ""
            return f"- {code}:{suffix}" if suffix else f"- {code}"

          info_count = sum(1 for item in alerts if str(item.get("severity") or "") == "info")
          warn_count = sum(1 for item in alerts if str(item.get("severity") or "") == "warn")
          rendered_lines = "\n".join(summarize(item) for item in alerts[:5])
          rendered_warning_lines = "\n".join(summarize_warning(item) for item in warnings[:5])

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
            handle.write(f"PROVIDER_DOMAIN_ALERT_COUNT={len(alerts)}\n")
            handle.write(f"PROVIDER_DOMAIN_INFO_COUNT={info_count}\n")
            handle.write(f"PROVIDER_DOMAIN_WARN_COUNT={warn_count}\n")
            handle.write(f"PROVIDER_HEALTH_WARNING_COUNT={len(warnings)}\n")
            handle.write("PROVIDER_DOMAIN_ALERT_LINES<<EOF\n")
            if rendered_lines:
              handle.write(rendered_lines + "\n")
            handle.write("EOF\n")
            handle.write("PROVIDER_HEALTH_WARNING_LINES<<EOF\n")
            if rendered_warning_lines:
              handle.write(rendered_warning_lines + "\n")
            handle.write("EOF\n")
          PY

      # ── Version bump + commit (skip when unchanged or breaking) ─
      - name: Bump library version in all pine consumers
        if: steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        run: |
          NEW_VERSION=$(jq -r '.library_version' pine/generated/smc_micro_profiles_generated.json)
          PIN_PATTERN='import preuss_steffen/smc_micro_profiles_generated/[0-9]*'
          REPLACEMENT="import preuss_steffen/smc_micro_profiles_generated/${NEW_VERSION}"
          # Enumerate every top-level .pine that pins the library. Fixture
          # and generated paths are excluded — they have their own
          # snapshot flow. Closes the 2026-04-22 gap where only
          # SMC_Core_Engine.pine was repinned, leaving 13 other
          # consumers stranded on the previous library version.
          mapfile -t PINE_CONSUMERS < <(grep -lrE "${PIN_PATTERN}" . \
            --include='*.pine' \
            --exclude-dir=tests \
            --exclude-dir=pine \
            --exclude-dir=node_modules \
            --exclude-dir=.git | sort -u)
          if [ ${#PINE_CONSUMERS[@]} -eq 0 ]; then
            echo "::error::No pine consumers found for library pin. Refusing to proceed."
            exit 1
          fi
          echo "Pinning ${#PINE_CONSUMERS[@]} pine consumers to library ${NEW_VERSION}:"
          printf '  %s\n' "${PINE_CONSUMERS[@]}"
          for f in "${PINE_CONSUMERS[@]}"; do
            sed -i "s|${PIN_PATTERN}|${REPLACEMENT}|g" "$f"
            if ! grep -qF "${REPLACEMENT}" "$f"; then
              echo "::error::Failed to pin ${f} to library version ${NEW_VERSION}."
              exit 1
            fi
          done

      - name: Commit and push changes
        id: commit_push
        if: steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && steps.tv_post_release.outcome == 'success' && steps.release_gates.outcome == 'success' && github.ref == 'refs/heads/main'
        env:
          # GH_PAT is required so the bot/* push + `gh pr create` below
          # actually trigger downstream workflows (notably fast-gates).
          # PRs/pushes created with the default GITHUB_TOKEN do NOT spawn
          # child workflows (GitHub suppresses webhook events for token-
          # generated actions), which would leave `gh pr merge --auto`
          # waiting forever on a check that never runs. Falls back to
          # github.token only on forks where the secret is unavailable.
          # See `/memories/repo/bot-pr-needs-pat-not-github-token.md`
          # and tests/test_workflow_gh_pat_discipline.py.
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          # The repo's `main-governance` ruleset only targets ~DEFAULT_BRANCH,
          # so direct `git push origin HEAD:main` is rejected with GH013
          # ("Required status check 'fast-gates' is expected"). Use the same
          # bot/* PR + auto-merge pattern as run-open-prep-daily.yml and
          # open-prep-outcome-backfill.yml. The CI skip-pattern in
          # smc-fast-pr-gates.yml + ci.yml short-circuits heavy steps for
          # bot/* heads, so the PR merges in seconds without burning CI.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          GIT_LFS_SKIP_SMUDGE=1 git -c filter.lfs.smudge= -c filter.lfs.process= -c filter.lfs.required=false restore --source=HEAD --worktree --staged -- \
            artifacts/databento_volatility_cache/ \
            artifacts/smc_microstructure_exports/smc_live_news_snapshot.json \
            artifacts/smc_microstructure_exports/smc_live_news_state.json || true
          git add pine/generated/ \
            SMC_Core_Engine.pine \
            SMC_Dashboard.pine \
            SMC_Mobile_Dashboard.pine \
            SMC_Long_Strategy.pine \
            SkippALGO_Confluence.pine \
            SMC_Structure_Context.pine \
            SMC_Session_Context.pine \
            SMC_Profile_Context.pine \
            SMC_Orderflow_Overlay.pine \
            SMC_Liquidity_Structure.pine \
            SMC_Liquidity_Context.pine \
            SMC_Imbalance_Context.pine \
            SMC_HTF_Confluence.pine \
            SMC_Event_Overlay.pine \
            SMC_Breakout_Overlay.pine \
            artifacts/tradingview/library_release_manifest.json
          if ! git diff --quiet; then
            echo "::error::Unexpected tracked changes remain unstaged before refresh commit."
            git status --short
            git diff --name-only
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "::notice::No post-publish changes to commit."
            exit 0
          fi

          BRANCH="bot/library-refresh-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "chore: library refresh ${REFRESH_DATE} (run ${{ github.run_number }})"
          git push -u origin "$BRANCH"
          # F-V6-I2.1 (2026-05-02): previously this `gh pr create` was suffixed
          # with `|| true`, which silently swallowed real PR-creation failures
          # (auth issues, branch-protection refusals, transient API errors) and
          # left the workflow green with no follow-up PR. Surface as ::error::
          # and fail the job so the library refresh cannot be lost.
          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --label automated \
            --title "chore: library refresh ${REFRESH_DATE} (run ${{ github.run_number }})" \
            --body "Automated SMC library refresh from \`smc-library-refresh\` (run ${GITHUB_RUN_ID}). Pine library content + manifest. Heavy CI is skipped for bot/* PRs (validation already happened in the refresh workflow itself: TV preflight + post-release validation + release gates)."; then
            echo "::error file=.github/workflows/smc-library-refresh.yml::gh pr create failed for ${BRANCH} — see step log for stderr"
            exit 1
          fi
          # CONTINUE-ON-ERROR-INTENTIONAL: enabling auto-merge can race with
          # branch-protection / required-status-check evaluation; the PR itself
          # is already open and reviewable, so we surface as warning rather
          # than failing the job.
          gh pr merge "$BRANCH" --auto --squash --delete-branch \
            || echo "::warning::auto-merge enable failed for ${BRANCH} (PR is open and reviewable)"

      # ── Signal alerts (non-blocking) ────────────────────────────
      - name: Evaluate and send alerts
        id: alerts
        if: always() && steps.diff.outputs.changed == 'true' && steps.breaking.outputs.breaking != 'true' && github.ref == 'refs/heads/main'
        # CONTINUE-ON-ERROR-INTENTIONAL: alert dispatch is best-effort notification;
        # missing TELEGRAM/SMTP secrets or transient delivery errors must not fail
        # the refresh job (artifacts already produced).
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          python scripts/smc_alert_notifier.py \
            --library pine/generated/smc_micro_profiles_generated.pine \
            --state-file artifacts/ci/alert_last_state.json \
            --post-release-report artifacts/ci/smc_post_release_validation_report.json \
            --provider-alerts \
            ${TELEGRAM_BOT_TOKEN:+--telegram-bot-token "$TELEGRAM_BOT_TOKEN"} \
            ${TELEGRAM_CHAT_ID:+--telegram-chat-id "$TELEGRAM_CHAT_ID"} \
            ${SMTP_HOST:+--smtp-host "$SMTP_HOST"} \
            ${SMTP_USER:+--smtp-user "$SMTP_USER"} \
            ${SMTP_PASS:+--smtp-pass "$SMTP_PASS"} \
            ${ALERT_EMAIL_FROM:+--email-from "$ALERT_EMAIL_FROM"} \
            ${ALERT_EMAIL_TO:+--email-to "$ALERT_EMAIL_TO"}

      # ── Upload CI artifacts ─────────────────────────────────────
      - name: Upload gate evidence + library artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smc-refresh-${{ env.REFRESH_DATE }}-${{ github.run_number }}
          path: |
            artifacts/ci/
            artifacts/snapshots/
            pine/generated/
          retention-days: 90

      - name: Upload TradingView validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smc-tradingview-${{ env.REFRESH_DATE }}-${{ github.run_number }}
          path: |
            artifacts/tradingview/
          if-no-files-found: ignore
          retention-days: 30

      # ── Status summary ─────────────────────────────────────────
      - name: Emit workflow summary
        if: always()
        env:
          FIRST_FAILED_GATE_TEST: ${{ steps.gates.outputs.first_failed_test }}
          FIRST_FAILED_GATE_TEST_LINE: ${{ steps.gates.outputs.first_failed_test_line }}
        run: |
          {
            echo "## SMC Library Refresh (v5) — ${REFRESH_TS}"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Runner | ${{ env.SMC_REFRESH_RUNNER_LABEL }} |"
            echo "| Ref | ${{ github.ref_name }} |"
            echo "| Generation (base + enrichment + event-risk) | ${{ steps.gates.outcome == 'success' && '✅' || steps.gates.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
            echo "| Evidence gates | ${{ steps.gates.outcome == 'success' && '✅ passed' || '❌ failed' }} |"
            if [ "${{ steps.gates.outcome }}" = "failure" ] && [ -n "$FIRST_FAILED_GATE_TEST" ]; then
              echo "| First failing gate test | $FIRST_FAILED_GATE_TEST |"
            fi
            echo "| Library changed | ${{ steps.diff.outputs.changed == 'true' && '✅ yes' || '⏭️ no' }} |"
            echo "| Pre-release artifact refresh | ${{ steps.pre_release_refresh.outcome == 'success' && '✅ passed' || steps.pre_release_refresh.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
            echo "| Pre-publish strict release gates | ${{ steps.pre_release_gates.outcome == 'success' && '✅ passed' || steps.pre_release_gates.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
            if [ "${{ steps.breaking.outputs.breaking }}" = "true" ]; then
              echo "| ⚠️ Breaking-change governance | 🛑 ${{ steps.breaking.outputs.reason }} |"
              echo "| Publish | 🛑 blocked (breaking change) |"
              echo "| Commit | 🛑 blocked (breaking change) |"
              echo "| Signal + event-risk alerts | 🛑 blocked (breaking change) |"
            elif [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
              echo "| Breaking-change governance | ✅ compatible |"
              if [ "${{ github.ref }}" = "refs/heads/main" ]; then
                echo "| TradingView preflight | ${{ steps.tv_preflight.outcome == 'success' && '✅ passed' || steps.tv_preflight.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| Publish | ${{ steps.publish.outcome == 'success' && '✅' || steps.publish.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| TradingView post-release validation | ${{ steps.tv_post_release.outcome == 'success' && '✅ passed' || steps.tv_post_release.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| Post-release strict release gates | ${{ steps.release_gates.outcome == 'success' && '✅ passed' || steps.release_gates.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| Commit | ${{ steps.commit_push.outcome == 'success' && '✅' || steps.commit_push.outcome == 'skipped' && '⏭️ skipped' || '❌ failed' }} |"
                echo "| Signal + event-risk alerts | ${{ steps.alerts.outcome == 'success' && '✅ evaluated' || steps.alerts.outcome == 'skipped' && '⏭️ skipped' || '⚠️ error (non-blocking)' }} |"
              else
                echo "| TradingView preflight | ⏭️ skipped (non-main ref) |"
                echo "| Publish | ⏭️ skipped (non-main ref) |"
                echo "| TradingView post-release validation | ⏭️ skipped (non-main ref) |"
                echo "| Post-release strict release gates | ⏭️ skipped (non-main ref) |"
                echo "| Commit | ⏭️ skipped (non-main ref) |"
                echo "| Signal + event-risk alerts | ⏭️ skipped (non-main ref) |"
              fi
            else
              echo "| TradingView preflight | ⏭️ skipped (no changes) |"
              echo "| Publish | ⏭️ skipped (no changes) |"
              echo "| TradingView post-release validation | ⏭️ skipped (no changes) |"
              echo "| Post-release strict release gates | ⏭️ skipped (no changes) |"
              echo "| Commit | ⏭️ skipped (no changes) |"
              echo "| Signal + event-risk alerts | ⏭️ skipped (no changes) |"
            fi
            if [ "${{ steps.gates.outcome }}" = "failure" ] && [ -n "$FIRST_FAILED_GATE_TEST_LINE" ]; then
              echo ""
              echo "### First Failing Gate Test"
              echo ""
              echo "$FIRST_FAILED_GATE_TEST_LINE"
            fi
            if [ "${PROVIDER_DOMAIN_ALERT_COUNT:-0}" -gt 0 ]; then
              echo ""
              echo "### Provider Domain Alerts"
              echo ""
              echo "| Severity | Count |"
              echo "|---|---:|"
              echo "| warn | ${PROVIDER_DOMAIN_WARN_COUNT:-0} |"
              echo "| info | ${PROVIDER_DOMAIN_INFO_COUNT:-0} |"
              if [ -n "${PROVIDER_DOMAIN_ALERT_LINES}" ]; then
                echo ""
                printf '%s\n' "${PROVIDER_DOMAIN_ALERT_LINES}"
              fi
            fi
            if [ "${PROVIDER_HEALTH_WARNING_COUNT:-0}" -gt 0 ]; then
              echo ""
              echo "### Provider Health Warnings"
              echo ""
              echo "Count: ${PROVIDER_HEALTH_WARNING_COUNT:-0}"
              if [ -n "${PROVIDER_HEALTH_WARNING_LINES}" ]; then
                echo ""
                printf '%s\n' "${PROVIDER_HEALTH_WARNING_LINES}"
              fi
            fi
            echo ""
            if [ -f artifacts/ci/library_diff_${REFRESH_DATE}.patch ]; then
              echo "<details><summary>Library diff</summary>"
              echo ""
              echo '```diff'
              head -200 "artifacts/ci/library_diff_${REFRESH_DATE}.patch"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Breaking-change notification ────────────────────────────
      - name: Notify on breaking change
        if: steps.breaking.outputs.breaking == 'true'
        # CONTINUE-ON-ERROR-INTENTIONAL: breaking-change Telegram notify is
        # best-effort; the breaking-change gate itself already blocked auto-commit
        # (visible via job conclusion), so notify failure must not mask that signal.
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🛑 SMC Library breaking change detected (${REFRESH_TS})%0A${{ steps.breaking.outputs.reason }}%0AArtifacts archived but auto-commit blocked."
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sf -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode=HTML || true
          fi

      # ── End-of-run status notification ──────────────────────────
      - name: Send end-of-run status notification
        if: always()
        # CONTINUE-ON-ERROR-INTENTIONAL: end-of-run Telegram heartbeat is
        # best-effort observability; failure must not flip job conclusion since
        # the actual work (refresh + commit) is upstream.
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::notice::Telegram secrets not configured — skipping status notification."
            exit 0
          fi

          GATE="${{ steps.gates.outcome }}"
          CHANGED="${{ steps.diff.outputs.changed }}"
          BREAKING="${{ steps.breaking.outputs.breaking }}"
          PREFLIGHT="${{ steps.tv_preflight.outcome }}"
          PUBLISH="${{ steps.publish.outcome }}"
          POST_RELEASE="${{ steps.tv_post_release.outcome }}"
          COMMIT_PUSH="${{ steps.commit_push.outcome }}"
          ALERTS="${{ steps.alerts.outcome }}"
          ALERT_COUNT="${PROVIDER_DOMAIN_ALERT_COUNT:-0}"
          ALERT_INFO="${PROVIDER_DOMAIN_INFO_COUNT:-0}"
          ALERT_WARN="${PROVIDER_DOMAIN_WARN_COUNT:-0}"
          PROVIDER_WARNING_COUNT="${PROVIDER_HEALTH_WARNING_COUNT:-0}"

          if [ "$GATE" = "failure" ]; then
            ICON="❌"
            HEADLINE="Evidence gates failed"
          elif [ "$CHANGED" != "true" ]; then
            ICON="⏭️"
            HEADLINE="No library changes"
          elif [ "$BREAKING" = "true" ]; then
            ICON="🛑"
            HEADLINE="Breaking change — publish blocked"
          elif [ "$PREFLIGHT" = "failure" ]; then
            ICON="❌"
            HEADLINE="TradingView preflight failed"
          elif [ "$PUBLISH" = "failure" ]; then
            ICON="❌"
            HEADLINE="TradingView publish failed"
          elif [ "$POST_RELEASE" = "failure" ]; then
            ICON="❌"
            HEADLINE="TradingView post-release validation failed"
          elif [ "$COMMIT_PUSH" = "failure" ]; then
            ICON="❌"
            HEADLINE="Commit/push failed"
          elif [ "$ALERT_WARN" != "0" ] || [ "$PROVIDER_WARNING_COUNT" != "0" ]; then
            ICON="⚠️"
            HEADLINE="Library published with provider warnings"
          elif [ "$ALERT_INFO" != "0" ]; then
            ICON="ℹ️"
            HEADLINE="Library published with fallback alerts"
          else
            ICON="✅"
            HEADLINE="Library published"
          fi

          MSG="${ICON} <b>SMC Refresh</b> — ${HEADLINE}%0A🕐 ${REFRESH_TS}  •  Run #${{ github.run_number }}"
          if [ "$ALERT_COUNT" != "0" ]; then
            MSG="${MSG}%0Aℹ️ Provider domain alerts: ${ALERT_COUNT} (${ALERT_WARN} warn / ${ALERT_INFO} info)"
          fi
          if [ "$PROVIDER_WARNING_COUNT" != "0" ]; then
            MSG="${MSG}%0A⚠️ Provider health warnings: ${PROVIDER_WARNING_COUNT}"
          fi
          if [ "$ALERTS" = "success" ]; then
            MSG="${MSG}%0A📡 Signal alerts evaluated"
          fi

          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode=HTML || true

