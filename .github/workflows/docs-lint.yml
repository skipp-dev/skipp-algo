# live-window: any-trigger  # PR-only docs lint, no mutating writes (drive-by repair on PR #2194)
name: docs-lint

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/lint_md_inline_backticks.py"
      - ".github/workflows/docs-lint.yml"
  workflow_dispatch:

# Concurrency: cancel superseded PR runs to keep CI minutes low.
concurrency:
  group: docs-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# F-V6-A2.1 (2026-05-02): top-level PYTHONUNBUFFERED so setup-python and
# pip steps stream their output unbuffered. Required by
# tests/test_workflow_python_unbuffered.py.
#
# PYTHONPATH: required by tests/test_workflow_invoked_scripts_importable.py
# because the lint script lives under scripts/ and any sibling import
# (`from scripts.X import Y`) would crash with ModuleNotFoundError without
# the workspace on sys.path.
env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  inline-backticks:
    name: lint inline backticks (strict)
    # Operator-override hook (tests/test_workflow_runner_pinned.py): runner
    # label is overridable via the SMC_GH_HOSTED_RUNNER repo variable; default
    # is the larger ubuntu-latest-l runner per project standard.
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-l' }}
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Use the repo's canonical setup-python composite action so the Python
      # version stays aligned with the rest of CI (currently 3.12, pinned via
      # actions/setup-python@v6). The lint script imports only stdlib, so we
      # do not pass `cache: pip` — pip caching stays opt-in at the call site
      # and is not active for this job. Migrating per Copilot review on PR #2185.
      - uses: ./.github/actions/setup-python-pinned

      # STRICT mode (Phase B3 active since 2026-05-13). Phase B2 (PR #2187)
      # mechanically cleared the docs/ corpus of unbalanced inline-backtick
      # spans; this workflow now exits 1 on any new finding so the regression
      # cannot reach main. History: B1 shipped warn-only (::warning:: GHA
      # annotations only); B2 fixed the corpus; B3 (this PR) flips to --strict.
      # Gating is documented in docs/COPILOT_REVIEW_TRIAGE_PROTOCOL.md
      # (Phase B) and the deep-review report 2026-05-13 § B3.
      - name: Run lint_md_inline_backticks.py (strict)
        run: |
          python scripts/lint_md_inline_backticks.py --strict --format github docs/
