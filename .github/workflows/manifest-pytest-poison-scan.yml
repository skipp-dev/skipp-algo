# live-window: any-trigger  # F-V6-F2.1 (2026-05-02)
name: manifest-pytest-poison-scan

on:
  pull_request:
    paths:
      - '**/manifest*.json'
      - 'scripts/scan_manifests_for_pytest_provenance.py'
      - '.github/workflows/manifest-pytest-poison-scan.yml'
  push:
    branches: [main]

permissions:
  contents: read

# F-V8-C5-A (2026-05-07): serialize per-ref so a fast follow-up push
# (e.g. amend + force-push during PR review) cancels the now-stale
# in-flight scan. cancel-in-progress is gated on pull_request only, so
# pushes to main always run to completion (audit-trail integrity).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
defaults:
  run:
    shell: bash

jobs:
  scan:
    name: scan tracked manifests for pytest provenance
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Scan tracked manifest*.json for pytest-of-* provenance
        run: |
          python scripts/scan_manifests_for_pytest_provenance.py --all-tracked
