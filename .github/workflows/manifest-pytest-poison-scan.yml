# live-window: any-trigger  # F-V6-F2.1 (2026-05-02)
name: manifest-pytest-poison-scan

on:
  pull_request:
    paths:
      - '**/manifest*.json'
      - 'scripts/scan_manifests_for_pytest_provenance.py'
      - '.github/workflows/manifest-pytest-poison-scan.yml'
  push:
    branches: [main]

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

jobs:
  scan:
    name: scan tracked manifests for pytest provenance
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-l' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Scan tracked manifest*.json for pytest-of-* provenance
        run: |
          python scripts/scan_manifests_for_pytest_provenance.py --all-tracked
