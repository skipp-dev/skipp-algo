# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: open-prep-outcome-backfill

# Schedule: 22:15 UTC weekdays — after US RTH close so post-open Databento data has settled (F-V4-C2/E2, audit 2026-05-01; header aligned audit 2026-06)
#
# ENG-WS4-01: Outcome-Backfill automatisieren.
# Runs the post-open outcome backfill on a regular schedule so labeled
# outcomes (and the feature-importance feedback loop) keep growing
# without manual intervention.
#
# Exit semantics (audit D-3, 2026-06-12 — the old "failures bubble up
# as a non-zero exit code" claim was wrong): per-symbol failures are
# tolerated by design (data gaps for delisted/halted symbols would turn
# the cron permanently red). `python -m open_prep.outcome_backfill`
# only fails the job when the run resolved NO outcomes (exit 2:
# resolved==0 AND failed>0 — skipped/deferred may still be non-zero;
# exit 3: --require-progress with zero activity). Persistent per-symbol
# failure residue is surfaced by the "Warn on persistent failed-status
# streak" step below instead.

on:
  schedule:
    # F-V4-C2 + F-V4-E2 (audit 2026-05-01): moved out of US RTH (13:30-21:00 UTC).
    # Previous cron entries 15:15 UTC + 16:15 UTC fired DURING the US session and
    # repeatedly hit Databento HTTP 422 ("data_start_after_available_end") because
    # the post-open data does not settle until after RTH close. Moved to 22:15 UTC
    # (~17:15 ET, ~18:15 EDT — both well after settlement >21:30 UTC).
    - cron: "15 22 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional explicit date to backfill (YYYY-MM-DD)"
        required: false
        default: ""
      lookback:
        description: "Number of recent outcome files to scan"
        required: false
        default: "5"
      feature_importance:
        description: "Also backfill feature-importance samples"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: open-prep-outcome-backfill
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          SMC_FORCE_GH_HOSTED: ${{ vars.SMC_FORCE_GH_HOSTED }}
        run: |
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_PRIORITY_CRON_GPU_SELF_HOSTED_LABEL || vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"

  backfill:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 20
    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # GH_PAT is required so the `bot/*` push + `gh pr create` below
          # trigger the `fast-gates` required check. Workflows opened with
          # the default GITHUB_TOKEN do NOT spawn child workflows, which
          # leaves the PR stuck in BLOCKED with `fast-gates` "expected".
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          persist-credentials: false

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Install Python dependencies
        run: |
          "$SMC_PYTHON_BIN" -m pip install --upgrade pip
          "$SMC_PYTHON_BIN" -m pip install -r requirements.txt

      - name: Install GPU dependencies
        if: needs.select-runner.outputs.runner_environment == 'self-hosted'
        run: |
          "$SMC_PYTHON_BIN" -m pip install -r requirements-gpu.txt

      - name: Select feature-importance backend
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "self-hosted" ]]; then
            echo "OPEN_PREP_FI_BACKEND=gpu" >> "$GITHUB_ENV"
            echo "OPEN_PREP_FI_GPU_DEVICE=0" >> "$GITHUB_ENV"
            echo "::notice::Open Prep feature-importance backend forced to GPU on self-hosted runner."
          else
            echo "OPEN_PREP_FI_BACKEND=cpu" >> "$GITHUB_ENV"
            echo "::notice::Open Prep feature-importance backend using CPU on hosted fallback runner."
          fi

      - name: Run outcome backfill
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          # A2 (2026-06-10): env-var indirection for user-supplied inputs.
          INPUT_LOOKBACK: ${{ github.event.inputs.lookback || '5' }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_FEATURE_IMPORTANCE: ${{ github.event.inputs.feature_importance || 'true' }}
        run: |
          set -euo pipefail
          # A2: validate all user-supplied inputs before use.
          [[ "${INPUT_LOOKBACK}" =~ ^[0-9]+$ ]] || {
            echo "::error::lookback must be a non-negative integer, got: ${INPUT_LOOKBACK}"; exit 1
          }
          if [ -n "${INPUT_DATE}" ]; then
            [[ "${INPUT_DATE}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || {
              echo "::error::date must be YYYY-MM-DD, got: ${INPUT_DATE}"; exit 1
            }
          fi
          [[ "${INPUT_FEATURE_IMPORTANCE}" =~ ^(true|false)$ ]] || {
            echo "::error::feature_importance must be 'true' or 'false', got: ${INPUT_FEATURE_IMPORTANCE}"; exit 1
          }
          ARGS=(--lookback "${INPUT_LOOKBACK}")
          if [ -n "${INPUT_DATE}" ]; then
            ARGS+=(--date "${INPUT_DATE}")
          fi
          if [ "${INPUT_FEATURE_IMPORTANCE}" = "true" ]; then
            ARGS+=(--feature-importance)
          fi
          # F-09: fail loud (exit 3) when the run made zero progress;
          # without this the workflow silently went green even when no
          # outcomes were resolved, skipped or failed.
          ARGS+=(--require-progress)
          "$SMC_PYTHON_BIN" -m open_prep.outcome_backfill "${ARGS[@]}"

      - name: Warn on persistent failed-status streak
        # Audit D-3 (2026-06-12): every run log 2026-04-30..2026-06-11
        # carried status="failed" (the same ~3 legacy symbols fail daily)
        # and nothing consumed that status. Surface a streak of failed
        # run logs as a ::warning:: so the residue is visible without
        # turning the cron permanently red.
        if: always()
        env:
          STREAK_THRESHOLD: "5"
        run: |
          set -euo pipefail
          # if: always() — SMC_PYTHON_BIN may be unset when the resolve
          # step was skipped/failed; fall back to plain python so this
          # warn-only step does not add its own failure noise. If no
          # interpreter is available at all, skip cleanly (exit 0)
          # instead of failing with exit 127.
          PYBIN="${SMC_PYTHON_BIN:-python}"
          # Probe by execution, not `command -v`: SMC_PYTHON_BIN may be an
          # absolute Windows path from `py -3.12 -c "print(sys.executable)"`
          # (resolve step above), which `command -v` would treat as a PATH
          # lookup and falsely reject under Git Bash.
          if ! "$PYBIN" -c "" >/dev/null 2>&1; then
            echo "streak check: no usable python interpreter ($PYBIN) — skipping"
            exit 0
          fi
          "$PYBIN" - <<'EOF'
          import json
          import os
          from pathlib import Path

          log_dir = Path("artifacts/open_prep/outcome_backfill")
          threshold = int(os.environ["STREAK_THRESHOLD"])
          logs = sorted(log_dir.glob("backfill_*.json"), reverse=True)[:threshold]
          if len(logs) < threshold:
              print(f"streak check: only {len(logs)} run logs — skipping")
              raise SystemExit(0)
          statuses = []
          for p in logs:
              try:
                  statuses.append(json.loads(p.read_text(encoding="utf-8")).get("status"))
              except (json.JSONDecodeError, OSError) as exc:
                  print(f"streak check: unreadable {p}: {exc}")
                  statuses.append(None)
          if all(s == "failed" for s in statuses):
              print(
                  f"::warning::outcome backfill: last {threshold} run logs all "
                  "have status='failed' — the same symbols are likely failing "
                  "every day (audit D-3). Inspect "
                  "artifacts/open_prep/outcome_backfill/latest.json and consider "
                  "quarantining permanently broken legacy rows."
              )
          else:
              print(f"streak check ok: statuses={statuses}")
          EOF

      - name: Generate feature-importance report
        # ENG-WS4-02: continuously regenerate the FI report so its status
        # (ok / insufficient_labels / no_data) is always inspectable.
        if: always()
        run: |
          set -euo pipefail
          "$SMC_PYTHON_BIN" -m open_prep.feature_importance_report --lookback 30

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: outcome-backfill-run-log
          path: |
            artifacts/open_prep/outcome_backfill/
            artifacts/open_prep/feature_importance/
          if-no-files-found: warn

      - name: Commit refreshed outcomes via PR
        # The repo's `main-governance` ruleset targets only ~DEFAULT_BRANCH,
        # so we can push to fresh `bot/*` branches and open an auto-merge PR.
        # Final merge into `main` still goes through pull_request +
        # required_status_checks. We MUST authenticate with GH_PAT (not the
        # default GITHUB_TOKEN) for both the push and `gh pr create` — GitHub
        # suppresses workflow triggers for events generated by GITHUB_TOKEN,
        # which leaves the required `fast-gates` check "expected" forever and
        # the PR stuck in BLOCKED.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add artifacts/open_prep/outcomes/ artifacts/open_prep/outcome_backfill/ artifacts/open_prep/feature_importance/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BRANCH="bot/outcome-backfill-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git commit -m "chore(open_prep): outcome backfill ${GITHUB_RUN_ID}"
          git push -u origin "$BRANCH"
          # F-V6-I2.1 (2026-05-02): previously this `gh pr create` was suffixed
          # with `|| true`, which silently swallowed real PR-creation failures
          # (auth issues, branch-protection refusals, transient API errors) and
          # left the workflow green with no follow-up PR. Surface as ::error::
          # and fail the job so the daily backfill cannot be lost.
          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --label automated \
            --title "chore(open_prep): outcome backfill ${GITHUB_RUN_ID}" \
            --body "Automated outcome backfill + feature-importance artifacts from run ${GITHUB_RUN_ID}."; then
            echo "::error file=.github/workflows/open-prep-outcome-backfill.yml::gh pr create failed for ${BRANCH} — see step log for stderr"
            exit 1
          fi
          # CONTINUE-ON-ERROR-INTENTIONAL: enabling auto-merge can race with
          # branch-protection / required-status-check evaluation; the PR itself
          # is already open and reviewable, so we surface as warning rather
          # than failing the job.
          gh pr merge "$BRANCH" --auto --squash --delete-branch \
            || echo "::warning::auto-merge enable failed for ${BRANCH} (PR is open and reviewable)"
