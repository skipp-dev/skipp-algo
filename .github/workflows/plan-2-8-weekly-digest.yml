name: plan-2.8 weekly trend digest

# Weekly Plan 2.8 trend digest. Pulls the long-running history JSONL
# from the most-recent rolling-bench run, renders the digest with
# scripts/plan_2_8_trend_digest.py, streams it into the run summary
# and uploads the markdown as an artifact for offline review.

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays, 12:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back for the comparison endpoint."
        required: false
        default: "7"
      alert_threshold_pp:
        description: "Per-slice drift threshold for alerts (pp)."
        required: false
        default: "0.05"
      min_events:
        description: "Minimum events per slice for a comparable verdict."
        required: false
        default: "30"

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download latest rolling-bench artifact
        id: download
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: smc-measurement-benchmark-rolling.yml
          name_is_regexp: true
          name: '^smc-measurement-benchmark-rolling-.*$'
          workflow_conclusion: ""
          if_no_artifact_found: warn
          path: artifacts/latest_bench

      - name: Render weekly trend digest
        id: digest
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_digest
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No plan_2_8_history.jsonl found in latest bench artifact." \
              | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '7' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --output             artifacts/plan_2_8_digest/weekly_digest.md \
            > /dev/null
          # Also render the issue-body + alerts summary for downstream steps.
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '7' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --format             issue \
            --output             artifacts/plan_2_8_digest/issue_body.md \
            --alerts-file        artifacts/plan_2_8_digest/alerts.json \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/weekly_digest.md ]; then
            cat artifacts/plan_2_8_digest/weekly_digest.md >> "$GITHUB_STEP_SUMMARY"
          fi
          # Also render a JSON digest so downstream steps can apply
          # the operator snooze config without re-reading the history.
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '7' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --format             json \
            --output             artifacts/plan_2_8_digest/digest.json \
            > /dev/null
          true

      - name: Apply alert snooze config
        id: snooze
        if: always()
        shell: bash
        run: |
          set +e
          config="configs/plan_2_8_snoozes.json"
          digest="artifacts/plan_2_8_digest/digest.json"
          if [ ! -s "${digest}" ]; then
            echo "No digest.json to snooze; skipping."
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pass-through when config missing or has no entries.
          if [ ! -s "${config}" ] || ! python -c "import json,sys;c=json.load(open('${config}'));sys.exit(0 if c.get('snoozes') else 1)" 2>/dev/null; then
            echo "No active snooze entries; pass-through."
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/plan_2_8_alert_snooze.py \
            --digest "${digest}" \
            --snooze "${config}" \
            --output artifacts/plan_2_8_digest/digest.snoozed.json \
            > /dev/null
          # Re-render issue body and alerts file from the filtered digest.
          python -c "
          import json
          from pathlib import Path
          import importlib.util
          spec = importlib.util.spec_from_file_location('td', 'scripts/plan_2_8_trend_digest.py')
          m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)
          d = json.load(open('artifacts/plan_2_8_digest/digest.snoozed.json'))
          Path('artifacts/plan_2_8_digest/issue_body.md').write_text(m.render_issue_body(d), encoding='utf-8')
          Path('artifacts/plan_2_8_digest/alerts.json').write_text(
            json.dumps({'has_alerts': m.has_alerts(d),
                        'count': len(d.get('alerts') or [])}, indent=2) + '\n',
            encoding='utf-8',
          )
          "
          echo "applied=true" >> "$GITHUB_OUTPUT"
          true

      - name: Resolve final has_alerts
        id: resolve_alerts
        if: always()
        shell: bash
        run: |
          set +e
          alerts="artifacts/plan_2_8_digest/alerts.json"
          has=$(python -c "import json;print(json.load(open('${alerts}'))['has_alerts'])" 2>/dev/null || echo False)
          echo "has_alerts=${has}" >> "$GITHUB_OUTPUT"
          echo "Final has_alerts=${has}"
          true

      - name: Upload weekly digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-weekly-digest
          path: artifacts/plan_2_8_digest/weekly_digest.md
          if-no-files-found: warn
          retention-days: 90

      - name: Open drift-alert issue
        if: steps.resolve_alerts.outputs.has_alerts == 'True'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          # Re-render the issue body with the workflow-run URL footer
          # so the link survives even after the artifact is gone.
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '7' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --format             issue \
            --run-url            "${RUN_URL}" \
            --output             artifacts/plan_2_8_digest/issue_body.md \
            > /dev/null
          title="Plan 2.8 weekly digest: drift alerts ($(date -u +%Y-%m-%d))"
          # De-dup: if an open drift-alert issue exists, append a
          # comment instead of opening a fresh one. This keeps the
          # backlog readable across consecutive alerting weeks.
          existing="$(gh issue list \
            --label plan-2.8 --label drift-alert \
            --state open --json number --jq '.[0].number' || echo '')"
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" \
              --body-file artifacts/plan_2_8_digest/issue_body.md
          else
            gh issue create \
              --title "${title}" \
              --body-file artifacts/plan_2_8_digest/issue_body.md \
              --label plan-2.8,drift-alert
          fi

      - name: Close drift-alert issues when alerts cleared
        if: steps.resolve_alerts.outputs.has_alerts == 'False'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          # When the weekly digest finds no comparable slice over
          # threshold, close any still-open drift-alert issues with
          # a short note pointing at this run. Idempotent: a no-op
          # when no matching open issue exists.
          numbers="$(gh issue list \
            --label plan-2.8 --label drift-alert \
            --state open --json number --jq '.[].number' || echo '')"
          if [ -z "${numbers}" ]; then
            echo "No open drift-alert issues to close."
            exit 0
          fi
          for n in ${numbers}; do
            gh issue comment "${n}" \
              --body "Plan 2.8 weekly digest now reports no slices over threshold. Closing automatically. Run: ${RUN_URL}"
            gh issue close "${n}" --reason completed
          done

      - name: Plan 2.8 history snapshot diff (last two)
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history found; skipping diff."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_history_diff.py \
            --history "${history}" \
            --output  artifacts/plan_2_8_digest/snapshot_diff.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/snapshot_diff.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/snapshot_diff.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 top movers (30-day window)
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history found; skipping top-movers."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_top_movers.py \
            --history      "${history}" \
            --lookback-days 30 \
            --min-events    "${{ inputs.min_events || '30' }}" \
            --top-n         5 \
            --output        artifacts/plan_2_8_digest/top_movers.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/top_movers.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/top_movers.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 slice coverage
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history found; skipping coverage."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_coverage.py \
            --history    "${history}" \
            --min-events "${{ inputs.min_events || '30' }}" \
            --output     artifacts/plan_2_8_digest/coverage.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/coverage.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/coverage.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true
