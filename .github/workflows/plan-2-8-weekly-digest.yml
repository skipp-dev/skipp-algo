name: plan-2.8 weekly trend digest

# Weekly Plan 2.8 trend digest. Pulls the long-running history JSONL
# from the most-recent rolling-bench run, renders the digest with
# scripts/plan_2_8_trend_digest.py, streams it into the run summary
# and uploads the markdown as an artifact for offline review.

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays, 12:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back for the comparison endpoint."
        required: false
        default: "7"
      alert_threshold_pp:
        description: "Per-slice drift threshold for alerts (pp)."
        required: false
        default: "0.05"
      min_events:
        description: "Minimum events per slice for a comparable verdict."
        required: false
        default: "30"

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download latest rolling-bench artifact
        id: download
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: smc-measurement-benchmark-rolling.yml
          name_is_regexp: true
          name: '^smc-measurement-benchmark-rolling-.*$'
          workflow_conclusion: ""
          if_no_artifact_found: warn
          path: artifacts/latest_bench

      - name: Render weekly trend digest
        id: digest
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_digest
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No plan_2_8_history.jsonl found in latest bench artifact." \
              | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '7' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --output             artifacts/plan_2_8_digest/weekly_digest.md \
            > /dev/null
          # Also render the issue-body + alerts summary for downstream steps.
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '7' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --format             issue \
            --output             artifacts/plan_2_8_digest/issue_body.md \
            --alerts-file        artifacts/plan_2_8_digest/alerts.json \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/weekly_digest.md ]; then
            cat artifacts/plan_2_8_digest/weekly_digest.md >> "$GITHUB_STEP_SUMMARY"
          fi
          # Also render a JSON digest so downstream steps can apply
          # the operator snooze config without re-reading the history.
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '7' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --format             json \
            --output             artifacts/plan_2_8_digest/digest.json \
            > /dev/null
          true

      - name: Lint snooze config
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_digest
          if [ ! -s configs/plan_2_8_snoozes.json ]; then
            echo "No snooze config; skipping lint."
            exit 0
          fi
          python scripts/plan_2_8_snooze_lint.py \
            --config configs/plan_2_8_snoozes.json \
            --warn-only \
            --output artifacts/plan_2_8_digest/snooze_lint.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/snooze_lint.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/snooze_lint.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Apply alert snooze config
        id: snooze
        if: always()
        shell: bash
        run: |
          set +e
          config="configs/plan_2_8_snoozes.json"
          digest="artifacts/plan_2_8_digest/digest.json"
          if [ ! -s "${digest}" ]; then
            echo "No digest.json to snooze; skipping."
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pass-through when config missing or has no entries.
          if [ ! -s "${config}" ] || ! python -c "import json,sys;c=json.load(open('${config}'));sys.exit(0 if c.get('snoozes') else 1)" 2>/dev/null; then
            echo "No active snooze entries; pass-through."
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/plan_2_8_alert_snooze.py \
            --digest "${digest}" \
            --snooze "${config}" \
            --output artifacts/plan_2_8_digest/digest.snoozed.json \
            > /dev/null
          # Re-render issue body and alerts file from the filtered digest.
          python -c "
          import json
          from pathlib import Path
          import importlib.util
          spec = importlib.util.spec_from_file_location('td', 'scripts/plan_2_8_trend_digest.py')
          m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m)
          d = json.load(open('artifacts/plan_2_8_digest/digest.snoozed.json'))
          Path('artifacts/plan_2_8_digest/issue_body.md').write_text(m.render_issue_body(d), encoding='utf-8')
          Path('artifacts/plan_2_8_digest/alerts.json').write_text(
            json.dumps({'has_alerts': m.has_alerts(d),
                        'count': len(d.get('alerts') or [])}, indent=2) + '\n',
            encoding='utf-8',
          )
          "
          echo "applied=true" >> "$GITHUB_OUTPUT"
          true

      - name: Resolve final has_alerts
        id: resolve_alerts
        if: always()
        shell: bash
        run: |
          set +e
          alerts="artifacts/plan_2_8_digest/alerts.json"
          has=$(python -c "import json;print(json.load(open('${alerts}'))['has_alerts'])" 2>/dev/null || echo False)
          echo "has_alerts=${has}" >> "$GITHUB_OUTPUT"
          echo "Final has_alerts=${has}"
          true

      - name: Upload weekly digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-weekly-digest
          path: artifacts/plan_2_8_digest/weekly_digest.md
          if-no-files-found: warn
          retention-days: 90

      - name: Append alerts to history log
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          snoozed="artifacts/plan_2_8_digest/digest.snoozed.json"
          digest="artifacts/plan_2_8_digest/digest.json"
          src="${snoozed}"
          [ -s "${src}" ] || src="${digest}"
          if [ ! -s "${src}" ]; then
            echo "No digest payload available; skipping alert-history append."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_alert_history
          # Re-use the rolling-bench history file's captured_at as the
          # alert key — stable across replays of the same digest run.
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          captured="$(python -c "import json,sys; d=json.load(open('${src}')); print(d.get('coverage',{}).get('latest_captured_at') or '')")"
          if [ -z "${captured}" ]; then
            captured="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          python scripts/plan_2_8_alert_history.py \
            --alerts     "${src}" \
            --log        artifacts/plan_2_8_alert_history/alert_history.jsonl \
            --captured-at "${captured}" \
            --run-url    "${RUN_URL}" \
            || true
          true

      - name: Upload alert history log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-alert-history
          path: artifacts/plan_2_8_alert_history/alert_history.jsonl
          if-no-files-found: ignore
          retention-days: 365

      - name: Plan 2.8 alert-history summary (90-day window)
        if: always()
        shell: bash
        run: |
          set +e
          log="artifacts/plan_2_8_alert_history/alert_history.jsonl"
          if [ ! -s "${log}" ]; then
            echo "No alert history yet; skipping summary."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_alert_history_summary.py \
            --log           "${log}" \
            --lookback-days 90 \
            --top-n         10 \
            --output        artifacts/plan_2_8_digest/alert_history_summary.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/alert_history_summary.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/alert_history_summary.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 rollout health
        if: always()
        shell: bash
        run: |
          set +e
          d="artifacts/plan_2_8_digest/digest.json"
          c="artifacts/plan_2_8_digest/coverage.json"
          s="artifacts/plan_2_8_digest/stability.json"
          args=""
          [ -s "${d}" ] && args="${args} --digest ${d}"
          [ -s "${c}" ] && args="${args} --coverage ${c}"
          [ -s "${s}" ] && args="${args} --stability ${s}"
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_health.py ${args} \
            --format json \
            --output artifacts/plan_2_8_digest/health.json \
            > /dev/null
          python scripts/plan_2_8_health.py ${args} \
            --format md \
            --output artifacts/plan_2_8_digest/health.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/health.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/health.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Assemble weekly runcard
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_weekly_runcard.py \
            --artifact-dir artifacts/plan_2_8_digest \
            --output       artifacts/plan_2_8_digest/runcard.md \
            --run-url      "${RUN_URL}" \
            > /dev/null
          true

      - name: Upload weekly runcard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-weekly-runcard
          path: artifacts/plan_2_8_digest/runcard.md
          if-no-files-found: ignore
          retention-days: 180

      - name: Plan 2.8 runcard section index
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_runcard_index.py \
            --artifact-dir artifacts/plan_2_8_digest \
            --format       json \
            --output       artifacts/plan_2_8_digest/runcard_index.json \
            > /dev/null
          python scripts/plan_2_8_runcard_index.py \
            --artifact-dir artifacts/plan_2_8_digest \
            --format       md \
            --output       artifacts/plan_2_8_digest/runcard_index.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/runcard_index.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/runcard_index.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 CHANGELOG slice (last 14 days)
        if: always()
        shell: bash
        run: |
          set +e
          if [ ! -s CHANGELOG.md ]; then
            echo "No CHANGELOG.md; skipping slice."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_changelog_digest.py \
            --changelog      CHANGELOG.md \
            --lookback-days  14 \
            --limit          10 \
            --output         artifacts/plan_2_8_digest/changelog_recent.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/changelog_recent.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/changelog_recent.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 alert-history heatmap (90-day window)
        if: always()
        shell: bash
        run: |
          set +e
          log="artifacts/plan_2_8_alert_history/alert_history.jsonl"
          if [ ! -s "${log}" ]; then
            echo "No alert history yet; skipping heatmap."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_alert_history_heatmap.py \
            --log            "${log}" \
            --lookback-days  90 \
            --output         artifacts/plan_2_8_digest/alert_history_heatmap.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/alert_history_heatmap.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/alert_history_heatmap.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 runbook TOC sidebar
        if: always()
        shell: bash
        run: |
          set +e
          doc="docs/plan_2_8_rollout_runbook.md"
          if [ ! -s "${doc}" ]; then
            echo "No runbook doc; skipping TOC."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_runbook_toc.py \
            --doc    "${doc}" \
            --output artifacts/plan_2_8_digest/runbook_toc.md \
            > /dev/null
          python scripts/plan_2_8_runbook_toc.py \
            --doc    "${doc}" \
            --format json \
            --output artifacts/plan_2_8_digest/runbook_toc.json \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/runbook_toc.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/runbook_toc.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 status snapshot
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_digest
          args=""
          for pair in \
            "--health:artifacts/plan_2_8_digest/health.json" \
            "--runcard-index:artifacts/plan_2_8_digest/runcard_index.json" \
            "--coverage:artifacts/plan_2_8_digest/coverage.json" \
            "--digest:artifacts/plan_2_8_digest/digest.json" \
          ; do
            flag="${pair%%:*}"
            path="${pair##*:}"
            [ -s "${path}" ] && args="${args} ${flag} ${path}"
          done
          python scripts/plan_2_8_status_snapshot.py ${args} \
            --format json \
            --output artifacts/plan_2_8_digest/status_snapshot.json \
            > /dev/null
          python scripts/plan_2_8_status_snapshot.py ${args} \
            --format md \
            --output artifacts/plan_2_8_digest/status_snapshot.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/status_snapshot.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/status_snapshot.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Upload Plan 2.8 status snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-status-snapshot
          path: |
            artifacts/plan_2_8_digest/status_snapshot.json
            artifacts/plan_2_8_digest/status_snapshot.md
          if-no-files-found: ignore
          retention-days: 365

      - name: Download Plan 2.8 digest archive
        if: always()
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: plan-2-8-digest-archive
          name_is_regexp: true
          path: artifacts/_download/plan_2_8_digest_archive
          workflow: plan-2-8-weekly-digest.yml
          workflow_conclusion: ""
          if_no_artifact_found: warn

      - name: Plan 2.8 digest archive + weekly compare
        if: always()
        shell: bash
        run: |
          set +e
          digest="artifacts/plan_2_8_digest/digest.json"
          if [ ! -s "${digest}" ]; then
            echo "No digest.json; skipping archive+compare."
            exit 0
          fi
          # Prime archive dir with any previously-uploaded snapshots.
          mkdir -p artifacts/plan_2_8_digest_archive
          if compgen -G "artifacts/_download/plan_2_8_digest_archive/**/*.json" > /dev/null; then
            cp -n artifacts/_download/plan_2_8_digest_archive/**/*.json \
              artifacts/plan_2_8_digest_archive/ 2>/dev/null
          fi
          python scripts/plan_2_8_digest_archive.py \
            --digest      "${digest}" \
            --archive-dir artifacts/plan_2_8_digest_archive \
            --keep        26 \
            --emit-latest-two \
            > artifacts/plan_2_8_digest/archive_report.txt
          # Last two lines of the report are the archive paths; diff if >=2.
          paths=$(tail -n 2 artifacts/plan_2_8_digest/archive_report.txt)
          count=$(echo "${paths}" | wc -l | tr -d ' ')
          if [ "${count}" -ge 2 ]; then
            baseline=$(echo "${paths}" | head -n 1)
            current=$( echo "${paths}" | tail -n 1)
            if [ "${baseline}" != "${current}" ]; then
              python scripts/plan_2_8_digest_compare.py \
                --baseline "${baseline}" \
                --current  "${current}" \
                --output   artifacts/plan_2_8_digest/weekly_compare.md \
                > /dev/null
              python scripts/plan_2_8_digest_compare.py \
                --baseline "${baseline}" \
                --current  "${current}" \
                --format   json \
                --output   artifacts/plan_2_8_digest/weekly_compare.json \
                > /dev/null
              if [ -s artifacts/plan_2_8_digest/weekly_compare.md ] \
                  && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                cat artifacts/plan_2_8_digest/weekly_compare.md \
                  >> "${GITHUB_STEP_SUMMARY}"
              fi
            else
              echo "Only one dated archive; skipping compare."
            fi
          else
            echo "Fewer than two dated archives yet; skipping compare."
          fi
          true

      - name: Upload Plan 2.8 digest archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-digest-archive
          path: artifacts/plan_2_8_digest_archive
          if-no-files-found: ignore
          retention-days: 365

      - name: Plan 2.8 compact status runcard
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_digest
          args=""
          for pair in \
            "--status-snapshot:artifacts/plan_2_8_digest/status_snapshot.json" \
            "--runcard-index:artifacts/plan_2_8_digest/runcard_index.json" \
            "--health:artifacts/plan_2_8_digest/health.json" \
          ; do
            flag="${pair%%:*}"
            path="${pair##*:}"
            [ -s "${path}" ] && args="${args} ${flag} ${path}"
          done
          python scripts/plan_2_8_runcard_from_status.py ${args} \
            --output  artifacts/plan_2_8_digest/status_runcard.md \
            --run-url "${RUN_URL}" \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/status_runcard.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/status_runcard.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Upload Plan 2.8 status runcard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-status-runcard
          path: artifacts/plan_2_8_digest/status_runcard.md
          if-no-files-found: ignore
          retention-days: 365

      - name: Plan 2.8 history CSV export (last 365 days)
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ] || [ ! -s "${history}" ]; then
            echo "No history found; skipping CSV export."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_history_export.py \
            --history       "${history}" \
            --lookback-days 365 \
            --output        artifacts/plan_2_8_digest/history.csv \
            --quiet
          true

      - name: Upload Plan 2.8 history CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-history-csv
          path: artifacts/plan_2_8_digest/history.csv
          if-no-files-found: ignore
          retention-days: 365

      - name: Plan 2.8 runbook link check
        if: always()
        shell: bash
        run: |
          set +e
          doc="docs/plan_2_8_rollout_runbook.md"
          if [ ! -s "${doc}" ]; then
            echo "No runbook doc; skipping link check."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_runbook_link_check.py \
            --doc    "${doc}" \
            --output artifacts/plan_2_8_digest/runbook_link_check.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/runbook_link_check.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/runbook_link_check.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 snooze expiry report
        if: always()
        shell: bash
        run: |
          set +e
          cfg="configs/plan_2_8_snoozes.json"
          if [ ! -s "${cfg}" ]; then
            echo "No snooze config; skipping expiry report."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_snooze_expiry_report.py \
            --config      "${cfg}" \
            --within-days 14 \
            --output      artifacts/plan_2_8_digest/snooze_expiry.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/snooze_expiry.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/snooze_expiry.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Upload Plan 2.8 snooze expiry report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-snooze-expiry
          path: artifacts/plan_2_8_digest/snooze_expiry.md
          if-no-files-found: ignore
          retention-days: 365

      - name: Plan 2.8 script manifest
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_manifest.py \
            --format json \
            --output artifacts/plan_2_8_digest/manifest.json \
            > /dev/null
          true

      - name: Upload Plan 2.8 script manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-manifest
          path: artifacts/plan_2_8_digest/manifest.json
          if-no-files-found: ignore
          retention-days: 365

      - name: Download prior Plan 2.8 manifest
        if: always()
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow:       plan-2-8-weekly-digest.yml
          workflow_conclusion: ''
          name:           plan-2-8-manifest
          name_is_regexp: true
          path:           artifacts/plan_2_8_prior_manifest
          if_no_artifact_found: warn

      - name: Plan 2.8 manifest diff
        if: always()
        shell: bash
        run: |
          set +e
          prior="$(find artifacts/plan_2_8_prior_manifest -name manifest.json -print -quit)"
          current="artifacts/plan_2_8_digest/manifest.json"
          if [ -z "${prior}" ] || [ ! -s "${prior}" ] \
              || [ ! -s "${current}" ]; then
            echo "No prior manifest; skipping diff."
            exit 0
          fi
          python scripts/plan_2_8_manifest_diff.py \
            --baseline "${prior}" \
            --current  "${current}" \
            --format   md \
            --output   artifacts/plan_2_8_digest/manifest_diff.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/manifest_diff.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/manifest_diff.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Upload Plan 2.8 manifest diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-manifest-diff
          path: artifacts/plan_2_8_digest/manifest_diff.md
          if-no-files-found: ignore
          retention-days: 365

      - name: Plan 2.8 digest schema check
        if: always()
        shell: bash
        run: |
          set +e
          digest="$(find artifacts/plan_2_8_digest -name digest.json -print -quit)"
          if [ -z "${digest}" ] || [ ! -s "${digest}" ]; then
            echo "No digest.json; skipping schema check."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_digest_schema.py \
            --digest "${digest}" \
            --format md \
            --output artifacts/plan_2_8_digest/digest_schema.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/digest_schema.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/digest_schema.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Upload Plan 2.8 digest schema report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-digest-schema-report
          path: artifacts/plan_2_8_digest/digest_schema.md
          if-no-files-found: ignore
          retention-days: 365

      - name: Plan 2.8 shields.io status badge
        if: always()
        shell: bash
        run: |
          set +e
          snap="artifacts/plan_2_8_digest/status_snapshot.json"
          health="artifacts/plan_2_8_digest/rollout_health.json"
          if [ -s "${snap}" ]; then
            input="${snap}"
          elif [ -s "${health}" ]; then
            input="${health}"
          else
            echo "No snapshot or health JSON; skipping badge."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_runcard_badge.py \
            --input  "${input}" \
            --output artifacts/plan_2_8_digest/status_badge.json \
            > /dev/null
          true

      - name: Upload Plan 2.8 status badge
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-2-8-status-badge
          path: artifacts/plan_2_8_digest/status_badge.json
          if-no-files-found: ignore
          retention-days: 365

      - name: Open drift-alert issue
        if: steps.resolve_alerts.outputs.has_alerts == 'True'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          # Re-render the issue body with the workflow-run URL footer
          # so the link survives even after the artifact is gone.
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          python scripts/plan_2_8_trend_digest.py \
            --history            "${history}" \
            --lookback-days      "${{ inputs.lookback_days || '7' }}" \
            --alert-threshold-pp "${{ inputs.alert_threshold_pp || '0.05' }}" \
            --min-events         "${{ inputs.min_events || '30' }}" \
            --format             issue \
            --run-url            "${RUN_URL}" \
            --output             artifacts/plan_2_8_digest/issue_body.md \
            > /dev/null
          title="Plan 2.8 weekly digest: drift alerts ($(date -u +%Y-%m-%d))"
          # De-dup: if an open drift-alert issue exists, append a
          # comment instead of opening a fresh one. This keeps the
          # backlog readable across consecutive alerting weeks.
          existing="$(gh issue list \
            --label plan-2.8 --label drift-alert \
            --state open --json number --jq '.[0].number' || echo '')"
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" \
              --body-file artifacts/plan_2_8_digest/issue_body.md
          else
            gh issue create \
              --title "${title}" \
              --body-file artifacts/plan_2_8_digest/issue_body.md \
              --label plan-2.8,drift-alert
          fi

      - name: Close drift-alert issues when alerts cleared
        if: steps.resolve_alerts.outputs.has_alerts == 'False'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          # When the weekly digest finds no comparable slice over
          # threshold, close any still-open drift-alert issues with
          # a short note pointing at this run. Idempotent: a no-op
          # when no matching open issue exists.
          numbers="$(gh issue list \
            --label plan-2.8 --label drift-alert \
            --state open --json number --jq '.[].number' || echo '')"
          if [ -z "${numbers}" ]; then
            echo "No open drift-alert issues to close."
            exit 0
          fi
          for n in ${numbers}; do
            gh issue comment "${n}" \
              --body "Plan 2.8 weekly digest now reports no slices over threshold. Closing automatically. Run: ${RUN_URL}"
            gh issue close "${n}" --reason completed
          done

      - name: Plan 2.8 history snapshot diff (last two)
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history found; skipping diff."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_history_diff.py \
            --history "${history}" \
            --output  artifacts/plan_2_8_digest/snapshot_diff.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/snapshot_diff.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/snapshot_diff.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 top movers (30-day window)
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history found; skipping top-movers."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_top_movers.py \
            --history      "${history}" \
            --lookback-days 30 \
            --min-events    "${{ inputs.min_events || '30' }}" \
            --top-n         5 \
            --output        artifacts/plan_2_8_digest/top_movers.md \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/top_movers.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/top_movers.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 slice coverage
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history found; skipping coverage."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_coverage.py \
            --history    "${history}" \
            --min-events "${{ inputs.min_events || '30' }}" \
            --output     artifacts/plan_2_8_digest/coverage.md \
            > /dev/null
          python scripts/plan_2_8_coverage.py \
            --history    "${history}" \
            --min-events "${{ inputs.min_events || '30' }}" \
            --format     json \
            --output     artifacts/plan_2_8_digest/coverage.json \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/coverage.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/coverage.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 slice stability (last 8 snapshots)
        if: always()
        shell: bash
        run: |
          set +e
          history="$(find artifacts/latest_bench -name plan_2_8_history.jsonl -print -quit)"
          if [ -z "${history}" ]; then
            echo "No history found; skipping stability."
            exit 0
          fi
          mkdir -p artifacts/plan_2_8_digest
          python scripts/plan_2_8_history_stability.py \
            --history    "${history}" \
            --window     8 \
            --min-events "${{ inputs.min_events || '30' }}" \
            --output     artifacts/plan_2_8_digest/stability.md \
            > /dev/null
          python scripts/plan_2_8_history_stability.py \
            --history    "${history}" \
            --window     8 \
            --min-events "${{ inputs.min_events || '30' }}" \
            --format     json \
            --output     artifacts/plan_2_8_digest/stability.json \
            > /dev/null
          if [ -s artifacts/plan_2_8_digest/stability.md ] \
              && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/plan_2_8_digest/stability.md \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
          true
