# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: g23-ab-watchdog

# Q3/Q4 plan §G2 (rollback gate, line 414) + §G3 (30-day SPRT stop rule, line 415).
# Daily watchdog: re-runs SPRT over the rolling A/B comparison history and
# publishes the resulting decision under docs/ab/ so reviewers can see the
# current promotion / rollback posture at a glance.
#
# This workflow does NOT execute the comparison benchmark itself; it only
# evaluates whatever history has accumulated. The comparison job (run by
# the existing measurement-benchmark pipeline) feeds entries into the
# history JSONL via `--input ab_comparison.json`. When called without
# --input the watchdog re-evaluates the existing window and refreshes the
# Markdown surface, which is what we want on a daily cadence.

on:
  schedule:
    # 05:30 UTC weekdays — 1 h after the public-calibration-dashboard run
    # so the latest comparison artifact (if any) has already landed.
    - cron: "30 5 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  # Required for `gh pr create` / `gh pr merge --auto` below: when GH_PAT
  # is unset and GH_TOKEN falls back to github.token, the API call needs
  # this scope to open the PR. Without it the PR step would 403.
  pull-requests: write

concurrency:
  group: g23-ab-watchdog
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  watchdog:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Workflow-Audit MITTEL-9 (2026-06): self-append loop guard. The
      # watchdog appends to docs/ab/g23_history.jsonl from the main
      # checkout and lands the change via an auto-merge PR. If a previous
      # watchdog PR is still open (auto-merge stuck on red required
      # checks, etc.), this run's checkout does NOT contain yesterday's
      # entry — appending now would either conflict on merge or silently
      # drop the prior entry. Fail loud instead of building on a stale
      # history; the open PR needs operator attention first.
      - name: Guard against unmerged predecessor watchdog PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          STALE=$(gh pr list --state open --json headRefName \
            --jq '[.[].headRefName | select(startswith("bot/g23-watchdog-"))] | join(", ")')
          if [ -n "${STALE}" ]; then
            echo "::error title=g23-ab-watchdog::previous watchdog PR(s) still open (${STALE}) — this checkout lacks the prior history entry; appending would conflict or silently lose it. Merge/close the stale PR, then re-run."
            exit 1
          fi
          echo "No unmerged predecessor watchdog PR — history baseline is current."

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        # F-06: g23_ab_watchdog transitively imports pandas via smc_core,
        # so the previous pip-only step left the runtime missing pandas.
        # Install the project requirements to match the rest of the
        # scheduled workflows.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run G2/G3 watchdog
        id: watchdog
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          python -m scripts.g23_ab_watchdog \
            --history docs/ab/g23_history.jsonl \
            --status-md docs/ab/g23_status.md
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          # Exit codes 2/3/4 are governance signals, not failures —
          # fold them into success so the workflow can post-process.
          case "$rc" in
            0|2|3|4) exit 0 ;;
            *)       exit "$rc" ;;
          esac

      - name: Upload watchdog artifact
        # F-V4-D2 (2026-05-01): always() — watchdog history (g23_history.jsonl)
        # must be preserved even when an unexpected exit code surfaces, so we
        # can debug what the watcher saw before failing.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: g23-ab-watchdog
          path: |
            docs/ab/g23_history.jsonl
            docs/ab/g23_status.md
          if-no-files-found: warn

      - name: Commit refreshed status via PR
        # F-V5-F1 / F-V3-11..15 (2026-05-01): the repo's `main-governance`
        # ruleset blocks bare pushes to main (GH013). Push to a fresh
        # `bot/*` branch (allowed) and open an auto-merge PR so changes
        # actually land. GH_PAT is required (not GITHUB_TOKEN) so the PR
        # triggers the required fast-gates check; falls back to the default
        # token in forks/dry-runs where GH_PAT is empty.
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ab/g23_status.md docs/ab/g23_history.jsonl || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BRANCH="bot/g23-watchdog-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git commit -m "chore(docs): g23 watchdog status ${GITHUB_RUN_ID}"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --label automated \
            --title "chore(docs): g23 watchdog status ${GITHUB_RUN_ID}" \
            --body "Automated §G2/§G3 A/B watchdog status update from run ${GITHUB_RUN_ID}." 2>pr_err.log \
            || { rc=$?; if grep -qi 'already exists' pr_err.log; then echo "PR already exists for ${BRANCH}"; else cat pr_err.log; exit $rc; fi; }
          gh pr merge "$BRANCH" --auto --squash --delete-branch 2>merge_err.log \
            || { rc=$?; if grep -qiE 'already (merged|closed)|cannot be merged' merge_err.log; then echo "auto-merge already armed or completed for ${BRANCH}"; else cat merge_err.log; exit $rc; fi; }

      - name: Open issue on §G2 rollback signal
        if: steps.watchdog.outputs.exit_code == '2'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const status = fs.existsSync('docs/ab/g23_status.md')
              ? fs.readFileSync('docs/ab/g23_status.md', 'utf8')
              : '(status file missing)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '§G2 rollback signal — A/B treatment underperforming',
              body: `Plan §G2 rollback gate fired (consecutive-loss streak met).\n\n${status}`,
              labels: ['governance', 'g2-rollback'],
            });

      - name: Open issue on §G3 promotion-ready signal
        if: steps.watchdog.outputs.exit_code == '3'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const status = fs.existsSync('docs/ab/g23_status.md')
              ? fs.readFileSync('docs/ab/g23_status.md', 'utf8')
              : '(status file missing)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '§G3 promotion-ready — SPRT accept_h1',
              body: `Plan §G3 stop rule reached \`accept_h1\`. Treatment arm ready for promotion review.\n\n${status}`,
              labels: ['governance', 'g3-promotion'],
            });

      - name: Open issue on §G3 futility signal
        if: steps.watchdog.outputs.exit_code == '4'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const status = fs.existsSync('docs/ab/g23_status.md')
              ? fs.readFileSync('docs/ab/g23_status.md', 'utf8')
              : '(status file missing)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '§G3 futility — SPRT accept_h0',
              body: `Plan §G3 stop rule reached \`accept_h0\`. Treatment arm should be retired.\n\n${status}`,
              labels: ['governance', 'g3-futility'],
            });
