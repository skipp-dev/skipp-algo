name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate Pine scripts
        run: |
          test -f SMC_Core_Engine.pine
          grep -q "^//@version=6" SMC_Core_Engine.pine
          test -f SMC_Long_Strategy.pine
          grep -q "^//@version=6" SMC_Long_Strategy.pine
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Run Python tests
        run: |
          python -m pytest -q --maxfail=1 --cov --cov-report=term-missing:skip-covered
      - name: E2E structural smoke test
        run: python scripts/e2e_smoke_ci.py
      - name: Layer violation guard (F-08)
        run: python scripts/check_layer_violations.py
