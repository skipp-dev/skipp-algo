# live-window: any-trigger  # F-V6-F2.1 (2026-05-02)
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    # F-V8-C5-A (2026-05-07): doc-only PRs do not exercise the validate
    # job's heavy gate; skip CI to save runner minutes. ci.yml is NOT a
    # required status check on main (only `fast-gates` is — see
    # smc-fast-pr-gates.yml), so paths-ignore here cannot block a merge.
    # `push:` above is intentionally NOT path-filtered — pushes to any
    # branch always run CI for audit-trail integrity.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    steps:
      # Bot data-only PRs (e.g. `bot/run-open-prep-*`, `bot/outcome-backfill-*`)
      # only touch `artifacts/open_prep/**` JSON artifacts and never change code,
      # so the full pytest suite (~40 min) adds no signal. We keep the job so
      # the required `validate` status check still reports, but short-circuit
      # all real steps below — the job reports success in seconds.
      - name: Determine if heavy validation should run
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.head_ref }}" == bot/* ]]; then
            echo "Bot data-only PR detected (head=${{ github.head_ref }}); skipping heavy validation."
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.gate.outputs.run_heavy == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate Pine scripts
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          test -f SMC_Core_Engine.pine
          grep -q "^//@version=6" SMC_Core_Engine.pine
          test -f SMC_Long_Strategy.pine
          grep -q "^//@version=6" SMC_Long_Strategy.pine
      - name: Set up Python
        if: steps.gate.outputs.run_heavy == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          # F-V8-C5-C (2026-05-07): pip wheel cache. Belt-and-braces alongside
          # the uv cache below — `pip` itself is still invoked transitively
          # by some test-time installs and by setup-python's own bootstrap.
          # Mirrors the F-V8-C5-B pattern from the cron-batch (PR #2075).
          cache: "pip"
          cache-dependency-path: "**/requirements*.txt"
      - name: Install uv
        if: steps.gate.outputs.run_heavy == 'true'
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt
      - name: Install test dependencies
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          # Use PATH Python (tool-cache) explicitly — uv --system alone picks
          # the py.exe-registered system Python which is in Program Files and
          # not writable without admin on the self-hosted Windows runner.
          PY=$(python -c 'import sys; print(sys.executable)')
          uv pip install --system --python "$PY" -r requirements.txt pytest
      # Coverage adds ~25-35% test wall-time. Keep it on `main` pushes (where
      # the report has value) and skip on PRs to shorten the feedback loop.
      - name: Run Python tests (PR — no coverage)
        if: steps.gate.outputs.run_heavy == 'true' && github.event_name == 'pull_request'
        run: |
          python -m pytest -q --maxfail=1 -n auto --dist=worksteal
      - name: Run Python tests (push — with coverage)
        if: steps.gate.outputs.run_heavy == 'true' && github.event_name != 'pull_request'
        run: |
          python -m pytest -q --maxfail=1 -n auto --dist=worksteal --cov --cov-report=term-missing:skip-covered

