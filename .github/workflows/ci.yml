# live-window: any-trigger  # F-V6-F2.1 (2026-05-02)
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    # F-V8-C5-A (2026-05-07): doc-only PRs do not exercise the validate
    # job's heavy gate; skip CI to save runner minutes. ci.yml is NOT a
    # required status check on main (only `fast-gates` is — see
    # smc-fast-pr-gates.yml), so paths-ignore here cannot block a merge.
    # `push:` above is intentionally NOT path-filtered — pushes to any
    # branch always run CI for audit-trail integrity.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          # Heavy validate runs are the best fit for the Windows self-hosted
          # pool, so CI bypasses the repo-wide generic-hosted-only label.
          # Operators can still pin a dedicated CI label; otherwise we reuse
          # the priority-cron runner before falling back to any idle
          # Windows/x64 self-hosted runner.
          # F-V8-C5-B (2026-05-17): heavy `validate` belongs on the Windows
          # self-hosted pool. If no runner is currently idle, queue the job
          # against the required labels instead of falling through to a
          # github-hosted ubuntu runner (which historically masked the
          # self-hosted pool's availability during brief restart/race
          # windows). Inventory-unavailable ALSO routes to required
          # self-hosted because the default `github.token` lacks
          # admin-scope to read /actions/runners, which would otherwise
          # 403 on every PR and silently fall back to hosted. Trade-off:
          # an extended GitHub API outage queues `validate` against the
          # self-hosted labels until a runner is free or `timeout-minutes`
          # cancels the job. Acceptable because the alternative is
          # silently consuming hosted minutes on every CI run.
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_CI_SELF_HOSTED_LABEL || vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || '' }}" \
            --inventory-unavailable-fallback required-self-hosted \
            --no-idle-fallback required-self-hosted

  validate:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 45
    steps:
      # Bot data-only PRs (e.g. `bot/run-open-prep-*`, `bot/outcome-backfill-*`)
      # only touch `artifacts/open_prep/**` JSON artifacts and never change code,
      # so the full pytest suite (~40 min) adds no signal. We keep the job so
      # the required `validate` status check still reports, but short-circuit
      # all real steps below — the job reports success in seconds.
      - name: Determine if heavy validation should run
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.head_ref }}" == bot/* ]]; then
            echo "Bot data-only PR detected (head=${{ github.head_ref }}); skipping heavy validation."
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.gate.outputs.run_heavy == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Announce selected runner
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"
      - name: Validate Pine scripts
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          test -f SMC_Core_Engine.pine
          grep -q "^//@version=6" SMC_Core_Engine.pine
          test -f SMC_Long_Strategy.pine
          grep -q "^//@version=6" SMC_Long_Strategy.pine
      - name: Set up pinned Python (GitHub-hosted)
        if: steps.gate.outputs.run_heavy == 'true' && needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install uv
        if: steps.gate.outputs.run_heavy == 'true'
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          # GHA cache backend returns HTTP 400 on the Windows self-hosted
          # runner ("Failed to restore: Cache service responded with 400").
          # uv falls back to its local on-disk cache (UV_CACHE_DIR) which the
          # self-hosted runner has anyway; opting out of the GHA cache layer
          # there silences the noise without losing local cache reuse.
          enable-cache: ${{ needs.select-runner.outputs.runner_environment == 'github-hosted' && 'true' || 'false' }}
          cache-dependency-glob: |
            requirements*.txt
      - name: Resolve Python 3.12 interpreter
        if: steps.gate.outputs.run_heavy == 'true'
        id: resolve_py
        shell: bash
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            echo "found=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Self-hosted: probe a wide set of well-known interpreters
          # (including the `py` launcher) before delegating to the
          # setup-python install fallback below. Each candidate is verified
          # to be Python 3.12 before being accepted.
          probe_312() {
            "$1" -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)" >/dev/null 2>&1
          }
          for cand in python python3 python3.12 "/c/Python312/python.exe" "$LOCALAPPDATA/Programs/Python/Python312/python.exe" "$ProgramFiles/Python312/python.exe"; do
            if [[ -n "$cand" ]] && command -v "$cand" >/dev/null 2>&1 && probe_312 "$cand"; then
              echo "SMC_PYTHON_BIN=$cand" >> "$GITHUB_ENV"
              echo "found=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)" 2>/dev/null || true)"
            if [[ -n "$python_bin" ]]; then
              echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
              echo "found=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "::notice::No pre-installed Python 3.12 on self-hosted runner — falling back to actions/setup-python install."
          echo "found=false" >> "$GITHUB_OUTPUT"
      - name: Install Python 3.12 (self-hosted fallback)
        if: steps.gate.outputs.run_heavy == 'true' && needs.select-runner.outputs.runner_environment != 'github-hosted' && steps.resolve_py.outputs.found != 'true'
        uses: ./.github/actions/setup-python-pinned
      - name: Confirm Python 3.12 after install
        if: steps.gate.outputs.run_heavy == 'true' && needs.select-runner.outputs.runner_environment != 'github-hosted' && steps.resolve_py.outputs.found != 'true'
        shell: bash
        run: |
          python -c "import sys; raise SystemExit('Fallback install did not yield Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
          echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
      - name: Install test dependencies
        if: steps.gate.outputs.run_heavy == 'true'
        uses: ./.github/actions/setup-persistent-venv
        with:
          python-bin: ${{ env.SMC_PYTHON_BIN }}
          requirements-file: requirements.txt
          extra-packages: pytest
          # When SMC_PERSISTENT_VENV_ROOT is unset, the composite falls back
          # to the historical behavior (fresh venv under $GITHUB_WORKSPACE/.venv),
          # so this is a no-op until an operator opts in by setting the var
          # on the self-hosted runner host (e.g. 'C:\runner-venvs\skipp-algo').
          persistent-root: ${{ vars.SMC_PERSISTENT_VENV_ROOT }}
          runner-environment: ${{ needs.select-runner.outputs.runner_environment }}
      # Coverage adds ~25-35% test wall-time. Keep it on `main` pushes (where
      # the report has value) and use the faster no-coverage suite on PRs and
      # non-main branch pushes to shorten feedback loops while preserving the
      # audit-trail CI run.
      #
      # Optional: when vars.SMC_TESTMON_PR_LANE == 'true', PR / non-main pushes
      # run only the tests that pytest-testmon thinks are affected by the
      # diff. This skips xdist (testmon needs to see every test for selection).
      # Stale-DB risk is bounded by the unconditional full-suite run on every
      # `main` push below. The .testmondata file is restored from / saved to
      # the actions/cache keyed on the base ref.
      - name: Restore testmon database
        if: steps.gate.outputs.run_heavy == 'true' && (github.event_name == 'pull_request' || github.ref != 'refs/heads/main') && vars.SMC_TESTMON_PR_LANE == 'true'
        uses: actions/cache@v4
        with:
          path: .testmondata
          key: testmondata-${{ runner.os }}-${{ github.base_ref || github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            testmondata-${{ runner.os }}-${{ github.base_ref || github.ref_name }}-
            testmondata-${{ runner.os }}-main-
      - name: Run Python tests (PR / non-main push — testmon fast lane)
        if: steps.gate.outputs.run_heavy == 'true' && (github.event_name == 'pull_request' || github.ref != 'refs/heads/main') && vars.SMC_TESTMON_PR_LANE == 'true'
        run: |
          python -m pytest -q --maxfail=1 --testmon
      - name: Run Python tests (PR / non-main push — no coverage)
        if: steps.gate.outputs.run_heavy == 'true' && (github.event_name == 'pull_request' || github.ref != 'refs/heads/main') && vars.SMC_TESTMON_PR_LANE != 'true'
        run: |
          python -m pytest -q --maxfail=1 -n auto --dist=worksteal
      - name: Run Python tests (main push — with coverage)
        if: steps.gate.outputs.run_heavy == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python -m pytest -q --maxfail=1 -n auto --dist=worksteal --cov --cov-report=term-missing:skip-covered

