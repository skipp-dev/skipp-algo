# live-window: release-driven  # F-V6-F2.1 (2026-05-02)
name: smc-release-gates

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

# SC-05 (supply-chain audit 2026-06-14): explicit default-deny floor; jobs
# declare their own elevated scopes (contents:read, attestations:write, etc.).
permissions: {}

# SC-06 (supply-chain audit 2026-06-14): serialise release runs so concurrent
# dispatch/release triggers cannot interleave gate results.
concurrency:
  group: smc-release-gates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          SMC_FORCE_GH_HOSTED: ${{ vars.SMC_FORCE_GH_HOSTED }}
        run: |
          # Release gates combine broad test coverage with Playwright-based
          # validation, so prefer the heavy self-hosted pool when available.
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_CI_SELF_HOSTED_LABEL || vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || '' }}"

  release-gates:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          "$SMC_PYTHON_BIN" -m pip install --upgrade pip
          "$SMC_PYTHON_BIN" -m pip install -r requirements.txt pytest

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Refresh release reference artifacts
        run: |
          "$SMC_PYTHON_BIN" scripts/run_smc_pre_release_artifact_refresh.py \
            --output artifacts/ci/smc_pre_release_artifact_refresh_report.json

      - name: Verify refreshed release reference manifests are unchanged
        run: |
          mkdir -p artifacts/ci
          shopt -s nullglob
          manifests=(reports/smc_structure_artifacts/manifest_*.json)
          : > artifacts/ci/smc_release_reference_manifest.diff
          if [ ${#manifests[@]} -gt 0 ]; then
            git --no-pager diff -- "${manifests[@]}" > artifacts/ci/smc_release_reference_manifest.diff || true
          fi
          if [ -s artifacts/ci/smc_release_reference_manifest.diff ]; then
            echo "::error::Release reference manifest drift detected after refresh. Commit refreshed manifests before publishing."
            exit 1
          fi

      - name: Run strict release gates
        run: |
          "$SMC_PYTHON_BIN" scripts/run_smc_release_gates.py \
            --ci-mode \
            --output artifacts/ci/smc_release_gates_report.json

      - name: Classify release gate results (F-09)
        if: always()
        run: |
          "$SMC_PYTHON_BIN" - <<'PY'
          import json, sys
          from pathlib import Path
          report_path = Path("artifacts/ci/smc_release_gates_report.json")
          if not report_path.exists():
              print("::warning::Release gates report not found, skipping classification.")
              sys.exit(0)
          report = json.loads(report_path.read_text())
          ci_pass = report.get("ci_structural_pass", False)
          op_pass = report.get("operational_release_pass", False)
          soft = report.get("soft_gates_for_review", [])
          print(f"ci_structural_pass:       {ci_pass}")
          print(f"operational_release_pass: {op_pass}")
          if soft:
              print(f"soft_gates_for_review:    {len(soft)} gate(s) need follow-up")
              for sg in soft:
                  print(f"  - {sg['name']}: {sg.get('review_reason', 'unknown')}")
          if not ci_pass:
              print("::error::CI structural gates did not pass.")
              sys.exit(1)
          PY

      - name: Run release validation test matrix
        run: |
          shopt -s nullglob
          tests=(
            tests/test_pine_consumer_contract.py
            tests/test_pine_consumer_setup.py
            tests/test_pine_input_surface.py
            tests/test_smc_integration_*.py
            tests/test_explicit_structure_*.py
            tests/test_smc_core_*.py
            tests/test_smc_adapters_*.py
            tests/test_measurement_*.py
            tests/test_smc_long_dip_regressions.py
            tests/test_smc_legacy_governance.py
            tests/test_smc_vol_regime.py
            tests/test_smc_bias_merge.py
            tests/test_smc_benchmark.py
            tests/test_smc_scoring.py
          )
          if [ ${#tests[@]} -eq 0 ]; then
            # F-V4-A4 (2026-05-01): emit ::error:: annotation for empty-glob.
            echo "::error::No release-gate tests matched the configured patterns."
            exit 1
          fi
          "$SMC_PYTHON_BIN" -m pytest -q --maxfail=1 "${tests[@]}"

      - name: Write TradingView storage state
        env:
          TV_STORAGE_STATE_SECRET: ${{ secrets.TV_STORAGE_STATE }}
        run: |
          mkdir -p automation/tradingview/auth
          "$SMC_PYTHON_BIN" - <<'PY'
          import base64
          import gzip
          import json
          import os
          from pathlib import Path

          raw = os.environ['TV_STORAGE_STATE_SECRET']
          trimmed = raw.strip()
          if not trimmed:
            raise SystemExit('TV_STORAGE_STATE secret is empty')

          if trimmed.startswith('{'):
            payload = trimmed
          else:
            try:
              payload = gzip.decompress(base64.b64decode(trimmed)).decode('utf-8')
            except Exception as exc:
              raise SystemExit(f'TV_STORAGE_STATE is neither raw JSON nor gzip+base64: {exc}')

          try:
            json.loads(payload)
          except json.JSONDecodeError as exc:
            raise SystemExit(f'Invalid TV_STORAGE_STATE JSON payload: {exc}')

          output_path = Path('automation/tradingview/auth/storage-state.json')
          output_path.write_text(payload if payload.endswith('\n') else payload + '\n', encoding='utf-8')
          PY

      - name: Validate TradingView storage state JSON
        run: |
          "$SMC_PYTHON_BIN" - <<'PY'
          import json
          from pathlib import Path

          path = Path("automation/tradingview/auth/storage-state.json")
          try:
              json.loads(path.read_text(encoding="utf-8"))
          except json.JSONDecodeError as exc:
              raise SystemExit(f"Invalid TV_STORAGE_STATE JSON in {path}: {exc}")
          PY

      - name: Run TradingView post-release validation
        id: tv_validation
        # CONTINUE-ON-ERROR-INTENTIONAL: TV automation is flaky external integration;
        # outcome is consumed downstream via steps.tv_validation.outcome rather
        # than aborting the release-gates job.
        continue-on-error: true
        env:
          TV_HEADLESS: "1"
          TV_STORAGE_STATE: automation/tradingview/auth/storage-state.json
          TV_STORAGE_STATE_MAX_AGE_HOURS: "72"
        run: |
          npx tsx scripts/tv_preflight.ts \
            --config automation/tradingview/preflight-smc-mainline.json \
            --execution-mode readonly \
            --out artifacts/tradingview/tv_post_release_validation.json
          "$SMC_PYTHON_BIN" scripts/verify_tradingview_post_release.py \
            --release-manifest artifacts/tradingview/library_release_manifest.json \
            --validation-report artifacts/tradingview/tv_post_release_validation.json \
            --output artifacts/ci/smc_tradingview_post_release_report.json

      - name: "⚠️ Warn: Run TradingView post-release validation"
        if: always() && steps.tv_validation.outcome == 'failure'
        run: |
          echo "::warning::Step 'Run TradingView post-release validation' failed silently (soft-fail step)"

      - name: Classify TV validation failure (WP-R14)
        if: always() && steps.tv_validation.outcome == 'failure'
        run: |
          "$SMC_PYTHON_BIN" - <<'PY'
          import json, sys
          from pathlib import Path
          # Import the classifier from the release-gates script.
          sys.path.insert(0, ".")
          from scripts.run_smc_release_gates import classify_tv_gate_failure

          report_path = Path("artifacts/ci/smc_tradingview_post_release_report.json")
          if not report_path.exists():
              # tv_preflight.ts crashed before producing a report — external drift.
              print("::warning::TV validation failed without producing a report (likely external drift).")
              sys.exit(0)

          payload = json.loads(report_path.read_text(encoding="utf-8"))
          gate = {
              "name": "post_release_validation",
              "status": "fail",
              "details": {
                  "overall_status": str(payload.get("overall_status", "unknown")),
                  "failures": payload.get("failures", []),
              },
          }
          tv_class = classify_tv_gate_failure(gate)
          print(f"tv_failure_class: {tv_class}")

          if tv_class == "external_tv_drift":
              print("::warning::TV validation failed due to external UI/auth drift — advisory only, not blocking.")
              sys.exit(0)
          elif tv_class == "code_or_data":
              print("::error::TV validation failed due to code or data problem — blocking.")
              sys.exit(1)
          elif tv_class == "mixed":
              print("::error::TV validation has mixed drift + code/data failures — blocking.")
              sys.exit(1)
          else:
              print("::warning::TV validation failed with unrecognized codes — advisory only.")
              sys.exit(0)
          PY

      - name: Build release gate evidence summary
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/collect_smc_gate_evidence.py \
            --input-glob "artifacts/ci/smc_*_report.json" \
            --output artifacts/ci/smc_release_evidence_summary.json

      - name: Render release gate summary
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/render_ci_gate_summary.py \
            --report artifacts/ci/smc_release_gates_report.json \
            --enforcement hard

      - name: Upload release gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-release-gates-report
          path: |
            artifacts/ci/measurement/
            artifacts/ci/smc_pre_release_artifact_refresh_report.json
            artifacts/ci/smc_release_reference_manifest.diff
            artifacts/ci/smc_release_gates_report.json
            artifacts/ci/smc_release_evidence_summary.json
            artifacts/ci/smc_tradingview_post_release_report.json
            artifacts/tradingview/tv_post_release_validation.json

      - name: Attest release gate report (WP-R20)
        if: always() && hashFiles('artifacts/ci/smc_release_gates_report.json') != ''
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: artifacts/ci/smc_release_gates_report.json
