name: smc-release-gates

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Refresh release reference artifacts
        run: |
          python scripts/run_smc_pre_release_artifact_refresh.py \
            --output artifacts/ci/smc_pre_release_artifact_refresh_report.json

      - name: Run strict release gates
        run: |
          python scripts/run_smc_release_gates.py \
            --output artifacts/ci/smc_release_gates_report.json

      - name: Run release validation test matrix
        run: |
          shopt -s nullglob
          tests=(
            tests/test_pine_consumer_contract.py
            tests/test_pine_consumer_setup.py
            tests/test_pine_input_surface.py
            tests/test_smc_integration_*.py
            tests/test_explicit_structure_*.py
            tests/test_smc_core_*.py
            tests/test_smc_adapters_*.py
            tests/test_measurement_*.py
            tests/test_release_policy.py
            tests/test_smc_long_dip_regressions.py
            tests/test_smc_legacy_governance.py
            tests/test_smc_vol_regime.py
            tests/test_smc_bias_merge.py
            tests/test_smc_benchmark.py
            tests/test_smc_scoring.py
          )
          if [ ${#tests[@]} -eq 0 ]; then
            echo "No release-gate tests matched the configured patterns." >&2
            exit 1
          fi
          python -m pytest -q --maxfail=1 "${tests[@]}"

      - name: Build release gate evidence summary
        if: always()
        run: |
          python scripts/collect_smc_gate_evidence.py \
            --input-glob "artifacts/ci/smc_*_report.json" \
            --output artifacts/ci/smc_release_evidence_summary.json

      - name: Upload release gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smc-release-gates-report
          path: |
            artifacts/ci/measurement/
            artifacts/ci/smc_pre_release_artifact_refresh_report.json
            artifacts/ci/smc_release_gates_report.json
            artifacts/ci/smc_release_evidence_summary.json
