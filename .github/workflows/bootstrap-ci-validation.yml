name: bootstrap-ci-validation

# Sprint C3 / T5 — weekly Monte-Carlo validation of
# scripts/performance_inference.py. Runs:
#   - Sharpe coverage (95%-CI must cover the true Sharpe in ≥85% of MC reps)
#   - determinism, edge cases, property checks
#
# Plan: docs/SPRINT_PLAN_C3_BOOTSTRAP_CI_2026-04-26.md §T5

on:
  schedule:
    - cron: "0 7 * * 1"  # Monday 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: bootstrap-ci-validation
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy

      - name: Run C3 bootstrap-CI validation
        run: python -m scripts.c3_bootstrap_validation

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c3-bootstrap-validation
          path: artifacts/c3_bootstrap_validation.json
          if-no-files-found: warn
