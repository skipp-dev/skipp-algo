# live-window: manual-only  # F-V6-F2.1 (2026-05-02)
name: phase-b-promotion-readiness

# Deep-Review 2026-04-27 follow-up: gate Phase-B promotion on the
# live-drift artifact carrying ``slippage_ks_reference_type ==
# "backtest_samples"``. Until a backtest slippage sample exists,
# ``compute_live_drift`` falls back to ``synthetic_normal``; promoting
# to Phase-B in that state was previously possible because no CI gate
# verified it. This workflow closes that gap.

on:
  workflow_dispatch:
    inputs:
      drift_glob:
        description: "Glob of drift artifact JSON files to check"
        default: "artifacts/drift/drift_report_*.json"
        required: false
  workflow_call:
    inputs:
      drift_glob:
        type: string
        default: "artifacts/drift/drift_report_*.json"
        required: false

permissions:
  contents: read
  # actions:read — needed by `gh run download` to fetch the
  # compute_live_drift artifact from the latest c13-daily-cron run.
  actions: read

env:
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

jobs:
  check-readiness:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      # Fix 2026-06-11: drift artifacts carrying the gate field
      # ``slippage_ks_reference_type`` are produced by compute_live_drift in
      # c13-daily-cron.yml (Step 4) and uploaded inside the per-day
      # ``c13-daily-<DATE>`` RUN ARTIFACT (cache/live/drift_<DATE>.json) —
      # they are never committed to the repo. The original glob against the
      # fresh checkout could only ever exit 64 (no files matched), which is
      # why this workflow had zero meaningful runs since creation. (The
      # drift-watchdog ``drift-report`` artifact is a DIFFERENT report shape
      # that never carries the field — do not point the gate at it.)
      - name: Fetch latest compute_live_drift artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/drift
          # If the caller supplied a custom glob that already matches files in
          # the checkout (e.g. workflow_call from a job that generated reports
          # in-place), skip the download.
          shopt -s nullglob
          existing=( ${{ inputs.drift_glob || 'artifacts/drift/drift_report_*.json' }} )
          shopt -u nullglob
          if [ "${#existing[@]}" -gt 0 ]; then
            echo "::notice title=drift-source::${#existing[@]} drift report(s) already present in checkout — skipping artifact download"
            exit 0
          fi
          # Step 4 is conditional (soft-skips when walk-forward inputs are
          # missing, e.g. weekends), so scan the most recent successful runs
          # for the newest artifact that actually contains a drift JSON.
          found=""
          for rid in $(gh run list \
              --workflow=c13-daily-cron.yml \
              --status=success \
              --limit=10 \
              --json databaseId \
              --jq '.[].databaseId'); do
            tmpdir=$(mktemp -d)
            if gh run download "${rid}" --pattern 'c13-daily-*' --dir "${tmpdir}" 2>/dev/null; then
              drift=$(find "${tmpdir}" -type f -name "drift_*.json" -print -quit || true)
              if [ -n "${drift}" ]; then
                base=$(basename "${drift}")
                # drift_<DATE>.json -> drift_report_<DATE>.json so the
                # contract-pinned default glob matches.
                cp "${drift}" "artifacts/drift/drift_report_${base#drift_}"
                echo "::notice title=drift-source::Using ${base} from c13-daily-cron run ${rid}"
                found="yes"
              fi
            fi
            rm -rf "${tmpdir}"
            [ -n "${found}" ] && break
          done
          if [ -z "${found}" ]; then
            echo "::error title=drift-source::No compute_live_drift artifact in the last 10 successful c13-daily-cron runs (Step 4 soft-skipped — walk-forward inputs missing). Phase-B NOT ready."
            exit 2
          fi

      - name: Run Phase-B readiness gate
        run: |
          python -m scripts.check_phase_b_drift_readiness \
            "${{ inputs.drift_glob || 'artifacts/drift/drift_report_*.json' }}"
