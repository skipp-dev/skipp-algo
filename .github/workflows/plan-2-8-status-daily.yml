# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: plan-2.8 status daily

# Daily heartbeat for the Plan 2.8 rollout. Walks the Phase 0-3
# anchor list (see scripts/plan_2_8_status.py) and fails the workflow
# only when a *required* anchor goes missing. Markdown report is
# streamed into the run summary.

on:
  schedule:
    - cron: "15 6 * * *"   # 06:15 UTC daily; no data handoff to the rolling-bench job (workflow_run-driven, Mon-Fri) — pure anchor sweep over the checkout
  workflow_dispatch:

permissions:
  contents: read

# F-V5-C2 (2026-05-01): cron-triggered heartbeat — queue overlapping runs so a
# manual dispatch cannot cancel the daily anchor sweep mid-flight.
concurrency:
  group: plan-2-8-status-daily
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
defaults:
  run:
    shell: bash

jobs:
  status:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Run plan-2.8 status report
        id: report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/plan_2_8_status
          python scripts/plan_2_8_status.py \
            --format md \
            --output artifacts/plan_2_8_status/report.md \
            | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload status report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plan-2-8-status-report
          path: artifacts/plan_2_8_status/report.md
          if-no-files-found: warn
          retention-days: 30
