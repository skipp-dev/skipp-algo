# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: public-calibration-dashboard

# Q3/Q4 plan §3.1.1: emit `calibration_report_public.json` daily and
# commit it under `docs/calibration/` so the GitHub-Pages dashboard
# (docs/calibration/index.html) always serves the latest evidence.

on:
  schedule:
    # 04:30 UTC weekdays — runs after the rolling benchmark settles.
    - cron: "30 4 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  # Required for `gh pr create` / `gh pr merge --auto` below: when GH_PAT
  # is unset and GH_TOKEN falls back to github.token, the API call needs
  # this scope to open the PR. Without it the PR step would 403.
  pull-requests: write

concurrency:
  group: public-calibration-dashboard
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  emit-public-report:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        # F-03: emit_public_calibration_report transitively imports pandas
        # via smc_core, so the previous "stdlib-only" assumption broke after
        # the dataframe-based aggregator landed. Install the project
        # requirements to match the rest of the scheduled workflows.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Emit public calibration report
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python -m scripts.emit_public_calibration_report

      - name: Upload public report artifact
        # F-V4-D2 (2026-05-01): default `if: success()` is intentional — this
        # is a published report. Uploading a half-baked report on failure
        # would corrupt the public-history JSONL. Audited by
        # tests/test_workflow_upload_artifact_unguarded_inventory.py.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: calibration-report-public
          path: |
            docs/calibration/calibration_report_public.json
            docs/calibration/calibration_report_public_history.jsonl
          if-no-files-found: warn

      - name: Commit refreshed public report via PR
        # F-V5-F1 / F-V3-11..15 (2026-05-01): the repo's `main-governance`
        # ruleset blocks bare pushes to main (GH013). Push to a fresh
        # `bot/*` branch (allowed) and open an auto-merge PR so changes
        # actually land. GH_PAT is required (not GITHUB_TOKEN) so the PR
        # triggers the required fast-gates check; falls back to the default
        # token in forks/dry-runs where GH_PAT is empty.
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/calibration/calibration_report_public.json \
                  docs/calibration/calibration_report_public_history.jsonl || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BRANCH="bot/calibration-public-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "chore(docs): public calibration report ${GITHUB_RUN_ID}"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --label automated \
            --title "chore(docs): public calibration report ${GITHUB_RUN_ID}" \
            --body "Automated public calibration dashboard refresh from run ${GITHUB_RUN_ID}." 2>pr_err.log \
            || { rc=$?; if grep -qi 'already exists' pr_err.log; then echo "PR already exists for ${BRANCH}"; else cat pr_err.log; exit $rc; fi; }
          gh pr merge "$BRANCH" --auto --squash --delete-branch 2>merge_err.log \
            || { rc=$?; if grep -qiE 'already (merged|closed)|cannot be merged' merge_err.log; then echo "auto-merge already armed or completed for ${BRANCH}"; else cat merge_err.log; exit $rc; fi; }
