# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: smc-measurement-benchmark-rolling

# E3 — Rolling Benchmark (Q3/Q4 plan §2.2 E3).
#
# Runs the measurement-benchmark harness daily against the same 20-symbol
# universe as the weekly full-corpus job, but writes its artifacts under
# a dated sub-directory and keeps only the most recent 30 days on the
# upload-artifact path. This gives us:
#
#   * a 30-day rolling window for drift detection alongside the
#     weekly lifetime snapshot (from smc-measurement-benchmark.yml), and
#   * a daily cadence that the Phase F / Phase G auto-tuner can consume
#     without waiting a full calendar week.
#
# Nothing in this workflow mutates the checked-in lifetime corpus or
# production calibration — it is purely observational.

on:
  # Workflow-Audit HOCH-1 (2026-06): cron offset is NOT an ordering
  # guarantee. The producer smc-databento-production-export-sharded
  # (12:00/16:00 UTC Mon-Fri) has a 240-min budget, so the previous
  # fixed 13:00 tick raced the still-running 12:00 export and failed
  # ~8/10 schedule runs on "Producer artifact missing for <date>".
  # Mirror of the proven F-V4-J3 pattern in smc-library-refresh.yml:
  # workflow_run (fires after producer success, gated by the job-level
  # `if:` below) is the primary path; the cron below is only a safety
  # net for lost/delayed workflow_run events.
  # NOTE: the producer runs 2x/day (12:00 + 16:00 UTC), so this consumer
  # can now fire up to 2x/day plus the safety-net cron. That is safe and
  # intentional: the history archive dedupes on (captured_at,
  # scoring_root) (scripts/plan_2_8_history_archive.py), re-benching the
  # same artifact is idempotent, and the concurrency group serialises
  # overlapping fires — same rationale as the library-refresh precedent.
  workflow_run:
    workflows: ["smc-databento-production-export-sharded"]
    types: [completed]
    branches: [main]
  schedule:
    # Safety-net tick: 16:30 UTC Mon-Fri = producer 12:00 tick + full
    # 240-min budget + 30 min headroom, so the day's artifact MUST be
    # uploaded (or the producer has failed) by the time this fires.
    # Offset from library-refresh's 16:00 safety-net cron to avoid
    # competing for the same priority self-hosted runner slot.
    # Restricted to Mon-Fri to match the producer's cadence (no producer
    # runs on weekends → no fresh artifact to consume).
    - cron: "30 16 * * 1-5"
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols (default: full 20-sym universe)"
        required: false
        default: ""
      timeframes:
        # Timeframe expansion (2026-06-19): full canonical benchmark set.
        description: "Comma-separated timeframes (default: 5m,10m,15m,30m,1H,4H,1D)"
        required: false
        default: "5m,10m,15m,30m,1H,4H,1D"

permissions:
  # WF-AUTH-1 (2026-06-26): the rolling benchmark must both (a) read cross-
  # workflow artifacts from the canonical producer via the GitHub Actions REST
  # API and (b) force-update the bot/live-experiment-snapshot branch so the
  # Grafana experiment daemon sees fresh rollups. `contents: write` is required
  # for the push; `actions: read` is required for artifact listing/download.
  # Keep workflow-level default as read-only and elevate write only on the
  # mutating job below (least-privilege layout).
  contents: read
  actions: read

concurrency:
  group: smc-measurement-benchmark-rolling
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
      # WF-AUTH-1: runner inventory query uses the repo-level Actions runners
      # REST endpoint; `actions: read` is required.
      actions: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          SMC_FORCE_GH_HOSTED: ${{ vars.SMC_FORCE_GH_HOSTED }}
        run: |
          # The rolling benchmark is an off-hours batch workload, so it
          # should prefer the priority cron Windows runner when one is idle.
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"

  rolling-benchmark:
    # Workflow-Audit HOCH-1: when triggered by workflow_run, only proceed
    # if the producer succeeded (mirror of F-V4-J3 in
    # smc-library-refresh.yml). Manual workflow_dispatch and the
    # scheduled safety-net cron bypass this guard.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 60
    permissions:
      # WF-AUTH-1: this is the only job that pushes updates to
      # bot/live-experiment-snapshot and reads producer artifacts.
      contents: write
      actions: read

    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      # F-V8-perf (2026-05-18): uv installer (mirrors ci.yml + smc-library-refresh).
      # On GitHub-hosted we enable the built-in wheel cache; on self-hosted we
      # rely on the local on-disk uv cache and skip the actions/cache layer.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: ${{ needs.select-runner.outputs.runner_environment == 'github-hosted' && 'true' || 'false' }}
          cache-dependency-glob: requirements*.txt

      - name: Install Python dependencies
        run: |
          # WF-012 (2026-05-20): ``uv pip install --python python ...`` on a
          # GitHub-hosted setup-python interpreter expects an existing venv and
          # fails with "No virtual environment found". Install into the resolved
          # interpreter's system environment instead; this mirrors the producer
          # workflows and keeps self-hosted Python-path resolution intact.
          uv pip install --python "$SMC_PYTHON_BIN" --system -r requirements.txt pytest

      - name: Resolve run date + output dir
        id: meta
        run: |
          RUN_DATE="$(date -u +'%Y-%m-%d')"
          echo "run_date=${RUN_DATE}" >> "$GITHUB_OUTPUT"
          echo "out_dir=artifacts/ci/measurement_benchmark_rolling/${RUN_DATE}" >> "$GITHUB_OUTPUT"

      # F-V8-D1 (2026-05-14): The rolling benchmark calls
      # `scripts/run_smc_measurement_benchmark.py --require-evidence`, which
      # via `smc_integration.measurement_evidence.build_measurement_evidence`
      # loads source bars from the canonical Databento production export
      # bundle at `artifacts/smc_microstructure_exports/`. Without that bundle
      # the run produces zero-event pairs across all symbols/TFs and the
      # --require-evidence guard hard-fails. Until 2026-05-14 this workflow
      # had NO download-step at all — explaining the red streak since the
      # F-V5-D2/D3 cutover from actions/cache to upload/download-artifact.
      #
      # Mirror the library-refresh fetch + flatten pattern: pull today's
      # producer artifact (or the most recent same-prefix fallback), then
      # flatten the nested subdir into the export-dir root so the
      # non-recursive `_manifest_candidates` glob can find the manifest.
      #
      # F-V8-D4 (2026-05-16): replace direct action unzip with an explicit
      # REST-download + zip-validate loop to survive transient artifact
      # download corruption (e.g. `Invalid LOC header`) without relying on
      # control-plane reruns.
      - name: Restore Databento production export bundle (today + fallback with retry)
        id: restore_export_bundle
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_DATE: ${{ steps.meta.outputs.run_date }}
        run: |
          set -euo pipefail
          # F-V8-perf (2026-05-18): extracted to scripts/restore_databento_export_bundle.py
          # for lintability / unit-test coverage. Behavior is bit-identical to the
          # pre-extraction heredoc (see F-V8-D4 above).
          "$SMC_PYTHON_BIN" scripts/restore_databento_export_bundle.py

      # Flatten the nested `<root>/smc-databento-production-export-*/...`
      # layout from the restored producer artifact directory.
      #
      # F-V8-D3 (2026-05-14): The repo ships a baseline
      # `artifacts/smc_microstructure_exports/smc_live_news_snapshot.json`
      # (and `_state.json`) which is also present in the producer bundle.
      # The producer copy is always the canonical source-of-truth; pre-
      # F-V5-D3 the actions/cache restore overwrote silently. Use `mv -f`
      # and emit `::notice::` annotations listing each overwrite so audits
      # stay visible.
      #
      # Skip when no artifact was restored — verify_export_bundle below
      # produces the canonical missing-bundle annotation.
      - name: Flatten downloaded Databento export bundle
        id: flatten_export_bundle
        if: steps.restore_export_bundle.outputs.found_artifact == 'true'
        run: |
          set -euo pipefail
          ROOT=artifacts/smc_microstructure_exports
          shopt -s nullglob
          moved=0
          overwritten=0
          for sub in "$ROOT"/smc-databento-production-export-*; do
            [ -d "$sub" ] || continue
            echo "==> Flattening $sub"
            for entry in "$sub"/* "$sub"/.[!.]*; do
              [ -e "$entry" ] || continue
              base=$(basename "$entry")
              if [ -e "$ROOT/$base" ]; then
                echo "::notice::Producer bundle overrides existing $ROOT/$base"
                overwritten=$((overwritten + 1))
              fi
              mv -f "$entry" "$ROOT/$base"
              moved=$((moved + 1))
            done
            rmdir "$sub"
          done
          echo "==> Flattened $moved entries ($overwritten overwrote a pre-existing file)"
          echo "moved_entries=$moved" >> "$GITHUB_OUTPUT"
          echo "overwritten_entries=$overwritten" >> "$GITHUB_OUTPUT"

      # Hard-fail when the canonical bundle is missing: --require-evidence
      # below would fail anyway, but with a confusing "no pair produced
      # measurement evidence" message that hides the real upstream cause.
      # Surfacing the clickable annotation pointing at the producer workflow
      # keeps triage in the right place.
      - name: Verify Databento production export bundle is present
        id: verify_export_bundle
        run: |
          set -euo pipefail
          if ls artifacts/smc_microstructure_exports/databento_volatility_production_*_manifest.json >/dev/null 2>&1; then
            NEWEST=$(ls -1t artifacts/smc_microstructure_exports/databento_volatility_production_*_manifest.json | head -1)
            echo "bundle_present=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Restored Databento production manifest: ${NEWEST}"
            exit 0
          fi
          echo "bundle_present=false" >> "$GITHUB_OUTPUT"
          echo "::error file=.github/workflows/smc-databento-production-export-sharded.yml::Producer artifact missing for ${{ steps.meta.outputs.run_date }}; rolling benchmark aborted. Re-run smc-databento-production-export-sharded and then re-trigger smc-measurement-benchmark-rolling."
          exit 1

      # #2667: produce REAL per-TF structure artifacts before the benchmark
      # runs, so each chart TF scores its own structural events. Without
      # these, the contract layer aliases the legacy single-file 1D artifact
      # onto every intraday TF (``legacy_tf_fallback``) and all per-TF
      # benchmark slices are clones — the Plan 2.8 Phase-E2 verdicts were
      # void because of exactly this (ADR 2026-06-10, docs/DECISIONS.md).
      # The exporter resamples the bundle's second-level bars to each TF and
      # writes reports/smc_structure_artifacts/manifest_<tf>.json +
      # <SYMBOL>_<tf>.structure.json, which the provider resolves FIRST.
      # Per-symbol failures land in the manifest errors[] (exporter still
      # exits 0); a hard exporter crash only warns — the benchmark below
      # must keep running on the legacy fallback rather than kill the lane.
      # This step also resolves + validates SYMBOLS/TIMEFRAMES once and
      # publishes them via GITHUB_ENV so the benchmark step cannot drift.
      - name: Export per-TF structure artifacts (un-void Plan 2.8 Phase-E2)
        env:
          # A2 (2026-06-10): env-var indirection for user-supplied inputs.
          INPUT_SYMBOLS: ${{ github.event.inputs.symbols }}
          INPUT_TIMEFRAMES: ${{ github.event.inputs.timeframes || '5m,10m,15m,30m,1H,4H,1D' }}
        run: |
          set -euo pipefail
          SYMBOLS="${INPUT_SYMBOLS}"
          if [ -z "${SYMBOLS}" ]; then
            SYMBOLS="AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,JPM,BAC,GS,MS,V,UNH,JNJ,HD,XOM,CVX,COP,OXY,CAT"
          else
            # A2: only uppercase letters and commas (ticker list — no shell metacharacters).
            [[ "${SYMBOLS}" =~ ^[A-Z,]+$ ]] || {
              echo "::error::symbols must be a comma-separated list of uppercase tickers, got: ${SYMBOLS}"; exit 1
            }
          fi
          # Canonical timeframe set for rolling benchmark.
          TIMEFRAMES="${INPUT_TIMEFRAMES}"
          # A2: digits + m/H/D/W/M + commas only.
          [[ "${TIMEFRAMES}" =~ ^[0-9mHDWM,]+$ ]] || {
            echo "::error::timeframes must be a comma-separated list like '5m,10m,15m,30m,1H,4H,1D', got: ${TIMEFRAMES}"; exit 1
          }
          echo "SMC_BENCH_SYMBOLS=${SYMBOLS}" >> "$GITHUB_ENV"
          echo "SMC_BENCH_TIMEFRAMES=${TIMEFRAMES}" >> "$GITHUB_ENV"
          for tf in ${TIMEFRAMES//,/ }; do
            if "$SMC_PYTHON_BIN" scripts/export_smc_structure_artifacts_from_workbook.py \
                --timeframe "${tf}" \
                --symbols "${SYMBOLS}" \
                --export-bundle-root artifacts/smc_microstructure_exports \
                > "structure_export_${tf}.json"; then
              "$SMC_PYTHON_BIN" -c "import json; m = json.load(open('structure_export_${tf}.json')); c = m['counts']; print(f\"::notice title=per-tf-structure::tf=${tf} written={c['artifacts_written']} errors={c['errors']}\")"
            else
              echo "::warning title=per-tf-structure::exporter crashed for tf=${tf}; benchmark will use the legacy fallback for this TF"
            fi
          done
          # Per-tf JSON is consumed inline above; drop it so it never leaks into
          # later steps' working tree or uploaded artifacts.
          rm -f structure_export_*.json

      - name: Run daily rolling benchmark
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
        run: |
          set -euo pipefail
          # SYMBOLS/TIMEFRAMES resolved + validated by the per-TF structure
          # export step above (single source of truth — #2667).
          "$SMC_PYTHON_BIN" scripts/run_smc_measurement_benchmark.py \
            --symbols "${SMC_BENCH_SYMBOLS}" \
            --timeframes "${SMC_BENCH_TIMEFRAMES}" \
            --output-dir "${{ steps.meta.outputs.out_dir }}" \
            --require-evidence

      - name: Zone priority + testable calibration (rolling)
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/smc_zone_priority_calibration.py \
            --benchmark-dir "${{ steps.meta.outputs.out_dir }}" \
            --output-path "${{ steps.meta.outputs.out_dir }}/zone_priority_calibration.json"

      - name: FVG label audit (rolling)
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/fvg_label_audit.py \
            --benchmark-dir "${{ steps.meta.outputs.out_dir }}" \
            --output-path "${{ steps.meta.outputs.out_dir }}/fvg_label_audit.json"

      - name: Plan 2.8 Phase 1 per-TF family rollup
        # Aggregates scoring_<symbol>_<tf>.json artifacts emitted by the
        # rolling benchmark into per-TF event counts + per-family HRs +
        # the two Phase-E2 verdicts (FVG 5m vs baseline, BOS 4H vs
        # baseline). Streams the Markdown view to the step summary so
        # operators can eyeball progress toward the W8 deliverable
        # without downloading artifacts. Fail-soft so a rollup hiccup
        # cannot mask the benchmark outcome.
        if: always()
        run: |
          set +e
          "$SMC_PYTHON_BIN" scripts/plan_2_8_tf_family_rollup.py \
            --scoring-root "${{ steps.meta.outputs.out_dir }}" \
            --timeframes   "5m,10m,15m,30m,1H,4H,1D" \
            --output       "${{ steps.meta.outputs.out_dir }}/plan_2_8_tf_family_rollup.json" \
            --format       md \
            > /tmp/rollup.md 2>/dev/null
          if [ -s /tmp/rollup.md ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat /tmp/rollup.md >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 history archive (snapshot append)
        # Folds today's rollup into docs/plan_2_8_history.jsonl so the
        # weekly trend digest has a stable, idempotent source of truth.
        # Fail-soft: a missing rollup or a write hiccup must not affect
        # the benchmark run outcome. The snapshot is uploaded as part
        # of the standard rolling-bench artifact bundle.
        if: always()
        run: |
          set +e
          rollup="${{ steps.meta.outputs.out_dir }}/plan_2_8_tf_family_rollup.json"
          if [ -s "${rollup}" ]; then
            "$SMC_PYTHON_BIN" scripts/plan_2_8_history_archive.py \
              --rollup  "${rollup}" \
              --history "${{ steps.meta.outputs.out_dir }}/plan_2_8_history.jsonl" \
              || true
          fi
          true

      - name: Plan 2.8 history rotate (trim snapshots)
        # Caps the rolling history JSONL so long-running benches don't
        # balloon the artifact bundle or slow the weekly digest. Default
        # policy: keep at most 366 snapshots (~1y of daily runs) and drop
        # anything older than 400 days. Fail-soft: rotation errors must
        # never affect the benchmark run outcome.
        if: always()
        run: |
          set +e
          history="${{ steps.meta.outputs.out_dir }}/plan_2_8_history.jsonl"
          if [ -s "${history}" ]; then
            "$SMC_PYTHON_BIN" scripts/plan_2_8_history_rotate.py \
              --history      "${history}" \
              --max-rows     366 \
              --max-age-days 400 \
              || true
          fi
          true

      - name: Plan 2.8 history validate (integrity check)
        # Non-destructive shape + uniqueness check on the rotated
        # history. Fail-soft: a validation hit only surfaces in the
        # step summary; it must not affect the bench run outcome.
        if: always()
        run: |
          set +e
          history="${{ steps.meta.outputs.out_dir }}/plan_2_8_history.jsonl"
          report="${{ steps.meta.outputs.out_dir }}/plan_2_8_history_validate.json"
          if [ -s "${history}" ]; then
            "$SMC_PYTHON_BIN" scripts/plan_2_8_history_validate.py \
              --history "${history}" \
              --output  "${report}" \
              --quiet
            if [ -s "${report}" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              echo '## Plan 2.8 history validate' >> "${GITHUB_STEP_SUMMARY}"
              echo '```json' >> "${GITHUB_STEP_SUMMARY}"
              cat "${report}" >> "${GITHUB_STEP_SUMMARY}"
              echo '```' >> "${GITHUB_STEP_SUMMARY}"
            fi
          fi
          true

      - name: Publish experiment snapshot to rolling bot branch
        # Mirrors smc-live-newsapi-refresh.yml's "Publish snapshot to rolling
        # bot branch": the live-overlay daemon reads the daily experiment
        # rollup + history from the rolling `bot/live-experiment-snapshot`
        # branch via the GitHub Contents API (EXPERIMENT_SNAPSHOT_URL /
        # EXPERIMENT_HISTORY_URL) so the Grafana experiment panels reflect the
        # freshest CI run instead of a stale Docker-baked seed. A bare push to
        # main is blocked by the `main-governance` ruleset; `bot/*` is excluded,
        # so we force-update the dedicated branch. The uploaded benchmark
        # artifact bundle above remains the authoritative archive. The two
        # files are copied to a STABLE `latest/` path so the daemon URL never
        # has to track the dated run directory.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          out_dir="${{ steps.meta.outputs.out_dir }}"
          rollup="${out_dir}/plan_2_8_tf_family_rollup.json"
          history="${out_dir}/plan_2_8_history.jsonl"
          # Fail-soft on missing inputs: the rollup + history steps above are
          # both fail-soft, so a hiccup there must not turn this delivery step
          # red. Only a genuine push failure (expired PAT, ruleset change)
          # should surface as a job failure.
          if [ ! -s "${rollup}" ] && [ ! -s "${history}" ]; then
            echo "No experiment rollup/history produced this run; nothing to publish."
            exit 0
          fi
          stable_dir="artifacts/ci/measurement_benchmark_rolling/latest"
          mkdir -p "${stable_dir}"
          [ -s "${rollup}" ]  && cp "${rollup}"  "${stable_dir}/plan_2_8_tf_family_rollup.json"
          [ -s "${history}" ] && cp "${history}" "${stable_dir}/plan_2_8_history.jsonl"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pass the authenticated URL directly to each git command instead of
          # persisting it via `git remote set-url`, which would leave the token
          # readable in .git/config for the rest of the job (audit F3).
          _remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          _remote_ref="refs/heads/bot/live-experiment-snapshot"
          _tracking_ref="refs/remotes/origin/bot/live-experiment-snapshot"
          # `latest/` lives under the gitignored artifacts/ tree, so `-f` is
          # required to stage it. Adding the directory tolerates either file
          # being absent on a partial run.
          git add -f "${stable_dir}"
          if git diff --cached --quiet; then
            echo "No experiment snapshot changes to commit."
            exit 0
          fi
          git commit -m "[skip ci] chore: refresh experiment snapshot"
          # Fetch the remote tip first so --force-with-lease has a real base
          # to compare against; tolerate the branch not yet existing.
          git fetch "${_remote_url}" "+${_remote_ref}:${_tracking_ref}" 2>/dev/null || true
          _zero_sha="0000000000000000000000000000000000000000"
          if _expected_sha="$(git rev-parse --verify "${_tracking_ref}" 2>/dev/null)"; then
            _lease_expected="${_expected_sha}"
          else
            _lease_expected="${_zero_sha}"
          fi
          # `if git push` form (fail-loud) is what tests/test_workflow_auth_pattern.py
          # expects; a real push failure surfaces red instead of a swallowed warning.
          if git push "--force-with-lease=${_remote_ref}:${_lease_expected}" "${_remote_url}" "HEAD:${_remote_ref}"; then
            echo "Pushed experiment snapshot to bot/live-experiment-snapshot."
          else
            echo "::warning::experiment snapshot push failed; the benchmark artifact bundle remains available, but bot/live-experiment-snapshot may be stale and the Grafana experiment panels can lag until the next daily run."
            {
              echo "### ⚠ experiment snapshot persistence warning"
              echo ""
              echo "The benchmark artifact uploaded, but the rolling bot/live-experiment-snapshot branch push failed. The Grafana experiment panels may show a stale rollup until the next daily run."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload rolling benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # If an early bootstrap step fails before `meta` runs, keep
          # upload-artifact syntactically valid so the real failure remains the
          # earlier step instead of a secondary "Input required: path" red
          # herring. Missing fallback path only warns (default behavior).
          name: smc-measurement-benchmark-rolling-${{ steps.meta.outputs.run_date || 'unknown' }}
          path: ${{ steps.meta.outputs.out_dir || 'artifacts/ci/measurement_benchmark_rolling' }}
          if-no-files-found: warn
          retention-days: 30
          # Idempotent same-day reruns (manual or backfill) must not 409.
          overwrite: true

      # ADR-0023 §4.1: upload scored FamilyEvent records as a separate
      # artifact so the magnitude-shadow workflow can download them via
      # dawidd6/action-download-artifact without pulling the full
      # benchmark bundle.
      - name: Upload scored family events (ADR-0023)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scored-family-events-${{ steps.meta.outputs.run_date || 'unknown' }}
          path: ${{ steps.meta.outputs.out_dir || 'artifacts/ci/measurement_benchmark_rolling' }}/scored_family_events.json
          if-no-files-found: warn
          retention-days: 14
          overwrite: true

      # ADR-0023 Option B (Issue #2706): rolling accumulation of FamilyEvent
      # records across the last 30 days of daily benchmark runs.
      #
      # A single day's run yields only ~9% of events with score + triggered
      # return (MIN_OOS_SAMPLES=40 never reached).  By downloading the previous
      # accumulated snapshot (retention 32 days), merging today's events, and
      # re-uploading, the pool grows across successive days until the walk-
      # forward calibration has enough out-of-sample folds.
      #
      # Deduplication key: (family, anchor_ts).  Tie-break: longest
      # forward_closes (newest daily run extends the outcome window the most).
      # Events older than 30 days are pruned from the pool each run.
      #
      # Fail-soft: if the download or the accumulation step fails, the daily
      # individual artifact (step above) is still available as a fallback and
      # the rolling-bench run is not marked failed.
      - name: Download previous accumulated family events (ADR-0023 Option B)
        id: dl_accumulated
        if: always()
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: smc-measurement-benchmark-rolling.yml
          name: scored-family-events-accumulated
          path: artifacts/ci/scored_family_events_accumulated_prev
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Accumulate family events across rolling window (ADR-0023 Option B)
        id: accumulate_events
        if: always()
        env:
          OUT_DIR: ${{ steps.meta.outputs.out_dir || 'artifacts/ci/measurement_benchmark_rolling' }}
        run: |
          set +e
          CURRENT="${OUT_DIR}/scored_family_events.json"
          PREV_DIR="artifacts/ci/scored_family_events_accumulated_prev"
          PREV=""
          if [ -d "${PREV_DIR}" ]; then
            PREV="$(find "${PREV_DIR}" -name 'accumulated_family_events.json' -type f 2>/dev/null | head -1)"
          fi
          ACCUMULATED="${OUT_DIR}/accumulated_family_events.json"
          ARGS=("--current" "${CURRENT}" "--output" "${ACCUMULATED}" "--max-age-days" "30")
          if [ -n "${PREV}" ] && [ -s "${PREV}" ]; then
            ARGS+=("--previous" "${PREV}")
          fi
          "$SMC_PYTHON_BIN" scripts/accumulate_family_events.py "${ARGS[@]}"
          if [ $? -ne 0 ] || [ ! -s "${ACCUMULATED}" ]; then
            echo "::warning ::accumulate_family_events failed or produced empty output; falling back to daily events only"
            cp "${CURRENT}" "${ACCUMULATED}" 2>/dev/null || true
          fi
          echo "accumulated_path=${ACCUMULATED}" >> "$GITHUB_OUTPUT"
          true

      - name: Upload accumulated family events (ADR-0023 Option B)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scored-family-events-accumulated
          path: ${{ steps.accumulate_events.outputs.accumulated_path || format('{0}/accumulated_family_events.json', steps.meta.outputs.out_dir || 'artifacts/ci/measurement_benchmark_rolling') }}
          if-no-files-found: warn
          retention-days: 32
          overwrite: true

      - name: F2 dual-arm contextual calibration (G3 wiring)
        # Plan §2.3 F2 / §2.4 G3. Re-scores the per-event JSONL ledgers
        # produced above twice — once with the global family weights
        # (control arm) and once with the contextual fallback cascade
        # (treatment arm) — and writes the two artifact trees the
        # f2-promotion-gate-daily workflow consumes. Without this step
        # the gate exits status=skipped indefinitely and the 30-day
        # SPRT countdown never starts. Fail-soft: a non-zero exit must
        # NOT mark the rolling-bench run failed; it only means the
        # promotion-gate stays on status=skipped that day.
        if: always()
        env:
          RUN_DATE: ${{ steps.meta.outputs.run_date }}
          OUT_DIR:  ${{ steps.meta.outputs.out_dir }}
        run: |
          set +e
          "$SMC_PYTHON_BIN" scripts/f2_apply_contextual_calibration.py \
            --control-dir          "${OUT_DIR}" \
            --contextual-cal       "${OUT_DIR}/zone_priority_contextual_calibration.json" \
            --global-cal           "${OUT_DIR}/zone_priority_calibration.json" \
            --output-dir-control   "artifacts/ci/f2/static_global_weights/${RUN_DATE}" \
            --output-dir-treatment "artifacts/ci/f2/contextual_weights/${RUN_DATE}"
          rc=$?
          {
            echo "## F2 dual-arm wiring (G3)"
            echo ""
            echo "- run_date: ${RUN_DATE}"
            echo "- exit_code: ${rc}"
            echo "- control:   artifacts/ci/f2/static_global_weights/${RUN_DATE}"
            echo "- treatment: artifacts/ci/f2/contextual_weights/${RUN_DATE}"
          } >> "${GITHUB_STEP_SUMMARY:-/dev/null}" || true
          # Fail-soft: an empty-events rc=2 or a missing-input rc=1 must
          # not affect the rolling-bench outcome. The promotion-gate
          # workflow surfaces the same condition as status=skipped.
          exit 0

      - name: Upload F2 dual-arm artifacts
        # Published as a separate, named artifact so the
        # f2-promotion-gate-daily workflow can pull it via the
        # cross-workflow artifact mechanism this repo uses
        # (`dawidd6/action-download-artifact` or `gh run download`,
        # depending on the consumer).
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: f2-dual-arm-${{ steps.meta.outputs.run_date }}
          path: artifacts/ci/f2/
          retention-days: 45
          if-no-files-found: ignore
          # Same-day rerun safety (audit H6).
          overwrite: true
