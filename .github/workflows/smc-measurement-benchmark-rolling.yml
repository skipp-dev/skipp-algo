# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: smc-measurement-benchmark-rolling

# E3 — Rolling Benchmark (Q3/Q4 plan §2.2 E3).
#
# Runs the measurement-benchmark harness daily against the same 20-symbol
# universe as the weekly full-corpus job, but writes its artifacts under
# a dated sub-directory and keeps only the most recent 30 days on the
# upload-artifact path. This gives us:
#
#   * a 30-day rolling window for drift detection alongside the
#     weekly lifetime snapshot (from smc-measurement-benchmark.yml), and
#   * a daily cadence that the Phase F / Phase G auto-tuner can consume
#     without waiting a full calendar week.
#
# Nothing in this workflow mutates the checked-in lifetime corpus or
# production calibration — it is purely observational.

on:
  schedule:
    # 07:30 UTC daily — after the US cash session close and the
    # outcome-backfill run have had time to land yesterday's labels.
    - cron: "30 7 * * *"
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols (default: full 20-sym universe)"
        required: false
        default: ""
      timeframes:
        # Plan 2.8 §3.1 (2026-04-21): expanded from 15m,1H to 5m,15m,1H,4H.
        description: "Comma-separated timeframes (default: 5m,15m,1H,4H)"
        required: false
        default: "5m,15m,1H,4H"

permissions:
  contents: read
  # Required by the restore step below: it calls the GitHub Actions REST API
  # to enumerate and download producer artifacts by id. Without `actions: read`
  # the cross-workflow pull fails with `Resource not accessible by integration`
  # (403). Matches the permissions block in smc-library-refresh.yml.
  actions: read

concurrency:
  group: smc-measurement-benchmark-rolling
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          # The rolling benchmark is an off-hours batch workload, so it
          # should prefer the priority cron Windows runner when one is idle.
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"

  rolling-benchmark:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 60

    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      # F-V8-perf (2026-05-18): uv installer (mirrors ci.yml + smc-library-refresh).
      # On GitHub-hosted we enable the built-in wheel cache; on self-hosted we
      # rely on the local on-disk uv cache and skip the actions/cache layer.
      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: ${{ needs.select-runner.outputs.runner_environment == 'github-hosted' && 'true' || 'false' }}
          cache-dependency-glob: requirements*.txt

      - name: Install Python dependencies
        run: |
          # WF-012 (2026-05-20): ``uv pip install --python python ...`` on a
          # GitHub-hosted setup-python interpreter expects an existing venv and
          # fails with "No virtual environment found". Install into the resolved
          # interpreter's system environment instead; this mirrors the producer
          # workflows and keeps self-hosted Python-path resolution intact.
          uv pip install --python "$SMC_PYTHON_BIN" --system -r requirements.txt pytest

      - name: Resolve run date + output dir
        id: meta
        run: |
          RUN_DATE="$(date -u +'%Y-%m-%d')"
          echo "run_date=${RUN_DATE}" >> "$GITHUB_OUTPUT"
          echo "out_dir=artifacts/ci/measurement_benchmark_rolling/${RUN_DATE}" >> "$GITHUB_OUTPUT"

      # F-V8-D1 (2026-05-14): The rolling benchmark calls
      # `scripts/run_smc_measurement_benchmark.py --require-evidence`, which
      # via `smc_integration.measurement_evidence.build_measurement_evidence`
      # loads source bars from the canonical Databento production export
      # bundle at `artifacts/smc_microstructure_exports/`. Without that bundle
      # the run produces zero-event pairs across all symbols/TFs and the
      # --require-evidence guard hard-fails. Until 2026-05-14 this workflow
      # had NO download-step at all — explaining the red streak since the
      # F-V5-D2/D3 cutover from actions/cache to upload/download-artifact.
      #
      # Mirror the library-refresh fetch + flatten pattern: pull today's
      # producer artifact (or the most recent same-prefix fallback), then
      # flatten the nested subdir into the export-dir root so the
      # non-recursive `_manifest_candidates` glob can find the manifest.
      #
      # F-V8-D4 (2026-05-16): replace direct action unzip with an explicit
      # REST-download + zip-validate loop to survive transient artifact
      # download corruption (e.g. `Invalid LOC header`) without relying on
      # control-plane reruns.
      - name: Restore Databento production export bundle (today + fallback with retry)
        id: restore_export_bundle
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          RUN_DATE: ${{ steps.meta.outputs.run_date }}
        run: |
          set -euo pipefail
          # F-V8-perf (2026-05-18): extracted to scripts/restore_databento_export_bundle.py
          # for lintability / unit-test coverage. Behavior is bit-identical to the
          # pre-extraction heredoc (see F-V8-D4 above).
          "$SMC_PYTHON_BIN" scripts/restore_databento_export_bundle.py

      # Flatten the nested `<root>/smc-databento-production-export-*/...`
      # layout from the restored producer artifact directory.
      #
      # F-V8-D3 (2026-05-14): The repo ships a baseline
      # `artifacts/smc_microstructure_exports/smc_live_news_snapshot.json`
      # (and `_state.json`) which is also present in the producer bundle.
      # The producer copy is always the canonical source-of-truth; pre-
      # F-V5-D3 the actions/cache restore overwrote silently. Use `mv -f`
      # and emit `::notice::` annotations listing each overwrite so audits
      # stay visible.
      #
      # Skip when no artifact was restored — verify_export_bundle below
      # produces the canonical missing-bundle annotation.
      - name: Flatten downloaded Databento export bundle
        id: flatten_export_bundle
        if: steps.restore_export_bundle.outputs.found_artifact == 'true'
        run: |
          set -euo pipefail
          ROOT=artifacts/smc_microstructure_exports
          shopt -s nullglob
          moved=0
          overwritten=0
          for sub in "$ROOT"/smc-databento-production-export-*; do
            [ -d "$sub" ] || continue
            echo "==> Flattening $sub"
            for entry in "$sub"/* "$sub"/.[!.]*; do
              [ -e "$entry" ] || continue
              base=$(basename "$entry")
              if [ -e "$ROOT/$base" ]; then
                echo "::notice::Producer bundle overrides existing $ROOT/$base"
                overwritten=$((overwritten + 1))
              fi
              mv -f "$entry" "$ROOT/$base"
              moved=$((moved + 1))
            done
            rmdir "$sub"
          done
          echo "==> Flattened $moved entries ($overwritten overwrote a pre-existing file)"
          echo "moved_entries=$moved" >> "$GITHUB_OUTPUT"
          echo "overwritten_entries=$overwritten" >> "$GITHUB_OUTPUT"

      # Hard-fail when the canonical bundle is missing: --require-evidence
      # below would fail anyway, but with a confusing "no pair produced
      # measurement evidence" message that hides the real upstream cause.
      # Surfacing the clickable annotation pointing at the producer workflow
      # keeps triage in the right place.
      - name: Verify Databento production export bundle is present
        id: verify_export_bundle
        run: |
          set -euo pipefail
          if ls artifacts/smc_microstructure_exports/databento_volatility_production_*_manifest.json >/dev/null 2>&1; then
            NEWEST=$(ls -1t artifacts/smc_microstructure_exports/databento_volatility_production_*_manifest.json | head -1)
            echo "bundle_present=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Restored Databento production manifest: ${NEWEST}"
            exit 0
          fi
          echo "bundle_present=false" >> "$GITHUB_OUTPUT"
          echo "::error file=.github/workflows/smc-databento-production-export-sharded.yml::Producer artifact missing for ${{ steps.meta.outputs.run_date }}; rolling benchmark aborted. Re-run smc-databento-production-export-sharded and then re-trigger smc-measurement-benchmark-rolling."
          exit 1

      - name: Run daily rolling benchmark
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
        run: |
          set -euo pipefail
          SYMBOLS="${{ github.event.inputs.symbols }}"
          if [ -z "${SYMBOLS}" ]; then
            SYMBOLS="AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,JPM,BAC,GS,MS,V,UNH,JNJ,HD,XOM,CVX,COP,OXY,CAT"
          fi
          # Plan 2.8 §3.1 (2026-04-21): expanded from 15m,1H to 5m,15m,1H,4H.
          TIMEFRAMES="${{ github.event.inputs.timeframes || '5m,15m,1H,4H' }}"
          "$SMC_PYTHON_BIN" scripts/run_smc_measurement_benchmark.py \
            --symbols "${SYMBOLS}" \
            --timeframes "${TIMEFRAMES}" \
            --output-dir "${{ steps.meta.outputs.out_dir }}" \
            --require-evidence

      - name: Zone priority + testable calibration (rolling)
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/smc_zone_priority_calibration.py \
            --benchmark-dir "${{ steps.meta.outputs.out_dir }}" \
            --output-path "${{ steps.meta.outputs.out_dir }}/zone_priority_calibration.json"

      - name: FVG label audit (rolling)
        if: always()
        run: |
          "$SMC_PYTHON_BIN" scripts/fvg_label_audit.py \
            --benchmark-dir "${{ steps.meta.outputs.out_dir }}" \
            --output-path "${{ steps.meta.outputs.out_dir }}/fvg_label_audit.json"

      - name: Plan 2.8 Phase 1 per-TF family rollup
        # Aggregates scoring_<symbol>_<tf>.json artifacts emitted by the
        # rolling benchmark into per-TF event counts + per-family HRs +
        # the two Phase-E2 verdicts (FVG 5m vs baseline, BOS 4H vs
        # baseline). Streams the Markdown view to the step summary so
        # operators can eyeball progress toward the W8 deliverable
        # without downloading artifacts. Fail-soft so a rollup hiccup
        # cannot mask the benchmark outcome.
        if: always()
        run: |
          set +e
          "$SMC_PYTHON_BIN" scripts/plan_2_8_tf_family_rollup.py \
            --scoring-root "${{ steps.meta.outputs.out_dir }}" \
            --timeframes   "5m,15m,1H,4H" \
            --output       "${{ steps.meta.outputs.out_dir }}/plan_2_8_tf_family_rollup.json" \
            --format       md \
            > /tmp/rollup.md 2>/dev/null
          if [ -s /tmp/rollup.md ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat /tmp/rollup.md >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Plan 2.8 history archive (snapshot append)
        # Folds today's rollup into docs/plan_2_8_history.jsonl so the
        # weekly trend digest has a stable, idempotent source of truth.
        # Fail-soft: a missing rollup or a write hiccup must not affect
        # the benchmark run outcome. The snapshot is uploaded as part
        # of the standard rolling-bench artifact bundle.
        if: always()
        run: |
          set +e
          rollup="${{ steps.meta.outputs.out_dir }}/plan_2_8_tf_family_rollup.json"
          if [ -s "${rollup}" ]; then
            "$SMC_PYTHON_BIN" scripts/plan_2_8_history_archive.py \
              --rollup  "${rollup}" \
              --history "${{ steps.meta.outputs.out_dir }}/plan_2_8_history.jsonl" \
              || true
          fi
          true

      - name: Plan 2.8 history rotate (trim snapshots)
        # Caps the rolling history JSONL so long-running benches don't
        # balloon the artifact bundle or slow the weekly digest. Default
        # policy: keep at most 366 snapshots (~1y of daily runs) and drop
        # anything older than 400 days. Fail-soft: rotation errors must
        # never affect the benchmark run outcome.
        if: always()
        run: |
          set +e
          history="${{ steps.meta.outputs.out_dir }}/plan_2_8_history.jsonl"
          if [ -s "${history}" ]; then
            "$SMC_PYTHON_BIN" scripts/plan_2_8_history_rotate.py \
              --history      "${history}" \
              --max-rows     366 \
              --max-age-days 400 \
              || true
          fi
          true

      - name: Plan 2.8 history validate (integrity check)
        # Non-destructive shape + uniqueness check on the rotated
        # history. Fail-soft: a validation hit only surfaces in the
        # step summary; it must not affect the bench run outcome.
        if: always()
        run: |
          set +e
          history="${{ steps.meta.outputs.out_dir }}/plan_2_8_history.jsonl"
          report="${{ steps.meta.outputs.out_dir }}/plan_2_8_history_validate.json"
          if [ -s "${history}" ]; then
            "$SMC_PYTHON_BIN" scripts/plan_2_8_history_validate.py \
              --history "${history}" \
              --output  "${report}" \
              --quiet
            if [ -s "${report}" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              echo '## Plan 2.8 history validate' >> "${GITHUB_STEP_SUMMARY}"
              echo '```json' >> "${GITHUB_STEP_SUMMARY}"
              cat "${report}" >> "${GITHUB_STEP_SUMMARY}"
              echo '```' >> "${GITHUB_STEP_SUMMARY}"
            fi
          fi
          true

      - name: Upload rolling benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # If an early bootstrap step fails before `meta` runs, keep
          # upload-artifact syntactically valid so the real failure remains the
          # earlier step instead of a secondary "Input required: path" red
          # herring. Missing fallback path only warns (default behavior).
          name: smc-measurement-benchmark-rolling-${{ steps.meta.outputs.run_date || 'unknown' }}
          path: ${{ steps.meta.outputs.out_dir || 'artifacts/ci/measurement_benchmark_rolling' }}
          retention-days: 30
          # Idempotent same-day reruns (manual or backfill) must not 409.
          overwrite: true

      - name: F2 dual-arm contextual calibration (G3 wiring)
        # Plan §2.3 F2 / §2.4 G3. Re-scores the per-event JSONL ledgers
        # produced above twice — once with the global family weights
        # (control arm) and once with the contextual fallback cascade
        # (treatment arm) — and writes the two artifact trees the
        # f2-promotion-gate-daily workflow consumes. Without this step
        # the gate exits status=skipped indefinitely and the 30-day
        # SPRT countdown never starts. Fail-soft: a non-zero exit must
        # NOT mark the rolling-bench run failed; it only means the
        # promotion-gate stays on status=skipped that day.
        if: always()
        env:
          RUN_DATE: ${{ steps.meta.outputs.run_date }}
          OUT_DIR:  ${{ steps.meta.outputs.out_dir }}
        run: |
          set +e
          "$SMC_PYTHON_BIN" scripts/f2_apply_contextual_calibration.py \
            --control-dir          "${OUT_DIR}" \
            --contextual-cal       "${OUT_DIR}/zone_priority_contextual_calibration.json" \
            --global-cal           "${OUT_DIR}/zone_priority_calibration.json" \
            --output-dir-control   "artifacts/ci/f2/static_global_weights/${RUN_DATE}" \
            --output-dir-treatment "artifacts/ci/f2/contextual_weights/${RUN_DATE}"
          rc=$?
          {
            echo "## F2 dual-arm wiring (G3)"
            echo ""
            echo "- run_date: ${RUN_DATE}"
            echo "- exit_code: ${rc}"
            echo "- control:   artifacts/ci/f2/static_global_weights/${RUN_DATE}"
            echo "- treatment: artifacts/ci/f2/contextual_weights/${RUN_DATE}"
          } >> "${GITHUB_STEP_SUMMARY:-/dev/null}" || true
          # Fail-soft: an empty-events rc=2 or a missing-input rc=1 must
          # not affect the rolling-bench outcome. The promotion-gate
          # workflow surfaces the same condition as status=skipped.
          exit 0

      - name: Upload F2 dual-arm artifacts
        # Published as a separate, named artifact so the
        # f2-promotion-gate-daily workflow can pull it via the
        # cross-workflow artifact mechanism this repo uses
        # (`dawidd6/action-download-artifact` or `gh run download`,
        # depending on the consumer).
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: f2-dual-arm-${{ steps.meta.outputs.run_date }}
          path: artifacts/ci/f2/
          retention-days: 45
          if-no-files-found: ignore
          # Same-day rerun safety (audit H6).
          overwrite: true
