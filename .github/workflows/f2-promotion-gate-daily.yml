# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: f2-promotion-gate-daily

# Schedule: 14:30 UTC Mon-Fri — inside trading window 13:30–20:00 UTC. The gate
# itself is observational (no trading-state mutation), but on a G2 rollback
# verdict it creates/updates a cron-failure Issue and demotes the contextual
# artifact — hence posture mutating-on-cron, NOT read-only. Runs after the
# rolling-bench corpus is normally available (smc-measurement-benchmark-rolling
# is workflow_run-driven off the 12:00 UTC producer; 16:30 UTC safety-net cron),
# see schedule comment below (audit 2026-06)
#
# F2 Contextual Promotion Gate — daily evaluation.
#
# Plan reference:
#   smc_improvement_plan_q3_q4_2026-04-20.md §2.3 F2 + §2.4 G3
# Spec:
#   artifacts/experiments/f2_contextual_promotion.json
# Decision memo:
#   docs/f2_contextual_promotion_decision_2026-04-21.md
#
# Each day this workflow:
#   1. Locates the most recent dual-arm artifact dirs produced by the
#      rolling-benchmark workflow (control = static_global_weights,
#      treatment = contextual_weights).
#   2. Runs scripts/f2_run_promotion_gate.py against them and the
#      shipping spec.
#   3. Uploads the resulting promotion-gate JSON as an Actions artifact.
#   4. Annotates the run with the decision and exits non-zero on
#      'rollback' so the GitHub-Issue-Ping rule (plan §2.4 G2) can
#      key off the workflow failure.
#
# Fail-soft semantics:
#   * If the spec status is 'rolled_back' (terminal SPRT verdict, ADR
#     2026-06-12 f2-contextual-sprt-h0-final), the gate job is skipped
#     entirely — the experiment is concluded and must not re-fail daily.
#   * If either arm directory is missing yet (the rolling-benchmark
#     workflow has not produced the contextual arm), the job exits 0
#     with status=skipped so the wall-clock countdown to the 30-day
#     window keeps ticking.
#   * Configuration errors (missing spec, malformed history) exit 1
#     and surface in CI normally.
#   * decision==rollback exits 2 -> workflow marked failed.
#
# Nothing in this workflow mutates production calibration. Promotion
# is a separate, manual follow-up step driven by the on_promote
# action list in the spec.

on:
  schedule:
    # 14:30 UTC Mon-Fri — intended to run after smc-measurement-benchmark-rolling
    # has produced the dual-arm artifact. Since audit HOCH-1 that consumer
    # is workflow_run-driven off the 12:00 UTC producer (~60 min runtime,
    # 16:30 UTC safety-net cron), so the artifact is normally published
    # well before this gate tries to download it; the workflow is fail-soft
    # on a missing artifact (status=skipped). The rolling-bench cadence is
    # gated by the upstream Databento producer (12:00 UTC Mon-Fri), so
    # this job follows the same Mon-Fri window.
    - cron: "30 14 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Override the date sub-dir to evaluate (YYYY-MM-DD). Default: today UTC."
        required: false
        default: ""

# Workflow-level: minimal default. Elevated scopes are job-local on
# `promotion-gate` (least privilege).
permissions:
  contents: read

concurrency:
  group: f2-promotion-gate-daily
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  PYTHONPATH: ${{ github.workspace }}
defaults:
  run:
    shell: bash

jobs:
  # ADR 2026-06-12 f2-contextual-sprt-h0-final: once the experiment has
  # reached a terminal SPRT verdict and the spec is flipped to
  # status=rolled_back, the daily gate must soft-skip instead of
  # re-evaluating an already-decided experiment and failing red (rc=2)
  # every day. A new candidate re-enters via a fresh spec registration
  # and a plumbing_only -> live flip (which auto-resets SPRT state).
  spec-status:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read  # zizmor: explicit scope — read-only checkout, no write access needed
    outputs:
      status: ${{ steps.read.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Read spec status
        id: read
        run: |
          SPEC=artifacts/experiments/f2_contextual_promotion.json
          if [ ! -f "${SPEC}" ]; then
            # Fail-soft: a missing spec is a configuration question for
            # the gate job itself (exit 1 there), not for this guard.
            echo "status=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STATUS=$(jq -r '.status // "registered"' "${SPEC}" 2>/dev/null || echo "registered")
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          if [ "${STATUS}" = "rolled_back" ]; then
            echo "::notice title=f2-promotion-gate-daily::spec status=rolled_back — experiment concluded (SPRT accept_h0, ADR 2026-06-12); skipping gate"
          fi

  promotion-gate:
    needs: spec-status
    if: ${{ needs.spec-status.outputs.status != 'rolled_back' }}
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      issues: write  # zizmor: job-level least-privilege (Copilot review #2741)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # F-V8-B3.1 (2026-05-02): migrated to ./.github/actions/setup-python-pinned
      # composite. NOTE: this is a behavior change — previously this workflow
      # pinned 3.13 explicitly while ci.yml + 17 other workflows ran on 3.12.
      # The composite hardcodes 3.12 (matches ci.yml baseline; minimises blast
      # radius across the 28-workflow Phase 2 sweep). If the F2 promotion gate
      # genuinely requires a 3.13-only library feature, revert this hunk and
      # add a workflow-specific override (or extend the composite with an
      # `override-version:` input). No 3.13-only feature was identified during
      # plan-review.
      - name: Setup Python
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        # F-V8-B1.1 (2026-05-02): requirements.txt MUST come before `pip install -e .`
        # otherwise pandas (and other runtime-only deps not in pyproject) are missing
        # and the cron fails with ModuleNotFoundError. Carries forward F-CI-D1.
        run: |
          python -m pip install --upgrade pip
          # `pip install -e .` only installs the project itself; runtime deps
          # like pandas/numpy live in requirements.txt. Without this, the F2
          # promotion-gate orchestrator fails with `ModuleNotFoundError: No
          # module named 'pandas'` (observed run 25211945532, 2026-05-01).
          pip install -r requirements.txt
          pip install -e .

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "value=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore previous spec-status (flip detection cache)
        # #45 follow-up: last_spec_status.txt is ephemeral per runner.
        # Without restoring from a cross-run cache, PREVIOUS would
        # always equal CURRENT on fresh runners and plumbing_only->live
        # flips would never be detected.
        #
        # 2026-06-10 audit fix: the unified actions/cache action saves
        # in an implicit POST step that is SKIPPED when the job fails —
        # and this job exits 2 by design on every rollback decision.
        # Five consecutive rollback runs therefore never persisted the
        # cache (`gh cache list` showed zero entries) and every run
        # logged "Cache not found for input keys". Split into explicit
        # restore (here) + save (right after the flip-detect step,
        # BEFORE the gate step can fail) so the status survives
        # rollback-failed runs.
        id: restore-last-spec-status
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: artifacts/ci/f2/last_spec_status.txt
          key: f2-last-spec-status-v1-${{ github.run_id }}
          restore-keys: |
            f2-last-spec-status-v1-

      - name: Detect spec-status flip and reset SPRT state (#45)
        # Issue #45: when the F2 contextual-promotion spec is edited
        # from status=plumbing_only to status=live, persisted SPRT
        # state from the plumbing-only corpus must be discarded before
        # the live gate runs. We persist the previous status in
        # `artifacts/ci/f2/last_spec_status.txt` (cross-run via the
        # cache step above); on every run we compare current vs
        # previous and call scripts/f2_flip_status.py to journal the
        # transition and (on plumbing_only -> live) delete
        # artifacts/ci/f2/sprt_state.json. Helper is fail-soft so
        # missing files do not break the cron.
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          SPEC=artifacts/experiments/f2_contextual_promotion.json
          if [ ! -f "${SPEC}" ]; then
            echo "::notice title=f2-flip-status::spec missing, skipping flip detection"
            exit 0
          fi
          CURRENT=$(python -c "import json,sys; print((json.load(open('${SPEC}')) or {}).get('status','registered'))")
          LAST_FILE=artifacts/ci/f2/last_spec_status.txt
          if [ -f "${LAST_FILE}" ]; then
            PREVIOUS=$(cat "${LAST_FILE}")
          else
            PREVIOUS="${CURRENT}"  # first run: treat as no-op
          fi
          echo "::notice title=f2-flip-status::previous=${PREVIOUS} current=${CURRENT}"
          python scripts/f2_flip_status.py \
            --from "${PREVIOUS}" \
            --to   "${CURRENT}" \
            --state-file       artifacts/ci/f2/sprt_state.json \
            --journal          artifacts/ci/f2/status_flip_journal.jsonl \
            --rollback-history artifacts/ci/f2/rollback_history.json \
            --deploy-boundary  "${{ github.sha }}"
          FLIP_RC=$?
          # Only persist CURRENT to the cache file when the helper
          # succeeded; otherwise a transient helper error would mask the
          # next real flip detection (PREVIOUS would advance to CURRENT
          # despite no journal entry being written). On helper failure
          # leave the prior value intact so the flip is re-detected on
          # the next run.
          if [ "${FLIP_RC}" -eq 0 ]; then
            printf '%s' "${CURRENT}" > "${LAST_FILE}"
          else
            echo "::warning title=f2-flip-status::helper exited ${FLIP_RC}; preserving prior last_spec_status"
          fi

      - name: Save spec-status for next run (flip detection cache)
        # 2026-06-10 audit fix (see restore step above): must be an
        # explicit save placed BEFORE the gate step — the implicit
        # post-step save of the unified cache action never ran on
        # rollback days because the job fails by design (exit 2).
        # Guard on file existence: the flip-detect step skips writing
        # when the spec is missing or the helper failed, and
        # cache/save errors on a missing path.
        if: ${{ hashFiles('artifacts/ci/f2/last_spec_status.txt') != '' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: artifacts/ci/f2/last_spec_status.txt
          key: f2-last-spec-status-v1-${{ github.run_id }}

      - name: Download F2 dual-arm artifact (from rolling-bench)
        # Plan §2.4 G3 — the rolling-bench workflow publishes
        # `f2-dual-arm-<DATE>` containing the two artifact dirs the gate
        # consumes. We fetch it here BEFORE the locate step using the
        # `gh` CLI so we can resolve the most-recent matching run of the
        # rolling-bench workflow (this is a scheduled workflow, not a
        # workflow_run trigger). Soft-fail: if the artifact is missing
        # yet, the locate step exits with status=skipped exactly as it
        # did before this wiring landed.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
          ART_NAME: f2-dual-arm-${{ steps.date.outputs.value }}
          DATE:     ${{ steps.date.outputs.value }}
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          # Audit H7 fix: iterate the most-recent N rolling-bench runs
          # and take the FIRST one whose artifact actually downloads.
          # Previously we used `head -n 1` which silently ate the case
          # where the newest completed run never produced the artifact
          # (e.g. early-step failure before the upload step).
          RUN_IDS=$(gh run list \
            --workflow smc-measurement-benchmark-rolling.yml \
            --branch main \
            --limit 8 \
            --json databaseId,status \
            --jq '.[] | select(.status=="completed") | .databaseId')
          if [ -z "${RUN_IDS}" ]; then
            echo "::notice title=f2-promotion-gate::no recent rolling-bench run found"
            exit 0
          fi
          DOWNLOADED_RUN=""
          for rid in ${RUN_IDS}; do
            rm -rf artifacts/ci/f2/_attempt
            mkdir -p artifacts/ci/f2/_attempt
            if gh run download "${rid}" \
                --name "${ART_NAME}" \
                --dir  artifacts/ci/f2/_attempt/ 2>/dev/null; then
              # Promote the attempt into place.
              # F-V4-I2 (2026-05-01): best-effort copy — `_attempt/` may be empty
              # if the prior run uploaded a partial artifact; tolerate missing
              # source files intentionally so the run can continue.
              cp -R artifacts/ci/f2/_attempt/. artifacts/ci/f2/ 2>/dev/null || true
              rm -rf artifacts/ci/f2/_attempt
              DOWNLOADED_RUN="${rid}"
              echo "::notice title=f2-promotion-gate::artifact ${ART_NAME} fetched from run ${rid}"
              break
            fi
          done
          rm -rf artifacts/ci/f2/_attempt
          if [ -z "${DOWNLOADED_RUN}" ]; then
            echo "::notice title=f2-promotion-gate::artifact ${ART_NAME} not found on the last 8 completed rolling-bench runs"
            exit 0
          fi
          # Audit B6: detect a date mismatch (e.g. backfill or weekend
          # gap) where the artifact we got is older than the run we are
          # gating. The presence/absence of the per-DATE subdir is the
          # authoritative signal — the locate step uses it directly —
          # but we surface a notice here so the run summary is honest.
          if [ ! -d "artifacts/ci/f2/contextual_weights/${DATE}" ] \
             || [ ! -d "artifacts/ci/f2/static_global_weights/${DATE}" ]; then
            echo "::notice title=f2-promotion-gate::date mismatch — artifact does not contain per-DATE subdirs for ${DATE}; gate will status=skipped"
          fi
          ls -R artifacts/ci/f2/ 2>/dev/null | head -40 || true
          exit 0

      - name: Locate dual-arm artifact dirs
        id: locate
        run: |
          set +e
          DATE="${{ steps.date.outputs.value }}"
          CONTROL_DIR="artifacts/ci/f2/static_global_weights/${DATE}"
          TREATMENT_DIR="artifacts/ci/f2/contextual_weights/${DATE}"
          if [ ! -d "${CONTROL_DIR}" ] || [ ! -d "${TREATMENT_DIR}" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "control_dir=${CONTROL_DIR}" >> "$GITHUB_OUTPUT"
            echo "treatment_dir=${TREATMENT_DIR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Cron-health audit (2026-06-12): existence alone is NOT enough.
          # The rolling-bench dual-arm step runs under `if: always()`, so an
          # upstream producer-artifact failure still uploads EMPTY arm trees
          # (date dirs + manifest with zero pair_runs). Feeding those to the
          # orchestrator made it exit rc=1 ("no benchmark pairs in
          # control_dir=...") — a red run for a by-design upstream gap that
          # the L-2 skip path exists to absorb (11/11 scheduled runs red,
          # 14-day window). Require a readable manifest with >=1 pair_runs
          # entry in BOTH arms before declaring ready.
          # Pin: tests/test_f2_promotion_gate_daily_workflow_contract.py
          if ! python - "${CONTROL_DIR}" "${TREATMENT_DIR}" <<'EOF'
          import json
          import sys
          from pathlib import Path

          for arm in sys.argv[1:]:
              manifest = Path(arm) / "benchmark_run_manifest.json"
              try:
                  pair_runs = json.loads(manifest.read_text(encoding="utf-8")).get("pair_runs") or []
              except (OSError, ValueError):
                  sys.exit(1)
              if not pair_runs:
                  sys.exit(1)
          EOF
          then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "control_dir=${CONTROL_DIR}" >> "$GITHUB_OUTPUT"
            echo "treatment_dir=${TREATMENT_DIR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=ready" >> "$GITHUB_OUTPUT"
          echo "control_dir=${CONTROL_DIR}" >> "$GITHUB_OUTPUT"
          echo "treatment_dir=${TREATMENT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Skip — dual-arm artifacts not yet produced
        if: steps.locate.outputs.status == 'skipped'
        run: |
          # L-2 (audit 2026-04-24, Klasse #24+#32): emit ::warning instead of
          # ::notice so each consecutive skipped run surfaces in the GitHub
          # Actions run summary banner. The "skipped" outcome is by-design
          # while F2 dual-arm artifacts are still being generated upstream,
          # but a warning per run is the cheapest way to detect "stuck on
          # skipped for weeks" drift without a separate counter ledger.
          # Pin: tests/test_workflow_f2_skip_visibility.py
          echo "::warning title=f2-promotion-gate-daily::status=skipped reason='control or treatment arm missing or empty for ${{ steps.date.outputs.value }}' — see audit L-2"
          echo "  control:   ${{ steps.locate.outputs.control_dir }}"
          echo "  treatment: ${{ steps.locate.outputs.treatment_dir }}"

      - name: Run F2 promotion-gate orchestrator
        id: gate
        if: steps.locate.outputs.status == 'ready'
        run: |
          set +e
          mkdir -p artifacts/reports
          REPORT="artifacts/reports/f2_promotion_gate_${{ steps.date.outputs.value }}.json"
          HISTORY_ARG=""
          if [ -f "artifacts/ci/f2/rollback_history.json" ]; then
            HISTORY_ARG="--rollback-history artifacts/ci/f2/rollback_history.json"
          fi
          python scripts/f2_run_promotion_gate.py \
            --spec artifacts/experiments/f2_contextual_promotion.json \
            --control-dir   "${{ steps.locate.outputs.control_dir }}" \
            --treatment-dir "${{ steps.locate.outputs.treatment_dir }}" \
            ${HISTORY_ARG} \
            --output "${REPORT}" \
            > gate_stdout.json
          rc=$?
          DECISION=$(python -c "import json,sys; print(json.load(open('${REPORT}'))['decision'])" 2>/dev/null || echo "unknown")
          echo "rc=${rc}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "report=${REPORT}" >> "$GITHUB_OUTPUT"
          # Surface stdout for log-readability without failing on rc=2.
          cat gate_stdout.json
          # Exit code policy:
          #   0 = promote / hold / insufficient_data  -> CI green
          #   2 = rollback                            -> CI red (Issue ping)
          #   1 = config error                        -> CI red (real bug)
          if [ "${rc}" -eq 0 ] || [ "${rc}" -eq 2 ]; then
            exit "${rc}"
          fi
          # F-V4-A4 (2026-05-01): unexpected rc — surface as ::error:: annotation.
          echo "::error::f2 promotion gate emitted unexpected return code ${rc} (expected 0=pass, 2=rollback, 1=config-error). Treating as config-error and failing CI."
          exit 1

      - name: Append rollback history
        # Run BEFORE annotate/upload so the bounded-ring file the next
        # day's gate consumes is part of this run's uploaded artifact.
        # Skip on rollback rc=2 to avoid double-counting after the
        # gate already tripped (next manual review owns the reset).
        if: steps.locate.outputs.status == 'ready' && steps.gate.outputs.rc == '0'
        run: |
          mkdir -p artifacts/ci/f2
          python scripts/f2_append_rollback_history.py \
            --report  "${{ steps.gate.outputs.report }}" \
            --history artifacts/ci/f2/rollback_history.json \
            --metric  calibrated_brier \
            --max-len 30

      - name: Open rollback Issue (§2.4 G2 ping)
        # Fires only on the rollback path. Idempotent-ish: searches for
        # an open cron-failure issue titled "[F2 rollback]…" and either
        # comments or creates a new one. Failures here MUST NOT mask the gate
        # failure -- the workflow still exits 2 because of the gate step.
        # WF-003 fix: needs always() because the gate step exits 2 on
        # rollback (run is marked failed); without always() this step
        # is skipped and the operator never gets the ping.
        if: always() && steps.locate.outputs.status == 'ready' && steps.gate.outputs.rc == '2'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
        run: |
          set -e
          python scripts/f2_render_rollback_issue.py \
            --report "${{ steps.gate.outputs.report }}" \
            --date   "${{ steps.date.outputs.value }}" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --report-path "${{ steps.gate.outputs.report }}" \
            --title-out /tmp/issue_title.txt \
            --body-out  /tmp/issue_body.md
          TITLE=$(cat /tmp/issue_title.txt)
          # Look for an existing open rollback issue (any date) to avoid
          # duplicates on consecutive bad days; comment on it instead.
          # 2026-06-12: restrict the search with an in:title filter on
          # TITLE_PREFIX (imported at runtime from
          # scripts/f2_render_rollback_issue.py so the two cannot drift).
          # The previous label-only query matched ANY open cron-failure
          # issue, so the 2026-06-12 rollback ping landed in the
          # unrelated credential-health issue #2732.
          # '// empty' suppresses jq's literal "null" output when the array is
          # empty so that -n correctly sees an empty string (not "null").
          TITLE_PREFIX=$(python -c 'from scripts.f2_render_rollback_issue import TITLE_PREFIX; print(TITLE_PREFIX)')
          EXISTING=$(gh issue list --state open --label cron-failure --search "\"${TITLE_PREFIX}\" in:title" --limit 1 --json number --jq '.[0].number // empty' || true)
          if [ -n "${EXISTING}" ]; then
            echo "Existing rollback issue #${EXISTING} found; commenting."
            gh issue comment "${EXISTING}" --body-file /tmp/issue_body.md
          else
            echo "No open rollback issue; creating new one."
            gh issue create --title "${TITLE}" --body-file /tmp/issue_body.md --label cron-failure
          fi

      - name: Auto-revert contextual calibration (§2.4 G2)
        # Demote the treatment artifact from production -> shadow and
        # journal the action. No-op when the artifact does not exist
        # yet (chicken-and-egg) or is already shadow. Failure here
        # MUST NOT mask the gate exit code (gate's own rc=2 is the
        # primary signal), BUT a silently-failed revert is itself a
        # critical operator-visible event — surface it as ::error::
        # annotation while keeping the step rc=0 so the gate signal
        # wins. (Bundle A hardening 2026-05-28.)
        # WF-003 fix: needs always() because the gate step exits 2 on
        # rollback; without always() the revert is silently skipped.
        if: always() && steps.locate.outputs.status == 'ready' && steps.gate.outputs.rc == '2'
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          python scripts/f2_revert_contextual_weights.py \
            --spec    artifacts/experiments/f2_contextual_promotion.json \
            --report  "${{ steps.gate.outputs.report }}" \
            --journal artifacts/ci/f2/revert_journal.jsonl
          revert_rc=$?
          if [ "$revert_rc" -ne 0 ]; then
            echo "::error title=f2-promotion-gate::auto-revert FAILED (rc=$revert_rc) — treatment artifact may still be flagged production; investigate scripts/f2_revert_contextual_weights.py log above"
          fi
          # Exit 0 unconditionally so the workflow's own rc=2 stays
          # the primary signal (revert is auxiliary).
          exit 0

      - name: Annotate decision
        if: always() && steps.locate.outputs.status == 'ready'
        run: |
          echo "::notice title=f2-promotion-gate-daily::date=${{ steps.date.outputs.value }} decision=${{ steps.gate.outputs.decision || 'unknown' }} rc=${{ steps.gate.outputs.rc || 'unknown' }}"

      - name: Stalled-gate streak alert (audit M8 follow-up)
        # Always runs (even on skip / rollback / config error). Detects
        # multi-day skipped/insufficient_data/hold streaks that would
        # otherwise silently extend the 30-day countdown. Failure here
        # MUST NOT mask the gate exit code; the script itself never
        # returns non-zero on alert (it emits ::warning::).
        # Bundle A hardening 2026-05-28: a NON-alert script crash (e.g.
        # import/parse error) used to be silently swallowed by
        # `|| true` — surface as ::error:: while keeping step rc=0.
        if: always()
        run: |
          set +e
          python scripts/f2_status_alert.py \
            --reports-dir artifacts/reports \
            --threshold   3 \
            > artifacts/ci/f2/status_alert.json
          alert_rc=$?
          if [ "$alert_rc" -ne 0 ]; then
            echo "::error title=f2-promotion-gate::f2_status_alert.py CRASHED (rc=$alert_rc) — stalled-gate streak detection is offline this run; investigate stderr above"
          fi
          if [ -f artifacts/ci/f2/status_alert.json ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo '## F2 stalled-gate streak alert'
              echo ''
              echo '```json'
              cat artifacts/ci/f2/status_alert.json
              echo ''
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
          # Step must succeed unconditionally so gate's own rc stays the
          # primary signal; crashes were already surfaced as ::error:: above.
          exit 0

      - name: Pipeline status summary
        # Always runs (even on skip / rollback / config error) so each
        # run leaves an operator-readable digest of where F2 stands
        # right now: history length / last delta / trend / consecutive
        # worse-or-better counts / per-decision counts / latest report
        # decision + SPRT terminal block. Failure here MUST NOT mask
        # the gate exit code, so we tolerate a non-zero rc.
        if: always()
        run: |
          mkdir -p artifacts/ci/f2
          python scripts/f2_summarize_history.py \
            --history      artifacts/ci/f2/rollback_history.json \
            --reports-dir  artifacts/reports \
            --trend-window 30 \
            --output       artifacts/ci/f2/history_summary.json || true
          if [ -f artifacts/ci/f2/history_summary.json ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo '## F2 history summary'
              echo ''
              echo '```json'
              cat artifacts/ci/f2/history_summary.json
              echo ''
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Contextual arm status snapshot
        # Always runs. Fuses the live treatment artifact, both journals
        # (revert + promote), and the latest promotion-gate report into
        # one operator-readable JSON. Failure here MUST NOT mask the
        # gate exit code, so we tolerate a non-zero rc.
        if: always()
        run: |
          mkdir -p artifacts/ci/f2
          python scripts/f2_inspect_status.py \
            --spec            artifacts/experiments/f2_contextual_promotion.json \
            --revert-journal  artifacts/ci/f2/revert_journal.jsonl \
            --promote-journal artifacts/ci/f2/promote_journal.jsonl \
            --reports-dir     artifacts/reports \
            --output          artifacts/ci/f2/status_snapshot.json || true
          # One-line annotation for log-readability. Tolerated on failure.
          ONE_LINE=$(python scripts/f2_inspect_status.py \
            --spec            artifacts/experiments/f2_contextual_promotion.json \
            --revert-journal  artifacts/ci/f2/revert_journal.jsonl \
            --promote-journal artifacts/ci/f2/promote_journal.jsonl \
            --reports-dir     artifacts/reports \
            --quiet 2>/dev/null || echo "f2[?] status_unavailable")
          echo "::notice title=f2-contextual-arm::${ONE_LINE}"
          if [ -f artifacts/ci/f2/status_snapshot.json ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo '## F2 contextual arm status'
              echo ''
              echo '```json'
              cat artifacts/ci/f2/status_snapshot.json
              echo ''
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Operator runbook (consolidated)
        # Always runs. Produces a pasteable Markdown digest that fuses
        # the status snapshot, the 7-day weekly digest, and the tail of
        # the rollback-history ring. Streams the Markdown directly to
        # the step summary so on-call operators can eyeball it without
        # downloading artifacts. Failure here MUST NOT mask the gate
        # exit code.
        if: always()
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          python scripts/f2_runbook.py \
            --spec            artifacts/experiments/f2_contextual_promotion.json \
            --revert-journal  artifacts/ci/f2/revert_journal.jsonl \
            --reports-dir     artifacts/reports \
            --history         artifacts/ci/f2/rollback_history.json \
            --window-days     7 \
            --ring-tail       5 \
            --output          artifacts/ci/f2/runbook.json \
            --format          md \
            > /tmp/runbook.md 2>/dev/null
          if [ -s /tmp/runbook.md ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat /tmp/runbook.md >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Prune stale archive entries (>90d)
        # Always runs. Keeps contextual_calibration.archive/ bounded so
        # the uploaded bundle does not bloat over time. Journals every
        # prune to artifacts/ci/f2/cleanup_archives_journal.jsonl for
        # audit. Failure MUST NOT mask the gate exit code.
        if: always()
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          python scripts/f2_cleanup_archives.py \
            --archive-dir   artifacts/ci/f2/contextual_calibration.archive \
            --max-age-days  90 \
            --journal       artifacts/ci/f2/cleanup_archives_journal.jsonl \
            --output        artifacts/ci/f2/cleanup_archives.json \
            --quiet
          true

      - name: Upload promotion-gate artifact
        if: always() && steps.locate.outputs.status == 'ready'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: f2-promotion-gate-${{ steps.date.outputs.value }}-${{ github.run_id }}
          path: |
            artifacts/reports/f2_promotion_gate_*.json
            artifacts/ci/f2/rollback_history.json
            artifacts/ci/f2/history_summary.json
            artifacts/ci/f2/status_snapshot.json
            artifacts/ci/f2/runbook.json
            artifacts/ci/f2/cleanup_archives.json
            artifacts/ci/f2/cleanup_archives_journal.jsonl
            artifacts/ci/f2/revert_journal.jsonl
            artifacts/ci/f2/promote_journal.jsonl
            artifacts/ci/f2/contextual_calibration.archive/**
            gate_stdout.json
          if-no-files-found: ignore
          retention-days: 60
