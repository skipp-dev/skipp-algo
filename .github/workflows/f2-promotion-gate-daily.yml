# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: f2-promotion-gate-daily

# F2 Contextual Promotion Gate — daily evaluation.
#
# Plan reference:
#   smc_improvement_plan_q3_q4_2026-04-20.md §2.3 F2 + §2.4 G3
# Spec:
#   artifacts/experiments/f2_contextual_promotion.json
# Decision memo:
#   docs/f2_contextual_promotion_decision_2026-04-21.md
#
# Each day this workflow:
#   1. Locates the most recent dual-arm artifact dirs produced by the
#      rolling-benchmark workflow (control = static_global_weights,
#      treatment = contextual_weights).
#   2. Runs scripts/f2_run_promotion_gate.py against them and the
#      shipping spec.
#   3. Uploads the resulting promotion-gate JSON as an Actions artifact.
#   4. Annotates the run with the decision and exits non-zero on
#      'rollback' so the GitHub-Issue-Ping rule (plan §2.4 G2) can
#      key off the workflow failure.
#
# Fail-soft semantics:
#   * If either arm directory is missing yet (the rolling-benchmark
#     workflow has not produced the contextual arm), the job exits 0
#     with status=skipped so the wall-clock countdown to the 30-day
#     window keeps ticking.
#   * Configuration errors (missing spec, malformed history) exit 1
#     and surface in CI normally.
#   * decision==rollback exits 2 -> workflow marked failed.
#
# Nothing in this workflow mutates production calibration. Promotion
# is a separate, manual follow-up step driven by the on_promote
# action list in the spec.

on:
  schedule:
    # 10:00 UTC daily — runs after smc-measurement-benchmark-rolling
    # (07:30 UTC) and feature-importance-daily (09:00 UTC) so the
    # dual-arm artifact dirs are guaranteed to be in place.
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Override the date sub-dir to evaluate (YYYY-MM-DD). Default: today UTC."
        required: false
        default: ""

permissions:
  contents: read
  # §2.4 G2 GitHub-Issue-Ping rule needs issues:write so the workflow
  # can file a rollback issue when the gate exits with rc=2.
  issues: write
  # §2.4 G3 dual-arm wiring — `gh run list` + `gh run download` need
  # actions:read to fetch the rolling-bench artifact.
  actions: read

concurrency:
  group: f2-promotion-gate-daily
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

jobs:
  promotion-gate:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-m' }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        # F-V8-B1.1 (2026-05-02): requirements.txt MUST come before `pip install -e .`
        # otherwise pandas (and other runtime-only deps not in pyproject) are missing
        # and the cron fails with ModuleNotFoundError. Carries forward F-CI-D1.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "value=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download F2 dual-arm artifact (from rolling-bench)
        # Plan §2.4 G3 — the rolling-bench workflow publishes
        # `f2-dual-arm-<DATE>` containing the two artifact dirs the gate
        # consumes. We fetch it here BEFORE the locate step using the
        # `gh` CLI so we can resolve the most-recent matching run of the
        # rolling-bench workflow (this is a scheduled workflow, not a
        # workflow_run trigger). Soft-fail: if the artifact is missing
        # yet, the locate step exits with status=skipped exactly as it
        # did before this wiring landed.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
          ART_NAME: f2-dual-arm-${{ steps.date.outputs.value }}
          DATE:     ${{ steps.date.outputs.value }}
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          # Audit H7 fix: iterate the most-recent N rolling-bench runs
          # and take the FIRST one whose artifact actually downloads.
          # Previously we used `head -n 1` which silently ate the case
          # where the newest completed run never produced the artifact
          # (e.g. early-step failure before the upload step).
          RUN_IDS=$(gh run list \
            --workflow smc-measurement-benchmark-rolling.yml \
            --branch main \
            --limit 8 \
            --json databaseId,status \
            --jq '.[] | select(.status=="completed") | .databaseId')
          if [ -z "${RUN_IDS}" ]; then
            echo "::notice title=f2-promotion-gate::no recent rolling-bench run found"
            exit 0
          fi
          DOWNLOADED_RUN=""
          for rid in ${RUN_IDS}; do
            rm -rf artifacts/ci/f2/_attempt
            mkdir -p artifacts/ci/f2/_attempt
            if gh run download "${rid}" \
                --name "${ART_NAME}" \
                --dir  artifacts/ci/f2/_attempt/ 2>/dev/null; then
              # Promote the attempt into place.
              cp -R artifacts/ci/f2/_attempt/. artifacts/ci/f2/ 2>/dev/null || true
              rm -rf artifacts/ci/f2/_attempt
              DOWNLOADED_RUN="${rid}"
              echo "::notice title=f2-promotion-gate::artifact ${ART_NAME} fetched from run ${rid}"
              break
            fi
          done
          rm -rf artifacts/ci/f2/_attempt
          if [ -z "${DOWNLOADED_RUN}" ]; then
            echo "::notice title=f2-promotion-gate::artifact ${ART_NAME} not found on the last 8 completed rolling-bench runs"
            exit 0
          fi
          # Audit B6: detect a date mismatch (e.g. backfill or weekend
          # gap) where the artifact we got is older than the run we are
          # gating. The presence/absence of the per-DATE subdir is the
          # authoritative signal — the locate step uses it directly —
          # but we surface a notice here so the run summary is honest.
          if [ ! -d "artifacts/ci/f2/contextual_weights/${DATE}" ] \
             || [ ! -d "artifacts/ci/f2/static_global_weights/${DATE}" ]; then
            echo "::notice title=f2-promotion-gate::date mismatch — artifact does not contain per-DATE subdirs for ${DATE}; gate will status=skipped"
          fi
          ls -R artifacts/ci/f2/ 2>/dev/null | head -40 || true
          exit 0

      - name: Locate dual-arm artifact dirs
        id: locate
        run: |
          set +e
          DATE="${{ steps.date.outputs.value }}"
          CONTROL_DIR="artifacts/ci/f2/static_global_weights/${DATE}"
          TREATMENT_DIR="artifacts/ci/f2/contextual_weights/${DATE}"
          if [ ! -d "${CONTROL_DIR}" ] || [ ! -d "${TREATMENT_DIR}" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "control_dir=${CONTROL_DIR}" >> "$GITHUB_OUTPUT"
            echo "treatment_dir=${TREATMENT_DIR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=ready" >> "$GITHUB_OUTPUT"
          echo "control_dir=${CONTROL_DIR}" >> "$GITHUB_OUTPUT"
          echo "treatment_dir=${TREATMENT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Skip — dual-arm artifacts not yet produced
        if: steps.locate.outputs.status == 'skipped'
        run: |
          # L-2 (audit 2026-04-24, Klasse #24+#32): emit ::warning instead of
          # ::notice so each consecutive skipped run surfaces in the GitHub
          # Actions run summary banner. The "skipped" outcome is by-design
          # while F2 dual-arm artifacts are still being generated upstream,
          # but a warning per run is the cheapest way to detect "stuck on
          # skipped for weeks" drift without a separate counter ledger.
          # Pin: tests/test_workflow_f2_skip_visibility.py
          echo "::warning title=f2-promotion-gate-daily::status=skipped reason='control or treatment artifact dir missing for ${{ steps.date.outputs.value }}' — see audit L-2"
          echo "  control:   ${{ steps.locate.outputs.control_dir }}"
          echo "  treatment: ${{ steps.locate.outputs.treatment_dir }}"

      - name: Run F2 promotion-gate orchestrator
        id: gate
        if: steps.locate.outputs.status == 'ready'
        run: |
          set +e
          mkdir -p artifacts/reports
          REPORT="artifacts/reports/f2_promotion_gate_${{ steps.date.outputs.value }}.json"
          HISTORY_ARG=""
          if [ -f "artifacts/ci/f2/rollback_history.json" ]; then
            HISTORY_ARG="--rollback-history artifacts/ci/f2/rollback_history.json"
          fi
          python scripts/f2_run_promotion_gate.py \
            --spec artifacts/experiments/f2_contextual_promotion.json \
            --control-dir   "${{ steps.locate.outputs.control_dir }}" \
            --treatment-dir "${{ steps.locate.outputs.treatment_dir }}" \
            ${HISTORY_ARG} \
            --output "${REPORT}" \
            > gate_stdout.json
          rc=$?
          DECISION=$(python -c "import json,sys; print(json.load(open('${REPORT}'))['decision'])" 2>/dev/null || echo "unknown")
          echo "rc=${rc}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "report=${REPORT}" >> "$GITHUB_OUTPUT"
          # Surface stdout for log-readability without failing on rc=2.
          cat gate_stdout.json
          # Exit code policy:
          #   0 = promote / hold / insufficient_data  -> CI green
          #   2 = rollback                            -> CI red (Issue ping)
          #   1 = config error                        -> CI red (real bug)
          if [ "${rc}" -eq 0 ] || [ "${rc}" -eq 2 ]; then
            exit "${rc}"
          fi
          exit 1

      - name: Append rollback history
        # Run BEFORE annotate/upload so the bounded-ring file the next
        # day's gate consumes is part of this run's uploaded artifact.
        # Skip on rollback rc=2 to avoid double-counting after the
        # gate already tripped (next manual review owns the reset).
        if: steps.locate.outputs.status == 'ready' && steps.gate.outputs.rc == '0'
        run: |
          mkdir -p artifacts/ci/f2
          python scripts/f2_append_rollback_history.py \
            --report  "${{ steps.gate.outputs.report }}" \
            --history artifacts/ci/f2/rollback_history.json \
            --metric  calibrated_brier \
            --max-len 30

      - name: Open rollback Issue (§2.4 G2 ping)
        # Fires only on the rollback path. Idempotent-ish: searches for
        # an open issue with the f2-rollback label and either comments
        # or creates a new one. Failures here MUST NOT mask the gate
        # failure -- the workflow still exits 2 because of the gate step.
        if: steps.locate.outputs.status == 'ready' && steps.gate.outputs.rc == '2'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
        run: |
          set -e
          python scripts/f2_render_rollback_issue.py \
            --report "${{ steps.gate.outputs.report }}" \
            --date   "${{ steps.date.outputs.value }}" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --report-path "${{ steps.gate.outputs.report }}" \
            --title-out /tmp/issue_title.txt \
            --body-out  /tmp/issue_body.md
          TITLE=$(cat /tmp/issue_title.txt)
          # Look for an existing open rollback issue (any date) to avoid
          # duplicates on consecutive bad days; comment on it instead.
          EXISTING=$(gh issue list --state open --label cron-failure --limit 1 --json number --jq '.[0].number' || true)
          if [ -n "${EXISTING}" ]; then
            echo "Existing rollback issue #${EXISTING} found; commenting."
            gh issue comment "${EXISTING}" --body-file /tmp/issue_body.md
          else
            echo "No open rollback issue; creating new one."
            gh issue create --title "${TITLE}" --body-file /tmp/issue_body.md --label cron-failure
          fi

      - name: Auto-revert contextual calibration (§2.4 G2)
        # Demote the treatment artifact from production -> shadow and
        # journal the action. No-op when the artifact does not exist
        # yet (chicken-and-egg) or is already shadow. Failure here
        # MUST NOT mask the gate exit code.
        if: steps.locate.outputs.status == 'ready' && steps.gate.outputs.rc == '2'
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          python scripts/f2_revert_contextual_weights.py \
            --spec    artifacts/experiments/f2_contextual_promotion.json \
            --report  "${{ steps.gate.outputs.report }}" \
            --journal artifacts/ci/f2/revert_journal.jsonl
          # Tolerate non-zero so the workflow's own rc=2 stays the
          # primary signal.
          true

      - name: Annotate decision
        if: always() && steps.locate.outputs.status == 'ready'
        run: |
          echo "::notice title=f2-promotion-gate-daily::date=${{ steps.date.outputs.value }} decision=${{ steps.gate.outputs.decision || 'unknown' }} rc=${{ steps.gate.outputs.rc || 'unknown' }}"

      - name: Stalled-gate streak alert (audit M8 follow-up)
        # Always runs (even on skip / rollback / config error). Detects
        # multi-day skipped/insufficient_data/hold streaks that would
        # otherwise silently extend the 30-day countdown. Failure here
        # MUST NOT mask the gate exit code; the script itself never
        # returns non-zero on alert (it emits ::warning::).
        if: always()
        run: |
          python scripts/f2_status_alert.py \
            --reports-dir artifacts/reports \
            --threshold   3 \
            > artifacts/ci/f2/status_alert.json || true
          if [ -f artifacts/ci/f2/status_alert.json ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo '## F2 stalled-gate streak alert'
              echo ''
              echo '```json'
              cat artifacts/ci/f2/status_alert.json
              echo ''
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Pipeline status summary
        # Always runs (even on skip / rollback / config error) so each
        # run leaves an operator-readable digest of where F2 stands
        # right now: history length / last delta / trend / consecutive
        # worse-or-better counts / per-decision counts / latest report
        # decision + SPRT terminal block. Failure here MUST NOT mask
        # the gate exit code, so we tolerate a non-zero rc.
        if: always()
        run: |
          mkdir -p artifacts/ci/f2
          python scripts/f2_summarize_history.py \
            --history      artifacts/ci/f2/rollback_history.json \
            --reports-dir  artifacts/reports \
            --trend-window 30 \
            --output       artifacts/ci/f2/history_summary.json || true
          if [ -f artifacts/ci/f2/history_summary.json ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo '## F2 history summary'
              echo ''
              echo '```json'
              cat artifacts/ci/f2/history_summary.json
              echo ''
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Contextual arm status snapshot
        # Always runs. Fuses the live treatment artifact, both journals
        # (revert + promote), and the latest promotion-gate report into
        # one operator-readable JSON. Failure here MUST NOT mask the
        # gate exit code, so we tolerate a non-zero rc.
        if: always()
        run: |
          mkdir -p artifacts/ci/f2
          python scripts/f2_inspect_status.py \
            --spec            artifacts/experiments/f2_contextual_promotion.json \
            --revert-journal  artifacts/ci/f2/revert_journal.jsonl \
            --promote-journal artifacts/ci/f2/promote_journal.jsonl \
            --reports-dir     artifacts/reports \
            --output          artifacts/ci/f2/status_snapshot.json || true
          # One-line annotation for log-readability. Tolerated on failure.
          ONE_LINE=$(python scripts/f2_inspect_status.py \
            --spec            artifacts/experiments/f2_contextual_promotion.json \
            --revert-journal  artifacts/ci/f2/revert_journal.jsonl \
            --promote-journal artifacts/ci/f2/promote_journal.jsonl \
            --reports-dir     artifacts/reports \
            --quiet 2>/dev/null || echo "f2[?] status_unavailable")
          echo "::notice title=f2-contextual-arm::${ONE_LINE}"
          if [ -f artifacts/ci/f2/status_snapshot.json ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo '## F2 contextual arm status'
              echo ''
              echo '```json'
              cat artifacts/ci/f2/status_snapshot.json
              echo ''
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Operator runbook (consolidated)
        # Always runs. Produces a pasteable Markdown digest that fuses
        # the status snapshot, the 7-day weekly digest, and the tail of
        # the rollback-history ring. Streams the Markdown directly to
        # the step summary so on-call operators can eyeball it without
        # downloading artifacts. Failure here MUST NOT mask the gate
        # exit code.
        if: always()
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          python scripts/f2_runbook.py \
            --spec            artifacts/experiments/f2_contextual_promotion.json \
            --revert-journal  artifacts/ci/f2/revert_journal.jsonl \
            --reports-dir     artifacts/reports \
            --history         artifacts/ci/f2/rollback_history.json \
            --window-days     7 \
            --ring-tail       5 \
            --output          artifacts/ci/f2/runbook.json \
            --format          md \
            > /tmp/runbook.md 2>/dev/null
          if [ -s /tmp/runbook.md ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat /tmp/runbook.md >> "${GITHUB_STEP_SUMMARY}"
          fi
          true

      - name: Prune stale archive entries (>90d)
        # Always runs. Keeps contextual_calibration.archive/ bounded so
        # the uploaded bundle does not bloat over time. Journals every
        # prune to artifacts/ci/f2/cleanup_archives_journal.jsonl for
        # audit. Failure MUST NOT mask the gate exit code.
        if: always()
        run: |
          set +e
          mkdir -p artifacts/ci/f2
          python scripts/f2_cleanup_archives.py \
            --archive-dir   artifacts/ci/f2/contextual_calibration.archive \
            --max-age-days  90 \
            --journal       artifacts/ci/f2/cleanup_archives_journal.jsonl \
            --output        artifacts/ci/f2/cleanup_archives.json \
            --quiet
          true

      - name: Upload promotion-gate artifact
        if: always() && steps.locate.outputs.status == 'ready'
        uses: actions/upload-artifact@v4
        with:
          name: f2-promotion-gate-${{ steps.date.outputs.value }}-${{ github.run_id }}
          path: |
            artifacts/reports/f2_promotion_gate_*.json
            artifacts/ci/f2/rollback_history.json
            artifacts/ci/f2/history_summary.json
            artifacts/ci/f2/status_snapshot.json
            artifacts/ci/f2/runbook.json
            artifacts/ci/f2/cleanup_archives.json
            artifacts/ci/f2/cleanup_archives_journal.jsonl
            artifacts/ci/f2/revert_journal.jsonl
            artifacts/ci/f2/promote_journal.jsonl
            artifacts/ci/f2/contextual_calibration.archive/**
            gate_stdout.json
          if-no-files-found: ignore
          retention-days: 60
