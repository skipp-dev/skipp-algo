# live-window: off-hours-only  # Sundays 06:00 UTC — outside trading window 13:30–20:00 UTC (F-V6-F2.1, 2026-05-25)
# Weekly promotion-gate dashboard (PQ Re-Audit A8 / #2354)
#
# Runs every Sunday 06:00 UTC. Re-aggregates the last 12 ISO weeks of
# archived promotion-gate reports from governance/promotion_decisions/
# into a single JSON + PNG artefact that the risk-owner reviews before
# the Monday gate cycle.
#
# Fail-soft contract: when the archive directory is empty (e.g. before
# the first archived report lands), the script still writes an
# empty-but-valid dashboard JSON and exits 0 so the cron stays green.

name: promotion-gate-weekly-dashboard

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      lookback_weeks:
        description: "Trailing window in ISO weeks (default 12)."
        required: false
        default: "12"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  dashboard:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install matplotlib
          pip install -e .

      - name: Resolve lookback window
        id: window
        run: |
          if [ -n "${{ inputs.lookback_weeks }}" ]; then
            echo "value=${{ inputs.lookback_weeks }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=12" >> "$GITHUB_OUTPUT"
          fi

      - name: Build weekly dashboard
        run: |
          python -m scripts.build_promotion_gate_dashboard \
            --source-dir governance/promotion_decisions \
            --output-dir artifacts/governance \
            --lookback-weeks "${{ steps.window.outputs.value }}"

      - name: Upload dashboard artefact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: promotion-gate-weekly-dashboard
          path: artifacts/governance/promotion_gate_dashboard_*
          if-no-files-found: error
          retention-days: 90
