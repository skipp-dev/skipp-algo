name: feature-importance-daily

# A1.D — G1 Feature-Importance Baseline Seed (Amendment A1.D).
#
# Runs the recurring feature-importance report so the daily samples in
# artifacts/open_prep/outcomes/feature_importance/ accumulate. Without
# this cron the FI directory stays empty and G1/G2/G3 in the Q3/Q4 plan
# cannot start.
#
# This workflow is fail-soft: status=no_data is an annotation, not a
# job failure, so the wall-clock countdown to the G1 acceptance gate
# (≥ 5 sequential days, status=ok) keeps running even on weekends or
# upstream-quiet days.
#
# Nothing in this workflow mutates production calibration or pushes
# code. Reports are uploaded as Actions artifacts only.

on:
  schedule:
    # 09:00 UTC daily — runs after smc-measurement-benchmark-rolling
    # (07:30 UTC) so an outcome-backfill that depends on the same
    # window has had time to land.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      lookback:
        description: "Lookback window in days (default 7)"
        required: false
        default: "7"

permissions:
  contents: read

concurrency:
  group: feature-importance-daily
  cancel-in-progress: false

jobs:
  feature-importance-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run feature-importance report
        id: fi
        env:
          LOOKBACK: ${{ inputs.lookback || '7' }}
        run: |
          set +e
          python -m open_prep.feature_importance_report --lookback "${LOOKBACK}" 2>&1 | tee fi_report.log
          rc=$?
          # Treat status=no_data as success so the countdown to the
          # G1 acceptance gate keeps ticking even before day-5.
          if grep -q "status=no_data" fi_report.log; then
            echo "fi_status=no_data" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$rc" -ne 0 ]; then
            echo "fi_status=error" >> "$GITHUB_OUTPUT"
            exit "$rc"
          fi
          echo "fi_status=ok" >> "$GITHUB_OUTPUT"

      - name: Annotate status
        if: always()
        run: |
          echo "::notice title=feature-importance-daily::status=${{ steps.fi.outputs.fi_status || 'unknown' }} lookback=${{ inputs.lookback || '7' }}"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-importance-report-${{ github.run_id }}
          path: |
            fi_report.log
            artifacts/open_prep/outcomes/feature_importance/latest.json
          if-no-files-found: ignore
          retention-days: 30
