# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: feature-importance-daily

# A1.D — G1 Feature-Importance Baseline Seed (Amendment A1.D).
#
# Runs the recurring feature-importance report so the raw daily samples in
# artifacts/open_prep/outcomes/feature_importance/ accumulate and the
# generated report in artifacts/open_prep/feature_importance/ stays fresh.
# Without this cron the FI feedback loop stays stale and G1/G2/G3 in the
# Q3/Q4 plan cannot start.
#
# This workflow is fail-soft: status=no_data is an annotation, not a
# job failure, so the wall-clock countdown to the G1 acceptance gate
# (≥ 5 sequential days, status=ok) keeps running even on weekends or
# upstream-quiet days.
#
# Nothing in this workflow mutates production calibration or pushes
# code. Reports are uploaded as Actions artifacts only.

on:
  schedule:
    # 09:00 UTC daily — runs after smc-measurement-benchmark-rolling
    # (07:30 UTC) so an outcome-backfill that depends on the same
    # window has had time to land.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      lookback:
        description: "Lookback window in days (default 7)"
        required: false
        default: "7"

permissions:
  contents: read

concurrency:
  group: feature-importance-daily
  cancel-in-progress: false

env:
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}

defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          SMC_FORCE_GH_HOSTED: ${{ vars.SMC_FORCE_GH_HOSTED }}
        run: |
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_PRIORITY_CRON_GPU_SELF_HOSTED_LABEL || vars.SMC_PRIORITY_CRON_SELF_HOSTED_LABEL || vars.SMC_SELF_HOSTED_LABEL }}"

  feature-importance-report:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 20
    steps:
      - name: Announce selected runner
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Install dependencies
        run: |
          "$SMC_PYTHON_BIN" -m pip install --upgrade pip
          "$SMC_PYTHON_BIN" -m pip install -r requirements.txt
          "$SMC_PYTHON_BIN" -m pip install -e .

      - name: Install GPU dependencies
        if: needs.select-runner.outputs.runner_environment == 'self-hosted'
        run: |
          "$SMC_PYTHON_BIN" -m pip install -r requirements-gpu.txt

      - name: Select feature-importance backend
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "self-hosted" ]]; then
            echo "OPEN_PREP_FI_BACKEND=gpu" >> "$GITHUB_ENV"
            echo "OPEN_PREP_FI_GPU_DEVICE=0" >> "$GITHUB_ENV"
            echo "::notice::Feature-importance report will run on the GPU backend."
          else
            echo "OPEN_PREP_FI_BACKEND=cpu" >> "$GITHUB_ENV"
            echo "::notice::Feature-importance report is running on the CPU fallback backend."
          fi

      - name: Run feature-importance report
        id: fi
        env:
          LOOKBACK: ${{ inputs.lookback || '7' }}
        run: |
          set +e
          "$SMC_PYTHON_BIN" -m open_prep.feature_importance_report --lookback "${LOOKBACK}" 2>&1 | tee fi_report.log
          rc=$?
          # Treat status=no_data as success so the countdown to the
          # G1 acceptance gate keeps ticking even before day-5.
          if grep -q "status=no_data" fi_report.log; then
            echo "fi_status=no_data" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -ne 0 ]; then
            echo "fi_status=error" >> "$GITHUB_OUTPUT"
            exit "$rc"
          else
            echo "fi_status=ok" >> "$GITHUB_OUTPUT"
          fi
          # E4-3 (Q3): surface the ranking_drift status so the daily run
          # behaves like the existing weight-drift-gate. The script
          # itself stays exit-0 (fail-soft); we only emit a workflow
          # annotation + step-summary line. Parses the single-line
          # "drift_status=…" token written by the script.
          drift_status=$(grep -oE 'drift_status=[a-z]+' fi_report.log | head -1 | cut -d= -f2)
          drift_max=$(grep -oE 'drift_max_delta=[0-9]+' fi_report.log | head -1 | cut -d= -f2)
          echo "drift_status=${drift_status:-unknown}" >> "$GITHUB_OUTPUT"
          echo "drift_max_delta=${drift_max:-0}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Annotate status
        if: always()
        run: |
          echo "::notice title=feature-importance-daily::status=${{ steps.fi.outputs.fi_status || 'unknown' }} lookback=${{ inputs.lookback || '7' }} drift_status=${{ steps.fi.outputs.drift_status || 'unknown' }} drift_max_delta=${{ steps.fi.outputs.drift_max_delta || '0' }}"
          {
            echo "## feature-importance-daily"
            echo ""
            echo "- status: \`${{ steps.fi.outputs.fi_status || 'unknown' }}\`"
            echo "- ranking_drift: \`${{ steps.fi.outputs.drift_status || 'unknown' }}\` (max position delta: \`${{ steps.fi.outputs.drift_max_delta || '0' }}\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on ranking drift
        if: steps.fi.outputs.drift_status == 'warn'
        run: |
          echo "::warning title=feature-importance ranking drift::Top feature ranking shifted by ≥${{ steps.fi.outputs.drift_max_delta }} positions vs the previous ok report. See fi_report.log for the per-feature delta list."
          {
            echo ""
            echo "### ⚠ Ranking drift detected"
            echo ""
            echo '```'
            grep -A20 "Feature-importance ranking drift" fi_report.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: feature-importance-report-${{ github.run_id }}
          path: |
            fi_report.log
            artifacts/open_prep/feature_importance/latest.json
          if-no-files-found: ignore
          retention-days: 30
