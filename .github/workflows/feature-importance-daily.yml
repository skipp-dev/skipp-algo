# live-window: off-hours-only  # F-V6-F2.1 (2026-05-02)
name: feature-importance-daily

# A1.D — G1 Feature-Importance Baseline Seed (Amendment A1.D).
#
# Runs the recurring feature-importance report so the daily samples in
# artifacts/open_prep/outcomes/feature_importance/ accumulate. Without
# this cron the FI directory stays empty and G1/G2/G3 in the Q3/Q4 plan
# cannot start.
#
# This workflow is fail-soft: status=no_data is an annotation, not a
# job failure, so the wall-clock countdown to the G1 acceptance gate
# (≥ 5 sequential days, status=ok) keeps running even on weekends or
# upstream-quiet days.
#
# Nothing in this workflow mutates production calibration or pushes
# code. Reports are uploaded as Actions artifacts only.

on:
  schedule:
    # 09:00 UTC daily — runs after smc-measurement-benchmark-rolling
    # (07:30 UTC) so an outcome-backfill that depends on the same
    # window has had time to land.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      lookback:
        description: "Lookback window in days (default 7)"
        required: false
        default: "7"

permissions:
  contents: read

concurrency:
  group: feature-importance-daily
  cancel-in-progress: false

env:
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

jobs:
  feature-importance-report:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run feature-importance report
        id: fi
        env:
          LOOKBACK: ${{ inputs.lookback || '7' }}
        run: |
          set +e
          python -m open_prep.feature_importance_report --lookback "${LOOKBACK}" 2>&1 | tee fi_report.log
          rc=$?
          # Treat status=no_data as success so the countdown to the
          # G1 acceptance gate keeps ticking even before day-5.
          if grep -q "status=no_data" fi_report.log; then
            echo "fi_status=no_data" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -ne 0 ]; then
            echo "fi_status=error" >> "$GITHUB_OUTPUT"
            exit "$rc"
          else
            echo "fi_status=ok" >> "$GITHUB_OUTPUT"
          fi
          # E4-3 (Q3): surface the ranking_drift status so the daily run
          # behaves like the existing weight-drift-gate. The script
          # itself stays exit-0 (fail-soft); we only emit a workflow
          # annotation + step-summary line. Parses the single-line
          # "drift_status=…" token written by the script.
          drift_status=$(grep -oE 'drift_status=[a-z]+' fi_report.log | head -1 | cut -d= -f2)
          drift_max=$(grep -oE 'drift_max_delta=[0-9]+' fi_report.log | head -1 | cut -d= -f2)
          echo "drift_status=${drift_status:-unknown}" >> "$GITHUB_OUTPUT"
          echo "drift_max_delta=${drift_max:-0}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Annotate status
        if: always()
        run: |
          echo "::notice title=feature-importance-daily::status=${{ steps.fi.outputs.fi_status || 'unknown' }} lookback=${{ inputs.lookback || '7' }} drift_status=${{ steps.fi.outputs.drift_status || 'unknown' }} drift_max_delta=${{ steps.fi.outputs.drift_max_delta || '0' }}"
          {
            echo "## feature-importance-daily"
            echo ""
            echo "- status: \`${{ steps.fi.outputs.fi_status || 'unknown' }}\`"
            echo "- ranking_drift: \`${{ steps.fi.outputs.drift_status || 'unknown' }}\` (max position delta: \`${{ steps.fi.outputs.drift_max_delta || '0' }}\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on ranking drift
        if: steps.fi.outputs.drift_status == 'warn'
        run: |
          echo "::warning title=feature-importance ranking drift::Top feature ranking shifted by ≥${{ steps.fi.outputs.drift_max_delta }} positions vs the previous ok report. See fi_report.log for the per-feature delta list."
          {
            echo ""
            echo "### ⚠ Ranking drift detected"
            echo ""
            echo '```'
            grep -A20 "Feature-importance ranking drift" fi_report.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: feature-importance-report-${{ github.run_id }}
          path: |
            fi_report.log
            artifacts/open_prep/outcomes/feature_importance/latest.json
          if-no-files-found: ignore
          retention-days: 30
