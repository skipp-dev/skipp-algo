# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: fvg-context-pine-refresh

# Schedule: 05:15 UTC weekdays — outside trading window 13:30–20:00 UTC (audit F-V3-14, 2026-05-01)
#
# Q3/Q4 plan §D2: refresh `pine/generated/fvg_context_health.pine` from
# the latest event ledgers so the SMC_Dashboard FVG Status row can
# render per-context (session × vol_regime) hit-rate cells.

on:
  schedule:
    # 05:15 UTC weekdays — runs after the rolling benchmark settles.
    - cron: "15 5 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fvg-context-pine-refresh
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
defaults:
  run:
    shell: bash

jobs:
  emit-pine-snippet:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # Use GH_PAT when available so the persisted credential matches
          # the token used to push the auto-PR branch (F-02 fix). Falls
          # back to the workflow token for forks / dispatch by users
          # without GH_PAT.
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        # The emitter depends on smc_core (already in repo) and stdlib only.
        run: python -m pip install --upgrade pip

      - name: Emit FVG context Pine snippet
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python -m scripts.emit_fvg_context_pine

      - name: Upload artifacts
        # F-V4-D2 (2026-05-01): default `if: success()` is intentional — this
        # artifact is a published Pine snippet; uploading a partial/failed
        # generation would mislead downstream consumers. Audited by
        # tests/test_workflow_upload_artifact_unguarded_inventory.py.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fvg-context-pine
          path: |
            pine/generated/fvg_context_health.pine
            pine/generated/fvg_context_health.json
          if-no-files-found: warn

      - name: Commit refreshed snippet
        env:
          # F-02: bare ``git push`` to main was blocked 3+ days in a row
          # by the main-branch ruleset (GH013). We now push to a feature
          # branch and open an auto-PR, mirroring the smc-library-refresh
          # pattern. GH_PAT is preferred so the PR is attributed to a
          # human-bridge identity that the ruleset bypass list allows.
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pine/generated/fvg_context_health.pine \
                  pine/generated/fvg_context_health.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          # No-op snapshot guard: the emitter rewrites volatile provenance
          # (generated_at / source_commit_sha / source_workflow_run) on EVERY
          # run, so `git diff --staged --quiet` is never empty even when the
          # substantive FVG health status is unchanged. Without this guard the
          # cron opens a fresh awaiting_first_run PR each run — pure timestamp
          # churn that burns a ~23min CI cycle + a merge-queue slot for zero
          # information (post-mortem: PRs #2514/#2536 closed as no-ops).
          # Strip the +/- diff body of the file-header lines and the three
          # volatile provenance comments; if nothing substantive remains, the
          # snapshot is content-identical to main, so skip the commit/PR. Real
          # data changes HEALTH_STATUS / total_events / the emitted constants,
          # which are NOT exempted and therefore still land a PR.
          substantive=$(git diff --staged -- \
              pine/generated/fvg_context_health.pine \
              pine/generated/fvg_context_health.json \
            | grep -E '^[+-]' \
            | grep -vE '^[+-]{3} ' \
            | grep -vE '^[+-]// (generated_at|source_commit_sha|source_workflow_run):' \
            || true)
          if [ -z "$substantive" ]; then
            echo "Only volatile provenance changed (timestamp/run id); content-identical snapshot. Skipping no-op PR."
            git restore --staged --worktree \
              pine/generated/fvg_context_health.pine \
              pine/generated/fvg_context_health.json || true
            exit 0
          fi
          git commit -m "chore(pine): FVG context health snapshot ${GITHUB_RUN_ID}"
          BRANCH="auto/fvg-context-pine-refresh-${GITHUB_RUN_ID}"
          if git push -u origin "HEAD:${BRANCH}" 2>&1; then
            echo "Pushed to ${BRANCH}"
            if command -v gh >/dev/null 2>&1 && [ -n "${GH_TOKEN:-}" ]; then
              # Distinguish benign "PR already exists" from real failures so the
              # auto-PR pipeline cannot silently fail (audit policy F-V5-F1).
              pr_stderr=$(gh pr create \
                --base main \
                --head "${BRANCH}" \
                --title "chore(pine): FVG context health snapshot ${GITHUB_RUN_ID}" \
                --body "Auto-generated by ${GITHUB_WORKFLOW:-fvg-context-pine-refresh} run ${GITHUB_RUN_ID}." 2>&1 1>/dev/null) || pr_rc=$?
              pr_rc=${pr_rc:-0}
              if [ "$pr_rc" -ne 0 ]; then
                if printf '%s' "$pr_stderr" | grep -qi 'a pull request for branch .* already exists'; then
                  echo "PR already exists for ${BRANCH}; treating as success."
                else
                  echo "::error title=gh pr create failed::${pr_stderr}"
                  exit "$pr_rc"
                fi
              fi
            else
              echo "::error title=gh CLI unavailable::gh CLI missing or GH_TOKEN unset; cannot open PR for ${BRANCH}"
              exit 1
            fi
          else
            echo "::warning::git push to ${BRANCH} failed; commit captured locally only"
            exit 0
          fi
