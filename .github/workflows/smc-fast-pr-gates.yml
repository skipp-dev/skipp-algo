name: smc-fast-pr-gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fast-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run fast provider and smoke health checks
        run: |
          python scripts/run_smc_ci_health_checks.py \
            --symbols "IBG" \
            --timeframes "15m" \
            --output artifacts/ci/smc_fast_health_report.json

      - name: Run fast SMC integration tests
        run: |
          python -m pytest -q --maxfail=1 tests/test_smc_integration_*.py

      - name: Upload fast gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smc-fast-health-report
          path: artifacts/ci/smc_fast_health_report.json
