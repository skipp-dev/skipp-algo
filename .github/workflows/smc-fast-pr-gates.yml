# live-window: any-trigger  # F-V6-F2.1 (2026-05-02)
name: smc-fast-pr-gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # (F-V5-A2 originally introduced this on 2026-05-01; F-V6-A2 expanded the
  # comment but kept the same key — the duplicate from a prior rebase merge
  # made GitHub Actions reject this workflow as invalid YAML.)
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
      matched_runner_name: ${{ steps.resolve.outputs.matched_runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          SMC_FORCE_GH_HOSTED: ${{ vars.SMC_FORCE_GH_HOSTED }}
        run: |
          # fast-gates is merge-critical: always prefer github-hosted so a
          # crashed/offline self-hosted runner cannot hold the merge queue
          # indefinitely (self-hosted timeout-minutes is only enforced by the
          # runner itself; a dead runner causes a 6h hang).
          # SMC_CI_SELF_HOSTED_LABEL can still force a dedicated label when set;
          # the PRIORITY_CRON fallback is intentionally excluded here.
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_CI_SELF_HOSTED_LABEL || '' }}"

  fast-gates:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 35

    steps:
      # Bot data-only PRs (e.g. `bot/run-open-prep-*`, `bot/outcome-backfill-*`)
      # only touch `artifacts/open_prep/**` JSON artifacts and never change code,
      # so the heavy SMC integration suite would just burn ~22 min for no signal.
      # We still keep this job (the ruleset requires `fast-gates` as a status
      # check) but short-circuit all heavy steps below — the job itself reports
      # success in seconds, unblocking auto-merge.
      - name: Determine if heavy gates should run
        id: gate
        env:
          # env-indirection instead of direct ${{ }} interpolation in run: block
          # — hardens against script-injection via branch names (Audit M-1).
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "$HEAD_REF" == bot/* ]]; then
            echo "Bot data-only PR detected (head=$HEAD_REF); skipping heavy fast-gates."
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run_heavy == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Announce selected runner
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          echo "runner_environment=${{ needs.select-runner.outputs.runner_environment }}"
          echo "resolution_reason=${{ needs.select-runner.outputs.resolution_reason }}"
          echo "matched_runner_name=${{ needs.select-runner.outputs.matched_runner_name }}"

      - name: Set up pinned Python (GitHub-hosted)
        if: steps.gate.outputs.run_heavy == 'true' && needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned
        with:
          cache: pip
          cache-dependency-path: requirements.txt

      # YAML-aware workflow lints below need PyYAML. The full dev install runs
      # only after `Install uv` further down; install just PyYAML here so the
      # lints stay an early-failing pre-flight check (~1s extra) instead of
      # being deferred until after the heavier resolve/install steps.
      - name: Install workflow-lint deps (PyYAML)
        if: steps.gate.outputs.run_heavy == 'true'
        # SC-02 (supply-chain audit 2026-06-14): exact pin, no floating >=.
        run: python -m pip install --quiet "pyyaml==6.0.3"

      # Guard: every workflow file must declare `defaults: run: shell: bash`
      # so jobs behave identically on the Windows self-hosted runner and on
      # ubuntu-latest. YAML-aware (rejects the string-in-comment false-pass
      # that the previous `grep -q` loop accepted); sub-second.
      - name: Lint workflow shell defaults
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/lint_workflow_defaults.py

      # Guard: every workflow must declare `permissions:` (top-level or per-job)
      # so GITHUB_TOKEN runs at least-privilege. OWASP A05; replaces the
      # legacy pytest pin (deleted in this PR) with a fast-failing CI lint.
      - name: Lint workflow permissions
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/lint_workflow_permissions.py

      # Guard: every workflow must set `env.PYTHONUNBUFFERED` (top-level or
      # per-job) so Python stdout/stderr reaches the GHA log in real time.
      # F-V5-A2 / F-CI-O1; replaces the legacy pytest pin (deleted in this PR).
      - name: Lint workflow PYTHONUNBUFFERED
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/lint_workflow_pythonunbuffered.py

      # Workflow-Audit 2026-06: actionlint as a hard gate. Catches GHA
      # template-engine syntax errors (e.g. `$\{\{ ... \}\}` inside run-block
      # shell comments -> HTTP 422 on dispatch; see A9b.2a post-mortem,
      # PR #2083) that PyYAML-based smoke tests structurally CANNOT see,
      # plus expression typos and invalid needs/outputs refs. shellcheck
      # integration is explicitly DISABLED (-shellcheck=): the existing
      # main baseline carries pre-existing shell findings (research
      # workflows, exit-with-template patterns) that are out of scope
      # for this template-engine gate; adopting shellcheck would be a
      # separate ratchet decision. Version pinned via actionlint-py wheel.
      - name: actionlint (workflow template/expression lint)
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          # SC-02 (supply-chain audit 2026-06-14): drop wildcard prefix match;
          # pin to full version for deterministic installs.
          python -m pip install --quiet "actionlint-py==1.7.12.24"
          actionlint -no-color -shellcheck=

      # Workflow-Audit 2026-06: zizmor as a RATCHET, not a hard zero-gate.
      # The existing inventory carries 91 high / 52 medium findings
      # (mostly template-injection + artipacked) that cannot be burned
      # down in one PR. The budgets below pin the status quo: any PR that
      # ADDS a medium that exceeds budget+ severity finding fails; shrinking
      # the budgets as findings get fixed is encouraged (lower both numbers
      # in the same PR that fixes findings).
      - name: zizmor (workflow security ratchet)
        if: steps.gate.outputs.run_heavy == 'true'
        env:
          # Baseline measured 2026-06-12 (offline mode, zizmor 1.25.2).
          # high 92→91 on PR #2741: excessive-permissions finding in
          # f2-promotion-gate-daily.yml resolved by moving issues:write to
          # job-level in promotion-gate. medium 53→52 (artipacked fix).
          ZIZMOR_HIGH_BUDGET: "91"
          ZIZMOR_MEDIUM_BUDGET: "52"
        run: |
          python -m pip install --quiet "zizmor==1.25.2"
          zizmor --no-progress --offline --format json .github/workflows/ > zizmor_report.json || true
          python - <<'PY'
          import json, os, sys
          findings = json.load(open("zizmor_report.json"))
          high = sum(1 for f in findings if f["determinations"]["severity"] == "High")
          medium = sum(1 for f in findings if f["determinations"]["severity"] == "Medium")
          hb = int(os.environ["ZIZMOR_HIGH_BUDGET"])
          mb = int(os.environ["ZIZMOR_MEDIUM_BUDGET"])
          print(f"zizmor: high={high} (budget {hb}), medium={medium} (budget {mb})")
          ok = True
          if high > hb:
              print(f"::error title=zizmor-ratchet::high-severity findings rose {hb} -> {high}. New workflow code introduced a security finding (run `zizmor .github/workflows/` locally).")
              ok = False
          if medium > mb:
              print(f"::error title=zizmor-ratchet::medium-severity findings rose {mb} -> {medium}. New workflow code introduced a security finding (run `zizmor .github/workflows/` locally).")
              ok = False
          if ok and (high < hb or medium < mb):
              print(f"::notice title=zizmor-ratchet::findings below budget (high {high}/{hb}, medium {medium}/{mb}) — consider lowering ZIZMOR_*_BUDGET in smc-fast-pr-gates.yml to lock in the improvement.")
          sys.exit(0 if ok else 1)
          PY

      - name: Install uv
        if: steps.gate.outputs.run_heavy == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt

      - name: Resolve Python 3.12 interpreter
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            python -c "import sys; raise SystemExit('GitHub-hosted Python bootstrap did not resolve Python 3.12.' if sys.version_info[:2] != (3, 12) else 0)"
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)"; then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 -c "import sys; print(sys.executable)")"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Install dependencies
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          "$SMC_PYTHON_BIN" -m venv .venv
          uv pip install --python .venv -r requirements.txt pytest
          # Expose venv for all subsequent steps in this job
          if [[ -d "$GITHUB_WORKSPACE/.venv/Scripts" ]]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi

      - name: Validate live-overlay daemon requirements
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          "$SMC_PYTHON_BIN" -m pip install --dry-run -r services/live_overlay_daemon/requirements.txt

      - name: Build live-overlay daemon Docker image
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          # Drift guard: verify daemon Dockerfile still builds from repository root context.
          docker build -f services/live_overlay_daemon/Dockerfile .

      # Guard: ruff must pass clean (exit 0) on every PR. ruff comes from the
      # venv just installed above (pinned in requirements.txt — single source
      # of truth for the version; no separate uvx pin that could drift).
      # Configuration lives in pyproject.toml [tool.ruff] / [tool.ruff.lint].
      - name: Ruff lint
        if: steps.gate.outputs.run_heavy == 'true'
        run: ruff check .

      - name: Run fast provider and smoke health checks
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          python scripts/run_smc_ci_health_checks.py \
            --symbols "IBG" \
            --timeframes "15m" \
            --output artifacts/ci/smc_fast_health_report.json

      # PINE_LEGACY.md drift check (D-1 v2 follow-up): every root-level
      # *.pine file must be classified in the index, and every index
      # entry must still exist. Sub-second; fails the gate on drift.
      - name: Check PINE_LEGACY.md drift
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/check_pine_legacy_drift.py

      # library_release_manifest.json drift check (B follow-up to PR
      # #105): every path the manifest references (sourceManifest,
      # sourceSnippet, consumers, productCut.{manifestPath,mainlineFiles})
      # must exist on disk. Sub-second; prevents silent renames from
      # breaking the TradingView publishing pipeline.
      - name: Check library_release_manifest drift
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/check_library_release_manifest_drift.py

      # T-3 re-introduction guard: forbid the redundant
      # `request.security(syminfo.tickerid, timeframe.period, ...)`
      # pattern (same symbol AND same timeframe is a no-op wrapper).
      # External-symbol calls like `request.security(symbol,
      # timeframe.period, ...)` remain legitimate and are not flagged.
      - name: Check Pine same-TF request.security pattern
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          if grep -rnE 'request\.security\(\s*syminfo\.tickerid\s*,\s*timeframe\.period' --include='*.pine' .; then
            echo "::error::Found redundant same-symbol/same-TF request.security() call (T-3 guard)."
            echo "Use direct field access instead of request.security(syminfo.tickerid, timeframe.period, ...)."
            exit 1
          fi
          echo "OK: no redundant same-TF request.security() patterns."

      - name: Run pin / ledger drift guard
        # Frontloads every line-pinned ledger / budget / discipline test
        # (~60s, 630 tests). Drift here means a PR shifted a pinned call
        # site without updating the corresponding ledger; surfacing this
        # in fast-gates blocks merge under main-governance instead of
        # being discovered ~6 min later in the slow validate job.
        # See PR #2348 for the regression that motivated this gate.
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          python -m pytest -q --maxfail=1 \
            -n auto --dist=worksteal \
            -p no:cacheprovider \
            tests/test_assert_and_open_encoding_pin.py \
            tests/test_assert_in_production_budget.py \
            tests/test_bare_type_ignore_ledger.py \
            tests/test_broad_except_silent_budget.py \
            tests/test_builtin_open_encoding_ledger.py \
            tests/test_dynamic_getattr_ledger.py \
            tests/test_dynamic_import_and_todo_tripwires.py \
            tests/test_global_statement_budget.py \
            tests/test_hashlib_weak_hash_ledger.py \
            tests/test_http_client_discipline.py \
            tests/test_http_post_egress_ledger.py \
            tests/test_loopback_and_baseimage_pin.py \
            tests/test_mutable_defaults_and_loads_pins.py \
            tests/test_nonlocal_budget.py \
            tests/test_noqa_budget.py \
            tests/test_noqa_suppression_ledger.py \
            tests/test_os_environ_mutation_ledger.py \
            tests/test_os_unlink_remove_ledger.py \
            tests/test_path_text_io_encoding_ledger.py \
            tests/test_pine_alertcondition_and_declaration_pin.py \
            tests/test_pine_request_security_htf_pin.py \
            tests/test_pine_var_budget_pin.py \
            tests/test_prod_print_ledger.py \
            tests/test_pytest_skip_budget.py \
            tests/test_random_tempfile_ledger_pin.py \
            tests/test_realtime_signals_sister_ledger_guardrail.py \
            tests/test_silent_error_swallow_pin.py \
            tests/test_silent_security_and_boundary_bundle.py \
            tests/test_socket_bind_loopback_pin.py \
            tests/test_subprocess_shell_injection_pin.py \
            tests/test_subprocess_spawn_sites_ledger.py \
            tests/test_sys_exit_ledger_pin.py \
            tests/test_sys_path_mutation_ledger.py \
            tests/test_time_sleep_budget.py \
            tests/test_type_ignore_budget.py \
            tests/test_urllib_urlopen_ledger.py \
            tests/test_warnings_simplefilter_ledger.py \
            tests/test_weak_hash_pin.py \
            tests/test_while_true_termination_ledger.py \
            tests/test_workflow_upload_artifact_uniform_version.py \
            tests/test_workflow_issue_labels_exist.py \
            tests/test_workflow_no_fake_push_success.py \
            tests/test_workflow_runner_pinned.py \
            tests/test_workflow_set_plus_e_inventory.py \
            tests/test_workflow_orphan_inventory.py \
            tests/test_workflow_pythonpath_for_direct_invoke.py \
            tests/test_workflow_concurrency_cron_no_cancel.py \
            tests/test_workflow_invoked_scripts_importable.py \
            tests/test_workflow_python_unbuffered.py \
            tests/test_workflow_freshness_monitor_workflow.py \
            tests/test_workflow_continue_on_error_inventory.py \
            tests/test_workflow_permissions_present.py \
            tests/test_smc_library_refresh_workflow.py \
            tests/test_schema_version_manifest_alignment.py \
            tests/test_edge_hypotheses_frozen.py \
            tests/test_point_in_time_integrity.py \
            tests/test_family_walkforward_config.py \
            tests/test_build_family_metrics.py \
            tests/test_family_returns.py \
            tests/test_family_event_adapter.py \
            tests/test_family_verdict.py \
            tests/test_verdict_panel.py \
            tests/test_run_edge_pipeline.py \
            tests/test_fast_gates_silent_skip_coverage.py \
            tests/test_pytest_marker_bucket_discipline.py

      - name: Run fast SMC integration tests
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          python -m pytest -q --maxfail=1 \
            -n auto --dist=worksteal \
            --cov=smc_integration \
            --cov-fail-under=95 \
            --cov-report=term-missing:skip-covered \
            tests/test_smc_integration_*.py \
            tests/test_smc_action_degradation.py \
            tests/test_manifest_preference.py \
            tests/test_stale_batch_guard.py \
            tests/test_smc_trust_state.py

      - name: Run terminal coverage subset
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          mkdir -p artifacts/ci
          set -o pipefail
          python -m pytest -q --maxfail=1 \
            -n auto --dist=worksteal \
            --cov-fail-under=20 \
            --cov=streamlit_terminal \
            --cov=streamlit_terminal_alerts \
            --cov=streamlit_terminal_config \
            --cov=streamlit_terminal_pure \
            --cov=streamlit_terminal_runtime \
            --cov=terminal_export \
            --cov=terminal_notifications \
            --cov=terminal_ui_helpers \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:artifacts/ci/terminal_coverage.xml \
            tests/test_streamlit_terminal_import.py \
            tests/test_streamlit_terminal_config.py \
            tests/test_streamlit_terminal_runtime.py \
            tests/test_streamlit_terminal_alerts.py \
            tests/test_terminal_notifications.py \
            tests/test_terminal_export_dispatch.py \
            tests/test_streamlit_terminal_feed_state.py \
            tests/test_streamlit_terminal_pure_functions.py \
            | tee artifacts/ci/terminal_coverage.txt

      - name: Layer violation guard (F-08)
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/check_layer_violations.py

      - name: Render fast gate summary
        if: always() && steps.gate.outputs.run_heavy == 'true'
        run: |
          python scripts/render_ci_gate_summary.py \
            --report artifacts/ci/smc_fast_health_report.json \
            --enforcement hard \
            || echo "::warning::Fast gate summary skipped (report not found)."

      - name: Upload fast gate report
        if: always() && steps.gate.outputs.run_heavy == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smc-fast-health-report
          path: |
            artifacts/ci/smc_fast_health_report.json
            artifacts/ci/terminal_coverage.txt
            artifacts/ci/terminal_coverage.xml
          if-no-files-found: ignore
