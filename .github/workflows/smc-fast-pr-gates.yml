# live-window: any-trigger  # F-V6-F2.1 (2026-05-02)
name: smc-fast-pr-gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # (F-V5-A2 originally introduced this on 2026-05-01; F-V6-A2 expanded the
  # comment but kept the same key — the duplicate from a prior rebase merge
  # made GitHub Actions reject this workflow as invalid YAML.)
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

jobs:
  fast-gates:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 35

    steps:
      # Bot data-only PRs (e.g. `bot/run-open-prep-*`, `bot/outcome-backfill-*`)
      # only touch `artifacts/open_prep/**` JSON artifacts and never change code,
      # so the heavy SMC integration suite would just burn ~22 min for no signal.
      # We still keep this job (the ruleset requires `fast-gates` as a status
      # check) but short-circuit all heavy steps below — the job itself reports
      # success in seconds, unblocking auto-merge.
      - name: Determine if heavy gates should run
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.head_ref }}" == bot/* ]]; then
            echo "Bot data-only PR detected (head=${{ github.head_ref }}); skipping heavy fast-gates."
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run_heavy == 'true'
        uses: actions/checkout@v6

      # Guard: every workflow file must declare `defaults: run: shell: bash`
      # so jobs behave identically on the Windows self-hosted runner and on
      # ubuntu-latest. Sub-second; fails the gate on any new file that omits it.
      - name: Lint workflow shell defaults
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          missing=()
          for f in .github/workflows/*.yml; do
            if ! grep -q 'shell: bash' "$f"; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::These workflow files are missing 'defaults: run: shell: bash':"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "OK: all workflow files declare shell: bash"

      - name: Set up Python
        if: steps.gate.outputs.run_heavy == 'true'
        uses: ./.github/actions/setup-python-pinned

      - name: Install uv
        if: steps.gate.outputs.run_heavy == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt

      - name: Install dependencies
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          uv pip install --system -r requirements.txt pytest

      - name: Run fast provider and smoke health checks
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          python scripts/run_smc_ci_health_checks.py \
            --symbols "IBG" \
            --timeframes "15m" \
            --output artifacts/ci/smc_fast_health_report.json

      # PINE_LEGACY.md drift check (D-1 v2 follow-up): every root-level
      # *.pine file must be classified in the index, and every index
      # entry must still exist. Sub-second; fails the gate on drift.
      - name: Check PINE_LEGACY.md drift
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/check_pine_legacy_drift.py

      # library_release_manifest.json drift check (B follow-up to PR
      # #105): every path the manifest references (sourceManifest,
      # sourceSnippet, consumers, productCut.{manifestPath,mainlineFiles})
      # must exist on disk. Sub-second; prevents silent renames from
      # breaking the TradingView publishing pipeline.
      - name: Check library_release_manifest drift
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/check_library_release_manifest_drift.py

      # T-3 re-introduction guard: forbid the redundant
      # `request.security(syminfo.tickerid, timeframe.period, ...)`
      # pattern (same symbol AND same timeframe is a no-op wrapper).
      # External-symbol calls like `request.security(symbol,
      # timeframe.period, ...)` remain legitimate and are not flagged.
      - name: Check Pine same-TF request.security pattern
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          if grep -rnE 'request\.security\(\s*syminfo\.tickerid\s*,\s*timeframe\.period' --include='*.pine' .; then
            echo "::error::Found redundant same-symbol/same-TF request.security() call (T-3 guard)."
            echo "Use direct field access instead of request.security(syminfo.tickerid, timeframe.period, ...)."
            exit 1
          fi
          echo "OK: no redundant same-TF request.security() patterns."

      - name: Run fast SMC integration tests
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          python -m pytest -q --maxfail=1 \
            -n auto --dist=worksteal \
            --cov=smc_integration \
            --cov-fail-under=95 \
            --cov-report=term-missing:skip-covered \
            tests/test_smc_integration_*.py \
            tests/test_smc_action_degradation.py \
            tests/test_manifest_preference.py \
            tests/test_stale_batch_guard.py \
            tests/test_smc_trust_state.py

      - name: Run terminal coverage subset
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          mkdir -p artifacts/ci
          set -o pipefail
          python -m pytest -q --maxfail=1 \
            -n auto --dist=worksteal \
            --cov-fail-under=20 \
            --cov=streamlit_terminal \
            --cov=streamlit_terminal_alerts \
            --cov=streamlit_terminal_config \
            --cov=streamlit_terminal_pure \
            --cov=streamlit_terminal_runtime \
            --cov=terminal_export \
            --cov=terminal_notifications \
            --cov=terminal_ui_helpers \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:artifacts/ci/terminal_coverage.xml \
            tests/test_streamlit_terminal_import.py \
            tests/test_streamlit_terminal_config.py \
            tests/test_streamlit_terminal_runtime.py \
            tests/test_streamlit_terminal_alerts.py \
            tests/test_terminal_notifications.py \
            tests/test_terminal_export_dispatch.py \
            tests/test_streamlit_terminal_feed_state.py \
            tests/test_streamlit_terminal_pure_functions.py \
            | tee artifacts/ci/terminal_coverage.txt

      - name: Layer violation guard (F-08)
        if: steps.gate.outputs.run_heavy == 'true'
        run: python scripts/check_layer_violations.py

      - name: Render fast gate summary
        if: always() && steps.gate.outputs.run_heavy == 'true'
        run: |
          python scripts/render_ci_gate_summary.py \
            --report artifacts/ci/smc_fast_health_report.json \
            --enforcement hard \
            || echo "::warning::Fast gate summary skipped (report not found)."

      - name: Upload fast gate report
        if: always() && steps.gate.outputs.run_heavy == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: smc-fast-health-report
          path: |
            artifacts/ci/smc_fast_health_report.json
            artifacts/ci/terminal_coverage.txt
            artifacts/ci/terminal_coverage.xml
          if-no-files-found: ignore
