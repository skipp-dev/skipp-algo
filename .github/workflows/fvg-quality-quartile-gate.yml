name: fvg-quality-quartile-gate

# Q3/Q4 plan §D4 — daily FVG quality quartile release-gate evaluation.
# When a benchmark snapshot is available, this workflow re-scores all
# FVG events with the production weights, bins by quality quartile,
# and refreshes docs/fvg_quality/release_gate.{json,md}.
#
# Until the benchmark pipeline produces snapshot artifacts in this
# repo, the gate sits in AWAITING_DATA state — that's expected and
# benign (exit 0).

on:
  schedule:
    # 06:00 UTC weekdays — after public-calibration-dashboard (04:30) and
    # g23-ab-watchdog (05:30).
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      root:
        description: "Benchmark snapshot root (SYMBOL/TF/events_*.jsonl tree)"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

concurrency:
  group: fvg-quality-quartile-gate
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: python -m pip install --upgrade pip

      - name: Run §D4 release-gate
        id: gate
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          ROOT_ARG=""
          if [ -n "${{ github.event.inputs.root }}" ]; then
            ROOT_ARG="--root ${{ github.event.inputs.root }}"
          fi
          python -m scripts.fvg_quality_quartile_gate $ROOT_ARG

      - name: Capture decision for downstream steps
        id: decision
        run: |
          set -euo pipefail
          if [ -f docs/fvg_quality/release_gate.json ]; then
            DEC=$(python -c "import json; print(json.load(open('docs/fvg_quality/release_gate.json'))['release_gate'])")
          else
            DEC="MISSING"
          fi
          echo "release_gate=$DEC" >> "$GITHUB_OUTPUT"

      - name: Upload release-gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: fvg-quality-release-gate
          path: |
            docs/fvg_quality/release_gate.json
            docs/fvg_quality/release_gate.md
          if-no-files-found: warn

      - name: Commit refreshed release-gate
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/fvg_quality/release_gate.json docs/fvg_quality/release_gate.md || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(docs): D4 fvg quality release-gate ${GITHUB_RUN_ID}"
            git push
          fi

      - name: Open issue when release-gate flips to PASS
        if: steps.decision.outputs.release_gate == 'PASS'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const md = fs.existsSync('docs/fvg_quality/release_gate.md')
              ? fs.readFileSync('docs/fvg_quality/release_gate.md', 'utf8')
              : '(release-gate file missing)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '§D4 release-gate PASS — FVG quality quartile filter ready',
              body: `Plan §D4 release-gate met thresholds.\n\n${md}`,
              labels: ['governance', 'd4-release-gate'],
            });
