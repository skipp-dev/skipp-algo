# live-window: mutating-on-cron  # F-V6-F2.1 (2026-05-02)
name: fvg-quality-quartile-gate

# Q3/Q4 plan §D4 — daily FVG quality quartile release-gate evaluation.
# When a benchmark snapshot is available, this workflow re-scores all
# FVG events with the production weights, bins by quality quartile,
# and refreshes docs/fvg_quality/release_gate.{json,md}.
#
# Until the benchmark pipeline produces snapshot artifacts in this
# repo, the gate sits in AWAITING_DATA state — that's expected and
# benign (exit 0).

on:
  schedule:
    # 06:00 UTC weekdays — after public-calibration-dashboard (04:30) and
    # g23-ab-watchdog (05:30).
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      root:
        description: "Benchmark snapshot root (SYMBOL/TF/events_*.jsonl tree)"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

concurrency:
  group: fvg-quality-quartile-gate
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"  # F-V5-A2 (2026-05-01)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # F-V6-A2 (2026-05-02): force unbuffered Python stdout so progress logs surface
  # in CI in near-real-time rather than after a buffer flush at process exit.
  PYTHONUNBUFFERED: "1"

jobs:
  evaluate:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest-l' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Use GH_PAT when available so the persisted credential matches
          # the token used to push the auto-PR branch (F-05 fix). Falls
          # back to the workflow token for forks / dispatch by users
          # without GH_PAT.
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: python -m pip install --upgrade pip

      - name: Run §D4 release-gate
        id: gate
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          ROOT_ARG=""
          if [ -n "${{ github.event.inputs.root }}" ]; then
            ROOT_ARG="--root ${{ github.event.inputs.root }}"
          fi
          python -m scripts.fvg_quality_quartile_gate $ROOT_ARG

      - name: Capture decision for downstream steps
        id: decision
        run: |
          set -euo pipefail
          if [ -f docs/fvg_quality/release_gate.json ]; then
            DEC=$(python -c "import json; print(json.load(open('docs/fvg_quality/release_gate.json'))['release_gate'])")
          else
            DEC="MISSING"
          fi
          echo "release_gate=$DEC" >> "$GITHUB_OUTPUT"

      - name: Upload release-gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: fvg-quality-release-gate
          path: |
            docs/fvg_quality/release_gate.json
            docs/fvg_quality/release_gate.md
          if-no-files-found: warn

      - name: Commit refreshed release-gate
        env:
          # F-05: bare ``git push`` to main was blocked 3+ days in a row
          # by the main-branch ruleset (GH013). We now push to a feature
          # branch and open an auto-PR, mirroring the smc-library-refresh
          # pattern. GH_PAT is preferred so the PR is attributed to a
          # human-bridge identity that the ruleset bypass list allows.
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/fvg_quality/release_gate.json docs/fvg_quality/release_gate.md || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(docs): D4 fvg quality release-gate ${GITHUB_RUN_ID}"
          BRANCH="auto/fvg-quality-quartile-gate-${GITHUB_RUN_ID}"
          if git push -u origin "HEAD:${BRANCH}" 2>&1; then
            echo "Pushed to ${BRANCH}"
            if command -v gh >/dev/null 2>&1 && [ -n "${GH_TOKEN:-}" ]; then
              gh pr create \
                --base main \
                --head "${BRANCH}" \
                --title "chore(docs): D4 fvg quality release-gate ${GITHUB_RUN_ID}" \
                --body "Auto-generated by ${GITHUB_WORKFLOW:-fvg-quality-quartile-gate} run ${GITHUB_RUN_ID}." \
                || echo "::warning::gh pr create failed (PR may already exist)"
            else
              echo "::warning::gh CLI unavailable or GH_TOKEN unset; PR not opened"
            fi
          else
            echo "::warning::git push to ${BRANCH} failed; commit captured locally only"
            exit 0
          fi

      - name: Open issue when release-gate flips to PASS
        if: steps.decision.outputs.release_gate == 'PASS'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const md = fs.existsSync('docs/fvg_quality/release_gate.md')
              ? fs.readFileSync('docs/fvg_quality/release_gate.md', 'utf8')
              : '(release-gate file missing)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '§D4 release-gate PASS — FVG quality quartile filter ready',
              body: `Plan §D4 release-gate met thresholds.\n\n${md}`,
              labels: ['governance', 'd4-release-gate'],
            });
