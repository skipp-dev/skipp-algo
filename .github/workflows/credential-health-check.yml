name: credential-health-check
# live-window: mutating-on-cron  # F-V6-F2.1 (schedule-only + issues:write)

# Bundle C (audit follow-up from PR #2415 / #2418 / #2421, issue #2422):
# Proactive daily probe for the credentials whose silent expiry would
# break critical CI:
#
#   * TV storage_state cookie (TTL 72h, enforced *reactively* by
#     smc-library-refresh.yml — see TV_STORAGE_STATE_MAX_AGE_HOURS)
#   * GH_PAT (used by every workflow that opens auto-PRs or files
#     cron-failure issues)
#   * Vendor API keys: Databento, FMP, NewsAPI (consumed by daily data
#     pipelines; silent revocation/expiry would surface only as a 401
#     buried in a downstream cron failure)
#
# The 5-week silent publish-skip post-mortem (#2415) found a 45-day-old
# cookie — there was no proactive check. This is that check.
#
# Vendor probes hit the lightest-weight authenticated endpoint per
# vendor (Databento list_publishers, FMP /stable/quote?symbol=AAPL,
# NewsAPI/Event Registry /api/v1/article/getArticles articlesCount=1)
# so daily polling consumes ~1 call/day each.
# Per-vendor error model lives in scripts/credential_health_check.py:
#   401/403 -> error (rotate); 429 -> warn (rate-limit, inconclusive);
#   5xx / network -> warn (vendor outage); 200 -> ok.

on:
  schedule:
    # Daily 06:00 UTC — runs ~2h before the first daily cron in the repo
    # (open-prep-daily at ~08:00 UTC), so a fresh alert is in front of
    # the operator before any consumer workflow needs the credential.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  # Keep the workflow default read-only. The probe job below elevates
  # contents:write because it force-with-lease updates the dedicated
  # bot/live-tv-credential-snapshot branch after uploading the authoritative
  # report artifact.
  contents: read
  issues: write

# F-V5-C2 (2026-05-01): cron-only workflows MUST queue overlapping runs
# rather than cancel them, so a fresh tick never kills a half-written
# credential probe / issue write.
concurrency:
  group: credential-health-check
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  probe:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Run credential health probes
        id: probe
        env:
          TV_STORAGE_STATE: ${{ secrets.TV_STORAGE_STATE }}
          GH_PAT: ${{ secrets.GH_PAT }}
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          set +e
          mkdir -p artifacts/ci
          python scripts/credential_health_check.py \
            --tv-max-age-hours 72 \
            --output artifacts/ci/credential_health.json
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Bundle C hardening: NEVER swallow non-zero — the whole point
          # of this workflow is to surface credential issues loudly. We
          # exit 0 here so the next steps (annotation + issue filing)
          # run; the final "fail-the-job" step at the end uses $rc.
          if [ -f artifacts/ci/credential_health.json ]; then
            overall=$(python -c "import json,sys; print(json.load(open('artifacts/ci/credential_health.json'))['overall_severity'])")
            echo "overall=$overall" >> "$GITHUB_OUTPUT"
          else
            echo "overall=error" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Surface probe results as annotations
        if: always() && steps.probe.outputs.rc != ''
        run: |
          if [ ! -f artifacts/ci/credential_health.json ]; then
            echo "::error title=credential-health::probe produced no report — script crashed before writing output"
            exit 0
          fi
          python - <<'PY'
          import json, os
          rep = json.load(open("artifacts/ci/credential_health.json"))
          for p in rep["probes"]:
              sev = p["severity"]
              if sev == "ok":
                  print(f"::notice title=credential-health::{p['name']}: {p['message']}")
              elif sev == "warn":
                  print(f"::warning title=credential-health::{p['name']}: {p['message']}")
              else:
                  print(f"::error title=credential-health::{p['name']}: {p['message']}")
          PY
          {
            echo "## Credential health probe"
            echo ""
            echo "Overall severity: \`${{ steps.probe.outputs.overall }}\`"
            echo ""
            echo '```json'
            cat artifacts/ci/credential_health.json
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: credential-health-report
          path: artifacts/ci/credential_health.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish credential snapshot to rolling bot branch
        # Mirrors smc-measurement-benchmark-rolling.yml's "Publish experiment
        # snapshot to rolling bot branch": the live-overlay daemon reads the
        # daily credential-health report from the rolling
        # `bot/live-tv-credential-snapshot` branch via the GitHub Contents API
        # (TRADINGVIEW_CREDENTIAL_SNAPSHOT_URL) so the Grafana "TradingView
        # Credential Age" panel reflects the freshest probe (TV storage_state
        # age_hours vs the 72h TTL) instead of nothing on the hosted daemon.
        # The report carries only severities/messages/ages — no secret values.
        # A bare push to main is blocked by the `main-governance` ruleset;
        # `bot/*` is excluded, so we force-update the dedicated branch. The
        # uploaded report artifact above remains the authoritative archive. The
        # file is copied to a STABLE `latest/` path so the daemon URL never has
        # to track a dated run directory.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::GITHUB_TOKEN is not available; skipping publish to bot/live-tv-credential-snapshot."
            {
              echo "### ⚠ credential snapshot publish skipped"
              echo ""
              echo "GITHUB_TOKEN is not available for this run. The report artifact uploaded, but bot/live-tv-credential-snapshot was not updated."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          report="artifacts/ci/credential_health.json"
          # Fail-soft on a missing report: the probe step is fail-soft, so a
          # crash there must not turn this delivery step red. Only a genuine
          # push failure (expired PAT, ruleset change) should surface red.
          if [ ! -s "${report}" ]; then
            echo "No credential-health report produced this run; nothing to publish."
            exit 0
          fi
          # Ruleset assumption guard: this rolling branch must stay outside the
          # main-governance direct-push/force-push rules. The rules-for-branch
          # endpoint exposes the effective branch rules without admin scope; if
          # GitHub cannot answer, the dry-run push below remains the effective
          # token/ruleset preflight.
          rules_json="$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${GITHUB_REPOSITORY}/rules/branches/bot%2Flive-tv-credential-snapshot" \
            2>/tmp/credential_snapshot_branch_rules.err || true)"
          if [ -z "${rules_json}" ]; then
            echo "::warning::Could not inspect rules for bot/live-tv-credential-snapshot; continuing to dry-run push preflight."
            cat /tmp/credential_snapshot_branch_rules.err || true
          else
            BRANCH_RULES_JSON="${rules_json}" python - <<'PY'
          import json
          import os
          import sys

          blocking = {"non_fast_forward", "pull_request", "required_status_checks"}
          try:
              rules = json.loads(os.environ["BRANCH_RULES_JSON"])
          except json.JSONDecodeError as exc:
              print(
                  "::warning::Could not parse branch rules for "
                  f"bot/live-tv-credential-snapshot ({exc}); continuing to dry-run push preflight."
              )
              sys.exit(0)
          if not isinstance(rules, list):
              print(
                  "::warning::Unexpected branch-rules response for "
                  "bot/live-tv-credential-snapshot; continuing to dry-run push preflight."
              )
              sys.exit(0)
          hits = sorted(
              str(rule.get("type"))
              for rule in rules
              if isinstance(rule, dict) and str(rule.get("type")) in blocking
          )
          if hits:
              print(
                  "::error::bot/live-tv-credential-snapshot is no longer excluded "
                  f"from blocking branch rules: {', '.join(hits)}"
              )
              sys.exit(1)
          print("bot/live-tv-credential-snapshot ruleset guard passed.")
          PY
          fi
          # Token-aware preflight: ``gh api .permissions.push`` only shows
          # repository-level permissions; it does not prove the PAT can
          # actually force-with-lease push to ``bot/live-tv-credential-snapshot``.
          # Use a genuine ``git push --dry-run`` against the target ref with the
          # same auth URL and lease pattern the real push will use. No commit is
          # created here.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pass the authenticated URL directly to each git command instead of
          # persisting it via `git remote set-url`, which would leave the token
          # readable in .git/config for the rest of the job (audit F3).
          _remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch "${_remote_url}" "+refs/heads/bot/live-tv-credential-snapshot:refs/remotes/origin/bot/live-tv-credential-snapshot" 2>/dev/null || true
          if ! git push --dry-run --force-with-lease=refs/heads/bot/live-tv-credential-snapshot "${_remote_url}" "HEAD:refs/heads/bot/live-tv-credential-snapshot" >/dev/null 2>&1; then
            echo "::warning::GITHUB_TOKEN cannot push to bot/live-tv-credential-snapshot; skipping publish to rolling bot branch."
            {
              echo "### ⚠ credential snapshot publish skipped"
              echo ""
              echo "GITHUB_TOKEN is present but dry-run push to bot/live-tv-credential-snapshot failed. The report artifact uploaded, but bot/live-tv-credential-snapshot was not updated."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          stable_dir="artifacts/credential_health/latest"
          mkdir -p "${stable_dir}"
          cp "${report}" "${stable_dir}/credential_health.json"
          # `latest/` lives under the gitignored artifacts/ tree, so `-f` is
          # required to stage it.
          git add -f "${stable_dir}"
          if git diff --cached --quiet; then
            echo "No credential snapshot changes to commit."
            exit 0
          fi
          git commit -m "[skip ci] chore: refresh credential-health snapshot"
          # Fetch the remote tip first so --force-with-lease has a real base
          # to compare against; tolerate the branch not yet existing.
          git fetch "${_remote_url}" "+refs/heads/bot/live-tv-credential-snapshot:refs/remotes/origin/bot/live-tv-credential-snapshot" 2>/dev/null || true
          # `if git push` form (fail-loud) is what tests/test_workflow_auth_pattern.py
          # expects; a real push failure surfaces red instead of a swallowed warning.
          if git push --force-with-lease=refs/heads/bot/live-tv-credential-snapshot "${_remote_url}" "HEAD:refs/heads/bot/live-tv-credential-snapshot"; then
            echo "Pushed credential snapshot to bot/live-tv-credential-snapshot."
          else
            echo "::warning::credential snapshot push failed; the report artifact remains available, but bot/live-tv-credential-snapshot may be stale and the Grafana credential-age panel can lag until the next daily run."
            {
              echo "### ⚠ credential snapshot persistence warning"
              echo ""
              echo "The credential-health report uploaded, but the rolling bot/live-tv-credential-snapshot branch push failed. The Grafana TradingView credential-age panel may show a stale age until the next daily run."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Open / update cron-failure issue on warn or error
        if: always() && (steps.probe.outputs.overall == 'warn' || steps.probe.outputs.overall == 'error')
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          GH_REPO: ${{ github.repository }}
          OVERALL: ${{ steps.probe.outputs.overall }}
        run: |
          set -euo pipefail
          TITLE="credential-health: ${OVERALL} — daily probe ($(date -u +%Y-%m-%d))"
          BODY_FILE=$(mktemp)
          {
            echo "Daily credential-health-check found one or more probes in **${OVERALL}** state."
            echo ""
            echo "Run: https://github.com/${GH_REPO}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### Probe report"
            echo ""
            echo '```json'
            cat artifacts/ci/credential_health.json
            echo ''
            echo '```'
            echo ""
            echo "### Why this matters"
            echo ""
            echo "This workflow exists because the 2026-04-13 → 2026-05-28 silent publish-skip regression"
            echo "(post-mortem PR #2415) was masked partly by a 45-day-old TV storage_state cookie."
            echo "Any \`error\` or \`warn\` here is operator-actionable: rotate or refresh BEFORE the next"
            echo "consumer workflow tries to use the credential."
          } > "$BODY_FILE"

          # De-duplicate: if an open issue with the same calendar-day
          # title already exists, comment on it instead of creating a
          # new one. Same pattern as f2-promotion-gate auto-issue.
          existing=$(gh issue list --repo "$GH_REPO" --state open \
            --search "$TITLE in:title" --json number --jq '.[0].number' || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GH_REPO" --body-file "$BODY_FILE"
          else
            gh issue create --repo "$GH_REPO" \
              --title "$TITLE" --body-file "$BODY_FILE" \
              --label cron-failure --label automated
          fi

      - name: Fail the job on error
        if: always() && steps.probe.outputs.overall == 'error'
        run: |
          echo "::error::credential-health overall=error — see annotations above and the just-filed cron-failure issue"
          exit 1
