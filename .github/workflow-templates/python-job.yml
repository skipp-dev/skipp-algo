# live-window: any-trigger  # REPLACE-WITH-FEATURE-FLAG (YYYY-MM-DD)
# Template: standard Python job
# Copy this file, rename it, and replace every <replace-me> placeholder.
# See .github/copilot-instructions.md for authoring rules.
name: "<replace-me: workflow name>"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1-5"  # 06:00 UTC weekdays — adjust or remove

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # set true if safe to interrupt mid-run

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_SELF_HOSTED_LABEL }}"

  run:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 20  # adjust per job complexity (lint=5, full-pytest=45)

    steps:
      # ── Bot / data-only PR short-circuit ─────────────────────────────────
      # Remove this block if the workflow is NOT a required status check.
      - name: Determine if heavy steps should run
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${{ github.head_ref }}" == bot/* ]]; then
            echo "Bot data-only PR detected; skipping heavy steps."
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run_heavy == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── Python environment ────────────────────────────────────────────────
      - name: Set up pinned Python (GitHub-hosted)
        if: steps.gate.outputs.run_heavy == 'true' && needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned

      - name: Install uv
        if: steps.gate.outputs.run_heavy == 'true'
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Resolve Python 3.12 interpreter
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python - <<'PY'
            import sys
            raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)
            PY
            then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 - <<'PY'
            import sys
            print(sys.executable)
            PY
            )"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      - name: Install dependencies
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          "$SMC_PYTHON_BIN" -m venv .venv
          uv pip install --python .venv -r requirements.txt
          if [[ -d "$GITHUB_WORKSPACE/.venv/Scripts" ]]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi

      # ── Main step(s) ──────────────────────────────────────────────────────
      - name: <replace-me: step name>
        if: steps.gate.outputs.run_heavy == 'true'
        run: |
          python scripts/<replace-me>.py

      # ── Artefact upload (optional) ────────────────────────────────────────
      - name: Upload report
        if: always() && steps.gate.outputs.run_heavy == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: <replace-me>-report
          path: artifacts/<replace-me>/
          if-no-files-found: ignore
