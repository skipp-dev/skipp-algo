# live-window: any-trigger  # REPLACE-WITH-FEATURE-FLAG (YYYY-MM-DD)
# Template: docs / markdown lint workflow
# Copy this file, rename it, and replace every <replace-me> placeholder.
# See .github/copilot-instructions.md for authoring rules.
name: "<replace-me: lint name>"

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  select-runner:
    runs-on: ${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
      runner_environment: ${{ steps.resolve.outputs.runner_environment }}
      resolution_reason: ${{ steps.resolve.outputs.resolution_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve worker runner
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          python scripts/resolve_workflow_runner.py \
            --repository "${{ github.repository }}" \
            --hosted-runner "${{ vars.SMC_GH_HOSTED_RUNNER || 'ubuntu-latest' }}" \
            --custom-label "${{ vars.SMC_SELF_HOSTED_LABEL }}"

  lint:
    needs: select-runner
    runs-on: ${{ fromJson(needs.select-runner.outputs.runs_on_json) }}
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pinned Python (GitHub-hosted)
        if: needs.select-runner.outputs.runner_environment == 'github-hosted'
        uses: ./.github/actions/setup-python-pinned

      - name: Resolve Python 3.12 interpreter
        run: |
          if [[ "${{ needs.select-runner.outputs.runner_environment }}" == "github-hosted" ]]; then
            echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            if python - <<'PY'
            import sys
            raise SystemExit(0 if sys.version_info[:2] == (3, 12) else 1)
            PY
            then
              echo "SMC_PYTHON_BIN=python" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if command -v py >/dev/null 2>&1; then
            python_bin="$(py -3.12 - <<'PY'
            import sys
            print(sys.executable)
            PY
            )"
            echo "SMC_PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Self-hosted runner is missing a usable Python 3.12 interpreter (tried \`python\` and \`py -3.12\`)."
          exit 1

      # ── Lint step(s) ──────────────────────────────────────────────────────
      # Examples — keep only what you need:

      # Option A: inline grep guard
      - name: <replace-me: lint step>
        run: |
          if grep -rnE '<replace-me: pattern>' --include='*.md' docs/; then
            echo "::error::Found disallowed pattern — <replace-me: explanation>."
            exit 1
          fi
          echo "OK"

      # Option B: Python script
      # - name: <replace-me: check name>
      #   run: "$SMC_PYTHON_BIN" scripts/<replace-me>.py
